<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Produção · Oficina — Oimpresso ERP</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    /* ── Oficina-specific overrides em cima do prod-* ── */
    html, body, #root { height: 100%; }
    body { margin: 0; background: var(--bg-2); color: var(--text); font-family: var(--font-sans); }
    .ofc-shell {
      display: grid;
      grid-template-columns: 220px 1fr;
      height: 100vh;
      overflow: hidden;
    }
    /* Sidebar leve só pra ancorar visualmente — não é o foco */
    .ofc-sidebar {
      background: var(--sb-bg);
      color: var(--sb-text);
      padding: 14px 12px;
      display: flex; flex-direction: column; gap: 2px;
      border-right: 1px solid var(--sb-border);
    }
    .ofc-sidebar h2 {
      font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
      color: var(--sb-text-dim); margin: 4px 8px 8px;
    }
    .ofc-brand {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 8px 14px;
      color: var(--sb-text-hi);
    }
    .ofc-brand-mark {
      width: 26px; height: 26px; border-radius: 6px;
      background: linear-gradient(135deg, oklch(0.62 0.13 30), oklch(0.55 0.16 25));
      display: grid; place-items: center;
      font-weight: 700; color: white; font-size: 12px;
    }
    .ofc-brand-name { font-size: 13px; font-weight: 600; }
    .ofc-brand-sub { font-size: 10.5px; color: var(--sb-text-dim); }
    .ofc-nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 6px;
      font-size: 12.5px; color: var(--sb-text);
      cursor: pointer;
    }
    .ofc-nav-item:hover { background: var(--sb-hover); color: var(--sb-text-hi); }
    .ofc-nav-item.active { background: var(--sb-active); color: var(--sb-text-hi); }
    .ofc-nav-item .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--sb-text-dim); }
    .ofc-nav-item.active .dot { background: oklch(0.70 0.14 30); }
    .ofc-main { overflow: auto; }

    /* 5 colunas no kanban da oficina (vs. 3 da CV) */
    .prod-kanban.ofc-5 { grid-template-columns: repeat(5, minmax(228px, 1fr)); }

    /* Placa estilo Mercosul (visual, não literal) */
    .ofc-plate {
      display: inline-flex; flex-direction: column; align-items: stretch;
      border: 1.5px solid oklch(0.30 0.01 240);
      border-radius: 4px;
      overflow: hidden;
      font-family: var(--font-mono);
      line-height: 1;
      background: white;
      min-width: 76px;
    }
    .ofc-plate .top {
      background: oklch(0.45 0.13 250);
      color: white;
      font-size: 7px;
      letter-spacing: .12em;
      text-align: center;
      padding: 1.5px 0;
      font-weight: 600;
    }
    .ofc-plate .num {
      padding: 3px 6px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      letter-spacing: .04em;
      color: oklch(0.20 0.01 240);
    }

    /* Cor por dot-type (etapas oficina) */
    .prod-col-dot.slate    { background: oklch(0.55 0.02 250); }
    .prod-col-dot.indigo   { background: oklch(0.55 0.16 270); }
    .prod-col-dot.rose     { background: oklch(0.62 0.16 20); }
    .prod-col-dot.emerald  { background: oklch(0.58 0.13 155); }
    .prod-col-dot.green    { background: oklch(0.62 0.14 145); }
    .prod-col-slate    { border-top: 2px solid oklch(0.65 0.02 250); }
    .prod-col-indigo   { border-top: 2px solid oklch(0.65 0.14 270); }
    .prod-col-rose     { border-top: 2px solid oklch(0.72 0.14 20); }
    .prod-col-emerald  { border-top: 2px solid oklch(0.70 0.12 155); }
    .prod-col-green    { border-top: 2px solid oklch(0.72 0.13 145); }

    /* Card oficina: vehicle row + meta */
    .ofc-veh-row {
      display: flex; align-items: center; gap: 8px;
      margin: 2px 0 6px;
    }
    .ofc-veh-meta { display: flex; flex-direction: column; gap: 1px; min-width: 0; flex: 1; }
    .ofc-veh-name { font-size: 12.5px; font-weight: 500; color: var(--text); }
    .ofc-veh-sub  { font-size: 10.5px; color: var(--text-mute); font-variant-numeric: tabular-nums; }

    .ofc-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text-dim);
      margin-top: 4px;
    }
    .ofc-row svg { color: var(--text-mute); }
    .ofc-row .dim { color: var(--text-mute); }

    .ofc-mech-av {
      width: 18px; height: 18px; border-radius: 50%;
      background: oklch(0.85 0.04 250);
      color: oklch(0.30 0.06 250);
      display: inline-grid; place-items: center;
      font-size: 9px; font-weight: 600;
      flex-shrink: 0;
    }

    /* Box pill */
    .ofc-box-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 6px;
      font-size: 10.5px; font-weight: 500;
      color: oklch(0.30 0.10 30);
      background: oklch(0.95 0.04 30);
      border: 1px solid oklch(0.88 0.06 30);
      border-radius: 4px;
      font-family: var(--font-mono);
    }
    .ofc-box-pill.elev {
      color: oklch(0.30 0.08 270);
      background: oklch(0.95 0.03 270);
      border-color: oklch(0.88 0.05 270);
    }

    /* Status pill peças */
    .ofc-parts {
      display: flex; align-items: center; gap: 4px;
      font-size: 10.5px;
      color: var(--text-dim);
      padding: 4px 6px;
      background: oklch(0.97 0.005 90);
      border: 1px solid var(--border-2);
      border-radius: 4px;
      margin-top: 6px;
    }
    .ofc-parts.warn {
      background: oklch(0.97 0.04 70);
      border-color: oklch(0.88 0.07 70);
      color: oklch(0.40 0.10 60);
    }
    .ofc-parts.ok {
      background: oklch(0.96 0.04 145);
      border-color: oklch(0.88 0.07 145);
      color: oklch(0.36 0.10 145);
    }
    .ofc-parts.await {
      background: oklch(0.96 0.04 20);
      border-color: oklch(0.88 0.07 20);
      color: oklch(0.42 0.13 20);
    }
    .ofc-parts-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .ofc-symptom {
      font-size: 11.5px;
      color: var(--text-dim);
      margin: 4px 0 2px;
      line-height: 1.35;
      text-wrap: pretty;
    }

    .ofc-eta-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10.5px; color: var(--text-mute);
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }
    .ofc-eta-row b { color: var(--text-dim); font-weight: 500; }

    /* Filters: usa prod-equip-filters mas com badge "box" */
    .prod-equip-dot.box { background: oklch(0.62 0.13 30); }
    .prod-equip-dot.elev { background: oklch(0.55 0.13 270); }

    /* Drawer extras */
    .ofc-drawer-section {
      border-top: 1px solid var(--border-2);
      padding: 14px 0 4px;
      margin-top: 10px;
    }
    .ofc-drawer-section h4 {
      font-size: 10.5px; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase;
      color: var(--text-mute);
      margin: 0 0 10px;
    }
    .ofc-photos {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .ofc-photo {
      aspect-ratio: 4/3;
      border-radius: 6px;
      background:
        repeating-linear-gradient(45deg, oklch(0.92 0.005 90) 0 8px, oklch(0.95 0.005 90) 8px 16px);
      border: 1px solid var(--border-2);
      display: grid; place-items: center;
      font-family: var(--font-mono);
      font-size: 9.5px;
      color: var(--text-mute);
      text-align: center;
      padding: 6px;
    }
    .ofc-parts-list {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 6px;
    }
    .ofc-parts-list li {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      font-size: 12px;
      padding: 6px 8px;
      background: var(--bg-2);
      border-radius: 6px;
      align-items: center;
    }
    .ofc-parts-list .qty { font-family: var(--font-mono); color: var(--text-mute); font-size: 11px; }
    .ofc-parts-list .stat {
      font-size: 10px; padding: 2px 6px; border-radius: 4px;
      font-weight: 500;
    }
    .ofc-parts-list .stat.ok    { background: oklch(0.94 0.05 145); color: oklch(0.36 0.10 145); }
    .ofc-parts-list .stat.warn  { background: oklch(0.95 0.06 70);  color: oklch(0.42 0.12 60);  }
    .ofc-parts-list .stat.wait  { background: oklch(0.95 0.04 20);  color: oklch(0.42 0.13 20);  }

    .ofc-timeline {
      display: flex; flex-direction: column; gap: 0;
      position: relative;
      padding-left: 12px;
    }
    .ofc-timeline::before {
      content: ""; position: absolute;
      top: 6px; bottom: 6px; left: 4px;
      width: 1px; background: var(--border);
    }
    .ofc-tl-item {
      position: relative;
      padding: 4px 0 10px 8px;
      font-size: 11.5px;
    }
    .ofc-tl-item::before {
      content: ""; position: absolute;
      left: -10px; top: 9px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--bg);
      border: 1.5px solid var(--text-mute);
    }
    .ofc-tl-item.done::before { background: oklch(0.62 0.14 145); border-color: oklch(0.55 0.13 145); }
    .ofc-tl-item.now::before { background: oklch(0.62 0.13 30); border-color: oklch(0.55 0.16 25); box-shadow: 0 0 0 3px oklch(0.95 0.05 30); }
    .ofc-tl-when { color: var(--text-mute); font-size: 10.5px; font-variant-numeric: tabular-nums; }
    .ofc-tl-what { color: var(--text); }
    .ofc-tl-by { color: var(--text-mute); font-size: 10.5px; }

    /* Aprovação banner */
    .ofc-approval {
      background: oklch(0.96 0.06 70);
      border: 1px solid oklch(0.85 0.10 70);
      color: oklch(0.36 0.12 60);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11.5px;
      display: flex; align-items: center; gap: 8px;
      margin-top: 8px;
    }
    .ofc-approval.pending { animation: ofcPulse 2s ease-in-out infinite; }
    @keyframes ofcPulse { 50% { background: oklch(0.94 0.08 70); } }

    .ofc-card-urgent-strip {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: oklch(0.62 0.16 25);
      border-radius: 8px 8px 0 0;
    }
    .prod-card { position: relative; }

    /* Vehicle-context note in drawer */
    .ofc-veh-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      padding: 10px;
      background: var(--bg-2);
      border-radius: 8px;
      border: 1px solid var(--border-2);
    }
    .ofc-veh-card .ofc-plate { transform: scale(1.15); transform-origin: top left; }
    .ofc-veh-card dl { margin: 0; font-size: 11.5px; display: grid; grid-template-columns: auto 1fr; gap: 2px 10px; align-self: end; }
    .ofc-veh-card dt { color: var(--text-mute); }
    .ofc-veh-card dd { margin: 0; color: var(--text); font-variant-numeric: tabular-nums; }

    /* Reuse some buttons */
    .os-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 10px;
      font-size: 11.5px; font-weight: 500;
      border-radius: 6px;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-family: inherit;
    }
    .os-btn:hover { background: var(--bg-2); }
    .os-btn.primary { background: var(--text); color: var(--surface); border-color: var(--text); }
    .os-btn.primary:hover { background: oklch(0.30 0.01 80); }
    .os-btn.ghost { background: transparent; }

    .icon-btn {
      width: 26px; height: 26px;
      display: inline-grid; place-items: center;
      border: 1px solid var(--border); background: var(--surface);
      border-radius: 6px; cursor: pointer;
      color: var(--text-dim);
    }
    .icon-btn:hover { background: var(--bg-2); color: var(--text); }

    /* ─────────── TWEAKS ─────────── */

    /* Densidade — reshapes per-card information bandwidth */
    .ofc-density-compacto .prod-card { padding: 9px 11px; }
    .ofc-density-compacto .ofc-symptom,
    .ofc-density-compacto .prod-progress,
    .ofc-density-compacto .ofc-mech-name,
    .ofc-density-compacto .ofc-parts-label,
    .ofc-density-compacto .ofc-card-extra { display: none; }
    .ofc-density-compacto .ofc-eta-row { margin-top: 4px; font-size: 10px; }
    .ofc-density-compacto .ofc-parts { padding: 3px 6px; font-size: 10px; }
    .ofc-density-compacto .ofc-veh-row { margin-bottom: 2px; }
    .ofc-density-compacto .ofc-plate { transform: scale(0.9); transform-origin: left center; }

    .ofc-card-extra { display: none; }
    .ofc-density-detalhe .ofc-card-extra {
      display: flex; align-items: center; gap: 8px;
      margin-top: 8px; padding-top: 8px;
      border-top: 1px dashed var(--border-2);
    }
    .ofc-density-detalhe .prod-card { padding: 14px 14px 12px; }
    .ofc-density-detalhe .ofc-symptom { font-size: 12.5px; line-height: 1.5; }
    .ofc-card-extra-thumb {
      width: 42px; height: 30px; border-radius: 4px;
      background: repeating-linear-gradient(45deg, oklch(0.92 0.005 90) 0 5px, oklch(0.95 0.005 90) 5px 10px);
      border: 1px solid var(--border-2);
      flex-shrink: 0;
      display: grid; place-items: center;
      font-family: var(--font-mono); font-size: 8px; color: var(--text-mute);
    }
    .ofc-card-extra-last {
      font-size: 10.5px; color: var(--text-mute); line-height: 1.35; flex: 1; min-width: 0;
    }
    .ofc-card-extra-last b { color: var(--text-dim); font-weight: 500; }

    /* Pressão — reshapes the urgency/temperature dial */
    .ofc-mood-calmo .ofc-card-urgent-strip { display: none; }
    .ofc-mood-calmo .prod-col-dot,
    .ofc-mood-calmo .prod-col { filter: saturate(0.45); }
    .ofc-mood-calmo .ofc-approval.pending { animation: none; background: oklch(0.97 0.015 80); border-color: var(--border-2); color: var(--text-dim); }
    .ofc-mood-calmo .prod-card.urgent { box-shadow: none; }
    .ofc-mood-calmo .prod-kpi-urgent { background: var(--surface); border-color: var(--border); }

    .ofc-mood-pressao .prod-card.urgent {
      animation: ofcUrgentPulse 1.8s ease-in-out infinite;
      box-shadow: 0 0 0 1.5px oklch(0.62 0.16 25 / .65), 0 4px 14px oklch(0.62 0.16 25 / .22);
    }
    @keyframes ofcUrgentPulse {
      50% { box-shadow: 0 0 0 1.5px oklch(0.62 0.16 25), 0 8px 22px oklch(0.62 0.16 25 / .45); }
    }
    .ofc-mood-pressao .ofc-card-urgent-strip { height: 3px; }
    .ofc-mood-pressao .prod-card.urgent .prod-deadline,
    .ofc-mood-pressao .prod-card.urgent .ofc-eta-row {
      color: oklch(0.48 0.16 25); font-weight: 600;
    }
    .ofc-mood-pressao .ofc-approval.pending { animation-duration: 1s; }
    .ofc-mood-pressao .prod-col { filter: saturate(1.25); }
    .ofc-mood-pressao .ofc-countdown { display: inline-flex; }
    .ofc-countdown {
      display: none; align-items: center; gap: 3px;
      padding: 1px 5px; margin-left: auto;
      background: oklch(0.95 0.07 25);
      color: oklch(0.42 0.15 25);
      border-radius: 3px;
      font-size: 9.5px; font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: .02em;
    }

    /* Foco — when re-pivoted, cards need a stage chip so users keep their bearings */
    .ofc-stage-chip {
      display: none;
      align-items: center; gap: 4px;
      font-size: 10px; color: var(--text-dim);
      padding: 1px 5px; border-radius: 3px;
      background: var(--bg-2); border: 1px solid var(--border-2);
    }
    .ofc-stage-chip-dot { width: 5px; height: 5px; border-radius: 50%; }
    .ofc-foco-box .ofc-stage-chip,
    .ofc-foco-mecanico .ofc-stage-chip { display: inline-flex; }
    /* In box/mecânico pivots, drop the redundant box pill from card top */
    .ofc-foco-box .ofc-box-pill,
    .ofc-foco-mecanico .ofc-box-pill { display: none; }

    /* Wider columns when re-pivoted to many resources/mechs */
    .prod-kanban.ofc-many { grid-template-columns: repeat(var(--ofc-cols, 5), minmax(228px, 1fr)); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "foco": "etapa",
      "densidade": "padrao",
      "pressao": "padrao"
    }/*EDITMODE-END*/;
    const { useState, useMemo } = React;

    // ── Inline icons (subset, sized for cards) ──
    const Ico = {
      car: (p) => <svg width={p.size||12} height={p.size||12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 17h14M3 13l2-5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2l2 5"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>,
      gauge: (p) => <svg width={p.size||12} height={p.size||12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 13l4-3"/><path d="M12 5V3"/></svg>,
      wrench: (p) => <svg width={p.size||12} height={p.size||12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a4 4 0 0 0 5.4 5.4L21 12l-9 9-2-2 9-9-1.7-1.7a4 4 0 0 0-5.4-5.4L13 5l-9 9 2 2 9-9-.3-.7Z"/></svg>,
      box: (p) => <svg width={p.size||12} height={p.size||12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7l9-4 9 4-9 4-9-4Z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/></svg>,
      clock: (p) => <svg width={p.size||12} height={p.size||12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
      check: (p) => <svg width={p.size||12} height={p.size||12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13l4 4 10-10"/></svg>,
      x: (p) => <svg width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 6l12 12M6 18L18 6"/></svg>,
      plus: (p) => <svg width={p.size||12} height={p.size||12} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>,

        ] : []),
        ...(os.stage === "pronto" ? [
          { when: os.finishedAt, what: "Serviço concluído", by: m?.nome || "—", status: "done" },
          { when: "—", what: "Aguardando retirada", by: os.client, status: "now" },
        ] : []),
      ];

      const showApproval = os.stage === "pecas" && os.partsStatus === "approval";

      return (
        <div className="prod-drawer-backdrop" onClick={onClose}>
          <aside className="prod-drawer" onClick={e => e.stopPropagation()}>
            <header className="prod-drawer-head">
              <div>
                <div className="prod-drawer-eyebrow">OS #{os.id} · {STAGES.find(s => s.id === os.stage)?.label}</div>
                <h2 style={{margin:"4px 0 2px"}}>{os.veh}</h2>
                <p style={{margin:0, fontSize:"12px", color:"var(--text-dim)"}}>{os.client}</p>
              </div>
              <button className="icon-btn" onClick={onClose}><Ico.x size={14}/></button>
            </header>

            <div className="prod-drawer-body">
              {/* Vehicle card */}
              <div className="ofc-veh-card">
                <Plate value={os.plate}/>
                <dl>
                  <dt>KM</dt><dd>{os.km}</dd>
                  <dt>Box</dt><dd>{r ? r.label : "— (sem alocação)"}</dd>
                  <dt>Mecânico</dt><dd>{m ? m.nome : "—"}</dd>
                  <dt>Valor</dt><dd>{os.value}</dd>
                </dl>
              </div>

              {/* Symptom */}
              <div className="ofc-drawer-section">
                <h4>Sintoma reportado</h4>
                <p style={{margin:0, fontSize:"13px", lineHeight:1.45, color:"var(--text)"}}>{os.symptom}</p>
              </div>

              {/* Approval banner */}
              {showApproval && (
                <div className="ofc-approval pending">
                  <Ico.alert size={14}/>
                  <div style={{flex:1}}>
                    <b>Aguardando aprovação do cliente.</b> Orçamento enviado por WhatsApp há 2h.
                  </div>
                  <button className="os-btn" style={{padding:"3px 8px", fontSize:"10.5px"}}>Cobrar</button>
                </div>
              )}

              {/* Photos / laudo */}
              <div className="ofc-drawer-section">
                <h4>Fotos & Laudo</h4>
                <div className="ofc-photos">
                  <div className="ofc-photo">FOTO·1<br/>frente</div>
                  <div className="ofc-photo">FOTO·2<br/>painel</div>
                  <div className="ofc-photo">FOTO·3<br/>peça</div>
                </div>
                <button className="os-btn ghost" style={{marginTop:8, fontSize:"11px"}}><Ico.camera size={11}/>Adicionar foto</button>
              </div>

              {/* Parts */}
              <div className="ofc-drawer-section">
                <h4>Peças & Mão de obra</h4>
                <ul className="ofc-parts-list">
                  {partsList.map((p, i) => (
                    <li key={i}>
                      <span>{p.name}</span>
                      <span className="qty">{p.qty}</span>
                      <span className={"stat " + p.stat}>{p.statL}</span>
                    </li>
                  ))}
                </ul>
              </div>

              {/* Timeline */}
              <div className="ofc-drawer-section">
                <h4>Linha do tempo</h4>
                <div className="ofc-timeline">
                  {tl.map((t, i) => (
                    <div key={i} className={"ofc-tl-item " + t.status}>
                      <div className="ofc-tl-when">{t.when}</div>
                      <div className="ofc-tl-what">{t.what}</div>
                      <div className="ofc-tl-by">{t.by}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Actions */}
              <div className="prod-drawer-actions" style={{marginTop:14, display:"flex", gap:8, flexWrap:"wrap"}}>
                <button className="os-btn ghost"><Ico.msg size={11}/>Conversa cliente</button>
                <button className="os-btn ghost"><Ico.file size={11}/>Imprimir OS</button>
                <button className="os-btn primary" style={{marginLeft:"auto"}}>Avançar etapa →</button>
              </div>
            </div>
          </aside>
        </div>
      );
    }

    // ── Página principal ──
    function ProducaoOficina({ foco }) {
      const [recursoFilter, setRecursoFilter] = useState("all");
      const [view, setView] = useState("kanban");
      const [open, setOpen] = useState(null);

      const filtered = useMemo(() => {
        if (recursoFilter === "all") return OS_LIST;
        return OS_LIST.filter(o => o.recurso === recursoFilter);
      }, [recursoFilter]);

      // Pivot do board: etapa / box / mecânico
      const pivot = useMemo(() => {
        if (foco === "box") {
          return [
            ...RECURSOS.map(r => ({
              id: r.id, label: r.label,
              dot: r.cls === "box" ? "rose" : "indigo",
              filter: o => o.recurso === r.id,
            })),
            { id: "_none", label: "Sem alocação", dot: "slate", filter: o => !o.recurso },
          ];
        }
        if (foco === "mecanico") {
          return [
            ...MECANICOS.map(m => ({
              id: m.id, label: m.nome,
              dot: "indigo",
              filter: o => o.mech === m.id,
            })),
            { id: "_none", label: "Sem mecânico", dot: "slate", filter: o => !o.mech },
          ];
        }
        return STAGES.map(s => ({
          id: s.id, label: s.label, dot: s.dot,
          filter: o => o.stage === s.id,
        }));
      }, [foco]);

      const byCol = useMemo(() => {
        const m = {};
        pivot.forEach(c => { m[c.id] = filtered.filter(c.filter); });
        return m;
      }, [filtered, pivot]);

      const totals = {
        recepcao:    OS_LIST.filter(o => o.stage === "recepcao").length,
        diagnostico: OS_LIST.filter(o => o.stage === "diagnostico").length,
        pecas:       OS_LIST.filter(o => o.stage === "pecas").length,
        execucao:    OS_LIST.filter(o => o.stage === "execucao").length,
        pronto:      OS_LIST.filter(o => o.stage === "pronto").length,
        urgent:      OS_LIST.filter(o => o.urgent).length,
        valor:       OS_LIST.reduce((a,o) => a + valorNumOf(o.value), 0),
        approval:    OS_LIST.filter(o => o.stage === "pecas" && o.partsStatus === "approval").length,
      };

      return (
        <div className="prod-page" data-screen-label="01 Produção · Oficina">
          {/* Header */}
          <div className="prod-header">
            <div className="prod-header-l">
              <h1>Produção · Oficina</h1>
              <p>Recepção, diagnóstico, peças, execução e entrega de veículos</p>
            </div>
            <div className="prod-header-r">
              <div className="prod-view-toggle">
                <button className={view === "kanban" ? "active" : ""} onClick={() => setView("kanban")}>
                  <Ico.grid size={11}/>Kanban
                </button>
                <button className={view === "list" ? "active" : ""} onClick={() => setView("list")}>
                  <Ico.list size={11}/>Lista
                </button>
              </div>
              <button className="os-btn ghost"><Ico.print size={11}/>Imprimir fila</button>
              <button className="os-btn primary"><Ico.plus size={11}/>Nova OS</button>
            </div>
          </div>

          {/* KPIs */}
          <div className="prod-kpis">
            <div className="prod-kpi">
              <span className="prod-kpi-label">Recepção</span>
              <span className="prod-kpi-value">{totals.recepcao}</span>
              <span className="prod-kpi-sub">veículos aguardando triagem</span>
            </div>
            <div className="prod-kpi">
              <span className="prod-kpi-label">Em diagnóstico</span>
              <span className="prod-kpi-value">{totals.diagnostico}</span>
              <span className="prod-kpi-sub">{RECURSOS.length} boxes/elevadores</span>
            </div>
            <div className="prod-kpi">
              <span className="prod-kpi-label">Aguardando peças</span>
              <span className="prod-kpi-value">{totals.pecas}</span>
              <span className="prod-kpi-sub">{totals.approval} aguardam OK do cliente</span>
            </div>
            <div className="prod-kpi">
              <span className="prod-kpi-label">Em execução</span>
              <span className="prod-kpi-value">{totals.execucao}</span>
              <span className="prod-kpi-sub">boxes ocupados agora</span>
            </div>
            <div className="prod-kpi prod-kpi-urgent">
              <span className="prod-kpi-label">Urgentes</span>
              <span className="prod-kpi-value">{totals.urgent}</span>
              <span className="prod-kpi-sub">prazo crítico</span>
            </div>
            <div className="prod-kpi">
              <span className="prod-kpi-label">Valor em curso</span>
              <span className="prod-kpi-value">{valorBR(totals.valor).replace(",00","")}</span>
              <span className="prod-kpi-sub">faturamento previsto</span>
            </div>
          </div>

          {/* Filter por recurso (box/elevador) */}
          <div className="prod-equip-filters">
            <button className={"prod-equip-tab" + (recursoFilter === "all" ? " active" : "")}
                    onClick={() => setRecursoFilter("all")}>
              Todos os boxes <span className="count">{OS_LIST.length}</span>
            </button>
            {RECURSOS.map(r => {
              const n = OS_LIST.filter(o => o.recurso === r.id).length;
              return (
                <button key={r.id}
                        className={"prod-equip-tab" + (recursoFilter === r.id ? " active" : "")}
                        onClick={() => setRecursoFilter(r.id)}>
                  <span className={"prod-equip-dot " + r.cls}/>
                  {r.label} <span className="count">{n}</span>
                </button>
              );
            })}
          </div>

          {/* Kanban */}
          {view === "kanban" && (
            <div className={"prod-kanban " + (foco === "etapa" ? "ofc-5" : "ofc-many")}
                 style={foco !== "etapa" ? { "--ofc-cols": pivot.length } : undefined}>
              {pivot.map(c => (
                <ProdColumn
                  key={c.id}
                  stage={{ id: c.id, label: c.label, dot: c.dot }}
                  items={byCol[c.id] || []}
                  capacity={foco === "etapa" && c.id === "execucao" ? `${byCol.execucao.length}/${RECURSOS.length} boxes` : null}
                  onOpen={setOpen}
                />
              ))}
            </div>
          )}

          {/* Lista */}
          {view === "list" && (
            <div className="prod-list">
              <table className="os-table">
                <thead>
                  <tr>
                    <th>OS</th><th>Placa</th><th>Veículo</th><th>Cliente</th>
                    <th>Etapa</th><th>Box</th><th>Mecânico</th><th>Prazo</th><th style={{textAlign:"right"}}>Valor</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(os => {
                    const r = recursoOf(os.recurso);
                    const m = mechOf(os.mech);
                    const s = STAGES.find(x => x.id === os.stage);
                    return (
                      <tr key={os.id} onClick={() => setOpen(os)} style={{cursor:"pointer"}}>
                        <td className="mono">#{os.id}</td>
                        <td><Plate value={os.plate}/></td>
                        <td>{os.veh} <small style={{color:"var(--text-mute)"}}>{os.km} km</small></td>
                        <td>{os.client}</td>
                        <td><span className="stage-pill" style={{display:"inline-flex", alignItems:"center", gap:5}}><span className={"prod-col-dot " + s.dot}/>{s.label}</span></td>
                        <td>{r ? r.label : "—"}</td>
                        <td>{m ? m.nome : "—"}</td>
                        <td>{os.deadline}</td>
                        <td className="mono" style={{textAlign:"right"}}>{os.value}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          <Drawer os={open} onClose={() => setOpen(null)}/>
        </div>
      );
    }

    // ── Shell ──
    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const shellClass = [
        "ofc-shell",
        "ofc-foco-" + t.foco,
        "ofc-density-" + t.densidade,
        "ofc-mood-" + t.pressao,
      ].join(" ");
      return (
        <div className={shellClass}>
          <aside className="ofc-sidebar">
            <div className="ofc-brand">
              <div className="ofc-brand-mark">O</div>
              <div>
                <div className="ofc-brand-name">Oimpresso ERP</div>
                <div className="ofc-brand-sub">Oficina · piloto</div>
              </div>
            </div>
            <h2>Operação</h2>
            <div className="ofc-nav-item"><span className="dot"/>Tarefas</div>
            <div className="ofc-nav-item"><span className="dot"/>Vendas</div>
            <div className="ofc-nav-item"><span className="dot"/>OS</div>
            <div className="ofc-nav-item active"><span className="dot"/>Produção</div>
            <div className="ofc-nav-item"><span className="dot"/>Estoque</div>
            <h2 style={{marginTop:14}}>Cadastro</h2>
            <div className="ofc-nav-item"><span className="dot"/>Clientes</div>
            <div className="ofc-nav-item"><span className="dot"/>Veículos</div>
            <div className="ofc-nav-item"><span className="dot"/>Mecânicos</div>
          </aside>
          <main className="ofc-main">
            <ProducaoOficina foco={t.foco}/>
          </main>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Foco"/>
            <TweakRadio
              label="Pivot do board"
              value={t.foco}
              options={[
                { value: "etapa",    label: "Etapa" },
                { value: "box",      label: "Box" },
                { value: "mecanico", label: "Mecânico" },
              ]}
              onChange={v => setTweak("foco", v)}
            />
            <TweakSection label="Densidade"/>
            <TweakRadio
              label="Detalhe nos cards"
              value={t.densidade}
              options={[
                { value: "compacto", label: "Compacto" },
                { value: "padrao",   label: "Padrão" },
                { value: "detalhe",  label: "Detalhe" },
              ]}
              onChange={v => setTweak("densidade", v)}
            />
            <TweakSection label="Pressão"/>
            <TweakRadio
              label="Temperatura visual"
              value={t.pressao}
              options={[
                { value: "calmo",   label: "Calmo" },
                { value: "padrao",  label: "Padrão" },
                { value: "pressao", label: "Pressão" },
              ]}
              onChange={v => setTweak("pressao", v)}
            />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
