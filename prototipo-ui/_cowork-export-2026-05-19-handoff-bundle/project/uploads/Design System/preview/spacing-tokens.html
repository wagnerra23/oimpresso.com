<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "IBM Plex Sans", sans-serif; background: oklch(0.985 0.003 90); padding: 16px; color: oklch(0.22 0.01 80); -webkit-font-smoothing: antialiased; }
  .section { margin-bottom: 14px; }
  .label { font-size: 9.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: oklch(0.65 0.01 80); margin-bottom: 8px; }
  .row { display: flex; gap: 10px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: #fff; border: 1px solid oklch(0.90 0.004 90); }
  .name { font-size: 10px; font-weight: 600; }
  .val  { font-family: "IBM Plex Mono", monospace; font-size: 9px; color: oklch(0.65 0.01 80); }
  .shadow-box { background: #fff; border-radius: 8px; width: 80px; height: 48px; display: grid; place-items: center; font-size: 10px; }
  .density-row { display: flex; gap: 8px; }
  .density-item { background: #fff; border: 1px solid oklch(0.90 0.004 90); border-radius: 6px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; font-size: 11.5px; }
  .density-line { height: var(--h); background: oklch(0.58 0.09 220); border-radius: 2px; width: 3px; }
</style>
</head>
<body>
  <div class="section">
    <div class="label">Border Radius</div>
    <div class="row">
      <div class="item">
        <div class="box" style="width:40px;height:40px;border-radius:6px"></div>
        <span class="name">radius-sm</span><span class="val">6px</span>
      </div>
      <div class="item">
        <div class="box" style="width:52px;height:52px;border-radius:8px"></div>
        <span class="name">radius</span><span class="val">8px</span>
      </div>
      <div class="item">
        <div class="box" style="width:64px;height:64px;border-radius:12px"></div>
        <span class="name">radius-lg</span><span class="val">12px</span>
      </div>
      <div class="item">
        <div class="box" style="width:64px;height:32px;border-radius:999px"></div>
        <span class="name">pill</span><span class="val">999px</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Sombras</div>
    <div class="row">
      <div class="item">
        <div class="shadow-box" style="box-shadow:0 1px 2px rgba(0,0,0,.04)">soft</div>
        <span class="val">0 1px 2px .04</span>
      </div>
      <div class="item">
        <div class="shadow-box" style="box-shadow:0 6px 24px -8px rgba(0,0,0,.18),0 2px 6px -2px rgba(0,0,0,.10)">pop</div>
        <span class="val">dropdowns / modais</span>
      </div>
      <div class="item">
        <div class="shadow-box" style="box-shadow:0 0 0 3px oklch(0.94 0.025 220); border:1px solid oklch(0.58 0.09 220)">focus</div>
        <span class="val">0 0 0 3px accent-soft</span>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="label">Densidade de linha (row-h)</div>
    <div class="density-row">
      <div class="density-item" style="height:26px"><div class="density-line" style="--h:26px"></div>compact — 26px</div>
      <div class="density-item" style="height:30px"><div class="density-line" style="--h:30px"></div>default — 30px</div>
      <div class="density-item" style="height:34px"><div class="density-line" style="--h:34px"></div>comfy — 34px</div>
    </div>
  </div>
</body>
</html>
