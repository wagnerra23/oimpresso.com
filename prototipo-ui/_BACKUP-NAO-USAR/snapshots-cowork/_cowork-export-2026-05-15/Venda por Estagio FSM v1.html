<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Venda por Estágio — FSM</title>
<style>
  :root{
    --bg:#f6f4ef; --paper:#fff; --ink:#1a1917; --ink-2:#5b574f; --ink-3:#8b8580;
    --line:#e5e0d3; --line-2:#efeae0;
    --accent:#1f3a5f; --accent-soft:#eaf0f7; --accent-2:#173049;
    --ok:#1f6d3a; --ok-soft:#e6f1e8;
    --warn:#a35a00; --warn-soft:#fbf0dc;
    --err:#9a2a2a; --err-soft:#f7e3e3;
    --gray:#6e6a62; --gray-soft:#f0ece2;
    --radius:6px;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 ui-sans-serif,system-ui,-apple-system,sans-serif}

  /* shell */
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .side{background:#0f1014;color:#cfc9bd;padding:18px 14px;border-right:1px solid #2a2b30}
  .side h1{font-size:13px;margin:0 0 16px;color:#f4efe2;letter-spacing:.02em}
  .side h1 small{display:block;font-size:10px;color:#7c7669;font-weight:400;margin-top:2px;letter-spacing:.04em;text-transform:uppercase}
  .side-group{margin-bottom:14px}
  .side-group-l{font-size:10px;color:#7c7669;text-transform:uppercase;letter-spacing:.06em;margin:8px 4px}
  .side-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;cursor:pointer;font-size:12.5px;color:#cfc9bd}
  .side-item:hover{background:#1c1d22}
  .side-item.active{background:#1c1d22;color:#fff}
  .side-item .dot{width:6px;height:6px;border-radius:50%;background:#5a554a}
  .side-item.active .dot{background:#7eb8e8}

  .main{padding:24px 28px;max-width:1180px}

  /* head */
  .h-row{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
  .h-id{font-family:var(--mono);font-size:11px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.06em}
  .h-row h1{margin:2px 0 4px;font-size:20px;letter-spacing:-.01em;font-weight:600}
  .h-row .sub{margin:0;color:var(--ink-2);font-size:13px}
  .h-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
  .badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;letter-spacing:.02em;display:inline-flex;align-items:center;gap:5px;border:1px solid transparent}
  .badge.draft   { background:var(--gray-soft);color:#5a5249;border-color:#d6cfc0 }
  .badge.approved{ background:var(--accent-soft);color:var(--accent);border-color:#c9d6e8 }
  .badge.prod    { background:var(--warn-soft);color:var(--warn);border-color:#e8d2a3 }
  .badge.rti     { background:#fdf6e0;color:#7a6a1f;border-color:#e8dba3 }
  .badge.inst    { background:#e7f0ff;color:#264a8b;border-color:#bccae5 }
  .badge.compl   { background:#e6f1e8;color:#1f6d3a;border-color:#b8d6c0 }
  .badge.inv     { background:#dbeedf;color:#155f2c;border-color:#a4ceaf }
  .badge.deliv   { background:#e6efe6;color:#2c5e3a;border-color:#a4c5ab }
  .badge.closed  { background:#1f3a5f;color:#fff;border-color:#1f3a5f }
  .badge.cancel  { background:var(--err-soft);color:var(--err);border-color:#e6b8b8 }

  .btn{font:inherit;border:1px solid var(--line);background:#fff;padding:7px 12px;border-radius:5px;cursor:pointer;font-size:13px}
  .btn:hover{border-color:#c5beae}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .btn.primary:hover{background:var(--accent-2)}
  .btn.ghost{background:transparent}

  /* grid de cards */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius)}
  .card .ch{display:flex;align-items:baseline;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line-2)}
  .card .ch .num{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
  .card .ch h3{margin:0;font-size:13px;font-weight:600}
  .card .ch .meta{margin-left:auto;font-size:11px;color:var(--ink-2)}
  .card .cb{padding:14px}

  /* FSM card */
  .fsm-track{display:flex;align-items:center;gap:0;padding:6px 0 12px;overflow-x:auto}
  .fsm-node{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--ink-3);min-width:56px;flex-shrink:0;text-align:center;line-height:1.2}
  .fsm-node .pill{width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid var(--line);position:relative;z-index:2}
  .fsm-node.done .pill{background:var(--ok);border-color:var(--ok)}
  .fsm-node.now .pill{background:var(--warn);border-color:var(--warn);box-shadow:0 0 0 4px var(--warn-soft)}
  .fsm-node.now{color:var(--warn);font-weight:600}
  .fsm-node.done{color:var(--ink-2)}
  .fsm-edge{flex:1;height:2px;background:var(--line);min-width:8px;margin-top:7px}
  .fsm-edge.done{background:var(--ok)}

  .fsm-info{margin-top:10px;padding:10px 12px;background:#fafaf6;border:1px solid var(--line-2);border-radius:5px;font-size:12.5px}
  .fsm-info .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);display:block;margin-bottom:2px}
  .fsm-info b{font-weight:600}
  .fsm-action{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;padding:10px 12px;background:var(--accent-soft);border:1px solid #c9d6e8;border-radius:5px}
  .fsm-action .at{font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .fsm-action .an{font-size:14px;font-weight:600;color:var(--accent)}
  .fsm-action .ar{font-size:11px;color:var(--ink-2);margin-top:1px}

  /* itens */
  .it-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line-2)}
  .it-row:last-child{border-bottom:none}
  .it-tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;flex-shrink:0;margin-top:2px}
  .it-tag.prod{background:#dbeedf;color:#155f2c}
  .it-tag.serv{background:#e7f0ff;color:#264a8b}
  .it-name{flex:1;min-width:0}
  .it-name b{display:block;font-weight:600;font-size:13px}
  .it-name .meta{font-size:11px;color:var(--ink-2);font-family:var(--mono);margin-top:2px}
  .it-val{font-variant-numeric:tabular-nums;font-weight:600;text-align:right;font-size:13px;flex-shrink:0}

  .it-tot{display:flex;justify-content:space-between;align-items:baseline;padding-top:10px;margin-top:6px;border-top:1px solid var(--line);font-weight:600}
  .it-tot .v{font-size:16px;font-variant-numeric:tabular-nums}

  /* reservas */
  .res-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:12.5px}
  .res-row:last-child{border-bottom:none}
  .res-row .ic{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700}
  .res-row .ic.ok{background:var(--ok-soft);color:var(--ok)}
  .res-row .ic.act{background:var(--warn-soft);color:var(--warn)}
  .res-row .ic.exp{background:var(--err-soft);color:var(--err)}
  .res-row .qt{font-variant-numeric:tabular-nums;font-weight:600;flex-shrink:0;min-width:65px}
  .res-row .nm{flex:1;min-width:0}
  .res-row .nm small{display:block;color:var(--ink-3);font-size:10.5px;margin-top:1px}
  .res-row .st{font-size:10.5px;color:var(--ink-2);font-style:italic;flex-shrink:0}

  /* docs */
  .doc-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--line-2)}
  .doc-row:last-child{border-bottom:none}
  .doc-status{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;margin-top:1px}
  .doc-status.aut{background:var(--ok-soft);color:var(--ok)}
  .doc-status.pen{background:var(--warn-soft);color:var(--warn);font-size:10px}
  .doc-status.dis{background:var(--gray-soft);color:var(--ink-3)}
  .doc-info{flex:1;min-width:0}
  .doc-info .ml{display:flex;align-items:baseline;gap:6px}
  .doc-info b{font-weight:600;font-size:12.5px}
  .doc-info code{font-family:var(--mono);font-size:11px;color:var(--ink-2)}
  .doc-info .desc{font-size:11px;color:var(--ink-2);margin-top:1px}
  .doc-val{font-family:var(--mono);font-size:12px;font-weight:600;text-align:right;flex-shrink:0;min-width:80px}

  .docs-tot{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--ink-2)}
  .docs-tot.match{color:var(--ok)}
  .docs-tot b{font-variant-numeric:tabular-nums}

  /* pagamentos */
  .pg-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-2);font-size:12.5px}
  .pg-row:last-child{border-bottom:none}
  .pg-row .pmt{flex:1;font-weight:500}
  .pg-row .pmt small{display:block;color:var(--ink-3);font-size:10.5px;margin-top:1px;font-weight:400}
  .pg-row .vl{font-variant-numeric:tabular-nums;font-weight:600}

  /* comp single col */
  .col-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .col-1{display:grid;grid-template-columns:1fr;gap:14px}

  /* legend */
  .legend{margin-top:18px;padding:12px 14px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);font-size:12px;color:var(--ink-2);line-height:1.55}
  .legend h4{margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink)}
  .legend code{font-family:var(--mono);font-size:11px;background:#f6f3ec;padding:1px 5px;border-radius:3px;border:1px solid var(--line-2)}
  .legend ul{margin:4px 0 0;padding-left:18px}
</style>
</head>
<body>
<div class="app">

  <aside class="side">
    <h1>Oimpresso ERP <small>Venda por Estágio · FSM v1</small></h1>
    <div class="side-group">
      <div class="side-group-l">Casos práticos</div>
      <div class="side-item active" data-case="vargas"><span class="dot"></span><span>V-7831 · ComVisual</span></div>
      <div class="side-item" data-case="mecanica"><span class="dot"></span><span>V-7832 · Mecânica</span></div>
      <div class="side-item" data-case="vest"><span class="dot"></span><span>V-7833 · Vestuário</span></div>
    </div>
    <div class="side-group">
      <div class="side-group-l">Referências</div>
      <div class="side-item" style="cursor:default;font-size:11px;color:#7c7669;line-height:1.4;padding:6px 8px">ADR 0129 · FSM canônica<br/>CASO-PRATICO-OS-COMUNICACAO-VISUAL.md</div>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<script>
const fmt = (n) => "R$ " + Number(n).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});

// ─────── 9 estágios canônicos ───────
const STAGES = [
  { k:"draft",            l:"Rascunho",     short:"draft"  },
  { k:"quote_approved",   l:"Aprovado",     short:"apr"    },
  { k:"in_production",    l:"Produção",     short:"prod"   },
  { k:"ready_to_install", l:"Pronto inst.", short:"rti"    },
  { k:"installing",       l:"Instalando",   short:"inst"   },
  { k:"completed",        l:"Concluída",    short:"compl"  },
  { k:"invoiced",         l:"Faturada",     short:"inv"    },
  { k:"delivered",        l:"Entregue",     short:"deliv"  },
  { k:"closed",           l:"Encerrada",    short:"closed" },
];

// ─────── 3 casos ───────
const CASES = {
  vargas: {
    id:"V-7831", title:"Pizzaria Nicola Ltda",
    sub:"CNPJ [REDACTED] · Florianópolis/SC · Lucro Presumido",
    desc:"Banner lona 380gr 3×2m + instalação na fachada",
    seller:"Carlos Vendas (Vargas)",
    date:"2026-05-09 14:32",
    total:550, paid:0,
    stages_used: 9,
    current:"ready_to_install",
    last:{ action:"concluir_producao", actor:"Carlos · op", at:"2026-05-10 09:14", side:"ConsumirEstoque (6m² lona)" },
    next:{ action:"iniciar_instalacao", role:"instalador, gerente", side:null },
    items:[
      { kind:"prod", name:"Banner lona 380gr 3×2m", meta:"NCM 5907.00.00 · CFOP 5101 · CSOSN 102 · 6m²", val:350 },
      { kind:"serv", name:"Instalação fachada",     meta:"LC 116/2003 item 17.06 · ISS 5% Florianópolis", val:200 },
    ],
    reservations:[
      { kind:"act", qty:"6 m²",  name:"Lona 380gr",      sub:"reservada em quote_approved · expira 2026-06-09", st:"consumed em concluir_producao" },
    ],
    docs:[
      { type:"NFe 55",  status:"pen", num:"—",   desc:"agendado pra faturar_os · banner R$ 350",         val:350 },
      { type:"NFSe 56", status:"pen", num:"—",   desc:"agendado pra faturar_os · instalação R$ 200 · LC 17.06", val:200 },
      { type:"MDFe 58", status:"dis", num:"—",   desc:"dispensado · entrega no mesmo município",          val:0   },
    ],
    payments:[
      { method:"PIX",        sub:"agendado pra invoiced · clearing imediato", val:550, status:"pendente" },
    ],
  },

  mecanica: {
    id:"V-7832", title:"Auto Posto Águia",
    sub:"CNPJ [REDACTED] · Tubarão/SC · Lucro Presumido",
    desc:"Troca de fonte 12V + mão de obra — equipamento bomba 3",
    seller:"Bruna Vendas",
    date:"2026-05-08 16:45",
    total:340, paid:340,
    stages_used: 9,
    current:"invoiced",
    last:{ action:"faturar_os", actor:"Wagner · gerente", at:"2026-05-10 11:02", side:"EmitirNFe55 + EmitirNFSe56 + BaixarFinanceiro" },
    next:{ action:"entregar_ao_cliente", role:"instalador, gerente", side:"opcional MDFe se carga > R$ 500" },
    items:[
      { kind:"prod", name:"Fonte 12V 5A",  meta:"NCM 8504.40.90 · CFOP 5101 · 1 un", val:220 },
      { kind:"serv", name:"Mão de obra · reparo eletrônico", meta:"LC 116/2003 item 14.01 · ISS 3%", val:120 },
    ],
    reservations:[
      { kind:"ok", qty:"1 un", name:"Fonte 12V 5A", sub:"consumida em concluir_producao", st:"baixa OK" },
    ],
    docs:[
      { type:"NFe 55",  status:"aut", num:"#789",  desc:"autorizada · cstat 100 · chave 4226...", val:220 },
      { type:"NFSe 56", status:"aut", num:"#44",   desc:"autorizada · sefin nacional · ISS recolhido",  val:120 },
      { type:"MDFe 58", status:"dis", num:"—",     desc:"dispensado · valor abaixo de R$ 500",   val:0   },
    ],
    payments:[
      { method:"Cartão crédito 2×",  sub:"recebido · D+30 (50% D+30, 50% D+60)", val:340, status:"recebido" },
    ],
  },

  vest: {
    id:"V-7833", title:"Consumidor Final",
    sub:"CPF [REDACTED] (opcional) · balcão",
    desc:"1 camiseta básica preta M",
    seller:"Larissa Caixa (ROTA LIVRE)",
    date:"2026-05-10 11:18",
    total:49.90, paid:49.90,
    stages_used: 3, // draft → invoiced → closed
    current:"closed",
    last:{ action:"fechar_os", actor:"Larissa · caixa", at:"2026-05-10 11:18", side:"BaixarFinanceiro · ConsumirEstoque" },
    next:null,
    items:[
      { kind:"prod", name:"Camiseta básica preta M", meta:"NCM 6109.10 · CFOP 5102 · CSOSN 102 · cód barras 7898...", val:49.90 },
    ],
    reservations:[
      { kind:"ok", qty:"1 un", name:"Camiseta preta M", sub:"baixa direta na venda balcão", st:"baixa OK" },
    ],
    docs:[
      { type:"NFC-e 65", status:"aut", num:"#1247", desc:"autorizada · cstat 100 · DANFE consumidor impresso", val:49.90 },
    ],
    payments:[
      { method:"PIX",      sub:"recebido · clearing imediato · QR pago em 11:18", val:49.90, status:"recebido" },
    ],
  },
};

// ─────── render ───────
function render(caseKey){
  const c = CASES[caseKey];
  const main = document.getElementById("main");

  const stagesUsed = c.stages_used === 9 ? STAGES : [STAGES[0], STAGES[6], STAGES[8]];
  const curIdx = stagesUsed.findIndex(s => s.k === c.current);
  const curStage = STAGES.find(s => s.k === c.current);

  const fsmHtml = stagesUsed.map((s,i) => {
    const cls = i < curIdx ? "done" : i === curIdx ? "now" : "";
    const edge = i < curIdx ? "done" : "";
    return `${i>0?`<div class="fsm-edge ${edge}"></div>`:""}<div class="fsm-node ${cls}"><div class="pill"></div><span>${s.l}</span></div>`;
  }).join("");

  const itensHtml = c.items.map(it => `
    <div class="it-row">
      <span class="it-tag ${it.kind}">${it.kind === "prod" ? "Produto" : "Serviço"}</span>
      <div class="it-name"><b>${it.name}</b><span class="meta">${it.meta}</span></div>
      <div class="it-val">${fmt(it.val)}</div>
    </div>`).join("");

  const reservasHtml = c.reservations.map(r => `
    <div class="res-row">
      <div class="ic ${r.kind}">${r.kind==="ok"?"✓":r.kind==="act"?"●":"!"}</div>
      <div class="qt">${r.qty}</div>
      <div class="nm"><b>${r.name}</b><small>${r.sub}</small></div>
      <div class="st">${r.st}</div>
    </div>`).join("");

  const docsHtml = c.docs.map(d => `
    <div class="doc-row">
      <div class="doc-status ${d.status}">${d.status==="aut"?"✓":d.status==="pen"?"⏳":"–"}</div>
      <div class="doc-info">
        <div class="ml"><b>${d.type}</b> <code>${d.num}</code></div>
        <div class="desc">${d.desc}</div>
      </div>
      <div class="doc-val">${d.val>0?fmt(d.val):"—"}</div>
    </div>`).join("");

  const pagosTotal = c.payments.filter(p=>p.status==="recebido").reduce((s,p)=>s+p.val,0);
  const pagosHtml = c.payments.map(p => `
    <div class="pg-row">
      <div class="pmt">${p.method}<small>${p.sub}</small></div>
      <span class="badge ${p.status==="recebido"?"compl":"prod"}">${p.status}</span>
      <div class="vl">${fmt(p.val)}</div>
    </div>`).join("");

  const docsTot = c.docs.filter(d=>d.status!=="dis").reduce((s,d)=>s+d.val,0);
  const totalMatch = Math.abs(docsTot - c.total) < 0.01;

  main.innerHTML = `
    <div class="h-row">
      <div>
        <div class="h-id">Venda #${c.id} · ${c.id.startsWith("V-7833")?"Vestuário":c.id.startsWith("V-7832")?"Mecânica/OS":"Comunicação Visual"}</div>
        <h1>${c.title}</h1>
        <p class="sub">${c.sub}<br/>${c.desc} · vendedor: ${c.seller} · ${c.date}</p>
      </div>
      <div class="h-actions">
        <span class="badge ${curStage.short}">${curStage.l}</span>
        <button class="btn ghost">Histórico</button>
        <button class="btn">⋯</button>
      </div>
    </div>

    <div class="grid">
      <div class="card" style="grid-column:1/-1">
        <div class="ch"><span class="num">[1]</span><h3>FSM · Venda por Estágio</h3><span class="meta">${stagesUsed.length} estágios neste processo · ADR 0129</span></div>
        <div class="cb">
          <div class="fsm-track">${fsmHtml}</div>
          <div class="fsm-info">
            <span class="lbl">Última transição</span>
            <b>${c.last.action}</b> · ${c.last.actor} · ${c.last.at}
            ${c.last.side?`<br/><span style="color:var(--ink-3);font-size:11.5px">side-effect: <code style="font-family:var(--mono);font-size:11px">${c.last.side}</code></span>`:""}
          </div>
          ${c.next ? `
            <div class="fsm-action">
              <div>
                <div class="at">Próxima ação</div>
                <div class="an">${c.next.action}</div>
                <div class="ar">RBAC: ${c.next.role}${c.next.side?` · side-effect: ${c.next.side}`:""}</div>
              </div>
              <button class="btn primary">Executar →</button>
            </div>` : `
            <div class="fsm-action" style="background:var(--ok-soft);border-color:#b8d6c0">
              <div><div class="at" style="color:var(--ok)">Encerrada</div><div class="an" style="color:var(--ok)">Sem ações pendentes</div></div>
            </div>`
          }
        </div>
      </div>

      <div class="card">
        <div class="ch"><span class="num">[2]</span><h3>Itens · mix produto + serviço</h3><span class="meta">${c.items.length} ${c.items.length===1?"item":"itens"}</span></div>
        <div class="cb">
          ${itensHtml}
          <div class="it-tot"><span>Total</span><span class="v">${fmt(c.total)}</span></div>
        </div>
      </div>

      <div class="card">
        <div class="ch"><span class="num">[3]</span><h3>Reserva de estoque</h3><span class="meta">não baixa · só reserva</span></div>
        <div class="cb">
          ${c.reservations.length ? reservasHtml : `<div style="color:var(--ink-3);font-size:12.5px;padding:8px 0">Sem reservas neste processo.</div>`}
        </div>
      </div>

      <div class="card">
        <div class="ch"><span class="num">[4]</span><h3>Documentos fiscais</h3><span class="meta">timeline · ${c.docs.filter(d=>d.status==="aut").length}/${c.docs.filter(d=>d.status!=="dis").length} autorizados</span></div>
        <div class="cb">
          ${docsHtml}
          <div class="docs-tot ${totalMatch?"match":""}">
            <span>Total documentado</span>
            <span><b>${fmt(docsTot)}</b> ${totalMatch?`= total venda ✓`:`/ ${fmt(c.total)}`}</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="ch"><span class="num">[5]</span><h3>Pagamentos</h3><span class="meta">${fmt(pagosTotal)} de ${fmt(c.total)} recebido</span></div>
        <div class="cb">${pagosHtml}</div>
      </div>
    </div>

    <div class="legend">
      <h4>Por que esse modelo é único</h4>
      <ul>
        <li><b>1 transação · N documentos:</b> NFe55 + NFSe56 ficam atrelados à mesma venda — concorrentes (Mubisys, Bling) forçam 2 vendas separadas pra cobrir o mesmo caso.</li>
        <li><b>FSM com RBAC granular:</b> cada transição valida <code>sale_stage_action_roles</code> (vendedor/operador/instalador/gerente). Sem consultoria paga.</li>
        <li><b>Reserva ≠ baixa:</b> 6m² de lona ficam reservados em <code>quote_approved</code>; só viram baixa em <code>concluir_producao</code>. Protege contra over-selling.</li>
        <li><b>Vertical = seed de processo,</b> não fork de telas. Vestuário usa 3 estágios (rascunho → faturada → encerrada); ComVisual usa os 9; mesma página, mesmo modelo.</li>
        <li><b>Pronto pra Reforma 2026 (LC 214/2025):</b> CBS/IBS destacados informativamente em <code>nfe55</code> e <code>nfse56</code> sem mudar estrutura.</li>
      </ul>
    </div>
  `;
}

document.querySelectorAll(".side-item[data-case]").forEach(el => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".side-item").forEach(s => s.classList.remove("active"));
    el.classList.add("active");
    render(el.dataset.case);
  });
});
render("vargas");
</script>
</body>
</html>
