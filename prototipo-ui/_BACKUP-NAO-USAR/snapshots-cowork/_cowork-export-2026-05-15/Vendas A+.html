<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vendas A+ · F1 protótipo · Oimpresso ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* base */
    --bg:           oklch(0.985 0.003 90);
    --bg-2:         oklch(0.965 0.004 90);
    --surface:      #ffffff;
    --border:       oklch(0.90 0.004 90);
    --border-2:     oklch(0.93 0.004 90);
    --text:         oklch(0.22 0.01 80);
    --text-dim:     oklch(0.50 0.01 80);
    --text-mute:    oklch(0.65 0.01 80);

    /* SELLS — forest-green identity */
    --sells:        oklch(0.45 0.11 155);
    --sells-2:      oklch(0.55 0.11 155);
    --sells-soft:   oklch(0.95 0.04 155);
    --sells-hero:   oklch(0.21 0.025 155);
    --sells-hero-2: oklch(0.27 0.03 155);

    /* status */
    --ok:    oklch(0.55 0.13 145);
    --ok-soft: oklch(0.94 0.06 145);
    --warn:  oklch(0.62 0.13 70);
    --warn-soft: oklch(0.94 0.06 70);
    --bad:   oklch(0.55 0.18 25);
    --bad-soft: oklch(0.94 0.06 25);
    --info:  oklch(0.55 0.12 240);
    --info-soft: oklch(0.94 0.05 240);
    --neutral: oklch(0.55 0.01 80);
    --neutral-soft: oklch(0.94 0.005 80);

    --radius-sm: 4px;
    --radius:    6px;
    --shadow-soft: 0 1px 2px rgba(0,0,0,.04);
    --shadow-card: 0 4px 16px -4px rgba(0,0,0,.10), 0 0 0 1px var(--border);
    --row-h: 36px;

    --font-sans: "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    font-size: 13.5px; line-height: 1.5;
    color: var(--text); background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  kbd {
    display: inline-block;
    font-family: var(--font-mono); font-size: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-bottom-width: 2px; border-radius: 3px;
    padding: 1px 5px; color: var(--text-dim);
  }
  button { font: inherit; cursor: pointer; }
  table { border-collapse: collapse; width: 100%; }

  /* ───── Page shell ───── */
  .page {
    display: grid;
    grid-template-columns: 64px 1fr;
    min-height: 100vh;
  }

  /* fake sidebar */
  .sb {
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; padding: 14px 0;
    gap: 4px;
  }
  .sb-logo {
    width: 32px; height: 32px; border-radius: 7px;
    background: linear-gradient(135deg, var(--sells), oklch(0.30 0.10 165));
    color: #fff; display: grid; place-items: center;
    font-weight: 700; font-size: 13px;
    margin-bottom: 12px;
  }
  .sb-item {
    width: 36px; height: 36px; border-radius: 7px;
    display: grid; place-items: center;
    color: var(--text-mute); cursor: pointer; position: relative;
    transition: background .12s, color .12s;
  }
  .sb-item:hover { background: var(--border-2); color: var(--text); }
  .sb-item.active {
    background: var(--surface); color: var(--sells);
    box-shadow: var(--shadow-soft), 0 0 0 1px var(--border);
  }
  .sb-item.active::after {
    content: ''; position: absolute; left: -10px; top: 8px; bottom: 8px;
    width: 2px; border-radius: 2px; background: var(--sells);
  }
  .sb-item svg { width: 17px; height: 17px; }

  /* main area */
  .main { display: flex; flex-direction: column; min-width: 0; }

  /* ───── Header sticky ───── */
  .hdr {
    position: sticky; top: 0; z-index: 8;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 22px 0;
  }
  .hdr-row {
    display: flex; align-items: center; gap: 14px;
    padding-bottom: 12px;
  }
  .hdr-title { display: flex; align-items: baseline; gap: 10px; min-width: 0; }
  .hdr-title h1 {
    margin: 0; font-size: 21px; font-weight: 700; letter-spacing: -0.015em;
  }
  .hdr-title .sub {
    color: var(--text-mute); font-size: 12.5px;
  }
  .hdr-r { margin-left: auto; display: flex; gap: 6px; align-items: center; }

  .cmdk {
    flex: 1; max-width: 380px;
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px;
    color: var(--text-mute); cursor: pointer;
    transition: border-color .12s, box-shadow .12s;
  }
  .cmdk:hover { border-color: var(--text-mute); }
  .cmdk .ph { flex: 1; font-size: 12.5px; }
  .cmdk kbd { font-size: 9.5px; }

  .btn {
    border: 1px solid var(--border); background: var(--surface);
    padding: 6px 10px; border-radius: 5px; font-size: 12px; font-weight: 500;
    color: var(--text-dim); display: inline-flex; align-items: center; gap: 6px;
    transition: all .12s;
  }
  .btn:hover { background: var(--bg-2); color: var(--text); border-color: var(--text-mute); }
  .btn svg { width: 13px; height: 13px; }
  .btn.primary {
    background: var(--sells); color: #fff; border-color: var(--sells);
  }
  .btn.primary:hover { background: oklch(0.40 0.11 155); }
  .btn.primary kbd { background: rgba(255,255,255,.18); color: #fff; border-color: transparent; }
  .btn.ghost { background: transparent; border-color: transparent; padding: 6px 8px; }
  .btn.ghost:hover { background: var(--bg-2); }

  /* saved views dropdown */
  .views {
    position: relative;
  }
  .views-btn {
    background: var(--surface); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 5px;
    font-size: 12px; font-weight: 600; color: var(--text);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .views-btn::after { content: '▾'; font-size: 9px; color: var(--text-mute); }
  .views-btn:hover { border-color: var(--text-mute); }
  .views-menu {
    position: absolute; top: calc(100% + 4px); left: 0;
    min-width: 220px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 8px 24px -8px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.02);
    padding: 4px; z-index: 30;
  }
  .views-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; font-size: 12.5px; cursor: pointer;
    border-radius: 4px;
  }
  .views-item:hover { background: var(--bg-2); }
  .views-item.active { color: var(--sells); font-weight: 600; }
  .views-item .ct { margin-left: auto; color: var(--text-mute); font-family: var(--font-mono); font-size: 10.5px; }
  .views-sep { height: 1px; background: var(--border-2); margin: 4px -4px; }

  /* tweak segmented control */
  .vista {
    display: inline-flex; background: var(--bg-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px;
  }
  .vista button {
    border: 0; background: transparent;
    padding: 4px 12px; font-size: 11.5px; font-weight: 600;
    color: var(--text-mute); border-radius: 4px;
    letter-spacing: 0.02em;
    transition: all .15s;
  }
  .vista button.on {
    background: var(--surface); color: var(--sells);
    box-shadow: var(--shadow-soft);
  }

  /* ───── Body ───── */
  .body { padding: 18px 22px 80px; max-width: 1480px; margin: 0 auto; width: 100%; }

  /* HERO KPIs */
  .kpis {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 18px;
  }
  .kpi {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    box-shadow: var(--shadow-soft);
    position: relative; overflow: hidden;
  }
  .kpi.hero {
    background: var(--sells-hero); color: oklch(0.92 0.01 155);
    border-color: var(--sells-hero);
  }
  .kpi .lbl {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-mute); font-weight: 600;
  }
  .kpi.hero .lbl { color: oklch(0.75 0.04 155); }
  .kpi b {
    display: block; margin-top: 6px;
    font-family: var(--font-mono); font-size: 26px; font-weight: 700;
    letter-spacing: -0.02em; line-height: 1.05;
    font-variant-numeric: tabular-nums;
  }
  .kpi b small {
    font-size: 13px; color: var(--text-mute); font-weight: 500; margin-left: 2px;
  }
  .kpi.hero b small { color: oklch(0.65 0.04 155); }
  .kpi .delta { margin-top: 6px; font-size: 11.5px; color: var(--text-dim); display: flex; align-items: center; gap: 4px; }
  .kpi.hero .delta { color: oklch(0.78 0.05 155); }
  .kpi .delta.up { color: var(--ok); }
  .kpi .delta.down { color: var(--bad); }

  /* sparkline */
  .spark {
    margin-top: 10px; height: 32px; width: 100%;
  }
  .spark svg { width: 100%; height: 100%; display: block; }

  /* ageing bars */
  .ageing { margin-top: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .ageing .ag-bar { height: 4px; border-radius: 99px; background: var(--border-2); position: relative; overflow: hidden; }
  .ageing .ag-bar .fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 99px; }
  .ageing .ag-bar.ok .fill { background: var(--ok); }
  .ageing .ag-bar.warn .fill { background: var(--warn); }
  .ageing .ag-bar.bad .fill { background: var(--bad); }
  .ageing .ag-lbls { grid-column: 1/-1; display: flex; justify-content: space-between; font-size: 10px; color: var(--text-mute); margin-top: 2px; font-family: var(--font-mono); }

  /* PIX progress */
  .pix-prog { margin-top: 12px; height: 6px; background: var(--border-2); border-radius: 99px; overflow: hidden; }
  .pix-prog .fill { height: 100%; background: linear-gradient(90deg, var(--sells), var(--sells-2)); border-radius: 99px; }

  /* ───── Tabs ───── */
  .tabs { display: flex; gap: 2px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
  .tab {
    border: 0; background: transparent;
    padding: 8px 14px 10px; margin-bottom: -1px;
    color: var(--text-mute); font-weight: 500; font-size: 12.5px;
    border-bottom: 2px solid transparent;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tab:hover { color: var(--text); }
  .tab.on { color: var(--sells); border-bottom-color: var(--sells); font-weight: 600; }
  .tab .ct {
    background: var(--bg-2); color: var(--text-mute); font-size: 10.5px;
    font-family: var(--font-mono); padding: 1px 6px; border-radius: 99px; font-weight: 600;
  }
  .tab.on .ct { background: var(--sells-soft); color: var(--sells); }

  /* table */
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-soft);
  }
  table thead th {
    background: var(--bg-2);
    text-align: left; font-weight: 600;
    padding: 10px 14px; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-mute);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  table thead th.num { text-align: right; }
  table tbody td {
    padding: 0 14px;
    height: var(--row-h);
    border-bottom: 1px solid var(--border-2);
    vertical-align: middle;
    font-size: 12.5px;
  }
  table tbody tr:last-child td { border-bottom: none; }
  table tbody tr { transition: background .08s; cursor: pointer; }
  table tbody tr:hover { background: var(--bg-2); }
  table tbody tr.selected { background: var(--sells-soft); }
  table tbody tr.urgent td:first-child { box-shadow: inset 3px 0 0 var(--bad); }

  td.id { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); font-weight: 600; width: 80px; }
  td.client b { display: block; font-weight: 600; }
  td.client small { font-size: 11px; color: var(--text-mute); }
  td.num { text-align: right; font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-weight: 600; }
  td.chk { width: 26px; padding: 0 0 0 14px; }
  td.chk input { margin: 0; cursor: pointer; }

  /* avatar vendedor */
  .av {
    width: 24px; height: 24px; border-radius: 50%;
    display: inline-grid; place-items: center;
    font-size: 10.5px; font-weight: 700; color: #fff;
    letter-spacing: 0.02em;
    font-family: var(--font-mono);
  }
  .av.av-1 { background: oklch(0.55 0.12 30); }
  .av.av-2 { background: oklch(0.50 0.13 200); }
  .av.av-3 { background: oklch(0.55 0.13 290); }
  .av.av-4 { background: oklch(0.50 0.13 120); }
  td.seller { display: flex; align-items: center; gap: 8px; }
  td.seller .v-info { display: flex; flex-direction: column; line-height: 1.2; }
  td.seller .v-info b { font-size: 12px; font-weight: 600; }
  td.seller .v-info small { font-size: 10.5px; color: var(--text-mute); font-family: var(--font-mono); }

  /* Mini-stepper FSM inline */
  .stepper {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 6px; border-radius: 99px;
    background: var(--bg-2);
  }
  .stepper .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--border);
    transition: all .15s;
  }
  .stepper .dot.done { background: var(--sells); }
  .stepper .dot.current {
    background: var(--sells); box-shadow: 0 0 0 2px var(--sells-soft);
    transform: scale(1.3);
  }
  .stepper .dot.failed { background: var(--bad); }
  .stepper .lbl {
    font-size: 10px; color: var(--text-mute); margin-left: 4px;
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em;
    font-weight: 600;
  }

  /* fiscal badges duplos */
  .fiscal-cell { display: inline-flex; gap: 4px; flex-wrap: wrap; }
  .fbadge {
    display: inline-flex; align-items: center; gap: 3px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 3px;
    letter-spacing: 0.02em;
  }
  .fbadge.ok    { background: var(--ok-soft);     color: oklch(0.36 0.10 145); }
  .fbadge.wait  { background: var(--warn-soft);   color: oklch(0.42 0.12 60); }
  .fbadge.bad   { background: var(--bad-soft);    color: oklch(0.42 0.13 20); }
  .fbadge.canc  { background: var(--neutral-soft);color: var(--text-mute); }
  .fbadge.na    { background: transparent; color: var(--text-mute); padding-left: 2px; padding-right: 2px; }
  .fbadge .ic   { font-size: 9px; }

  /* status badges */
  .sbadge {
    display: inline-block; font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 3px; letter-spacing: 0.02em;
  }
  .sbadge.paga    { background: var(--ok-soft);  color: oklch(0.36 0.10 145); }
  .sbadge.pendente{ background: var(--warn-soft);color: oklch(0.42 0.12 60); }
  .sbadge.faturada{ background: var(--info-soft);color: oklch(0.40 0.10 240); }
  .sbadge.cancelada{ background: var(--neutral-soft); color: var(--text-mute); text-decoration: line-through; }

  /* row hover actions */
  .rowact {
    display: inline-flex; gap: 2px; opacity: 0;
    transition: opacity .12s;
  }
  tr:hover .rowact { opacity: 1; }
  .rowact .btn { padding: 3px 6px; font-size: 11px; }

  /* ───── Drawer ───── */
  .drw-bd {
    position: fixed; inset: 0; background: rgba(0,0,0,.30); z-index: 40;
    opacity: 0; pointer-events: none; transition: opacity .18s;
  }
  .drw-bd.on { opacity: 1; pointer-events: auto; }
  .drw {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: 720px; max-width: 95vw;
    background: var(--surface); z-index: 41;
    transform: translateX(100%); transition: transform .22s ease-out;
    display: flex; flex-direction: column;
    box-shadow: -16px 0 32px -16px rgba(0,0,0,.20);
  }
  .drw.on { transform: translateX(0); }
  .drw.wide { width: 860px; }

  .drw-h {
    padding: 16px 22px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .drw-h h2 { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .drw-h .id-tag { font-family: var(--font-mono); font-size: 12px; color: var(--text-mute); }
  .drw-h .total { margin-left: auto; font-family: var(--font-mono); font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
  .drw-h .close { margin-left: 6px; }

  .drw-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    padding: 0 22px;
  }
  .drw-tab {
    border: 0; background: transparent;
    padding: 10px 14px; margin-bottom: -1px;
    color: var(--text-mute); font-weight: 500; font-size: 12px;
    border-bottom: 2px solid transparent;
  }
  .drw-tab.on { color: var(--sells); border-bottom-color: var(--sells); font-weight: 600; }

  .drw-body {
    flex: 1; min-height: 0; overflow-y: auto;
    padding: 20px 22px; background: var(--bg-2);
  }

  /* fiscal cards in drawer */
  .fisc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .fisc-grid.single { grid-template-columns: 1fr; max-width: 480px; }
  .fcard {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
    box-shadow: var(--shadow-soft);
  }
  .fcard .fh {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .fcard .fh h4 { margin: 0; font-size: 13px; font-weight: 700; }
  .fcard .fh .right { margin-left: auto; }
  .fcard .fmeta {
    display: grid; grid-template-columns: 80px 1fr; gap: 4px 12px;
    font-size: 11.5px;
  }
  .fcard .fmeta dt { color: var(--text-mute); }
  .fcard .fmeta dd { margin: 0; font-family: var(--font-mono); }
  .fcard .chave {
    display: flex; align-items: center; gap: 6px;
    margin-top: 12px; padding: 8px 10px;
    background: var(--bg-2); border-radius: 5px;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--text-dim);
  }
  .fcard .chave-num { letter-spacing: 0.04em; flex: 1; word-break: break-all; }
  .fcard .copy-btn {
    background: transparent; border: 1px solid var(--border);
    padding: 3px 7px; border-radius: 4px; font-size: 10.5px;
    color: var(--text-dim); font-family: var(--font-sans);
    flex-shrink: 0;
  }
  .fcard .copy-btn.copied { background: var(--ok-soft); color: oklch(0.36 0.10 145); border-color: transparent; }

  .fcard .ftimeline {
    margin-top: 12px;
    display: flex; gap: 0; align-items: center;
    padding: 10px 0;
  }
  .fcard .fstep {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    position: relative;
  }
  .fcard .fstep::before {
    content: ''; position: absolute; top: 8px; left: -50%; right: 50%; height: 2px;
    background: var(--border-2); z-index: 0;
  }
  .fcard .fstep:first-child::before { display: none; }
  .fcard .fstep .sd {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--surface); border: 2px solid var(--border-2);
    display: grid; place-items: center;
    font-size: 9px; font-weight: 700; color: var(--text-mute);
    z-index: 1;
  }
  .fcard .fstep.done .sd { background: var(--sells); border-color: var(--sells); color: #fff; }
  .fcard .fstep.done::before { background: var(--sells); }
  .fcard .fstep.failed .sd { background: var(--bad); border-color: var(--bad); color: #fff; }
  .fcard .fstep .stl {
    font-size: 9.5px; color: var(--text-mute); text-align: center;
    font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.02em;
  }
  .fcard.failed .fstep.done .sd { background: var(--bad); border-color: var(--bad); }
  .fcard.failed .fstep.done::before { background: var(--bad); }

  .fcard .fctas {
    display: flex; gap: 6px; margin-top: 14px; padding-top: 12px;
    border-top: 1px solid var(--border-2);
  }
  .fcard .fcta {
    flex: 1; padding: 6px 8px; font-size: 11px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center; gap: 4px;
    cursor: pointer;
  }
  .fcard .fcta:hover { border-color: var(--text-mute); color: var(--text); }
  .fcard.failed .fail-msg {
    margin-bottom: 12px; padding: 10px 12px;
    background: var(--bad-soft); border-radius: 5px;
    border-left: 3px solid var(--bad);
    font-size: 11.5px; color: oklch(0.32 0.12 25);
  }
  .fcard.failed .fail-msg b { display: block; margin-bottom: 2px; }

  .fcce {
    margin-top: 10px; border-top: 1px solid var(--border-2); padding-top: 10px;
  }
  .fcce summary {
    cursor: pointer; font-size: 11px; color: var(--sells); font-weight: 600;
    user-select: none;
  }
  .fcce summary:hover { color: var(--sells-2); }
  .fcce p { margin: 8px 0 0; font-size: 11.5px; color: var(--text-dim); }

  /* emit panel for missing nf */
  .emit-panel {
    background: var(--sells-soft); border: 1px dashed var(--sells);
    border-radius: 8px; padding: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .emit-panel .em-txt b { display: block; font-size: 13px; color: var(--sells); }
  .emit-panel .em-txt small { font-size: 11.5px; color: var(--text-dim); }
  .emit-panel .em-cta { margin-left: auto; }
  .emit-panel .em-cta button {
    background: var(--sells); color: #fff; border: 0;
    padding: 8px 14px; border-radius: 5px; font-weight: 600; font-size: 12px;
  }

  /* itens list */
  .items-list { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .item-row {
    display: grid; grid-template-columns: 1fr 60px 80px 100px;
    padding: 10px 14px; gap: 12px;
    border-bottom: 1px solid var(--border-2);
    font-size: 12.5px;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row .it-name b { display: block; font-weight: 600; }
  .item-row .it-name small { font-size: 11px; color: var(--text-mute); }
  .item-row .it-num { text-align: right; font-family: var(--font-mono); }

  /* timeline drawer */
  .tline { position: relative; padding-left: 18px; }
  .tline::before {
    content: ''; position: absolute; left: 6px; top: 4px; bottom: 4px;
    width: 2px; background: var(--border-2);
  }
  .tline-it { position: relative; padding: 6px 0; }
  .tline-it::before {
    content: ''; position: absolute; left: -16px; top: 10px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--sells); border: 2px solid var(--bg-2);
  }
  .tline-it small { color: var(--text-mute); font-size: 11px; font-family: var(--font-mono); }
  .tline-it b { display: block; font-size: 12.5px; }

  /* section header in drawer */
  .sec-h {
    display: flex; align-items: baseline; gap: 8px;
    margin: 0 0 10px;
  }
  .sec-h h3 { margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); font-weight: 700; }
  .sec-h .right { margin-left: auto; font-size: 11px; color: var(--text-mute); }
  .sec { margin-bottom: 20px; }

  /* sub-tabs fiscal */
  .fsub {
    display: inline-flex; gap: 2px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px;
    margin-bottom: 12px;
  }
  .fsub button {
    border: 0; background: transparent;
    padding: 4px 10px; font-size: 11px; font-weight: 600;
    border-radius: 4px; color: var(--text-mute);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .fsub button.on { background: var(--bg-2); color: var(--text); }
  .fsub button .ct { font-family: var(--font-mono); font-size: 9.5px; background: var(--border-2); padding: 0 4px; border-radius: 99px; }

  /* ───── Bulk action bar ───── */
  .bulk {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--text); color: #fff; border-radius: 10px;
    box-shadow: 0 12px 32px -8px rgba(0,0,0,.30);
    padding: 10px 14px; display: flex; align-items: center; gap: 6px;
    z-index: 30; opacity: 0; transition: all .22s ease-out;
  }
  .bulk.on { opacity: 1; transform: translateX(-50%) translateY(0); }
  .bulk .ct { font-size: 12px; padding: 2px 8px; background: rgba(255,255,255,.12); border-radius: 99px; font-weight: 600; }
  .bulk .b-btn {
    background: transparent; border: 1px solid rgba(255,255,255,.20);
    padding: 5px 10px; border-radius: 5px; color: #fff; font-size: 11.5px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .bulk .b-btn:hover { background: rgba(255,255,255,.10); }
  .bulk .b-btn.primary { background: var(--sells); border-color: var(--sells); }
  .bulk .b-btn.primary:hover { background: var(--sells-2); }
  .bulk .b-close { color: var(--text-mute); padding: 4px 6px; font-size: 13px; background: transparent; border: 0; }

  /* ───── ⌘K palette ───── */
  .pal-bd {
    position: fixed; inset: 0; background: rgba(0,0,0,.34);
    z-index: 50; display: grid; place-items: start center;
    padding-top: 12vh;
    opacity: 0; pointer-events: none; transition: opacity .14s;
  }
  .pal-bd.on { opacity: 1; pointer-events: auto; }
  .pal {
    width: 560px; max-width: 92vw;
    background: var(--surface); border-radius: 12px;
    box-shadow: 0 24px 64px -12px rgba(0,0,0,.40);
    overflow: hidden;
    transform: scale(0.96); transition: transform .14s;
  }
  .pal-bd.on .pal { transform: scale(1); }
  .pal-in {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px; border-bottom: 1px solid var(--border);
  }
  .pal-in input {
    flex: 1; border: 0; background: transparent;
    font: inherit; font-size: 15px;
    color: var(--text); outline: none;
  }
  .pal-in input::placeholder { color: var(--text-mute); }
  .pal-list { max-height: 50vh; overflow-y: auto; padding: 6px; }
  .pal-grp { padding: 6px 12px 4px; font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-mute); font-weight: 700; }
  .pal-it {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; border-radius: 6px; cursor: pointer;
    font-size: 13px;
  }
  .pal-it:hover, .pal-it.sel { background: var(--bg-2); }
  .pal-it.sel { background: var(--sells-soft); }
  .pal-it .pal-ic {
    width: 28px; height: 28px; border-radius: 6px; background: var(--bg-2);
    display: grid; place-items: center; color: var(--text-dim);
    flex-shrink: 0;
  }
  .pal-it.sel .pal-ic { background: var(--sells); color: #fff; }
  .pal-it .pal-tx { flex: 1; min-width: 0; }
  .pal-it .pal-tx b { display: block; font-weight: 600; }
  .pal-it .pal-tx small { font-size: 11px; color: var(--text-mute); }
  .pal-it kbd { margin-left: auto; }
  .pal-ft { padding: 10px 18px; border-top: 1px solid var(--border); display: flex; gap: 16px; font-size: 11px; color: var(--text-mute); }
  .pal-ft span { display: inline-flex; align-items: center; gap: 4px; }

  /* selection */
  input[type="checkbox"] { accent-color: var(--sells); }

  /* tooltip on fiscal badge */
  .fbadge { position: relative; cursor: help; }
  .fbadge:hover .tip { opacity: 1; transform: translateY(0); }
  .fbadge .tip {
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%) translateY(4px);
    background: var(--text); color: #fff;
    padding: 6px 10px; border-radius: 5px;
    font-size: 10.5px; font-family: var(--font-mono);
    white-space: nowrap; pointer-events: none;
    opacity: 0; transition: all .12s;
    z-index: 20;
    box-shadow: 0 4px 12px rgba(0,0,0,.20);
  }
  .fbadge .tip::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 4px solid transparent; border-top-color: var(--text);
  }

  /* commission column shown only on vista=comissao */
  td.commission, th.commission { display: none; }
  body[data-vista="comissao"] td.commission,
  body[data-vista="comissao"] th.commission { display: table-cell; }

  td.tax-info, th.tax-info { display: none; }
  body[data-vista="faturamento"] td.tax-info,
  body[data-vista="faturamento"] th.tax-info { display: table-cell; }

  /* responsive small */
  @media (max-width: 1180px) {
    .kpis { grid-template-columns: repeat(2, 1fr); }
    .cmdk { display: none; }
  }
</style>
</head>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
