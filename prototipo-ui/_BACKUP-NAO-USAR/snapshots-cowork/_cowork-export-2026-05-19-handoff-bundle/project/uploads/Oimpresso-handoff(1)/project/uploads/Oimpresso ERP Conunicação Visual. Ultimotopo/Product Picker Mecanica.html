<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Product Picker — Oficina Mecânica</title>
<style>
  :root{
    --bg:#f6f4ef;--paper:#fff;--ink:#1a1917;--ink-2:#5b574f;--ink-3:#8b8580;--ink-4:#b8b0a3;
    --line:#e5e0d3;--line-2:#efeae0;
    --accent:#1f3a5f;--accent-soft:#eaf0f7;--accent-2:#173049;
    --ok:#1f6d3a;--ok-soft:#e6f1e8;
    --warn:#a35a00;--warn-soft:#fbf0dc;
    --danger:#9a2a2a;--danger-soft:#f8e6e6;
    --radius:6px;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.45 ui-sans-serif,system-ui,-apple-system,sans-serif}
  button{font:inherit;cursor:pointer}

  /* ── stage / mock OS ── */
  .stage{padding:40px;max-width:920px;margin:0 auto}
  .stage h1{font-size:18px;margin:0 0 4px;font-weight:600}
  .stage p{margin:0 0 24px;color:var(--ink-2);font-size:13px}
  .mock-sale{background:#fff;border:1px solid var(--line);border-radius:6px;padding:18px}
  .mock-sale .h{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .mock-sale .h b{font-size:13px}
  .mock-sale .h small{color:var(--ink-3);font-size:11.5px;font-family:var(--mono)}
  .empty-cart{padding:32px;text-align:center;color:var(--ink-3);font-size:12.5px;border:1px dashed var(--line);border-radius:5px}
  .empty-cart b{display:block;color:var(--ink-2);font-size:13.5px;margin-bottom:4px}
  .btn{border:1px solid var(--line);background:#fff;padding:7px 13px;border-radius:5px;font-size:12.5px;color:var(--ink)}
  .btn:hover{border-color:#c5beae;background:#fbf9f3}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .btn.primary:hover{background:var(--accent-2)}
  .btn.sm{padding:4px 9px;font-size:11.5px}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--ink-2)}
  .btn.ghost:hover{background:var(--line-2)}

  .cart-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line-2)}
  .cart-row:last-child{border-bottom:none}
  .cart-thumb{width:42px;height:42px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;font-family:var(--mono);letter-spacing:-.02em}
  .cart-info{flex:1;min-width:0}
  .cart-info b{font-size:12.5px;font-weight:600}
  .cart-info small{display:block;color:var(--ink-3);font-size:10.5px;font-family:var(--mono);margin-top:1px}
  .cart-q{display:flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .cart-q button{border:none;background:#fbf9f3;padding:4px 9px;color:var(--ink-2);font-size:13px}
  .cart-q button:hover{background:var(--line-2)}
  .cart-q input{border:none;width:38px;text-align:center;font:inherit;font-family:var(--mono);font-weight:600;background:#fff;padding:4px 0}
  .cart-q input:focus{outline:1px solid var(--accent)}
  .cart-val{font-family:var(--mono);font-weight:600;font-size:12.5px;min-width:75px;text-align:right;font-variant-numeric:tabular-nums}
  .cart-x{border:none;background:transparent;color:var(--ink-3);width:24px;height:24px;border-radius:5px;font-size:12px}
  .cart-x:hover{background:var(--line-2);color:var(--ink)}
  .cart-tot{display:flex;justify-content:space-between;align-items:baseline;padding-top:12px;margin-top:6px;border-top:1px solid var(--line);font-weight:600}
  .cart-tot b{font-size:17px;font-variant-numeric:tabular-nums;font-family:var(--mono)}

  /* ── MODAL PICKER ── */
  .modal-back{position:fixed;inset:0;background:rgba(15,16,20,.5);backdrop-filter:blur(2px);z-index:50}
  .modal{position:fixed;inset:32px auto auto 50%;transform:translateX(-50%);background:#fff;border-radius:8px;width:1040px;max-width:calc(100vw - 64px);height:calc(100vh - 64px);max-height:780px;display:grid;grid-template-rows:auto auto auto 1fr auto;box-shadow:0 24px 60px rgba(15,16,20,.3);z-index:51;overflow:hidden}

  .mh{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line-2)}
  .mh h2{margin:0;font-size:15px;font-weight:600}
  .mh small{color:var(--ink-3);font-size:11.5px;font-family:var(--mono)}
  .mh .x{margin-left:auto;border:none;background:transparent;color:var(--ink-3);width:28px;height:28px;border-radius:5px;font-size:16px}
  .mh .x:hover{background:var(--line-2);color:var(--ink)}

  .msearch{padding:10px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line-2);background:#fbf9f3}
  .msearch .s{flex:1;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:6px;padding:7px 12px}
  .msearch .s input{border:none;outline:none;background:transparent;font:inherit;flex:1;font-size:13.5px}
  .msearch .s input::placeholder{color:var(--ink-3)}
  .msearch .s span.ic{color:var(--ink-3);font-size:14px}
  .msearch .s .scope{font-size:10.5px;color:var(--ink-3);font-family:var(--mono);padding:0 4px;border-left:1px solid var(--line-2);margin-left:4px}
  .view-toggle{display:flex;border:1px solid var(--line);border-radius:5px;overflow:hidden;background:#fff}
  .view-toggle button{border:none;background:transparent;padding:6px 11px;font-size:11.5px;color:var(--ink-2)}
  .view-toggle button.active{background:var(--accent);color:#fff;font-weight:600}

  .mcats{display:flex;gap:4px;padding:8px 18px;border-bottom:1px solid var(--line-2);overflow-x:auto;background:#fff}
  .mcat{border:none;background:transparent;padding:5px 11px;border-radius:99px;font-size:11.5px;color:var(--ink-2);white-space:nowrap;border:1px solid transparent}
  .mcat:hover{background:var(--line-2)}
  .mcat.active{background:var(--accent-soft);color:var(--accent);border-color:#c9d6e8;font-weight:600}
  .mcat .n{margin-left:5px;font-size:10.5px;color:var(--ink-3);font-variant-numeric:tabular-nums}
  .mcat.active .n{color:var(--accent)}
  .mcat .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;transform:translateY(-1px)}

  /* ── corpo (sidebar marcas + grid) ── */
  .mwrap{display:grid;grid-template-columns:172px 1fr;min-height:0}
  .marcas{background:#fbf9f3;border-right:1px solid var(--line-2);overflow:auto;padding:12px 10px 12px 14px}
  .marcas h4{margin:0 0 8px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:700}
  .marca-row{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:5px;cursor:pointer;font-size:12px;color:var(--ink-2);line-height:1.2}
  .marca-row:hover{background:#fff;color:var(--ink)}
  .marca-row.on{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .marca-row input{margin:0;accent-color:var(--accent)}
  .marca-row .n{margin-left:auto;font-size:10.5px;color:var(--ink-3);font-family:var(--mono);font-variant-numeric:tabular-nums}
  .marca-row.on .n{color:var(--accent)}
  .marcas .clear{font-size:10.5px;color:var(--ink-3);margin-top:8px;padding:4px 6px;cursor:pointer;display:inline-block}
  .marcas .clear:hover{color:var(--accent);text-decoration:underline}

  .mbody{overflow:auto;padding:14px 18px;background:#fbf9f3;min-width:0}
  .mbody .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
  .mbody .list{display:flex;flex-direction:column;gap:6px}
  .mbody .sec{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:700;margin:14px 0 6px;display:flex;align-items:center;gap:8px}
  .mbody .sec:first-child{margin-top:0}
  .mbody .sec .ln{flex:1;height:1px;background:var(--line)}

  /* ── CARD (grid Balcão) ── */
  .pcard{background:#fff;border:1px solid var(--line);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;position:relative}
  .pcard:hover{border-color:#c9d6e8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(31,58,95,.06)}
  .pcard .img{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;position:relative;letter-spacing:-.02em;font-family:var(--mono);overflow:hidden}
  .pcard .img::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,rgba(0,0,0,.18) 100%);pointer-events:none}
  .pcard .img .cat-mini{position:absolute;top:6px;left:6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:rgba(255,255,255,.88);color:var(--ink);padding:2px 7px;border-radius:99px;line-height:1.5;z-index:1}
  .pcard .img .stk{position:absolute;top:6px;right:6px;font-size:9.5px;font-weight:700;background:rgba(255,255,255,.92);color:var(--ink);padding:2px 7px;border-radius:99px;line-height:1.5;z-index:1;display:flex;align-items:center;gap:4px;font-family:var(--mono)}
  .pcard .img .stk .d{width:6px;height:6px;border-radius:50%}
  .pcard .img .stk.ok .d{background:var(--ok)}
  .pcard .img .stk.warn .d{background:#d4910f}
  .pcard .img .stk.danger .d{background:var(--danger)}
  .pcard .img .ic-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.18;font-size:60px}
  .pcard .info{padding:9px 11px 9px;display:flex;flex-direction:column;gap:2px}
  .pcard .info .brand{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-2);font-family:var(--mono)}
  .pcard .info b{font-size:12.5px;font-weight:600;line-height:1.3;text-wrap:pretty}
  .pcard .info small{font-size:10.5px;color:var(--ink-3);font-family:var(--mono);display:flex;gap:8px;align-items:center}
  .pcard .info small .loc{color:var(--ink-2);background:var(--line-2);padding:0 5px;border-radius:3px;font-size:10px}
  .pcard .footer{display:flex;align-items:flex-end;justify-content:space-between;padding:8px 11px;border-top:1px solid var(--line-2);background:#fbf9f3}
  .pcard .price{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .pcard .price small{display:block;font-size:9.5px;color:var(--ink-3);font-family:ui-sans-serif;font-weight:400;letter-spacing:0;margin-top:-1px}
  .pcard .unit{font-size:10.5px;color:var(--ink-2);text-align:right;align-self:flex-end}
  .pcard .unit b{display:block;font-weight:600;font-size:11.5px;color:var(--ink);font-family:var(--mono)}
  .pcard.added{border-color:var(--ok);background:#fafff8}
  .pcard.added::after{content:"✓ ADICIONADO";position:absolute;top:8px;right:8px;background:var(--ok);color:#fff;font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:99px;letter-spacing:.05em;z-index:2;font-family:var(--mono)}
  .pcard.added .img .stk{display:none}

  /* Esgotado: opaco e pequeno */
  .pcard.out{opacity:.55;filter:grayscale(.7)}
  .pcard.out .img{background:linear-gradient(135deg,#d8d2c4 0%,#b8b0a3 100%) !important}
  .pcard.out .img::after{background:none}
  .pcard.out .img .ic-overlay{opacity:.12}
  .pcard.out .img .stk{background:#fff;color:var(--danger)}
  .pcard.out .img .stk .d{display:none}
  .pcard.out:hover{opacity:.85}

  /* ── LIST (Densa, default) ── */
  .prow{background:#fff;border:1px solid var(--line);border-radius:5px;display:grid;grid-template-columns:48px 1fr auto auto auto auto;align-items:center;gap:12px;padding:6px 12px 6px 6px;cursor:pointer;transition:border-color .12s}
  .prow:hover{border-color:#c9d6e8;background:#fbfbf6}
  .prow .img{width:48px;height:48px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;font-family:var(--mono);letter-spacing:-.02em;position:relative;overflow:hidden}
  .prow .img::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,rgba(0,0,0,.18) 100%);pointer-events:none}
  .prow .info{min-width:0;display:flex;flex-direction:column;gap:0}
  .prow .info .top{display:flex;align-items:center;gap:8px;font-size:9.5px;color:var(--ink-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em}
  .prow .info .top .brand{color:var(--ink-2);font-weight:700}
  .prow .info .top .cat-dot{width:6px;height:6px;border-radius:50%}
  .prow .info b{font-size:12.5px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prow .info small{font-size:10.5px;color:var(--ink-3);font-family:var(--mono);display:flex;gap:8px;align-items:center}
  .prow .info small .loc{color:var(--ink-2);background:var(--line-2);padding:0 5px;border-radius:3px;font-size:10px;font-family:var(--mono)}
  .prow .stk-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);font-weight:600;padding:3px 8px;border-radius:99px;background:var(--line-2)}
  .prow .stk-pill .d{width:6px;height:6px;border-radius:50%}
  .prow .stk-pill.ok{background:var(--ok-soft);color:var(--ok)}
  .prow .stk-pill.ok .d{background:var(--ok)}
  .prow .stk-pill.warn{background:#fdf3df;color:#7a4a00}
  .prow .stk-pill.warn .d{background:#d4910f}
  .prow .stk-pill.out{background:var(--line-2);color:var(--ink-3)}
  .prow .stk-pill.out .d{background:#a8a298}
  .prow .price{font-family:var(--mono);font-size:13.5px;font-weight:700;text-align:right;flex-shrink:0;min-width:90px}
  .prow .price small{display:block;font-size:10px;color:var(--ink-3);font-family:ui-sans-serif;font-weight:400;margin-top:-1px;letter-spacing:0}
  .prow .add{flex-shrink:0}
  .prow.added{border-color:var(--ok);background:#fafff8}
  .prow.added .add{background:var(--ok);border-color:var(--ok);color:#fff}
  .prow.out{opacity:.6}
  .prow.out .img{filter:grayscale(1)}
  .prow.out:hover{opacity:.9}

  .mbody .empty{padding:50px;text-align:center;color:var(--ink-3);font-size:13px}
  .mbody .empty b{display:block;color:var(--ink-2);font-size:14px;margin-bottom:5px}

  .mfoot{display:flex;align-items:center;gap:10px;padding:12px 18px;border-top:1px solid var(--line-2);background:#fbf9f3}
  .mfoot .summary{flex:1;font-size:12.5px;color:var(--ink-2)}
  .mfoot .summary b{color:var(--ink);font-weight:600}
  .mfoot .summary .v{font-family:var(--mono);font-weight:700;color:var(--ink);margin-left:6px}

  /* tooltip discreto pra modos */
  .view-toggle button[title]:hover::after{content:attr(title);position:absolute;background:#222;color:#fff;padding:3px 7px;border-radius:4px;font-size:10.5px;transform:translateY(28px);white-space:nowrap;z-index:99;font-weight:400}
  .view-toggle{position:relative}
</style>
</head>
<body>

<div class="stage">
  <h1>Consulta de Produto — Oficina Mecânica</h1>
  <p>Modal abre sobre a OS / venda · 9 categorias mecânicas · filtro lateral por marca · estoque colorido · esgotado vai pro fim, acinzentado. Clique em <b>+ Adicionar item</b> abaixo.</p>

  <div class="mock-sale">
    <div class="h"><b>OS-12847</b> <small>· Civic 2018 · cliente: Marcos Andrade · placa BRA2E19</small></div>
    <div id="cart"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn primary" onclick="openPicker()">+ Adicionar item</button>
      <button class="btn ghost">Aplicar desconto</button>
    </div>
  </div>
</div>

<div id="modal-root"></div>

  // Elétrica
  { id:"EL-BT-1060", name:"Bateria 60Ah Free",              cat:"Elétrica",      brand:"Moura",        unit:"un", price:520.00, stock:6, min:2, loc:"E5-01", ean:"7898357501060" },

  // Lubrificantes

  // Pneus

  { id:"AC-PL-3055", name:"Palheta limpador 24''",          cat:"Acessórios",    brand:"Bosch",        unit:"un", price:42.00,  stock:0, min:4, loc:"H8-08", ean:"7898357800055" },

  // Serviços
  { id:"SV-AL-001", name:"Alinhamento direção 4 rodas",     cat:"Serviços",      brand:"—",            unit:"h",  price:120.00, stock:99,min:0, loc:"—",     ean:"" },
  { id:"SV-BL-002", name:"Balanceamento (4 rodas)",         cat:"Serviços",      brand:"—",            unit:"h",  price:80.00,  stock:99,min:0, loc:"—",     ean:"" },
  { id:"SV-TR-003", name:"Troca de óleo + filtro",          cat:"Serviços",      brand:"—",            unit:"h",  price:60.00,  stock:99,min:0, loc:"—",     ean:"" },
  { id:"SV-RV-004", name:"Revisão 20.000 km",               cat:"Serviços",      brand:"—",            unit:"h",  price:380.00, stock:99,min:0, loc:"—",     ean:"" },
  { id:"SV-DG-005", name:"Diagnóstico c/ scanner",          cat:"Serviços",      brand:"—",            unit:"h",  price:90.00,  stock:99,min:0, loc:"—",     ean:"" },
];
const fmt = (n) => "R$ " + Number(n).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});

// status do estoque por produto (cor)
function stockStatus(p){
  if (p.cat === "Serviços") return "service"; // serviços não têm estoque limitante
  if (p.stock <= 0) return "out";
  if (p.stock < p.min) return "warn";
  return "ok";
}
function stockLabel(p){
  if (p.cat === "Serviços") return "—";
  if (p.stock <= 0) return "Esgotado";
  return p.stock + " " + (p.unit === "h" ? "" : p.unit);
}

// ─── carrinho ───
let cart = []; // {id, qty}
function renderCart(){
  const el = document.getElementById("cart");
  if (!cart.length){
    el.innerHTML = `<div class="empty-cart"><b>Nenhum item adicionado</b><span>Clique em "+ Adicionar item" pra começar</span></div>`;
    return;
  }
  let total = 0;
  el.innerHTML = cart.map((it, i) => {
    const p = PRODUCTS.find(x => x.id === it.id);
    const sub = p.price * it.qty; total += sub;
    return `
      <div class="cart-row">
        <div class="cart-thumb" style="background:${CAT_META[p.cat].color}">${CAT_META[p.cat].short}</div>
        <div class="cart-info"><b>${p.name}</b><small>${p.id} · ${p.brand} · ${fmt(p.price)}/${p.unit}</small></div>
        <div class="cart-q">
          <button onclick="setQty(${i}, ${it.qty-1})">−</button>
          <input value="${it.qty}" onchange="setQty(${i}, parseFloat(this.value)||1)"/>
          <button onclick="setQty(${i}, ${it.qty+1})">+</button>
        </div>
        <div class="cart-val">${fmt(sub)}</div>
        <button class="cart-x" onclick="removeItem(${i})" title="Remover">✕</button>
      </div>`;
  }).join("") + `
    <div class="cart-tot"><span>Total</span><b>${fmt(total)}</b></div>`;
}
function setQty(i, q){ cart[i].qty = Math.max(1, q); renderCart(); }
function removeItem(i){ cart.splice(i,1); renderCart(); }
function addItem(p){
  if (stockStatus(p) === "out") return; // não permite adicionar esgotado
  const ex = cart.find(c => c.id === p.id);
  if (ex) ex.qty++; else cart.push({ id:p.id, qty:1 });
  renderCart(); renderPicker();
}

// ─── picker modal ───
let pickerOpen = false;
let view = "list";      // list (densa) | grid (balcão) — densa default
let cat  = "all";
let q    = "";
let brandsSel = new Set();

function openPicker(){ pickerOpen = true; renderPicker(); setTimeout(() => document.querySelector(".msearch input")?.focus(), 50); }
function closePicker(){ pickerOpen = false; renderPicker(); }

function toggleBrand(b){
  if (brandsSel.has(b)) brandsSel.delete(b); else brandsSel.add(b);
  renderPicker();
}
function clearBrands(){ brandsSel.clear(); renderPicker(); }

function renderPicker(){
  const root = document.getElementById("modal-root");
  if (!pickerOpen){ root.innerHTML = ""; return; }

  // categorias (com cor) e contagem
  const cats = ["all", ...Object.keys(CAT_META)];
  const counts = Object.fromEntries(cats.map(c => [c, c==="all" ? PRODUCTS.length : PRODUCTS.filter(p => p.cat===c).length]));

  // marcas globais (exceto Serviços)
  const allBrands = [...new Set(PRODUCTS.filter(p => p.brand !== "—").map(p => p.brand))].sort();
  const brandCount = (b) => PRODUCTS.filter(p => p.brand === b).length;

  // filtra
  let filtered = PRODUCTS.slice();
  if (cat !== "all") filtered = filtered.filter(p => p.cat === cat);
  if (brandsSel.size) filtered = filtered.filter(p => brandsSel.has(p.brand));
  if (q.trim()){
    const qq = q.toLowerCase();
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(qq) ||
      p.id.toLowerCase().includes(qq) ||
      p.brand.toLowerCase().includes(qq) ||
      p.cat.toLowerCase().includes(qq) ||
      (p.ean || "").includes(qq.replace(/\s/g,""))
    );
  }

  // separa disponíveis e esgotados
  const avail = filtered.filter(p => stockStatus(p) !== "out");
  const out   = filtered.filter(p => stockStatus(p) === "out");

  // disponíveis: ordena por stock status (ok > warn > service) então alpha
  const rankAvail = { ok:0, warn:1, service:2 };
  avail.sort((a,b) => (rankAvail[stockStatus(a)] - rankAvail[stockStatus(b)]) || a.name.localeCompare(b.name));

  const inCart = (id) => cart.find(c => c.id === id);

  // ── render card (grid Balcão) ──
  const renderCard = (p, isOut) => {
    const added = !!inCart(p.id);
    const ss = stockStatus(p);
    const stkCls = ss === "ok" ? "ok" : ss === "warn" ? "warn" : ss === "out" ? "danger" : "ok";
    const stkText = isOut ? "Esgotado" : (p.cat === "Serviços" ? "Sob ordem" : stockLabel(p));
    return `
      <div class="pcard ${added?"added":""} ${isOut?"out":""}" onclick="addItem(${JSON.stringify(p).replace(/"/g,'&quot;')})">
        <div class="img" style="background:${CAT_META[p.cat].color}">
          <span class="cat-mini">${p.cat}</span>
          <span class="ic-overlay">${CAT_META[p.cat].short}</span>
          <span style="position:relative;z-index:1">${p.id.split('-')[0]}</span>
          <span class="stk ${stkCls}"><span class="d"></span>${stkText}</span>
        </div>
        <div class="info">
          <span class="brand">${p.brand}</span>
          <b>${p.name}</b>
          <small><span>${p.id}</span>${p.loc !== "—" ? `<span class="loc">${p.loc}</span>` : ""}</small>
        </div>
        <div class="footer">
          <div class="price">${fmt(p.price)}<small>/${p.unit}</small></div>
          <div class="unit"><b>${p.unit}</b><span>unidade</span></div>
        </div>
      </div>`;
  };

  // ── render row (Densa default) ──
  const renderRow = (p, isOut) => {
    const added = !!inCart(p.id);
    const ss = stockStatus(p);
    const stkCls = ss === "ok" ? "ok" : ss === "warn" ? "warn" : ss === "out" ? "out" : "ok";
    const stkText = isOut ? "Esgotado" : (p.cat === "Serviços" ? "Serviço" : stockLabel(p));
    return `
      <div class="prow ${added?"added":""} ${isOut?"out":""}" onclick="addItem(${JSON.stringify(p).replace(/"/g,'&quot;')})">
        <div class="img" style="background:${CAT_META[p.cat].color}">${CAT_META[p.cat].short}</div>
        <div class="info">
          <span class="top">
            <span class="cat-dot" style="background:${CAT_META[p.cat].color}"></span>
            <span>${p.cat}</span>
            <span style="opacity:.4">·</span>
            <span class="brand">${p.brand}</span>
          </span>
          <b>${p.name}</b>
          <small><span>${p.id}</span>${p.loc !== "—" ? `<span class="loc">${p.loc}</span>` : ""}${p.ean ? `<span style="opacity:.6">${p.ean}</span>` : ""}</small>
        </div>
        <div class="stk-pill ${stkCls}"><span class="d"></span>${stkText}</div>
        <div style="font-size:11px;color:var(--ink-2);font-family:var(--mono);text-align:right">${p.unit}</div>
        <div class="price">${fmt(p.price)}<small>/${p.unit}</small></div>
        <button class="btn sm add">${added?"+1":"Adicionar"}</button>
      </div>`;
  };

  const renderEither = (p, isOut) => view === "grid" ? renderCard(p, isOut) : renderRow(p, isOut);

  const cartCount = cart.reduce((a,c) => a+c.qty, 0);
  const cartTot = cart.reduce((a,c) => a + c.qty * PRODUCTS.find(p => p.id===c.id).price, 0);

  root.innerHTML = `
    <div class="modal-back" onclick="closePicker()"></div>
    <div class="modal" role="dialog">
      <div class="mh">
        <h2>Adicionar peça ou serviço à OS</h2>
        <small>OS-12847 · Civic 2018</small>
        <button class="x" onclick="closePicker()">✕</button>
      </div>

      <div class="msearch">
        <div class="s">
          <span class="ic">⌕</span>
          <input placeholder="Buscar por nome, código, marca, categoria ou código de barras..."
                 value="${q.replace(/"/g,'&quot;')}"
                 oninput="q=this.value;renderPicker()" autofocus/>
          <span class="scope">5 campos</span>
        </div>
        <div class="view-toggle">
          <button class="${view==='list'?'active':''}" onclick="view='list';renderPicker()" title="Lista densa (padrão)">≡ Densa</button>
          <button class="${view==='grid'?'active':''}" onclick="view='grid';renderPicker()" title="Cards grandes para balcão">▦ Balcão</button>
        </div>
      </div>

      <div class="mcats">
        ${cats.map(c => `
          <button class="mcat ${cat===c?'active':''}" onclick="cat='${c}';renderPicker()">
            ${c==='all' ? 'Todas' : `<span class="dot" style="background:${CAT_META[c].color}"></span>${c}`}
            <span class="n">${counts[c]}</span>
          </button>`).join("")}
      </div>

      <div class="mwrap">
        <aside class="marcas">
          <h4>Marca <span style="opacity:.6">(${brandsSel.size}/${allBrands.length})</span></h4>
          ${allBrands.map(b => `
            <label class="marca-row ${brandsSel.has(b)?'on':''}">
              <input type="checkbox" ${brandsSel.has(b)?'checked':''} onchange="toggleBrand('${b}')"/>
              <span>${b}</span>
              <span class="n">${brandCount(b)}</span>
            </label>`).join("")}
          ${brandsSel.size ? `<span class="clear" onclick="clearBrands()">Limpar filtro</span>` : ""}
        </aside>

        <div class="mbody">
          ${filtered.length ? `
            ${avail.length ? `
              <div class="sec"><span>Disponíveis</span><span class="n" style="font-family:var(--mono);font-weight:600">${avail.length}</span><span class="ln"></span></div>
              <div class="${view==='grid'?'grid':'list'}">${avail.map(p => renderEither(p, false)).join("")}</div>
            ` : ""}
            ${out.length ? `
              <div class="sec"><span>Esgotados</span><span class="n" style="font-family:var(--mono);font-weight:600">${out.length}</span><span class="ln"></span></div>
              <div class="${view==='grid'?'grid':'list'}">${out.map(p => renderEither(p, true)).join("")}</div>
            ` : ""}
          ` : `
            <div class="empty"><b>Nenhum item bate com a busca</b>Tente outro termo, marca ou limpe os filtros.</div>
          `}
        </div>
      </div>

      <div class="mfoot">
        <div class="summary">
          ${cartCount
            ? `<b>${cartCount}</b> item${cartCount>1?'s':''} adicionado${cartCount>1?'s':''} <span class="v">${fmt(cartTot)}</span>`
            : `Clique adiciona · clique novamente soma quantidade · ⏎ confirma · esgotados não somam`}
        </div>
        <button class="btn ghost" onclick="closePicker()">Continuar</button>
        <button class="btn primary" onclick="closePicker()">Concluir e voltar à OS</button>
      </div>
    </div>`;
}

renderCart();
openPicker();

// Esc fecha
document.addEventListener("keydown", e => { if (e.key === "Escape") closePicker(); });
</script>
