<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap');
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:"IBM Plex Sans",sans-serif; background:#fff; padding:16px; color:oklch(0.22 0.01 80); -webkit-font-smoothing:antialiased; }
  .section{ margin-bottom:14px; }
  .label{ font-size:9.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:oklch(0.65 0.01 80); margin-bottom:8px; }
  .row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

  /* vw-btn styles */
  .btn{
    appearance:none; border:1px solid oklch(0.90 0.004 90);
    background:#fff; color:oklch(0.22 0.01 80);
    height:34px; padding:0 14px; border-radius:6px;
    font-family:inherit; font-size:12.5px; font-weight:500;
    cursor:default; display:inline-flex; align-items:center; gap:6px;
  }
  .btn:hover{ background:oklch(0.93 0.004 90); }
  .btn.primary{ background:oklch(0.58 0.09 220); color:#fff; border-color:oklch(0.58 0.09 220); }
  .btn.primary:hover{ background:oklch(0.66 0.09 220); }
  .btn.danger{ background:oklch(0.55 0.18 25); color:#fff; border-color:oklch(0.55 0.18 25); }
  .btn.ghost{ background:transparent; border-color:transparent; color:oklch(0.50 0.01 80); }
  .btn.ghost:hover{ background:oklch(0.93 0.004 90); color:oklch(0.22 0.01 80); }
  .btn.sm{ height:26px; padding:0 10px; font-size:11.5px; }

  /* send-btn */
  .send-btn{
    appearance:none; border:0;
    background:oklch(0.58 0.09 220); color:#fff;
    height:28px; padding:0 12px; border-radius:6px;
    font-family:inherit; font-size:12.5px; font-weight:600;
    cursor:default; display:inline-flex; align-items:center; gap:6px;
  }

  /* icon-btn */
  .icon-btn{
    appearance:none; border:1px solid oklch(0.90 0.004 90);
    background:#fff; color:oklch(0.50 0.01 80);
    width:28px; height:28px; border-radius:6px;
    display:grid; place-items:center; cursor:default; font-size:14px;
  }
  .icon-btn:hover{ color:oklch(0.22 0.01 80); border-color:oklch(0.65 0.01 80); }

  /* lbtn-sec */
  .lbtn-sec{
    appearance:none; border:1px solid oklch(0.90 0.004 90);
    background:oklch(0.965 0.004 90); color:oklch(0.22 0.01 80);
    height:26px; padding:0 10px; border-radius:6px;
    font-family:inherit; font-size:11.5px;
    cursor:default; display:inline-flex; align-items:center; gap:4px;
  }

  /* lblock-cta */
  .lblock-cta{
    appearance:none;
    border:1px solid oklch(0.94 0.025 220);
    background:oklch(0.94 0.025 220); color:oklch(0.58 0.09 220);
    height:28px; padding:0 12px; border-radius:6px;
    font-family:inherit; font-size:12px; font-weight:600;
    cursor:default; display:inline-flex; align-items:center; gap:5px;
  }
  .lblock-cta:hover{ background:oklch(0.58 0.09 220); color:#fff; }

  /* input */
  .input{
    appearance:none; border:1px solid oklch(0.90 0.004 90);
    background:#fff; color:oklch(0.22 0.01 80);
    height:34px; padding:0 10px; border-radius:6px;
    font-family:inherit; font-size:13px; outline:none; width:200px;
  }
  .input:focus{ border-color:oklch(0.58 0.09 220); box-shadow:0 0 0 3px oklch(0.94 0.025 220); }

  /* chip */
  .chip{
    appearance:none; border:1px solid oklch(0.90 0.004 90);
    background:#fff; color:oklch(0.22 0.01 80);
    padding:5px 12px; border-radius:999px;
    font-family:inherit; font-size:12px; cursor:default;
  }
  .chip.on{ background:oklch(0.58 0.09 220); color:#fff; border-color:oklch(0.58 0.09 220); }
</style>
</head>
<body>
  <div class="section">
    <div class="label">Botões principais (vw-btn)</div>
    <div class="row">
      <button class="btn primary">Aprovar</button>
      <button class="btn">Editar</button>
      <button class="btn danger">Rejeitar</button>
      <button class="btn ghost">Cancelar</button>
      <button class="btn sm">sm</button>
      <button class="send-btn">Enviar ↑</button>
    </div>
  </div>
  <div class="section">
    <div class="label">Ícone &amp; Ações vinculadas</div>
    <div class="row">
      <button class="icon-btn">✕</button>
      <button class="icon-btn">⋯</button>
      <button class="lbtn-sec">Ligar</button>
      <button class="lbtn-sec">WhatsApp</button>
      <button class="lblock-cta">Abrir OS →</button>
    </div>
  </div>
  <div class="section">
    <div class="label">Input &amp; Chips</div>
    <div class="row">
      <input class="input" placeholder="Buscar conversa..." />
      <button class="chip on">Todos</button>
      <button class="chip">OS</button>
      <button class="chip">Equipe</button>
      <button class="chip">Clientes</button>
    </div>
  </div>
</body>
</html>
