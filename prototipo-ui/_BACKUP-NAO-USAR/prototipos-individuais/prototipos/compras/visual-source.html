<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Compras — Oimpresso ERP</title>
<style>
  :root{
    --bg:#f6f4ef;--paper:#fff;--ink:#1a1917;--ink-2:#5b574f;--ink-3:#8b8580;
    --line:#e5e0d3;--line-2:#efeae0;
    --accent:#1f3a5f;--accent-soft:#eaf0f7;--accent-2:#173049;
    --ok:#1f6d3a;--ok-soft:#e6f1e8;
    --warn:#a35a00;--warn-soft:#fbf0dc;
    --err:#9a2d2d;--err-soft:#fbe9e9;
    --info:#1f5a8a;--info-soft:#e3edf6;
    --radius:6px;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.45 ui-sans-serif,system-ui,-apple-system,sans-serif}
  button,input,select,textarea{font:inherit}

  /* APP shell: sidebar + main */
  .app{display:grid;grid-template-columns:200px 1fr;height:100vh;overflow:hidden}

  /* SIDEBAR */
  .sb{background:#1a1917;color:#c5beae;padding:14px 0;overflow-y:auto;display:flex;flex-direction:column}
  .sb .brand{padding:0 16px 16px;border-bottom:1px solid #2a2926;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .sb .brand b{font-size:14px;color:#fff;font-weight:700;letter-spacing:-.01em}
  .sb .brand small{font-size:10px;color:#8b8580;font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em;display:block;margin-top:1px}
  .sb h4{margin:14px 16px 6px;font-size:9.5px;color:#5b574f;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
  .sb a{display:flex;align-items:center;gap:9px;padding:6px 16px;color:#c5beae;text-decoration:none;font-size:12.5px;border-left:2px solid transparent;cursor:pointer}
  .sb a:hover{background:#2a2926;color:#fff}
  .sb a.active{background:#2a2926;color:#fff;border-left-color:#c97a3a;font-weight:600}
  .sb a .ic{width:14px;text-align:center;font-size:11px;color:#8b8580}
  .sb a.active .ic{color:#c97a3a}
  .sb a .ct{margin-left:auto;font-size:10px;color:#5b574f;font-family:var(--mono)}
  .sb .biz{margin-top:auto;padding:12px 16px;border-top:1px solid #2a2926;font-size:11px;color:#8b8580}
  .sb .biz b{display:block;color:#c5beae;font-size:12px;margin-bottom:1px}

  /* MAIN */
  .main{display:grid;grid-template-rows:auto auto 1fr auto;overflow:hidden}

  /* HEAD sticky */
  .hd{background:#fff;border-bottom:1px solid var(--line);padding:11px 20px;display:flex;align-items:center;gap:14px}
  .hd .crumbs{font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;font-family:var(--mono)}
  .hd h1{margin:0;font-size:16px;font-weight:600;letter-spacing:-.01em}
  .hd .count{font-size:11px;font-family:var(--mono);color:var(--ink-3);background:var(--line-2);padding:2px 8px;border-radius:99px}
  .hd .sp{flex:1}
  .hd .search{display:flex;align-items:center;gap:6px;background:#fbf9f3;border:1px solid var(--line);border-radius:5px;padding:5px 10px;min-width:260px}
  .hd .search input{border:none;outline:none;background:transparent;font-size:12.5px;flex:1}
  .hd .search span{color:var(--ink-3);font-size:13px}

  /* TABS (sub-rotas dentro de Compras) */
  .tbs{background:#fff;border-bottom:1px solid var(--line);padding:0 20px;display:flex;align-items:center;gap:2px;overflow-x:auto}
  .tbs a{padding:9px 14px;font-size:12.5px;color:var(--ink-2);border-bottom:2px solid transparent;text-decoration:none;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .tbs a:hover{color:var(--ink)}
  .tbs a.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .tbs a .ct{font-size:10px;font-family:var(--mono);color:var(--ink-3);background:var(--line-2);padding:1px 6px;border-radius:99px}
  .tbs a.active .ct{background:var(--accent-soft);color:var(--accent)}
  .tbs .sp{flex:1}
  .tbs .filters{display:flex;gap:6px;font-size:11.5px;color:var(--ink-3);align-items:center}
  .tbs .filter-pill{padding:3px 9px;border:1px solid var(--line);background:#fbf9f3;border-radius:99px;color:var(--ink-2);cursor:pointer;font-size:11px}
  .tbs .filter-pill:hover{border-color:var(--accent);color:var(--accent)}
  .tbs .filter-pill.on{background:var(--accent-soft);border-color:#c9d6e8;color:var(--accent);font-weight:600}

  /* BODY: lista + drawer */
  .bd{display:grid;overflow:hidden;transition:grid-template-columns .2s ease;min-width:0}
  .bd.with-drawer{grid-template-columns:minmax(580px,1fr) 480px}
  .bd:not(.with-drawer){grid-template-columns:1fr 0}
  @media (min-width:1500px){
    .bd.with-drawer{grid-template-columns:minmax(680px,1fr) 540px}
  }
  .list{min-width:0}
  .drawer{min-width:0}

  /* LISTA */
  .list{overflow:auto;padding:14px 20px;background:var(--bg)}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:5px;padding:10px 12px}
  .kpi small{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;display:block;margin-bottom:3px}
  .kpi b{font-size:18px;font-weight:700;letter-spacing:-.01em;font-family:var(--mono);font-variant-numeric:tabular-nums;display:block}
  .kpi .ln{font-size:10.5px;color:var(--ink-2);margin-top:3px}
  .kpi.warn b{color:var(--warn)} .kpi.warn{background:var(--warn-soft);border-color:#f1d499}
  .kpi.ok b{color:var(--ok)}     .kpi.ok{background:var(--ok-soft);border-color:#b8d9c0}

  /* TABELA */
  .tbl{background:#fff;border:1px solid var(--line);border-radius:5px;overflow:hidden}
  table.purchases{width:100%;border-collapse:collapse;font-size:12.5px}
  table.purchases th{text-align:left;padding:8px 10px;background:#fbf9f3;border-bottom:1px solid var(--line);font-weight:600;color:var(--ink-2);font-size:10px;text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0;z-index:1}
  table.purchases td{padding:9px 10px;border-bottom:1px solid var(--line-2);cursor:pointer;vertical-align:middle}
  table.purchases tr:last-child td{border-bottom:none}
  table.purchases tr:hover td{background:#fbf9f3}
  table.purchases tr.sel td{background:var(--accent-soft);border-bottom-color:#c9d6e8}
  table.purchases td.mono{font-family:var(--mono);font-size:12px}
  table.purchases td.num{font-family:var(--mono);text-align:right;font-variant-numeric:tabular-nums}
  table.purchases td b{font-weight:600;font-size:12.5px}
  table.purchases td small{display:block;font-size:10.5px;color:var(--ink-3);margin-top:1px}

  /* status pill */
  .pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
  .pill::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor}
  .pill.rascunho{background:var(--line-2);color:var(--ink-2)}
  .pill.pedido{background:var(--info-soft);color:var(--info)}
  .pill.transito{background:var(--warn-soft);color:var(--warn)}
  .pill.recebido{background:var(--ok-soft);color:var(--ok)}
  .pill.pago{background:#dcecdf;color:#0f5a2a}
  .pill.cancelada{background:var(--err-soft);color:var(--err)}

  /* DRAWER */
  .drawer{background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
  .drw-head{padding:14px 18px;border-bottom:1px solid var(--line-2);display:flex;align-items:flex-start;gap:10px}
  .drw-head h2{margin:0;font-size:14px;font-weight:600}
  .drw-head .mono{font-family:var(--mono);font-size:11px;color:var(--ink-3);background:var(--line-2);padding:2px 7px;border-radius:4px;margin-top:3px;display:inline-block}
  .drw-head .x{margin-left:auto;border:none;background:transparent;color:var(--ink-3);width:26px;height:26px;border-radius:4px;font-size:15px;cursor:pointer}
  .drw-head .x:hover{background:var(--line-2);color:var(--ink)}

  /* FSM stepper inline no drawer */
  .fsm{padding:12px 18px;border-bottom:1px solid var(--line-2);background:#fbf9f3}
  .fsm-track{display:flex;gap:0;align-items:stretch;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .fsm-step{flex:1;padding:6px 4px;text-align:center;background:#fff;border:1px solid var(--line);border-right:none;color:var(--ink-3);position:relative}
  .fsm-step:first-child{border-radius:4px 0 0 4px}
  .fsm-step:last-child{border-radius:0 4px 4px 0;border-right:1px solid var(--line)}
  .fsm-step.done{background:var(--ok-soft);color:var(--ok);border-color:#b8d9c0}
  .fsm-step.now{background:var(--accent);color:#fff;border-color:var(--accent-2);font-weight:700;z-index:1}
  .fsm-step .ic{display:block;font-size:13px;margin-bottom:1px}

  .drw-tabs{display:flex;padding:0 18px;border-bottom:1px solid var(--line-2);gap:0}
  .drw-tabs button{border:none;background:transparent;padding:9px 12px;font-size:12px;color:var(--ink-2);border-bottom:2px solid transparent;cursor:pointer;display:flex;align-items:center;gap:5px}
  .drw-tabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .drw-tabs button:hover:not(.active){color:var(--ink)}
  .drw-tabs button .ct{font-size:10px;font-family:var(--mono);color:var(--ink-3);background:var(--line-2);padding:0 5px;border-radius:99px}

  .drw-body{flex:1;overflow:auto;padding:14px 18px}
  .drw-foot{padding:11px 18px;border-top:1px solid var(--line);background:#fbf9f3;display:flex;align-items:center;gap:8px}
  .drw-foot .total{flex:1;font-size:11.5px;color:var(--ink-3)}
  .drw-foot .total b{display:block;font-size:17px;font-weight:700;font-family:var(--mono);color:var(--ink);font-variant-numeric:tabular-nums;margin-top:1px}

  /* SECTION dentro do drawer */
  .sec{margin-bottom:14px}
  .sec h4{margin:0 0 7px;font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;display:flex;align-items:center;gap:6px}
  .sec h4 .badge{background:var(--line-2);color:var(--ink-2);font-size:9.5px;padding:1px 6px;border-radius:99px;font-family:var(--mono)}
  .sec .card{background:#fbf9f3;border:1px solid var(--line);border-radius:5px;padding:11px 13px}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:12px}
  .field-grid .f label{font-size:9.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;font-weight:600;display:block;margin-bottom:1px}
  .field-grid .f span{color:var(--ink);font-weight:500}
  .field-grid .f span.mono{font-family:var(--mono);font-size:11.5px}
  .field-grid .f.full{grid-column:span 2}

  /* ITEMS table */
  .items-tbl{width:100%;border-collapse:collapse;font-size:11.5px;background:#fff;border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .items-tbl th{background:#fbf9f3;padding:6px 7px;text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);font-weight:700;border-bottom:1px solid var(--line)}
  .items-tbl td{padding:7px 7px;border-bottom:1px solid var(--line-2);vertical-align:top}
  .items-tbl tr:last-child td{border-bottom:none}
  .items-tbl b{font-size:11.5px;font-weight:600}
  .items-tbl small{display:block;font-size:10px;color:var(--ink-3);font-family:var(--mono);margin-top:1px}
  .items-tbl .num{font-family:var(--mono);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}

  /* PAGAMENTOS */
  .pay-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-2);align-items:center}
  .pay-row:last-child{border-bottom:none}
  .pay-icon{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;background:var(--info-soft);color:var(--info);font-size:12px;font-weight:700;font-family:var(--mono)}
  .pay-row b{font-size:12px;font-weight:600;display:block}
  .pay-row small{font-size:10.5px;color:var(--ink-3);display:block;font-family:var(--mono)}
  .pay-row .val{font-family:var(--mono);font-weight:700;font-size:12.5px;font-variant-numeric:tabular-nums}
  .pay-row .val.due{color:var(--warn)}
  .pay-row .val.paid{color:var(--ok)}

  /* TIMELINE */
  .tl{position:relative;padding-left:18px}
  .tl::before{content:"";position:absolute;left:5px;top:5px;bottom:5px;width:1px;background:var(--line)}
  .tl-item{position:relative;padding-bottom:10px;font-size:11.5px}
  .tl-item::before{content:"";position:absolute;left:-16px;top:4px;width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid var(--ink-3)}
  .tl-item.ok::before{border-color:var(--ok);background:var(--ok)}
  .tl-item.warn::before{border-color:var(--warn);background:var(--warn)}
  .tl-item.now::before{border-color:var(--accent);background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .tl-item b{font-size:12px;font-weight:600;display:block;color:var(--ink)}
  .tl-item .when{font-size:10px;color:var(--ink-3);font-family:var(--mono);margin-top:1px}
  .tl-item p{margin:3px 0 0;color:var(--ink-2);font-size:11px}

  /* FOOTER sticky */
  .ft{background:#fff;border-top:1px solid var(--line);padding:8px 20px;display:flex;align-items:center;gap:14px;font-size:11.5px;color:var(--ink-3)}
  .ft b{color:var(--ink);font-weight:600}
  .ft .sp{flex:1}
  .ft kbd{font-family:var(--mono);font-size:10px;background:var(--line-2);border:1px solid var(--line);border-radius:3px;padding:1px 5px;color:var(--ink-2)}

  /* BTN */
  .btn{border:1px solid var(--line);background:#fff;padding:5px 11px;border-radius:4px;font-size:11.5px;color:var(--ink);cursor:pointer}
  .btn:hover{border-color:#c5beae;background:#fbf9f3}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .btn.primary:hover{background:var(--accent-2)}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--ink-2)}
  .btn.ghost:hover{background:var(--line-2)}
  .btn.sm{padding:3px 8px;font-size:11px}
  .btn.warn{background:var(--warn);border-color:var(--warn);color:#fff;font-weight:600}
  .btn.warn:hover{background:#8c4d00}

  /* XML drop badge */
  .xml-badge{background:var(--info-soft);border:1px dashed #a8c7df;color:var(--info);padding:8px 12px;border-radius:5px;font-size:11.5px;display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .xml-badge b{color:var(--info);font-weight:700}
  .xml-badge .key{font-family:var(--mono);font-size:10.5px;background:#fff;padding:2px 6px;border-radius:3px;border:1px solid var(--line)}
</style>
</head>

  const [sel, setSel] = useState("COMP-2847");
  const [tab, setTab] = useState("resumo");
  const [filter, setFilter] = useState("all");

  const filtered = useMemo(() => {
    if (filter === "all") return PURCHASES;
    if (filter === "abertas") return PURCHASES.filter(p => p.due > 0);
    if (filter === "rascunhos") return PURCHASES.filter(p => p.stage === "rascunho");
    if (filter === "transito") return PURCHASES.filter(p => p.stage === "transito");
    return PURCHASES;
  }, [filter]);

  const selected = PURCHASES.find(p => p.id === sel);

  // KPIs
  const kpi = useMemo(() => ({
    aberto: PURCHASES.filter(p=>p.due>0).reduce((s,p)=>s+p.due,0),
    transito: PURCHASES.filter(p=>p.stage==="transito").length,
    mes: PURCHASES.reduce((s,p)=>s+p.total,0),
    fornec: new Set(PURCHASES.map(p=>p.supplier)).size,
  }), []);

  const stageIdx = (s) => STAGES.findIndex(x => x.id === s);
  const ITAB = (id, label, ct) => ({id, label, ct});

  return (
    <div className="app">

      {/* SIDEBAR */}
      <aside className="sb">
        <div className="brand">
          <div>
            <b>Oimpresso</b>
            <small>ERP · Rota Livre</small>
          </div>
        </div>
        <h4>Operação</h4>
        <a><span className="ic">▢</span>Dashboard</a>
        <a><span className="ic">↗</span>Vendas <span className="ct">82</span></a>
        <a className="active"><span className="ic">↙</span>Compras <span className="ct">7</span></a>
        <a><span className="ic">▣</span>Produtos <span className="ct">147</span></a>
        <a><span className="ic">⏵</span>OS · Produção <span className="ct">23</span></a>
        <a><span className="ic">$</span>Financeiro</a>
        <h4>Cadastros</h4>
        <a><span className="ic">●</span>Clientes</a>
        <a><span className="ic">○</span>Fornecedores <span className="ct">{Object.keys(SUPPLIERS).length}</span></a>
        <a><span className="ic">⚙</span>Configurações</a>
        <div className="biz">
          <b>Matriz · Larissa</b>
          regime simples nacional<br/>04.123.456/0001-78
        </div>
      </aside>

      {/* MAIN */}
      <div className="main">

        {/* HEAD */}
        <header className="hd">
          <div className="crumbs">ERP · Operação · <b style={{color:"var(--ink-2)"}}>Compras</b></div>
          <h1>Compras</h1>
          <span className="count">{filtered.length} de {PURCHASES.length}</span>
          <div className="sp"></div>
          <div className="search">
            <span>⌕</span>
            <input placeholder="Buscar NF-e, fornecedor, ref, chave..."/>
            <kbd style={{fontSize:9,fontFamily:"var(--mono)",color:"var(--ink-3)",background:"var(--line-2)",padding:"1px 5px",borderRadius:3}}>/</kbd>
          </div>
          <button className="btn">↓ Importar XML</button>
          <button className="btn primary">+ Nova compra</button>
        </header>

        {/* TABS */}
        <nav className="tbs">
          <a className={filter==="all"?"active":""} onClick={()=>setFilter("all")}>Todas <span className="ct">{PURCHASES.length}</span></a>
          <a className={filter==="abertas"?"active":""} onClick={()=>setFilter("abertas")}>A pagar <span className="ct">{PURCHASES.filter(p=>p.due>0).length}</span></a>
          <a className={filter==="rascunhos"?"active":""} onClick={()=>setFilter("rascunhos")}>Rascunhos <span className="ct">{PURCHASES.filter(p=>p.stage==="rascunho").length}</span></a>
          <a className={filter==="transito"?"active":""} onClick={()=>setFilter("transito")}>Em trânsito <span className="ct">{PURCHASES.filter(p=>p.stage==="transito").length}</span></a>
          <a>Cancelados</a>
          <div className="sp"></div>
          <div className="filters">
            <span style={{fontSize:10.5,textTransform:"uppercase",letterSpacing:".04em",color:"var(--ink-3)"}}>filtros</span>
            <span className="filter-pill">Fornecedor: todos</span>
            <span className="filter-pill">Local: Matriz</span>
            <span className="filter-pill">Maio/2026</span>
            <span className="filter-pill on">Pagamento: todos</span>
          </div>
        </nav>

        {/* BODY */}
        <div className={`bd ${selected ? 'with-drawer':''}`}>

          {/* LISTA */}
          <main className="list">

            <div className="kpis">
              <div className="kpi warn">
                <small>A pagar</small><b>{fmt(kpi.aberto)}</b>
                <div className="ln">{PURCHASES.filter(p=>p.due>0).length} compras em aberto · próx. venc. 09/05</div>
              </div>
              <div className="kpi">
                <small>Em trânsito</small><b>{kpi.transito}</b>
                <div className="ln">aguardando entrega · {fmt(PURCHASES.filter(p=>p.stage==="transito").reduce((s,p)=>s+p.total,0))}</div>
              </div>
              <div className="kpi">
                <small>Volume do mês</small><b>{fmt(kpi.mes)}</b>
                <div className="ln">+12,4% vs. abr/26 · meta {fmt(45000)}</div>
              </div>
              <div className="kpi ok">
                <small>Fornecedores ativos</small><b>{kpi.fornec}</b>
                <div className="ln">3 com compra recorrente · 1 novo</div>
              </div>
            </div>

            <div className="tbl">
              <table className="purchases">
                <thead>
                  <tr>
                    <th style={{width:"100px"}}>Compra</th>
                    <th>Fornecedor</th>
                    <th style={{width:"95px"}}>Data</th>
                    <th style={{width:"100px"}}>Estágio</th>
                    <th style={{width:"60px",textAlign:"right"}}>Itens</th>
                    <th style={{width:"100px",textAlign:"right"}}>Total</th>
                    <th style={{width:"100px",textAlign:"right"}}>A pagar</th>
                    <th style={{width:"80px"}}>NF-e</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(p => {
                    const s = SUPPLIERS[p.supplier];
                    return (
                      <tr key={p.id} className={sel===p.id?'sel':''} onClick={()=>{setSel(p.id);setTab("resumo")}}>
                        <td className="mono"><b>{p.id}</b><small>{p.ref}</small></td>
                        <td><b>{s.name}</b><small>{s.city}</small></td>
                        <td className="mono">{fmtDate(p.date)}</td>
                        <td><span className={`pill ${p.stage}`}>{STAGES.find(x=>x.id===p.stage).l}</span></td>
                        <td className="num">{p.items}</td>
                        <td className="num"><b>{fmt(p.total)}</b></td>
                        <td className="num" style={{color: p.due > 0 ? "var(--warn)" : "var(--ok)", fontWeight:600}}>
                          {p.due > 0 ? fmt(p.due) : "✓"}
                        </td>
                        <td className="mono" style={{color: p.xmlChave?"var(--ok)":"var(--ink-3)",fontSize:11}}>
                          {p.xmlChave ? "✓ XML" : "—"}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </main>

          {/* DRAWER */}
          {selected && <DrawerView p={selected} tab={tab} setTab={setTab} stageIdx={stageIdx} close={()=>setSel(null)}/>}
        </div>

        {/* FOOTER */}
        <footer className="ft">
          <b>{filtered.length}</b> compras listadas · total <b>{fmt(filtered.reduce((s,p)=>s+p.total,0))}</b> · a pagar <b style={{color:"var(--warn)"}}>{fmt(filtered.reduce((s,p)=>s+p.due,0))}</b>
          <div className="sp"></div>
          <span>Atalhos: <kbd>/</kbd> buscar · <kbd>N</kbd> nova · <kbd>I</kbd> importar XML · <kbd>↑↓</kbd> navegar · <kbd>Esc</kbd> fechar</span>
        </footer>
      </div>
    </div>
  );
}

// ─── DRAWER ───
function DrawerView({ p, tab, setTab, stageIdx, close }){
  const s = SUPPLIERS[p.supplier];
  const idx = stageIdx(p.stage);
  const subtotal = p.products ? p.products.reduce((s,i)=>s+i.total,0) : p.total;
  const itemsTabs = [
    { id:"resumo",     l:"Resumo",     ct:null },
    { id:"itens",      l:"Itens",      ct:p.items },
    { id:"documentos", l:"Documentos", ct:p.xmlChave ? 1 : 0 },
    { id:"pagamentos", l:"Pagamentos", ct:null },
    { id:"historico",  l:"Histórico",  ct:p.timeline ? p.timeline.length : 0 },
  ];

  return (
    <aside className="drawer">
      <div className="drw-head">
        <div>
          <h2>{s.name}</h2>
          <div style={{fontSize:11.5,color:"var(--ink-3)",marginTop:2}}>
            {p.items} ite{p.items===1?'m':'ns'} · {p.locName} · {p.payTerm || "—"}
          </div>
          <span className="mono">{p.id} · {p.ref}</span>
        </div>
        <button className="x" onClick={close}>✕</button>
      </div>

      <div className="fsm">
        <div className="fsm-track">
          {STAGES.map((st, i) => (
            <div key={st.id} className={`fsm-step ${i<idx?'done':i===idx?'now':''}`} title={st.l}>
              <span className="ic">{st.ic}</span>{st.l}
            </div>
          ))}
        </div>
      </div>

      <div className="drw-tabs">
        {itemsTabs.map(t => (
          <button key={t.id} className={tab===t.id?'active':''} onClick={()=>setTab(t.id)}>
            {t.l}{t.ct != null && <span className="ct">{t.ct}</span>}
          </button>
        ))}
      </div>

      <div className="drw-body">
        {tab==="resumo" && (
          <>
            <div className="sec">
              <h4>Fornecedor</h4>
              <div className="card">
                <div className="field-grid">
                  <div className="f"><label>CNPJ</label><span className="mono">{s.doc}</span></div>
                  <div className="f"><label>Cidade</label><span>{s.city}</span></div>
                  <div className="f full"><label>Endereço de cobrança</label><span>Rua Industrial, 200 · Centro · CEP 04123-000</span></div>
                </div>
              </div>
            </div>

            <div className="sec">
              <h4>Dados da compra</h4>
              <div className="card">
                <div className="field-grid">
                  <div className="f"><label>Ref. interna</label><span className="mono">{p.ref}</span></div>
                  <div className="f"><label>Data emissão</label><span className="mono">{fmtDate(p.date)}</span></div>
                  <div className="f"><label>Local</label><span>{p.locName}</span></div>
                  <div className="f"><label>Cond. pagamento</label><span>{p.payTerm || "—"}</span></div>
                  <div className="f"><label>Desconto</label><span>{p.desc>0 ? p.desc+"%" : "—"}</span></div>
                  <div className="f"><label>Frete</label><span className="mono">{fmt(p.shipping)}</span></div>
                </div>
              </div>
            </div>

            {p.notes && (
              <div className="sec">
                <h4>Observações</h4>
                <div className="card" style={{fontSize:12,color:"var(--ink-2)",lineHeight:1.5,background:"#fff"}}>{p.notes}</div>
              </div>
            )}

            <div className="sec">
              <h4>Resumo financeiro</h4>
              <div className="card" style={{padding:0}}>
                <table style={{width:"100%",fontSize:12}}>
                  <tbody>
                    <tr><td style={{padding:"6px 13px",color:"var(--ink-3)"}}>Subtotal</td><td style={{padding:"6px 13px",textAlign:"right",fontFamily:"var(--mono)"}}>{fmt(subtotal)}</td></tr>
                    {p.desc>0 && <tr><td style={{padding:"6px 13px",color:"var(--ink-3)"}}>Desconto ({p.desc}%)</td><td style={{padding:"6px 13px",textAlign:"right",fontFamily:"var(--mono)",color:"var(--err)"}}>−{fmt(subtotal * p.desc/100)}</td></tr>}
                    {p.shipping>0 && <tr><td style={{padding:"6px 13px",color:"var(--ink-3)"}}>Frete</td><td style={{padding:"6px 13px",textAlign:"right",fontFamily:"var(--mono)"}}>+{fmt(p.shipping)}</td></tr>}
                    <tr style={{borderTop:"1px solid var(--line)"}}>
                      <td style={{padding:"8px 13px",fontWeight:700}}>Total da compra</td>
                      <td style={{padding:"8px 13px",textAlign:"right",fontFamily:"var(--mono)",fontWeight:700,fontSize:14}}>{fmt(p.total)}</td>
                    </tr>
                    <tr><td style={{padding:"6px 13px",color:"var(--ok)"}}>Pago</td><td style={{padding:"6px 13px",textAlign:"right",fontFamily:"var(--mono)",color:"var(--ok)"}}>{fmt(p.paid)}</td></tr>
                    <tr><td style={{padding:"6px 13px",color:"var(--warn)",fontWeight:600}}>A pagar</td><td style={{padding:"6px 13px",textAlign:"right",fontFamily:"var(--mono)",fontWeight:700,color:"var(--warn)"}}>{fmt(p.due)}</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </>
        )}

        {tab==="itens" && (
          <>
            <div className="sec">
              <h4>Itens recebidos <span className="badge">{p.items}</span></h4>
              {p.products ? (
                <table className="items-tbl">
                  <thead><tr>
                    <th>Produto</th><th className="num">Qtd</th><th className="num">Custo unit.</th><th className="num">Total</th><th className="num">Venda</th><th className="num">Margem</th>
                  </tr></thead>
                  <tbody>
                    {p.products.map((it,i)=>(
                      <tr key={i}>
                        <td><b>{it.name}</b><small>{it.sku} · lote {it.lot}</small></td>
                        <td className="num">{it.qty}<small style={{textAlign:"right"}}>{it.unit}</small></td>
                        <td className="num">{fmt(it.net)}{it.disc>0 && <small style={{textAlign:"right",color:"var(--ok)"}}>−{it.disc}%</small>}</td>
                        <td className="num"><b>{fmt(it.total)}</b></td>
                        <td className="num">{fmt(it.sellPrice)}</td>
                        <td className="num" style={{color:"var(--ok)",fontWeight:600}}>+{it.margin}%</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              ) : (
                <div className="card" style={{textAlign:"center",color:"var(--ink-3)",fontSize:11.5,padding:18}}>Itens detalhados não disponíveis nesta visualização.</div>
              )}
            </div>
          </>
        )}

        {tab==="documentos" && (
          <>
            {p.xmlChave ? (
              <>
                <div className="sec">
                  <h4>NF-e de entrada</h4>
                  <div className="xml-badge">
                    <span style={{fontSize:18}}>⊞</span>
                    <div style={{flex:1}}>
                      <b>NF-e {p.ref}</b> autorizada · status SEFAZ <b>100</b>
                      <div style={{fontSize:10.5,marginTop:3}}>chave de acesso</div>
                      <div className="key">{p.xmlChave}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,marginTop:8}}>
                    <button className="btn sm">↓ XML</button>
                    <button className="btn sm">↓ DANFE PDF</button>
                    <button className="btn sm">Manifestar destinatário</button>
                  </div>
                </div>
                <div className="sec">
                  <h4>Manifesto destinatário</h4>
                  <div className="card" style={{background:"var(--ok-soft)",borderColor:"#b8d9c0",fontSize:11.5}}>
                    <b style={{color:"var(--ok)"}}>✓ Confirmação da operação</b>
                    <div style={{color:"var(--ink-2)",marginTop:3}}>Manifestada em 08/05/26 09:18 · protocolo 135260012345</div>
                  </div>
                </div>
              </>
            ) : (
              <div className="card" style={{textAlign:"center",padding:24,color:"var(--ink-3)"}}>
                <div style={{fontSize:24,marginBottom:8}}>⊠</div>
                <b style={{color:"var(--ink-2)",fontSize:13,display:"block",marginBottom:3}}>Nenhuma NF-e vinculada</b>
                <small style={{fontSize:11}}>Importe o XML ou cole a chave de 44 dígitos</small>
                <div style={{marginTop:10}}><button className="btn sm">↓ Importar XML</button></div>
              </div>
            )}
          </>
        )}

        {tab==="pagamentos" && (
          <div className="sec">
            <h4>Pagamentos</h4>
            <div className="card">
              {p.paid > 0 && (
                <div className="pay-row">
                  <div className="pay-icon" style={{background:"var(--ok-soft)",color:"var(--ok)"}}>PIX</div>
                  <div>
                    <b>Pagamento à vista</b>
                    <small>05/05/26 14:23 · Banco do Brasil · doc 8842</small>
                  </div>
                  <span className="val paid">{fmt(p.paid)}</span>
                </div>
              )}
              {p.due > 0 && (
                <>
                  <div className="pay-row">
                    <div className="pay-icon" style={{background:"var(--warn-soft)",color:"var(--warn)"}}>BL</div>
                    <div>
                      <b>Boleto · vence 07/06/26</b>
                      <small>30 dias · cód. barras gerado · 837900000...</small>
                    </div>
                    <span className="val due">{fmt(p.due)}</span>
                  </div>
                </>
              )}
              {p.paid === 0 && p.due === 0 && (
                <div style={{textAlign:"center",color:"var(--ink-3)",fontSize:12,padding:14}}>Sem pagamentos lançados</div>
              )}
            </div>
            {p.due > 0 && (
              <div style={{display:"flex",gap:6,marginTop:10}}>
                <button className="btn sm primary">+ Registrar pagamento</button>
                <button className="btn sm">Agendar no financeiro</button>
              </div>
            )}
          </div>
        )}

        {tab==="historico" && (
          <div className="sec">
            <h4>Linha do tempo</h4>
            {p.timeline ? (
              <div className="tl">
                {p.timeline.map((e,i)=>(
                  <div key={i} className={`tl-item ${e.t}`}>
                    <b>{e.title}</b>
                    <div className="when">{e.at} · {e.by}</div>
                    {e.notes && <p>{e.notes}</p>}
                  </div>
                ))}
              </div>
            ) : (
              <div className="card" style={{textAlign:"center",color:"var(--ink-3)",fontSize:12,padding:18}}>Sem eventos registrados</div>
            )}
          </div>
        )}
      </div>

      <div className="drw-foot">
        <div className="total">
          Total da compra
          <b>{fmt(p.total)}</b>
        </div>
        {p.stage === "transito" && <button className="btn">Marcar recebida</button>}
        {p.stage === "recebido" && <button className="btn">Conferir itens</button>}
        {p.stage === "conferido" && p.due > 0 && <button className="btn warn">Pagar agora</button>}
        {p.stage === "rascunho" && <button className="btn">Enviar pedido</button>}
        <button className="btn primary">Executar →</button>
      </div>
    </aside>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
