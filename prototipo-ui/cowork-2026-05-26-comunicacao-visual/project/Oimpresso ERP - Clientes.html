<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Oimpresso ERP — Clientes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    corePlugins: { preflight: false },
    theme: { extend: { fontFamily: {
      sans: ['"IBM Plex Sans"', 'system-ui', 'sans-serif'],
      mono: ['"IBM Plex Mono"', 'ui-monospace', 'monospace'],
    } } },
  };
</script>
<style>
  html, body { background: var(--bg, #f6f4ef); }
  .cli-shell {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }
  .cli-shell-side {
    background: #fff;
    border-right: 1px solid #e8e5dc;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .cli-shell-brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 15px;
    padding: 4px 6px 14px;
    border-bottom: 1px solid #f0ede4;
  }
  .cli-shell-brand-dot {
    width: 24px; height: 24px; border-radius: 6px;
    background: #29261b; color: #f6f4ef;
    display: grid; place-items: center;
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
  }
  .cli-shell-nav { display: flex; flex-direction: column; gap: 2px; }
  .cli-shell-nav-group {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: #98917f; padding: 10px 8px 4px;
  }
  .cli-shell-nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 8px;
    border-radius: 4px;
    color: #29261b;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
  }
  .cli-shell-nav-item:hover { background: #f0ede4; }
  .cli-shell-nav-item.active { background: #29261b; color: #f6f4ef; }
  .cli-shell-nav-item-icon { width: 14px; display: grid; place-items: center; }
  .cli-shell-main {
    display: flex; flex-direction: column;
    min-height: 100vh;
  }
  .cli-shell-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px;
    background: #fff;
    border-bottom: 1px solid #e8e5dc;
    position: sticky; top: 0; z-index: 10;
  }
  .cli-shell-header-l {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: #6b6552;
  }
  .cli-shell-header-l b { color: #29261b; font-weight: 500; }
  .cli-shell-header-r { display: flex; align-items: center; gap: 8px; }
  .cli-shell-iconbtn {
    width: 30px; height: 30px; border-radius: 4px;
    border: 1px solid #e8e5dc; background: #fff;
    display: grid; place-items: center; cursor: pointer;
    color: #6b6552;
  }
  .cli-shell-iconbtn:hover { background: #f6f4ef; color: #29261b; }
  .cli-shell-user {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px 4px 4px;
    border: 1px solid #e8e5dc; border-radius: 4px;
    font-size: 12px;
  }
  .cli-shell-user-av {
    width: 22px; height: 22px; border-radius: 50%;
    background: linear-gradient(135deg, #c89469, #a36b3f);
    color: #fff; display: grid; place-items: center;
    font-size: 10px; font-weight: 600;
  }
  .cli-shell-body {
    padding: 24px;
    flex: 1;
    overflow-y: auto;
  }
  .cli-shell-footer {
    padding: 8px 24px;
    background: #fff;
    border-top: 1px solid #e8e5dc;
    font-size: 11px; color: #98917f;
    display: flex; justify-content: space-between;
    font-family: "IBM Plex Mono", monospace;
  }
  /* Fallback table styles (when styles.css not present) */
  .os-page-h { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:18px; }
  .os-page-h h1 { font-size: 22px; font-weight: 600; margin: 0 0 2px; color:#29261b; }
  .os-page-h p { font-size: 13px; color: #6b6552; margin: 0; }
  .os-page-h-r { display:flex; gap:8px; }
  .os-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 4px;
    border: 1px solid #e8e5dc; background: #fff;
    font-size: 12.5px; font-weight: 500; color: #29261b;
    cursor: pointer;
  }
  .os-btn:hover { background: #f6f4ef; }
  .os-btn.primary { background: #29261b; color: #f6f4ef; border-color: #29261b; }
  .os-btn.primary:hover { background: #1f1d14; }
  .os-btn.ghost { background: transparent; }
  .os-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
  .os-stat { background: #fff; border: 1px solid #e8e5dc; border-radius: 6px; padding: 12px 14px; }
  .os-stat small { display: block; font-size: 11px; color: #6b6552; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .os-stat b { font-size: 22px; font-weight: 600; color: #29261b; }
  .os-stat.warn b { color: #b06a1a; }
  .os-stat .mono { font-family: "IBM Plex Mono", monospace; font-size: 17px; }
  .os-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; }
  .os-tabs { display: flex; gap: 4px; background: #f0ede4; padding: 3px; border-radius: 5px; }
  .os-tab {
    padding: 5px 12px; border-radius: 3px; border: 0; background: transparent;
    font-size: 12.5px; color: #6b6552; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .os-tab.active { background: #fff; color: #29261b; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  .os-tab-count { font-size: 11px; color: #98917f; font-family: "IBM Plex Mono", monospace; }
  .os-tab.active .os-tab-count { color: #6b6552; }
  .os-search {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px;
    background: #fff; border: 1px solid #e8e5dc; border-radius: 4px;
    min-width: 320px;
  }
  .os-search input { border: 0; outline: 0; flex: 1; font-size: 13px; background: transparent; color: #29261b; }
  .os-table-wrap { background: #fff; border: 1px solid #e8e5dc; border-radius: 6px; overflow: hidden; }
  .os-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .os-table thead th {
    text-align: left; padding: 9px 14px;
    background: #faf8f3; border-bottom: 1px solid #e8e5dc;
    font-size: 11.5px; font-weight: 500; color: #6b6552;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .os-table thead th.num { text-align: right; }
  .os-table tbody td { padding: 11px 14px; border-bottom: 1px solid #f0ede4; vertical-align: middle; }
  .os-table tbody tr:last-child td { border-bottom: 0; }
  .os-table tbody tr:hover { background: #faf8f3; cursor: pointer; }
  .os-table tbody td.num { text-align: right; font-family: "IBM Plex Mono", monospace; font-size: 12.5px; }
  .os-table tbody td.value { font-weight: 500; color: #29261b; }
  .os-empty { text-align: center; padding: 28px !important; color: #98917f; }
  .cli-name { display: flex; align-items: center; gap: 10px; }
  .cli-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: grid; place-items: center;
    color: #fff; font-weight: 600; font-size: 11px;
    flex-shrink: 0;
  }
  .cli-avatar.lg { width: 48px; height: 48px; font-size: 16px; }
  .cli-avatar.grad-1 { background: linear-gradient(135deg, #c89469, #a36b3f); }
  .cli-avatar.grad-2 { background: linear-gradient(135deg, #6b8db5, #3f6ba3); }
  .cli-avatar.grad-3 { background: linear-gradient(135deg, #7ba37b, #4f7d4f); }
  .cli-avatar.grad-4 { background: linear-gradient(135deg, #b56b94, #8b3f6c); }
  .cli-avatar.grad-5 { background: linear-gradient(135deg, #8b7bb5, #5f4f8b); }
  .cli-name-text { font-weight: 500; color: #29261b; }
  .cli-doc { font-size: 11.5px; color: #98917f; font-family: "IBM Plex Mono", monospace; margin-top: 1px; }
  .cli-contact-line { font-size: 12.5px; color: #29261b; }
  .cli-phone { font-size: 11.5px; color: #98917f; font-family: "IBM Plex Mono", monospace; margin-top: 1px; }
  .cli-status {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 11px; font-weight: 500;
  }
  .cli-status.active { background: #e7f0e7; color: #4f7d4f; }
  .cli-status.late { background: #fbe8d6; color: #b06a1a; }
  .cli-status.idle { background: #f0ede4; color: #98917f; }
  /* drawer */
  .os-drawer-back {
    position: fixed; inset: 0; background: rgba(41, 38, 27, 0.32);
    display: flex; justify-content: flex-end; z-index: 50;
    animation: drawerFade 0.15s ease;
  }
  @keyframes drawerFade { from { background: rgba(41,38,27,0); } to { background: rgba(41,38,27,0.32); } }
  .os-drawer {
    width: 560px; max-width: 95vw;
    background: #fff; height: 100vh;
    display: flex; flex-direction: column;
    box-shadow: -8px 0 24px rgba(0,0,0,.08);
    animation: drawerSlide 0.18s ease;
  }
  @keyframes drawerSlide { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }
  .os-drawer.wide { width: 640px; }
  .os-drawer-head { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; border-bottom: 1px solid #f0ede4; }
  .os-drawer-body { padding: 20px 22px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 22px; }
  .os-drawer-actions { display: flex; gap: 8px; padding: 14px 22px; border-top: 1px solid #f0ede4; background: #faf8f3; }
  .os-icon-btn { width: 28px; height: 28px; border-radius: 4px; border: 1px solid #e8e5dc; background: #fff; cursor: pointer; display:grid; place-items:center; color:#6b6552; }
  .cli-head { display: flex; gap: 14px; align-items: center; }
  .cli-head-name { font-size: 17px; font-weight: 600; color: #29261b; }
  .cli-head-doc { font-size: 12px; color: #98917f; font-family: "IBM Plex Mono", monospace; margin-top: 2px; }
  .cli-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .cli-kpi { background: #faf8f3; border: 1px solid #f0ede4; border-radius: 4px; padding: 10px 12px; text-align: center; }
  .cli-kpi-v { font-size: 20px; font-weight: 600; color: #29261b; }
  .cli-kpi-l { font-size: 10.5px; color: #6b6552; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.03em; }
  .cli-kpi.danger .cli-kpi-v { color: #b06a1a; }
  .cli-section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b6552; margin-bottom: 10px; font-weight: 500; }
  .cli-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
  .cli-info-l { font-size: 11px; color: #98917f; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 2px; }
  .cli-info-v { font-size: 13px; color: #29261b; }
  .cli-history { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
  .cli-os { display: grid; grid-template-columns: 60px 1fr 110px 90px 90px; gap: 10px; align-items: center; padding: 7px 10px; background: #faf8f3; border: 1px solid #f0ede4; border-radius: 4px; font-size: 12px; }
  .cli-os-id { font-family: "IBM Plex Mono", monospace; color: #6b6552; }
  .cli-os-prod { color: #29261b; }
  .cli-os-stage { font-size: 10.5px; padding: 2px 6px; border-radius: 3px; background: #fff; border: 1px solid #e8e5dc; text-align: center; }
  .cli-os-deadline { font-size: 11px; color: #98917f; font-family: "IBM Plex Mono", monospace; }
  .cli-os-value { font-size: 11.5px; color: #29261b; font-family: "IBM Plex Mono", monospace; text-align: right; }
  .cli-empty { font-size: 12px; color: #98917f; text-align: center; padding: 12px; }
  .cli-fin { display: flex; flex-direction: column; gap: 6px; }
  .cli-fin-row { display: flex; justify-content: space-between; padding: 8px 12px; background: #faf8f3; border: 1px solid #f0ede4; border-radius: 4px; font-size: 13px; }
  .cli-fin-row b { font-family: "IBM Plex Mono", monospace; color: #29261b; }
  .cli-fin-row b.danger { color: #b06a1a; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data-os.jsx"></script>
<script type="text/babel" src="data-clientes.jsx"></script>
<script type="text/babel" src="clientes-page.jsx"></script>

<script type="text/babel" data-screen-label="Clientes">
  const { useState } = React;

  const NAV = [
    { group: "Operação", items: [
      { id: "vendas",     label: "Vendas",     icon: "shopping-cart" },
      { id: "clientes",   label: "Clientes",   icon: "users", active: true },
      { id: "os",         label: "Ordens de Serviço", icon: "clipboard-list" },
      { id: "producao",   label: "Produção",   icon: "factory" },
    ]},
    { group: "Financeiro", items: [
      { id: "financeiro", label: "Financeiro", icon: "wallet" },
      { id: "compras",    label: "Compras",    icon: "package" },
      { id: "boletos",    label: "Boletos",    icon: "file-text" },
    ]},
    { group: "Gestão", items: [
      { id: "equipe",     label: "Equipe",     icon: "user-cog" },
      { id: "kb",         label: "Conhecimento", icon: "book" },
    ]},
  ];

  const NavIcon = ({ name }) => {
    const I = window.I || {};
    const map = {
      "shopping-cart": I.shoppingCart || I.cart,
      "users":         I.users,
      "clipboard-list": I.clipboardList || I.list,
      "factory":       I.factory || I.building,
      "wallet":        I.wallet,
      "package":       I.package,
      "file-text":     I.fileText || I.file,
      "user-cog":      I.userCog || I.users,
      "book":          I.book,
    };
    const Cmp = map[name];
    return Cmp ? <Cmp size={14}/> : <span style={{width:14,height:14,display:'inline-block',borderRadius:2,background:'currentColor',opacity:.35}}/>;
  };

  function Shell() {
    const CliListPage = window.CliListPage;
    return (
      <div className="cli-shell" data-screen-label="Clientes / Listagem">
        <aside className="cli-shell-side">
          <div className="cli-shell-brand">
            <div className="cli-shell-brand-dot">O</div>
            <div>
              <div>Oimpresso</div>
              <div style={{fontSize:11,color:'#98917f',fontWeight:400}}>ROTA LIVRE · Larissa</div>
            </div>
          </div>
          <nav className="cli-shell-nav">
            {NAV.map(group => (
              <React.Fragment key={group.group}>
                <div className="cli-shell-nav-group">{group.group}</div>
                {group.items.map(item => (
                  <a key={item.id} className={`cli-shell-nav-item ${item.active ? "active" : ""}`} href="#">
                    <span className="cli-shell-nav-item-icon"><NavIcon name={item.icon}/></span>
                    {item.label}
                  </a>
                ))}
              </React.Fragment>
            ))}
          </nav>
        </aside>

        <main className="cli-shell-main">
          <header className="cli-shell-header">
            <div className="cli-shell-header-l">
              <span>Operação</span>
              <span style={{color:'#cfc8b6'}}>›</span>
              <b>Clientes</b>
            </div>
            <div className="cli-shell-header-r">
              <button className="cli-shell-iconbtn" title="Buscar">⌕</button>
              <button className="cli-shell-iconbtn" title="Notificações">⌃</button>
              <div className="cli-shell-user">
                <div className="cli-shell-user-av">LA</div>
                <span>Larissa</span>
              </div>
            </div>
          </header>

          <div className="cli-shell-body">
            {CliListPage ? <CliListPage/> : <div style={{color:'#98917f'}}>Carregando módulo de clientes…</div>}
          </div>

          <footer className="cli-shell-footer">
            <span>Oimpresso ERP · Cockpit V2 · Clientes v1</span>
            <span>F1 · protótipo</span>
          </footer>
        </main>
      </div>
    );
  }

  // Render after all scripts loaded
  function boot() {
    if (!window.CliListPage || !window.I || !window.OS_DATA) {
      return setTimeout(boot, 50);
    }
    ReactDOM.createRoot(document.getElementById("app")).render(<Shell/>);
  }
  boot();
</script>
</body>
</html>
