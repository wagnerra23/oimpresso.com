<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PaymentGateway UI · F1 batch (3 telas)</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['"Inter"', '"IBM Plex Sans"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          mono: ['"IBM Plex Mono"', 'ui-monospace', '"SF Mono"', 'Menlo', 'monospace'],
        },
      },
    },
  };
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  body { font-family: 'IBM Plex Sans', system-ui, sans-serif; margin: 0; background: #0a0a0a; color: oklch(0.22 0.01 80); }
  /* Tokens canon do shell — replicados pro canvas standalone, escopados em .pg-shell-scope */
  .pg-shell-scope {
    --bg:           oklch(0.985 0.003 90);
    --bg-2:         oklch(0.965 0.004 90);
    --surface:      #ffffff;
    --border:       oklch(0.90 0.004 90);
    --border-2:     oklch(0.93 0.004 90);
    --text:         oklch(0.22 0.01 80);
    --text-dim:     oklch(0.50 0.01 80);
    --text-mute:    oklch(0.65 0.01 80);
    --accent:       oklch(0.58 0.09 220);
    --accent-2:     oklch(0.66 0.09 220);
    --accent-soft:  oklch(0.94 0.025 220);
    --radius:       8px;
    --radius-sm:    6px;
    --font-sans:    'IBM Plex Sans', system-ui, sans-serif;
    --font-mono:    'IBM Plex Mono', ui-monospace, monospace;
    font-family: var(--font-sans);
    color: var(--text);
  }
  .font-mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  .tabular-nums { font-variant-numeric: tabular-nums; }
  * { box-sizing: border-box; }
</style>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../pg-styles.css">
<script>
  // Tailwind dentro do shell desabilita preflight. Aqui também — pra não brigar
  // com os tokens canon que importamos.
  tailwind.config = { corePlugins: { preflight: false } };
</script>

<!-- React + Babel canônicos (system prompt) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Ordem: shared → 3 telas → design canvas → app -->
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="cobranca-page.jsx"></script>
<script type="text/babel" src="payment-gateways-page.jsx"></script>
<script type="text/babel" src="sells-emitir-cobranca-modal.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <rect width="200" height="200" fill="#f97316"/>
    <text x="100" y="92" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="44" font-weight="800">$PG</text>
    <text x="100" y="130" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="14" font-weight="500" opacity="0.85">PaymentGateway UI</text>
    <text x="100" y="150" text-anchor="middle" fill="white" font-family="Inter, sans-serif" font-size="11" opacity="0.7">F1 · 3 telas</text>
  </svg>
</template>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
  const { useState } = React;

  function App() {
    return (
      <window.DesignCanvas>
        <window.DCSection
          id="payment-gateway-ui"
          title="PaymentGateway UI · F1 batch"
          subtitle="3 telas · 2026-05-19 · vinculadas à ADR 0144 (extração camada cobrança) · KB-9.75 mira"
        >
          <window.DCArtboard id="cobranca" label="Tela 1 · Financeiro/Cobrança (rename + expansão · /financeiro/boletos)" width={1280} height={900}>
            <div className="pg-shell-scope" style={{ width:'100%', height:'100%' }}>
              <window.PG_CobrancaPage />
            </div>
          </window.DCArtboard>

          <window.DCArtboard id="gateways" label="Tela 2 · Settings/PaymentGateways (NOVA · Wagner-only)" width={1280} height={900}>
            <div className="pg-shell-scope" style={{ width:'100%', height:'100%' }}>
              <window.PG_PaymentGatewaysPage />
            </div>
          </window.DCArtboard>

          <window.DCArtboard id="sells-modal" label="Tela 3 · Sells/Index drawer + botão Emitir cobrança (pino · A+ 9,75 PR #1064)" width={1280} height={780}>
            <div className="pg-shell-scope" style={{ width:'100%', height:'100%' }}>
              <window.PG_SellsEmitirCobrancaPin />
            </div>
          </window.DCArtboard>
        </window.DCSection>
      </window.DesignCanvas>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
  </script>
</body>
</html>
