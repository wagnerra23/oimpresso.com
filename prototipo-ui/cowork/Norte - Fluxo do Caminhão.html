<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Norte — Fluxo do Caminhão · Oimpresso ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* DS v5 — dark (espelho dos tokens canônicos + paleta de etapas temperada) */
  --bg:        oklch(0.165 0.008 282);
  --sunken:    oklch(0.142 0.008 282);
  --surface:   oklch(0.205 0.009 282);
  --raised:    oklch(0.235 0.010 282);
  --border:    oklch(0.30 0.012 282);
  --border-2:  oklch(0.25 0.010 282);
  --text:      oklch(0.965 0.004 282);
  --text-2:    oklch(0.74 0.008 282);
  --text-3:    oklch(0.58 0.009 282);
  --text-4:    oklch(0.47 0.009 282);

  --accent:      oklch(0.72 0.15 295);
  --accent-soft: oklch(0.30 0.07 295);
  --accent-line: oklch(0.42 0.10 295);

  --pos:  oklch(0.74 0.14 150); --pos-soft:  oklch(0.30 0.085 150);
  --neg:  oklch(0.72 0.16 25);  --neg-soft:  oklch(0.32 0.09 25);
  --warn: oklch(0.80 0.13 75);  --warn-soft: oklch(0.32 0.085 70);

  /* paleta de etapas (tempero desta sessão) */
  --stage-slate:   oklch(0.66 0.03 250);
  --stage-indigo:  oklch(0.66 0.16 270);
  --stage-rose:    oklch(0.68 0.16 20);
  --stage-emerald: oklch(0.68 0.14 155);
  --stage-green:   oklch(0.74 0.15 145);

  --sans: "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
  --mono: "IBM Plex Mono", ui-monospace, Menlo, monospace;
  --r: 14px; --r-sm: 9px;
  --sh: 0 18px 50px -18px rgba(0,0,0,.6), 0 4px 14px -6px rgba(0,0,0,.4);
}
*{ box-sizing: border-box; }
html,body{ margin:0; height:100%; }
body{
  background:
    radial-gradient(1100px 600px at 82% -8%, oklch(0.26 0.07 295 / .28), transparent 60%),
    radial-gradient(900px 520px at 8% 108%, oklch(0.24 0.05 250 / .22), transparent 62%),
    var(--bg);
  color: var(--text);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
#app{ height:100vh; display:flex; flex-direction:column; }

/* ── topbar ── */
.nx-top{ display:flex; align-items:center; gap:14px; padding:18px 30px 14px; }
.nx-brand{ display:flex; align-items:center; gap:10px; }
.nx-logo{ width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--accent),oklch(0.55 0.15 295)); display:grid; place-items:center; color:#fff; font-weight:700; font-size:13px; box-shadow:0 0 0 1px var(--accent-line), 0 6px 18px -6px oklch(0.55 0.15 295 / .6); }
.nx-brand b{ font-size:14.5px; font-weight:600; letter-spacing:-0.01em; }
.nx-brand small{ display:block; font-size:11px; color:var(--text-3); margin-top:1px; }
.nx-kicker{ margin-left:auto; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-4); font-weight:600; }

/* ── spine (hero) ── */
.nx-spine{ display:flex; align-items:flex-start; gap:0; padding:6px 30px 4px; }
.nx-node{ flex:1 1 0; min-width:0; background:none; border:0; cursor:pointer; color:inherit; font:inherit; padding:8px 4px 0; position:relative; display:flex; flex-direction:column; align-items:center; gap:8px; }
.nx-node-line{ position:absolute; top:15px; left:50%; right:-50%; height:2px; background:var(--border); z-index:0; }
.nx-node:last-child .nx-node-line{ display:none; }
.nx-node-line.done{ background:var(--stage); }
.nx-dot{ position:relative; z-index:1; width:14px; height:14px; border-radius:50%; background:var(--sunken); border:2px solid var(--border); transition:all .3s cubic-bezier(.22,1,.36,1); }
.nx-node.done .nx-dot{ background:color-mix(in oklch, var(--stage) 62%, var(--bg)); border-color:color-mix(in oklch, var(--stage) 62%, var(--bg)); }
.nx-node.active .nx-dot{ background:var(--stage); border-color:var(--stage); box-shadow:0 0 0 5px color-mix(in oklch, var(--stage) 22%, transparent); transform:scale(1.18); }
.nx-node-lbl{ font-size:10.5px; color:var(--text-4); text-align:center; line-height:1.25; transition:color .2s; font-weight:500; }
.nx-node.active .nx-node-lbl{ color:var(--text); font-weight:600; }
.nx-node.done .nx-node-lbl{ color:var(--text-3); }
.nx-node-n{ font-family:var(--mono); font-size:9px; color:var(--text-4); }
.nx-node.active .nx-node-n{ color:var(--stage); }

/* ── stage area ── */
.nx-stage{ flex:1 1 auto; min-height:0; display:grid; grid-template-columns: 1.35fr 1fr; gap:22px; padding:14px 30px 26px; }
.nx-scene{ min-width:0; min-height:0; display:flex; flex-direction:column; }
@media (prefers-reduced-motion: no-preference){
  .nx-scene{ animation:nxIn .5s cubic-bezier(.22,1,.36,1); }
}
@keyframes nxIn{ from{ transform:translateY(14px); } to{ transform:translateY(0); } }

.nx-scene-head{ margin-bottom:12px; }
.nx-eyebrow{ display:flex; align-items:center; gap:9px; font-size:11px; }
.nx-mod{ font-family:var(--mono); font-weight:600; letter-spacing:.04em; padding:2px 8px; border-radius:5px; background:color-mix(in oklch, var(--stage) 22%, var(--surface)); color:var(--stage); }
.nx-persona{ color:var(--text-3); }
.nx-persona b{ color:var(--text-2); font-weight:600; }
.nx-scene-head h1{ margin:9px 0 0; font-size:25px; font-weight:600; letter-spacing:-0.025em; line-height:1.1; max-width:18ch; text-wrap:balance; }
.nx-felt{ margin:9px 0 0; font-size:13px; color:var(--text-3); line-height:1.5; max-width:46ch; }

/* mock screen */
.nx-screen{ flex:1 1 auto; min-height:0; overflow:hidden; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--sh); display:flex; flex-direction:column; }
.nx-screen-bar{ height:34px; display:flex; align-items:center; gap:7px; padding:0 13px; border-bottom:1px solid var(--border-2); background:var(--sunken); flex:0 0 auto; }
.nx-tl{ width:9px; height:9px; border-radius:50%; background:var(--border); }
.nx-screen-bar span{ margin-left:8px; font-size:10.5px; color:var(--text-4); font-family:var(--mono); }
.nx-screen-body{ flex:1 1 auto; min-height:0; overflow-y:auto; padding:16px 18px; scrollbar-width:thin; }
.nx-screen-body::-webkit-scrollbar{ width:7px; } .nx-screen-body::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }

/* widgets */
.w-head{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.w-plate{ flex:0 0 auto; width:96px; border:1.5px solid var(--text-3); border-radius:6px; overflow:hidden; background:var(--surface); }
.w-plate .pt{ background:oklch(0.42 0.13 250); color:#fff; font-size:7px; text-align:center; padding:1px; letter-spacing:.05em; font-weight:600; }
.w-plate .pn{ font-family:var(--mono); font-weight:700; font-size:15px; text-align:center; padding:3px 0; letter-spacing:.04em; }
.w-head-meta b{ display:block; font-size:15px; font-weight:600; letter-spacing:-0.01em; }
.w-head-meta small{ display:block; font-size:11.5px; color:var(--text-3); margin-top:2px; }
.w-os{ margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--text-4); align-self:flex-start; }

.w-fields{ display:grid; grid-template-columns:auto 1fr; gap:7px 14px; font-size:12.5px; margin-bottom:14px; }
.w-fields dt{ color:var(--text-4); } .w-fields dd{ margin:0; color:var(--text-2); text-align:right; }
.w-fields dd.mono{ font-family:var(--mono); }

.w-sec{ font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-4); margin:16px 0 9px; }
.w-sec:first-child{ margin-top:0; }

.w-dvi{ display:flex; flex-direction:column; gap:6px; }
.w-dvi-row{ display:grid; grid-template-columns:14px 1fr auto; gap:10px; align-items:center; padding:8px 11px; border-radius:8px; background:var(--sunken); border:1px solid var(--border-2); }
.w-dvi-dot{ width:9px; height:9px; border-radius:50%; }
.w-dvi-row.ok .w-dvi-dot{ background:var(--pos); } .w-dvi-row.warn .w-dvi-dot{ background:var(--warn); } .w-dvi-row.bad .w-dvi-dot{ background:var(--neg); }
.w-dvi-row.bad{ border-color:color-mix(in oklch,var(--neg) 40%,var(--border)); background:var(--neg-soft); }
.w-dvi-row b{ font-size:12.5px; font-weight:600; } .w-dvi-row small{ display:block; font-size:10.5px; color:var(--text-3); margin-top:1px; }
.w-tag{ font-size:10px; font-weight:600; padding:2px 7px; border-radius:999px; font-family:var(--mono); }
.w-tag.ok{ background:var(--pos-soft); color:var(--pos); } .w-tag.warn{ background:var(--warn-soft); color:var(--warn); } .w-tag.bad{ background:var(--neg-soft); color:var(--neg); }

.w-kpis{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:6px; }
.w-kpi{ background:var(--sunken); border:1px solid var(--border-2); border-radius:9px; padding:11px 12px; }
.w-kpi small{ display:block; font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--text-4); }
.w-kpi b{ display:block; font-size:19px; font-weight:600; font-family:var(--mono); margin-top:5px; letter-spacing:-0.01em; }
.w-kpi.pos b{ color:var(--pos); } .w-kpi.accent b{ color:var(--accent); } .w-kpi.neg b{ color:var(--neg); }

.w-items{ display:flex; flex-direction:column; gap:5px; }
.w-item{ display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; background:var(--sunken); border:1px solid var(--border-2); font-size:12px; }
.w-item-ic{ width:24px; height:24px; border-radius:6px; display:grid; place-items:center; flex:0 0 auto; font-size:11px; }
.w-item-ic.peca{ background:var(--accent-soft); color:var(--accent); } .w-item-ic.serv{ background:var(--pos-soft); color:var(--pos); }
.w-item b{ font-weight:600; } .w-item .q{ color:var(--text-4); font-family:var(--mono); font-size:10.5px; margin-left:auto; }
.w-item .v{ font-family:var(--mono); font-weight:600; min-width:74px; text-align:right; }

.w-msg{ display:flex; margin:7px 0; }
.w-msg.them{ justify-content:flex-start; } .w-msg.me{ justify-content:flex-end; }
.w-bub{ max-width:78%; padding:9px 12px; border-radius:14px; font-size:12.5px; line-height:1.4; }
.w-msg.them .w-bub{ background:var(--raised); border-top-left-radius:4px; }
.w-msg.me .w-bub{ background:var(--accent); color:oklch(0.16 0.02 295); font-weight:500; border-top-right-radius:4px; }
.w-bub small{ display:block; font-size:9.5px; opacity:.7; margin-top:3px; text-align:right; }

.w-fiscal{ display:flex; flex-direction:column; gap:8px; }
.w-fiscal-row{ display:flex; align-items:center; gap:11px; padding:11px 13px; border-radius:9px; background:var(--sunken); border:1px solid var(--border-2); }
.w-fiscal-ic{ width:30px; height:30px; border-radius:7px; background:var(--pos-soft); color:var(--pos); display:grid; place-items:center; flex:0 0 auto; }
.w-fiscal-row b{ display:block; font-size:12.5px; } .w-fiscal-row small{ display:block; font-size:11px; color:var(--text-3); font-family:var(--mono); margin-top:1px; }
.w-fiscal-ok{ margin-left:auto; font-size:11px; color:var(--pos); font-weight:600; display:inline-flex; align-items:center; gap:4px; }

.w-note{ display:flex; gap:9px; padding:11px 13px; border-radius:10px; font-size:12px; line-height:1.45; margin-top:6px; }
.w-note.accent{ background:var(--accent-soft); border:1px solid var(--accent-line); }
.w-note.pos{ background:var(--pos-soft); border:1px solid color-mix(in oklch,var(--pos) 40%,var(--border)); }
.w-note b{ color:var(--text); }
.w-bigtotal{ display:flex; align-items:baseline; justify-content:space-between; padding:13px 4px 2px; border-top:1px solid var(--border-2); margin-top:10px; }
.w-bigtotal span{ font-size:12px; color:var(--text-3); } .w-bigtotal b{ font-size:23px; font-weight:600; font-family:var(--mono); letter-spacing:-0.02em; }

/* ── costura (right rail) ── */
.nx-seam{ min-width:0; display:flex; flex-direction:column; }
.nx-seam-card{ flex:1 1 auto; background:linear-gradient(180deg, color-mix(in oklch,var(--stage) 12%,var(--surface)), var(--surface)); border:1px solid color-mix(in oklch,var(--stage) 30%,var(--border)); border-radius:var(--r); padding:20px; display:flex; flex-direction:column; box-shadow:var(--sh); }
.nx-seam-tag{ display:inline-flex; align-items:center; gap:7px; align-self:flex-start; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--stage); background:color-mix(in oklch,var(--stage) 18%,transparent); padding:4px 10px; border-radius:999px; }
.nx-seam-flow{ display:flex; align-items:center; gap:9px; margin:18px 0 4px; }
.nx-seam-chip{ font-size:11.5px; font-weight:600; padding:6px 11px; border-radius:8px; background:var(--sunken); border:1px solid var(--border-2); color:var(--text-2); }
.nx-seam-arrow{ color:var(--stage); flex:0 0 auto; }
.nx-seam-card h2{ margin:18px 0 0; font-size:18px; font-weight:600; letter-spacing:-0.02em; line-height:1.25; text-wrap:balance; }
.nx-seam-card p{ margin:11px 0 0; font-size:13px; line-height:1.6; color:var(--text-2); }
.nx-seam-auto{ margin-top:auto; display:flex; align-items:center; gap:9px; padding-top:18px; }
.nx-seam-auto-ic{ width:30px; height:30px; border-radius:8px; background:color-mix(in oklch,var(--stage) 22%,transparent); color:var(--stage); display:grid; place-items:center; flex:0 0 auto; }
.nx-seam-auto b{ font-size:12px; color:var(--text); display:block; }
.nx-seam-auto small{ font-size:11px; color:var(--text-3); }

/* ── footer nav ── */
.nx-foot{ display:flex; align-items:center; gap:14px; padding:0 30px 22px; }
.nx-btn{ appearance:none; cursor:pointer; font:inherit; display:inline-flex; align-items:center; gap:8px; height:40px; padding:0 18px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:13px; font-weight:500; transition:all .15s; }
.nx-btn:hover{ background:var(--raised); border-color:var(--text-4); }
.nx-btn:disabled{ opacity:.4; cursor:not-allowed; }
.nx-btn.primary{ background:var(--accent); border-color:var(--accent); color:oklch(0.16 0.02 295); font-weight:600; }
.nx-btn.primary:hover{ background:oklch(0.78 0.15 295); }
.nx-count{ font-family:var(--mono); font-size:12px; color:var(--text-4); }
.nx-progress{ flex:1 1 auto; height:3px; border-radius:2px; background:var(--border-2); overflow:hidden; }
.nx-progress-fill{ height:100%; background:linear-gradient(90deg,var(--accent),var(--stage-green)); border-radius:2px; transition:width .4s cubic-bezier(.22,1,.36,1); }
.nx-hint{ font-size:11px; color:var(--text-4); white-space:nowrap; } .nx-hint kbd{ font-family:var(--mono); background:var(--sunken); border:1px solid var(--border); border-radius:4px; padding:1px 5px; font-size:10px; }

@media (max-width:1080px){ .nx-stage{ grid-template-columns:1fr; } .nx-seam{ display:none; } .nx-node-lbl{ display:none; } }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="norte-data.jsx"></script>
<script type="text/babel" src="norte-app.jsx"></script>
</body>
</html>
