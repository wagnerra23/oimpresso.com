<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Caixa Unificada · Banner de saúde de canal (F1)</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
/* ── Tokens canônicos oimpresso (shadcn + warm scale, dark-aware via .dark) ── */
:root{
  --background: oklch(0.985 0.002 285);
  --card: oklch(1 0 0);
  --foreground: oklch(0.21 0.01 285);
  --muted: oklch(0.967 0.003 285);
  --muted-foreground: oklch(0.55 0.012 285);
  --border: oklch(0.918 0.004 285);
  --primary: oklch(0.55 0.15 295);
  --primary-fg: oklch(0.99 0 0);
  --ring: oklch(0.55 0.15 295);
  --sel-bg: oklch(0.95 0.03 295);

  --warning-soft: oklch(0.965 0.035 85);
  --warning-fg: oklch(0.47 0.10 70);
  --warning: oklch(0.80 0.13 80);
  --warning-border: oklch(0.85 0.10 80);
  --warning-weak: oklch(0.92 0.075 82);

  --destructive-soft: oklch(0.965 0.028 25);
  --destructive-fg: oklch(0.51 0.19 27);
  --destructive: oklch(0.63 0.21 27);
  --destructive-border: oklch(0.84 0.12 27);
  --destructive-weak: oklch(0.92 0.08 27);
  --wa-chip-border: oklch(0.85 0.06 145);

  --success: oklch(0.64 0.14 150);
  --info: oklch(0.55 0.16 250);

  --wa-thread: oklch(0.97 0.013 145);
  --wa-bub: oklch(0.85 0.10 145);
  --wa-bub-fg: oklch(0.18 0.10 145);
}
.dark{
  --background: oklch(0.16 0.006 285);
  --card: oklch(0.205 0.006 285);
  --foreground: oklch(0.96 0.002 285);
  --muted: oklch(0.27 0.006 285);
  --muted-foreground: oklch(0.68 0.01 285);
  --border: oklch(0.30 0.006 285);
  --primary: oklch(0.66 0.15 295);
  --primary-fg: oklch(0.16 0.01 285);
  --sel-bg: oklch(0.28 0.05 295);

  --warning-soft: oklch(0.32 0.05 75);
  --warning-fg: oklch(0.86 0.12 85);
  --warning: oklch(0.70 0.12 80);
  --warning-border: oklch(0.50 0.10 80);
  --warning-weak: oklch(0.40 0.075 80);

  --destructive-soft: oklch(0.31 0.07 27);
  --destructive-fg: oklch(0.83 0.13 27);
  --destructive: oklch(0.62 0.18 27);
  --destructive-border: oklch(0.48 0.12 27);
  --destructive-weak: oklch(0.40 0.09 27);
  --wa-chip-border: oklch(0.42 0.07 145);

  --wa-thread: oklch(0.20 0.012 145);
  --wa-bub: oklch(0.34 0.07 145);
  --wa-bub-fg: oklch(0.92 0.06 145);
}

*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; }
body{
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  background: var(--background);
  color: var(--foreground);
  -webkit-font-smoothing: antialiased;
  font-size: 13px;
}
button{ font:inherit; color:inherit; cursor:pointer; }
a{ color:inherit; }
.mono{ font-variant-numeric: tabular-nums; font-family: ui-monospace, "SF Mono", Menlo, monospace; }

/* scrollbars finas */
.scroll-thin{ scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.scroll-thin::-webkit-scrollbar{ width:8px; height:8px; }
.scroll-thin::-webkit-scrollbar-thumb{ background: var(--border); border-radius:99px; }

/* banner entra suave */
@keyframes bannerIn{ from{ opacity:0; transform: translateY(-4px); } to{ opacity:1; transform:none; } }
.banner-in{ animation: bannerIn .18s ease-out; }

@media (prefers-reduced-motion: reduce){ .banner-in{ animation:none; } }

@keyframes softpulse{ 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
.dot-pulse{ animation: softpulse 1.6s ease-in-out infinite; }

/* foco canônico */
:focus-visible{ outline:none; box-shadow: 0 0 0 2px var(--background), 0 0 0 4px var(--ring); border-radius:6px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const { useState } = React;

/* ── lucide-ish icons (canon iconography) ── */
const Ico = {
  wifiOff: "M2 2l20 20M8.5 16.5a5 5 0 0 1 7 0M5 12.86A10 10 0 0 1 12 10M2 8.82a16 16 0 0 1 4.9-2.91M22 8.82a16 16 0 0 0-4.5-2.78M12 20h.01",
  plugZap: "M13 2 7 8h4l-1 6 6-6h-4l1-6ZM6.5 11 4 13.5a2.83 2.83 0 0 0 0 4 2.83 2.83 0 0 0 4 0L10.5 15M17.5 13 20 10.5a2.83 2.83 0 0 0 0-4 2.83 2.83 0 0 0-4 0L13.5 9",
  refresh: "M3 12a9 9 0 0 1 9-9 9 9 0 0 1 6.36 2.64L21 8M21 3v5h-5M21 12a9 9 0 0 1-9 9 9 9 0 0 1-6.36-2.64L3 16M3 21v-5h5",
  x: "M18 6 6 18M6 6l12 12",
  chevron: "m6 9 6 6 6-6",
  search: "M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM21 21l-4.3-4.3",
};
function Icon({ d, size=14, sw=2, cls, style }){
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"
      className={cls} style={style} aria-hidden="true">
      {d.split("M").filter(Boolean).map((seg,i)=><path key={i} d={"M"+seg} />)}
    </svg>
  );
}

/* ── catálogo de canais (espelha o glyph/hue do catálogo real) ── */
const CHAN = {
  whatsapp:  { short:"WhatsApp",  glyph:"W", hue:145 },
  instagram: { short:"Instagram",glyph:"IG",hue:330 },
  email:     { short:"E-mail",   glyph:"@", hue:250 },
};

/* ── cenários de saúde (drivados pelo Tweak `state`) ── */
function scenarioAccounts(state){
  if(state==="degraded") return [
    { id:12, channel:"whatsapp", label:"Operacional", handle:"+55 48 9888-0001", health:"degraded", sinceMin:3, affected:4 },
  ];
  if(state==="down") return [
    { id:12, channel:"whatsapp", label:"Operacional", handle:"+55 48 9888-0001", health:"down", sinceMin:8, affected:12 },
  ];
  // multi
  return [
    { id:12, channel:"whatsapp",  label:"Operacional", handle:"+55 48 9888-0001", health:"down",     sinceMin:8,  affected:12 },
    { id:31, channel:"instagram", label:"@rotalivre",  handle:"@rotalivre",       health:"degraded", sinceMin:14, affected:2  },
  ];
}

const HEALTH = {
  degraded: { label:"degradado", verb:"está degradado",  tone:"warn" },
  down:     { label:"fora do ar",verb:"está fora do ar", tone:"err"  },
};

/* ── BANNER — a peça central do design ── */
function HealthBanner({ accounts, dense, showLastCheck, dismissible, onDismiss }){
  if(!accounts.length) return null;
  const worst = accounts.some(a=>a.health==="down") ? "err" : "warn";
  const multi = accounts.length > 1;

  const toneVars = worst==="err"
    ? { bg:"var(--destructive-soft)", fg:"var(--destructive-fg)", ac:"var(--destructive)", bd:"var(--destructive-border)", weak:"var(--destructive-weak)" }
    : { bg:"var(--warning-soft)",     fg:"var(--warning-fg)",     ac:"var(--warning)",     bd:"var(--warning-border)",     weak:"var(--warning-weak)" };

  const totalAffected = accounts.reduce((s,a)=>s+a.affected,0);

  return (
    <div role="status" aria-live="polite"
      style={{
        background: toneVars.bg,
        border: `1px solid ${toneVars.bd}`,
        borderRadius: 8,
        padding: dense ? "8px 10px" : "10px 12px",
        display:"flex", flexDirection:"column", gap: 6,
      }}>
      {/* linha-cabeçalho */}
      <div style={{ display:"flex", alignItems:"flex-start", gap:9 }}>
        <span style={{
          flexShrink:0, width:26, height:26, borderRadius:7, display:"grid", placeItems:"center",
          background: toneVars.weak, color: toneVars.fg, marginTop:1,
        }}>
          <Icon d={worst==="err" ? Ico.plugZap : Ico.wifiOff} size={15} sw={2.1} />
        </span>

        <div style={{ minWidth:0, flex:1 }}>
          {multi ? (
            <>
              <b style={{ fontSize:12.5, fontWeight:600, color:toneVars.fg, display:"block" }}>
                {accounts.length} canais com problema de conexão
              </b>
              <span style={{ fontSize:11.5, color:toneVars.fg, opacity:.92 }}>
                {totalAffected} conversas podem não receber mensagens novas.
              </span>
            </>
          ) : (
            <>
              <b style={{ fontSize:12.5, fontWeight:600, color:toneVars.fg, display:"block" }}>
                {CHAN[accounts[0].channel].short} · {accounts[0].label} {HEALTH[accounts[0].health].verb}.
              </b>
              <span style={{ fontSize:11.5, color:toneVars.fg, opacity:.92 }}>
                {accounts[0].health==="down"
                  ? "Mensagens novas não estão chegando."
                  : "Sincronização lenta — pode haver atraso nas mensagens."}
                {" "}{accounts[0].affected} conversas afetadas.
                {showLastCheck && (
                  <span className="mono" style={{ opacity:.8, whiteSpace:"nowrap" }}> · há {accounts[0].sinceMin} min</span>
                )}
              </span>
            </>
          )}
        </div>

        {/* dismiss sempre no topo-direita */}
        {dismissible && (
          <button onClick={onDismiss} title="Dispensar até a próxima verificação"
            style={{ display:"grid", placeItems:"center", width:22, height:22, borderRadius:6, flexShrink:0,
              border:"none", background:"transparent", color: toneVars.fg, opacity:.6 }}>
            <Icon d={Ico.x} size={13} />
          </button>
        )}
      </div>

      {/* ação Reconectar — linha própria, alinhada sob o texto (robusto a 300px e a largura cheia) */}
      {!multi && (
        <div style={{ paddingLeft:35 }}>
          <a href="#reconectar"
            style={{
              display:"inline-flex", alignItems:"center", gap:5, textDecoration:"none",
              fontSize:11.5, fontWeight:600, color: toneVars.fg,
              border:`1px solid ${toneVars.bd}`,
              borderRadius:6, padding:"4px 10px", whiteSpace:"nowrap",
              background: toneVars.weak,
            }}>
            <Icon d={Ico.refresh} size={12} sw={2.2} /> Reconectar canal
          </a>
        </div>
      )}

      {/* linhas por-conta (só no multi) */}
      {multi && (
        <div style={{ display:"flex", flexDirection:"column", gap:3, paddingLeft:35 }}>
          {accounts.map(a=>(
            <div key={a.id} style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span className="dot-pulse" style={{ width:7, height:7, borderRadius:99, flexShrink:0,
                background: a.health==="down" ? "var(--destructive)" : "var(--warning)" }} />
              <span style={{ fontSize:11.5, color:toneVars.fg, minWidth:0, flex:1 }}>
                <b style={{ fontWeight:600 }}>{CHAN[a.channel].short} · {a.label}</b>
                <span style={{ opacity:.85 }}> — {HEALTH[a.health].label}, {a.affected} conversas
                  {showLastCheck && <span className="mono"> · há {a.sinceMin} min</span>}
                </span>
              </span>
              <a href="#reconectar" style={{ fontSize:11, fontWeight:600, color:toneVars.fg,
                textDecoration:"underline", textUnderlineOffset:2, whiteSpace:"nowrap" }}>
                Reconectar
              </a>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── peças do shell (mock realista) ── */
function ChannelDot({ channel, size=14 }){
  const c = CHAN[channel];
  return (
    <span style={{ width:size, height:size, borderRadius:99, display:"grid", placeItems:"center",
      background:`oklch(0.62 0.14 ${c.hue})`, color:"#fff", fontSize:size*0.5, fontWeight:700, flexShrink:0 }}>
      {c.glyph}
    </span>
  );
}

const CONVERSAS = [
  { id:1, name:"Maiara Coutinho", channel:"whatsapp", prev:"Oi! O banner já está pronto?", t:"14:32", unread:2, sla:"atrasando", affected:true, sel:true },
  { id:2, name:"+55 48 9 9614-2230", channel:"whatsapp", prev:"Obrigada, recebi 👍", t:"14:18", unread:0, sla:null, affected:true },
  { id:3, name:"Gráfica Norte", channel:"instagram", prev:"Vocês fazem adesivo recortado?", t:"13:50", unread:1, sla:"atenção", affected:false },
  { id:4, name:"Renato Lopes", channel:"whatsapp", prev:"Fechado, pode emitir a NF", t:"11:04", unread:0, sla:null, affected:true },
  { id:5, name:"Eliana Souza", channel:"email", prev:"Segue o comprovante em anexo", t:"Ontem", unread:0, sla:null, affected:false },
];

const SLA_TONE = {
  "atenção":   { fg:"var(--warning-fg)", bd:"var(--warning)" },
  "atrasando": { fg:"oklch(0.50 0.16 30)", bd:"oklch(0.70 0.14 30)" },
};

function ConvRow({ c, listAffected, highlightAffected }){
  const ch = CHAN[c.channel];
  const isAff = highlightAffected && c.affected && listAffected;
  return (
    <div style={{
      display:"flex", gap:9, padding:"9px 11px", borderRadius:8, alignItems:"flex-start",
      background: c.sel ? "var(--sel-bg)" : "transparent",
      boxShadow: c.sel ? "inset 2px 0 0 var(--primary)" : "none",
      cursor:"pointer", position:"relative",
    }}>
      <div style={{ position:"relative", flexShrink:0 }}>
        <div style={{ width:34, height:34, borderRadius:99, display:"grid", placeItems:"center",
          background:`oklch(0.60 0.12 ${(c.name.charCodeAt(0)*7)%360})`, color:"#fff", fontSize:11.5, fontWeight:700 }}>
          {c.name.replace(/[^A-Za-zÀ-ú ]/g,"").trim().split(" ").filter(Boolean).slice(0,2).map(p=>p[0]).join("").toUpperCase() || c.name.replace(/\D/g,"").slice(-2)}
        </div>
        <span style={{ position:"absolute", right:-2, bottom:-2, border:"2px solid var(--card)", borderRadius:99 }}>
          <ChannelDot channel={c.channel} size={13} />
        </span>
      </div>
      <div style={{ minWidth:0, flex:1 }}>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <b style={{ fontSize:12.5, fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", flex:1 }}>{c.name}</b>
          <span className="mono" style={{ fontSize:10.5, color:"var(--muted-foreground)", flexShrink:0 }}>{c.t}</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:2 }}>
          <span style={{ fontSize:11.5, color:"var(--muted-foreground)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", flex:1 }}>{c.prev}</span>
          {c.unread>0 && (
            <span style={{ flexShrink:0, minWidth:17, height:17, padding:"0 5px", borderRadius:99, background:"var(--primary)", color:"var(--primary-fg)",
              fontSize:10, fontWeight:700, display:"grid", placeItems:"center" }}>{c.unread}</span>
          )}
        </div>
        {(c.sla || isAff) && (
          <div style={{ display:"flex", gap:5, marginTop:5 }}>
            {c.sla && (
              <span style={{ fontSize:9.5, fontWeight:600, padding:"1px 7px", borderRadius:99,
                color: SLA_TONE[c.sla].fg, border:`1px solid ${SLA_TONE[c.sla].bd}` }}>
                {c.sla}
              </span>
            )}
            {isAff && (
              <span title="Canal com problema de conexão" style={{ fontSize:9.5, fontWeight:600, padding:"1px 7px", borderRadius:99,
                display:"inline-flex", alignItems:"center", gap:4,
                color:"var(--destructive-fg)", border:"1px solid var(--destructive-border)" }}>
                <span className="dot-pulse" style={{ width:5, height:5, borderRadius:99, background:"var(--destructive)" }} /> canal off
              </span>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [dismissed, setDismissed] = useState(false);

  React.useEffect(()=>{ setDismissed(false); }, [t.state, t.placement]);

  const accounts = scenarioAccounts(t.state);
  const showBanner = !dismissed && accounts.length>0;
  const listAffected = true; // o cenário sempre tem conta afetada

  const Banner = (extra={}) => (
    <HealthBanner accounts={accounts} dense={t.density==="compact"}
      showLastCheck={t.showLastCheck} dismissible={t.dismissible}
      onDismiss={()=>setDismissed(true)} {...extra} />
  );

  return (
    <div className={t.dark ? "dark" : ""} style={{ minHeight:"100vh", background:"var(--background)", padding:18 }}>
      <div style={{ maxWidth: 1240, margin:"0 auto" }}>

        {/* header da página (canon os-page-h-l: título + subtítulo) */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, padding:"0 4px 10px" }}>
          <div>
            <h1 style={{ margin:0, fontSize:14, fontWeight:600 }}>Caixa unificada</h1>
            <p style={{ margin:"2px 0 0", fontSize:12.5, color:"var(--muted-foreground)" }}>3 contas ativas · 5 filas · 8 abertas · 3 não lidas</p>
          </div>
          <div style={{ display:"flex", gap:6 }}>
            {["Templates","Filas","Canais","Broadcast"].map(x=>(
              <button key={x} style={{ padding:"6px 10px", fontSize:11.5, fontWeight:500, color:"var(--muted-foreground)",
                background:"transparent", border:"none", borderRadius:6 }}>{x}</button>
            ))}
            <button style={{ padding:"6px 12px", fontSize:11.5, fontWeight:600, color:"var(--primary-fg)", background:"var(--primary)", border:"none", borderRadius:6 }}>+ Nova conversa</button>
          </div>
        </div>

        {/* posicionamento GLOBAL — faixa acima do shell 3-col */}
        {showBanner && t.placement==="global" && (
          <div style={{ marginBottom:8 }}>{Banner()}</div>
        )}

        {/* shell 3-col */}
        <div style={{ display:"grid", gridTemplateColumns:"320px 1fr 300px", gap:0, height:"min(74vh, 720px)",
          border:"1px solid var(--border)", borderRadius:10, overflow:"hidden", background:"var(--card)" }}>

          {/* coluna lista */}
          <div style={{ display:"flex", flexDirection:"column", borderRight:"1px solid var(--border)", minHeight:0 }}>
            <div style={{ padding:"10px 11px", borderBottom:"1px solid var(--border)", display:"flex", gap:8, alignItems:"center" }}>
              <button style={{ display:"inline-flex", alignItems:"center", gap:5, fontSize:12, fontWeight:600, background:"transparent", border:"none" }}>
                Abertas <Icon d={Ico.chevron} size={13} />
              </button>
              <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6, flex:1, maxWidth:160,
                border:"1px solid var(--border)", borderRadius:7, padding:"4px 8px", color:"var(--muted-foreground)" }}>
                <Icon d={Ico.search} size={13} />
                <span style={{ fontSize:11.5 }}>Buscar…</span>
              </div>
            </div>

            {/* posicionamento LISTA — banner persistente no topo da lista (default) */}
            {showBanner && t.placement==="list" && (
              <div style={{ padding:"10px 10px 0" }}>{Banner()}</div>
            )}

            <div className="scroll-thin" style={{ flex:1, overflow:"auto", padding:"6px 6px", display:"flex", flexDirection:"column", gap:2 }}>
              {CONVERSAS.map(c=> <ConvRow key={c.id} c={c} listAffected={listAffected} highlightAffected={t.markRows} />)}
            </div>
          </div>

          {/* coluna thread */}
          <div style={{ display:"flex", flexDirection:"column", minWidth:0, background:"var(--wa-thread)" }}>
            {/* header thread */}
            <header style={{ display:"flex", alignItems:"center", gap:10, background:"var(--card)", borderBottom:"1px solid var(--border)", padding:"9px 14px" }}>
              <div style={{ position:"relative" }}>
                <div style={{ width:32, height:32, borderRadius:99, display:"grid", placeItems:"center", background:"oklch(0.60 0.12 20)", color:"#fff", fontSize:11, fontWeight:700 }}>MC</div>
                <span style={{ position:"absolute", right:-2, bottom:-2, border:"2px solid var(--card)", borderRadius:99 }}><ChannelDot channel="whatsapp" size={13} /></span>
              </div>
              <div style={{ minWidth:0, flex:1 }}>
                <b style={{ fontSize:13.5, fontWeight:600 }}>Maiara Coutinho</b>
                <div style={{ display:"flex", gap:7, alignItems:"center", fontSize:11, color:"var(--muted-foreground)", marginTop:1 }}>
                  <span style={{ border:"1px solid var(--wa-chip-border)", color:"oklch(0.35 0.10 145)", borderRadius:99, padding:"0px 7px", fontSize:10.5, fontWeight:500, background:"var(--card)" }}>WhatsApp · Operacional</span>
                  <span className="mono">+55 48 9 9888-2230</span>
                </div>
              </div>
              <span style={{ fontSize:9.5, fontWeight:700, padding:"2px 8px", borderRadius:99, color:SLA_TONE["atrasando"].fg, border:`1px solid ${SLA_TONE["atrasando"].bd}` }}>atrasando 22min</span>
            </header>

            {/* posicionamento THREAD — banner no topo da thread (padrão dos banners preview/blocked) */}
            {showBanner && t.placement==="thread" && (
              <div style={{ padding:"10px 14px 0" }}>{Banner()}</div>
            )}

            {/* mensagens */}
            <div className="scroll-thin" style={{ flex:1, overflow:"auto", padding:"14px", display:"flex", flexDirection:"column", gap:6 }}>
              <div style={{ alignSelf:"flex-start", maxWidth:"68%", background:"var(--card)", color:"var(--foreground)", border:"1px solid var(--border)", borderRadius:"10px 10px 10px 3px", padding:"7px 11px", fontSize:12.5 }}>
                Oi! O banner já está pronto?
                <div className="mono" style={{ fontSize:9.5, opacity:.55, marginTop:3 }}>14:32</div>
              </div>
              <div style={{ alignSelf:"flex-end", maxWidth:"68%", background:"var(--wa-bub)", color:"var(--wa-bub-fg)", borderRadius:"10px 10px 3px 10px", padding:"7px 11px", fontSize:12.5 }}>
                Tô finalizando agora, te mando em seguida.
                <div className="mono" style={{ fontSize:9.5, opacity:.6, marginTop:3 }}>14:33</div>
              </div>
            </div>

            {/* composer (estado depende do canal) */}
            <div style={{ borderTop:"1px solid var(--border)", background:"var(--card)", padding:"10px 14px" }}>
              {t.state!=="degraded" && t.composerLock ? (
                <div style={{ display:"flex", alignItems:"center", gap:8, fontSize:11.5, color:"var(--destructive-fg)",
                  background:"var(--destructive-soft)", border:"1px solid var(--destructive-border)", borderRadius:8, padding:"9px 11px" }}>
                  <Icon d={Ico.plugZap} size={14} />
                  <span><b style={{ fontWeight:600 }}>Envio pausado.</b> Reconecte o canal pra enviar — sua mensagem fica salva como rascunho.</span>
                </div>
              ) : (
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <div style={{ flex:1, border:"1px solid var(--border)", borderRadius:8, padding:"8px 11px", fontSize:12.5, color:"var(--muted-foreground)" }}>Escreva uma mensagem…</div>
                  <button style={{ padding:"8px 14px", fontSize:12, fontWeight:600, color:"#fff", background:"oklch(0.55 0.13 145)", border:"none", borderRadius:8 }}>Enviar</button>
                </div>
              )}
            </div>
          </div>

          {/* coluna contexto */}
          <div style={{ borderLeft:"1px solid var(--border)", padding:"14px", display:"flex", flexDirection:"column", gap:14, minHeight:0, overflow:"auto" }} className="scroll-thin">
            {[["Fila","Atendimento · SLA 1h"],["Atribuído","Larissa"],["Canal · Conta","WhatsApp · Operacional"],["Saldo cliente","R$ 1.420 em aberto"],["Histórico","6 pedidos · LTV R$ 8.940"]].map(([k,v])=>(
              <div key={k}>
                <div style={{ fontSize:9.5, textTransform:"uppercase", letterSpacing:".07em", color:"var(--muted-foreground)", fontWeight:600, marginBottom:3 }}>{k}</div>
                <div style={{ fontSize:12.5 }}>{v}</div>
              </div>
            ))}
          </div>
        </div>

        <p style={{ fontSize:11, color:"var(--muted-foreground)", marginTop:10, textAlign:"center" }}>
          Protótipo F1 · banner de saúde de canal · dados mock — abra <b>Tweaks</b> pra alternar estado e posicionamento
        </p>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Cenário" />
        <TweakRadio label="Estado do canal" value={t.state}
          options={["degraded","down","multi"]}
          onChange={v=>setTweak("state", v)} />
        <TweakSection label="Posicionamento" />
        <TweakSelect label="Onde o banner aparece" value={t.placement}
          options={[
            {value:"list",   label:"Topo da lista (persistente)"},
            {value:"thread", label:"Topo da thread (contextual)"},
            {value:"global", label:"Faixa global acima do shell"},
          ]}
          onChange={v=>setTweak("placement", v)} />
        <TweakToggle label="Marcar conversas afetadas (chip 'canal off')" value={t.markRows} onChange={v=>setTweak("markRows", v)} />
        <TweakToggle label="Bloquear envio quando fora do ar" value={t.composerLock} onChange={v=>setTweak("composerLock", v)} />
        <TweakSection label="Conteúdo" />
        <TweakToggle label="Mostrar 'verificado há X min'" value={t.showLastCheck} onChange={v=>setTweak("showLastCheck", v)} />
        <TweakToggle label="Permitir dispensar (X)" value={t.dismissible} onChange={v=>setTweak("dismissible", v)} />
        <TweakSection label="Aparência" />
        <TweakRadio label="Densidade" value={t.density} options={["compact","regular"]} onChange={v=>setTweak("density", v)} />
        <TweakToggle label="Modo escuro" value={t.dark} onChange={v=>setTweak("dark", v)} />
      </TweaksPanel>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "state": "down",
  "placement": "list",
  "markRows": true,
  "composerLock": true,
  "showLastCheck": true,
  "dismissible": true,
  "density": "compact",
  "dark": false
}/*EDITMODE-END*/;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
