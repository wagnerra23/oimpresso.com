# OpenTelemetry Collector + Grafana Tempo + Grafana — SMOKE LOCAL DEV
# Wave 28 Agent 6 — valida pipeline antes de deploy CT 100 (ADR 0162).
#
# ⚠️ ISOLAMENTO TIER 0 DE PROD:
#   - Volumes nomeados com prefixo `localdev-` (NÃO conflita com `oimpresso-tempo-data` do CT 100)
#   - Container names com sufixo `-localdev` (NÃO conflita com `oimpresso-otel-collector` / `oimpresso-tempo` do CT 100)
#   - Rede `otel-localdev` própria (NÃO usa rede external `oimpresso-mcp`)
#   - Portas mesmas do CT 100 (4318/3200/3000/13133) porque é local-dev — Wagner sobe um por vez
#   - Exporter Laravel custom (mcp.oimpresso.com) REMOVIDO — local-dev não fala com Hostinger
#
# Subset CT 100 (vs infra/ct100/otel/docker-compose.yml):
#   ✅ otel-collector-contrib 0.110.0 (mesma versão pinada)
#   ✅ tempo 2.6.0 (mesma versão pinada)
#   ➕ grafana 11.3 (incluído pra Wagner explorar traces localmente; CT 100 não tem ainda)
#   ❌ exporter otlphttp/laravel removido (ver otel-collector-config.yaml local-dev)
#
# Subir:    docker compose up -d
# Derrubar: docker compose down -v   (cleanup volume; sempre -v em local-dev)
# Status:   docker compose ps

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: oimpresso-otel-collector-localdev
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (Wagner manda curl pra cá)
      - "8888:8888"   # Métricas internas collector (Prometheus scrape)
      - "13133:13133" # Health check endpoint
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    networks:
      - otel-localdev
    depends_on:
      - tempo
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 3

  tempo:
    image: grafana/tempo:2.6.0
    container_name: oimpresso-tempo-localdev
    restart: unless-stopped
    ports:
      - "3200:3200"   # Tempo HTTP query API
      - "9095:9095"   # Tempo gRPC query API
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - localdev-tempo-data:/var/tempo
    command: ["-config.file=/etc/tempo.yaml"]
    networks:
      - otel-localdev
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
    user: "0"   # local-dev: rodar root simplifica permissão volume named (CT 100 usa default)

  grafana:
    image: grafana/grafana:11.3.0
    container_name: oimpresso-grafana-localdev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - localdev-grafana-data:/var/lib/grafana
    networks:
      - otel-localdev
    depends_on:
      - tempo

volumes:
  localdev-tempo-data:
    name: localdev-oimpresso-tempo-data
  localdev-grafana-data:
    name: localdev-oimpresso-grafana-data

networks:
  otel-localdev:
    name: otel-localdev
    driver: bridge
