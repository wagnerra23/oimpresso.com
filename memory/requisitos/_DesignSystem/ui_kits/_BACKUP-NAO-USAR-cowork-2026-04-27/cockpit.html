<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oimpresso ERP — Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
:root{
  --sb-bg:oklch(0.21 0 0);--sb-bg-2:oklch(0.18 0 0);--sb-border:oklch(0.28 0 0);
  --sb-text:oklch(0.78 0 0);--sb-text-dim:oklch(0.55 0 0);--sb-text-hi:oklch(0.96 0 0);
  --sb-hover:oklch(0.27 0 0);--sb-active:oklch(0.32 0 0);
  --bg:oklch(0.985 0.003 90);--bg-2:oklch(0.965 0.004 90);--surface:#ffffff;
  --border:oklch(0.90 0.004 90);--border-2:oklch(0.93 0.004 90);
  --text:oklch(0.22 0.01 80);--text-dim:oklch(0.50 0.01 80);--text-mute:oklch(0.65 0.01 80);
  --accent:oklch(0.58 0.09 220);--accent-2:oklch(0.66 0.09 220);--accent-soft:oklch(0.94 0.025 220);
  --bubble-me:oklch(0.58 0.09 220);--bubble-me-fg:#fff;
  --bubble-them:oklch(0.96 0.003 90);--bubble-them-fg:var(--text);
  --origin-OS-bg:oklch(0.93 0.07 70);--origin-OS-fg:oklch(0.40 0.10 60);
  --origin-CRM-bg:oklch(0.92 0.06 220);--origin-CRM-fg:oklch(0.40 0.10 220);
  --origin-FIN-bg:oklch(0.93 0.07 145);--origin-FIN-fg:oklch(0.36 0.10 145);
  --origin-PNT-bg:oklch(0.93 0.06 295);--origin-PNT-fg:oklch(0.40 0.10 295);
  --origin-MFG-bg:oklch(0.93 0.05 30);--origin-MFG-fg:oklch(0.40 0.10 30);
  --radius:8px;--radius-sm:6px;--radius-lg:12px;
  --shadow-pop:0 6px 24px -8px rgba(0,0,0,.18),0 2px 6px -2px rgba(0,0,0,.10);
  --shadow-soft:0 1px 2px rgba(0,0,0,.04);
  --row-h:30px;--font-sans:"IBM Plex Sans",ui-sans-serif,system-ui,sans-serif;
  --font-mono:"IBM Plex Mono",ui-monospace,monospace;
}
[data-theme="dark"]{
  --bg:oklch(0.16 0.003 240);--bg-2:oklch(0.14 0.003 240);--surface:oklch(0.19 0.003 240);
  --border:oklch(0.26 0.005 240);--border-2:oklch(0.23 0.005 240);
  --text:oklch(0.92 0.005 90);--text-dim:oklch(0.68 0.005 90);--text-mute:oklch(0.55 0.005 90);
  --bubble-them:oklch(0.24 0.005 240);--accent-soft:oklch(0.30 0.04 220);
  --origin-OS-bg:oklch(0.30 0.07 60);--origin-OS-fg:oklch(0.85 0.07 60);
  --origin-CRM-bg:oklch(0.30 0.07 220);--origin-CRM-fg:oklch(0.85 0.07 220);
  --origin-FIN-bg:oklch(0.30 0.07 145);--origin-FIN-fg:oklch(0.85 0.07 145);
  --origin-PNT-bg:oklch(0.30 0.07 295);--origin-PNT-fg:oklch(0.85 0.07 295);
  --origin-MFG-bg:oklch(0.30 0.07 30);--origin-MFG-fg:oklch(0.85 0.07 30);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#app{height:100%;overflow:hidden;}
body{font-family:var(--font-sans);font-size:13.5px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;}

.app{display:grid;grid-template-columns:260px 1fr;height:100vh;width:100vw;overflow:hidden;transition:background .2s,color .2s;}

/* ── Sidebar ── */
.sb{background:var(--sb-bg);color:var(--sb-text);border-right:1px solid var(--sb-border);display:flex;flex-direction:column;min-height:0;}
.sb-top{padding:10px 10px 8px;border-bottom:1px solid var(--sb-border);}
.sb-cp-btn{appearance:none;border:1px solid var(--sb-border);background:var(--sb-bg-2);color:var(--sb-text-hi);height:32px;padding:0 8px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:8px;font:inherit;font-size:12.5px;font-weight:500;cursor:pointer;width:100%;}
.sb-cp-btn:hover{background:var(--sb-hover);}
.av-sm{width:20px;height:20px;border-radius:4px;color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;flex:0 0 auto;}
.sb-dd{position:absolute;top:calc(100% + 2px);left:0;right:0;background:oklch(0.20 0 0);border:1px solid var(--sb-border);border-radius:var(--radius);box-shadow:var(--shadow-pop);padding:6px;z-index:50;font-size:12.5px;}
.sb-dd-h{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--sb-text-dim);padding:6px 8px 4px;}
.sb-dd-i{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius-sm);color:var(--sb-text-hi);cursor:pointer;}
.sb-dd-i:hover{background:var(--sb-hover);}
.sb-dd-sep{height:1px;background:var(--sb-border);margin:4px 0;}
.sb-dd-foot{padding:7px 8px;border-radius:var(--radius-sm);color:var(--sb-text-dim);font-size:12px;cursor:pointer;}
.sb-dd-foot:hover{background:var(--sb-hover);color:var(--sb-text-hi);}
.sb-tabs{display:flex;gap:2px;padding:8px;border-bottom:1px solid var(--sb-border);}
.sb-tab{flex:1;appearance:none;border:0;background:transparent;color:var(--sb-text-dim);padding:6px 8px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;gap:6px;font:inherit;font-size:12px;font-weight:500;cursor:pointer;}
.sb-tab:hover{color:var(--sb-text-hi);background:var(--sb-hover);}
.sb-tab.active{background:var(--sb-active);color:var(--sb-text-hi);}
.sb-body{flex:1 1 auto;overflow-y:auto;scrollbar-width:thin;scrollbar-color:oklch(0.32 0 0) transparent;}
.sb-chat,.sb-menu{padding:8px;}
.sb-actions{display:flex;flex-direction:column;gap:1px;margin-bottom:8px;}
.sb-action{display:flex;align-items:center;gap:10px;padding:0 10px;height:30px;border-radius:var(--radius-sm);color:var(--sb-text);font-size:13px;cursor:pointer;}
.sb-action:hover{background:var(--sb-hover);color:var(--sb-text-hi);}
.sb-action .kbd{font-family:var(--font-mono);font-size:10.5px;color:var(--sb-text-dim);margin-left:auto;}
.sb-action .kbd-badge{font-size:10px;font-weight:700;background:oklch(0.55 0.15 30);color:#fff;padding:1px 5px;border-radius:999px;min-width:16px;text-align:center;margin-left:auto;}
.sb-action .beta{font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--sb-text-dim);border:1px solid var(--sb-border);padding:1px 5px;border-radius:3px;margin-left:auto;}
.sb-section-h{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--sb-text-dim);padding:14px 10px 6px;}
.sb-bullet{width:7px;height:7px;border-radius:50%;flex:0 0 auto;}
.sb-bullet.outline{border:1.4px solid oklch(0.40 0 0);}
.sb-bullet.filled{background:oklch(0.78 0.16 75);}
.sb-conv{display:flex;align-items:center;gap:10px;padding:0 10px;height:30px;border-radius:var(--radius-sm);color:var(--sb-text);font-size:13px;cursor:pointer;}
.sb-conv:hover{background:var(--sb-hover);color:var(--sb-text-hi);}
.sb-conv.active{background:var(--sb-active);color:var(--sb-text-hi);font-weight:500;}
.sb-conv-t{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-routine{display:flex;align-items:center;gap:10px;padding:0 10px;height:28px;border-radius:var(--radius-sm);color:var(--sb-text);font-size:12.5px;cursor:pointer;}
.sb-routine:hover{background:var(--sb-hover);}
.sb-routine-t{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-routine-f{font-size:10.5px;color:var(--sb-text-dim);flex:0 0 auto;}
.sb-group-h{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--sb-text-dim);padding:12px 10px 6px;display:flex;align-items:center;gap:6px;cursor:pointer;}
.sb-group-h:hover{color:var(--sb-text-hi);}
.sb-item{display:flex;align-items:center;gap:10px;padding:0 10px;height:var(--row-h);border-radius:var(--radius-sm);color:var(--sb-text);font-size:13px;cursor:pointer;position:relative;text-decoration:none;}
.sb-item:hover{background:var(--sb-hover);color:var(--sb-text-hi);}
.sb-item.active{background:var(--sb-active);color:var(--sb-text-hi);font-weight:500;}
.sb-item.active::before{content:"";position:absolute;left:-8px;top:6px;bottom:6px;width:2px;background:var(--accent-2);border-radius:2px;}
.sb-item .label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-item .badge-n{font-size:10.5px;font-weight:600;background:var(--accent);color:#fff;border-radius:999px;padding:1px 6px;min-width:18px;text-align:center;}
.sb-user{border-top:1px solid var(--sb-border);padding:8px;position:relative;}
.sb-user-btn{appearance:none;border:0;background:transparent;display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:var(--radius);cursor:pointer;width:100%;color:inherit;font:inherit;}
.sb-user-btn:hover{background:var(--sb-hover);}
.user-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,oklch(0.65 0.12 30),oklch(0.55 0.15 10));color:#fff;font-size:11.5px;font-weight:700;display:grid;place-items:center;flex:0 0 auto;}
.who b{display:block;color:var(--sb-text-hi);font-weight:500;font-size:12.5px;}
.who small{display:block;color:var(--sb-text-dim);font-size:11px;}
.user-menu{position:absolute;bottom:calc(100% + 6px);left:8px;right:8px;background:oklch(0.22 0 0);border:1px solid var(--sb-border);border-radius:var(--radius);box-shadow:var(--shadow-pop);padding:6px;z-index:60;font-size:12.5px;}
.user-menu-head{display:flex;align-items:center;gap:10px;padding:10px 10px 12px;border-bottom:1px solid var(--sb-border);margin-bottom:6px;}
.user-menu-head .av-lg{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,oklch(0.65 0.12 30),oklch(0.55 0.15 10));color:#fff;font-weight:700;display:grid;place-items:center;}
.user-menu-head b{display:block;color:var(--sb-text-hi);font-weight:500;}
.user-menu-head small{display:block;color:var(--sb-text-dim);font-size:11.5px;}
.um-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:var(--radius-sm);color:var(--sb-text-hi);cursor:pointer;}
.um-item:hover{background:var(--sb-hover);}
.um-item .label{flex:1;}
.um-sep{height:1px;background:var(--sb-border);margin:4px 2px;}

/* ── Main ── */
.main{display:grid;grid-template-rows:44px 1fr;min-height:0;min-width:0;}
.topbar{height:44px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;padding:0 16px;gap:12px;}
.bc{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-dim);}
.bc-tenant{color:var(--text);font-weight:600;}
.bc-sep{color:var(--text-mute);}
.bc-cur{color:var(--text);font-weight:500;}
.topbar-r{margin-left:auto;display:flex;gap:4px;}
.icon-btn{appearance:none;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);width:28px;height:28px;border-radius:var(--radius-sm);display:grid;place-items:center;cursor:pointer;}
.icon-btn:hover{color:var(--text);border-color:var(--text-mute);}
.main-body{min-height:0;min-width:0;overflow:hidden;display:flex;flex-direction:column;}

/* ── Chat page ── */
.chat-page{display:grid;grid-template-columns:1fr 320px;flex:1;min-height:0;}
.chat-main{display:flex;flex-direction:column;min-width:0;min-height:0;}
.chat-tabsbar{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--bg);}
.chat-tabs{display:flex;gap:2px;background:var(--bg-2);border:1px solid var(--border);border-radius:999px;padding:2px;}
.chat-tab{appearance:none;border:0;background:transparent;color:var(--text-dim);font:inherit;font-size:12px;font-weight:500;padding:4px 14px;border-radius:999px;cursor:pointer;}
.chat-tab:hover{color:var(--text);}
.chat-tab.active{background:var(--surface);color:var(--text);font-weight:600;box-shadow:var(--shadow-soft);}
.chat-search{margin-left:auto;display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);border-radius:999px;height:28px;padding:0 10px;width:220px;color:var(--text-mute);}
.chat-search input{appearance:none;border:0;outline:none;background:transparent;flex:1;font:inherit;font-size:12px;color:var(--text);}
.chat-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}

/* ── Thread ── */
.thread{display:flex;flex-direction:column;flex:1;min-height:0;background:var(--bg);}
.th-head{height:56px;border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;gap:12px;}
.th-av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:600;font-size:13px;}
.th-head .who b{display:block;font-size:14px;font-weight:600;letter-spacing:-0.01em;}
.th-head .who small{display:block;font-size:11.5px;color:var(--text-dim);}
.th-head .actions{margin-left:auto;display:flex;gap:4px;}
.th-context{background:var(--bg-2);border-bottom:1px solid var(--border);padding:8px 18px;display:flex;align-items:center;gap:14px;font-size:12px;color:var(--text-dim);}
.th-context b{color:var(--text);font-weight:600;}
.th-context .pill{background:var(--surface);border:1px solid var(--border);padding:2px 8px;border-radius:999px;font-family:var(--font-mono);font-size:11px;color:var(--text);}
.th-context .stage{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;background:var(--origin-OS-bg);color:var(--origin-OS-fg);border-radius:999px;font-size:11px;font-weight:500;}
.msgs{flex:1;overflow-y:auto;padding:18px 24px 12px;scrollbar-width:thin;display:flex;flex-direction:column;gap:2px;}
.day-sep{align-self:center;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-mute);background:var(--bg-2);border:1px solid var(--border);padding:3px 10px;border-radius:999px;margin:12px 0 8px;}
.row{display:flex;gap:10px;margin-top:2px;max-width:78%;}
.row.me{align-self:flex-end;flex-direction:row-reverse;}
.row .av{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:600;flex:0 0 auto;margin-top:2px;align-self:flex-end;}
.row.me .av{display:none;}
.row.continued .av{visibility:hidden;}
.bubble{background:var(--bubble-them);color:var(--bubble-them-fg);padding:8px 12px;border-radius:14px;border-top-left-radius:4px;font-size:13.5px;line-height:1.45;max-width:100%;word-wrap:break-word;position:relative;}
.row.me .bubble{background:var(--bubble-me);color:var(--bubble-me-fg);border-top-left-radius:14px;border-top-right-radius:4px;}
.row.continued .bubble{border-top-left-radius:14px;}
.row.me.continued .bubble{border-top-right-radius:14px;}
.bubble .meta{display:block;font-size:10.5px;margin-top:3px;opacity:.65;font-variant-numeric:tabular-nums;text-align:right;}
.bubble .author{display:block;font-size:11px;font-weight:600;margin-bottom:2px;color:var(--accent);}
.bubble.note{background:oklch(0.96 0.04 80);color:oklch(0.32 0.06 70);border:1px dashed oklch(0.80 0.08 80);font-size:12.5px;}
.bubble.file{display:flex;align-items:center;gap:10px;padding:10px 12px;}
.bubble.file .fic{width:36px;height:36px;border-radius:8px;background:oklch(0.94 0.02 220);color:oklch(0.40 0.10 220);display:grid;place-items:center;flex:0 0 auto;}
.typing{display:inline-flex;align-items:center;gap:4px;padding:10px 14px;background:var(--bubble-them);border-radius:14px;border-top-left-radius:4px;margin-top:4px;align-self:flex-start;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text-mute);animation:bounce 1.2s infinite ease-in-out;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-4px);opacity:1;}}
.composer{border-top:1px solid var(--border);background:var(--bg);padding:12px 18px 14px;}
.composer-inner{border:1px solid var(--border);background:var(--surface);border-radius:var(--radius-lg);padding:8px 10px 6px;display:flex;flex-direction:column;gap:6px;transition:border-color .15s,box-shadow .15s;}
.composer-inner:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.composer textarea{appearance:none;border:0;background:transparent;resize:none;outline:none;width:100%;font:inherit;font-size:13.5px;line-height:1.45;color:var(--text);min-height:22px;max-height:160px;padding:4px 2px;}
.composer-toolbar{display:flex;align-items:center;gap:4px;}
.composer-toolbar .spacer{flex:1;}
.composer-toolbar .hint{font-size:11px;color:var(--text-mute);margin-right:4px;}
.composer-toolbar .hint kbd{font-family:var(--font-mono);font-size:10.5px;background:var(--bg-2);border:1px solid var(--border);border-radius:3px;padding:0 4px;margin:0 1px;}
.send-btn{appearance:none;border:0;background:var(--accent);color:#fff;height:28px;padding:0 12px;border-radius:var(--radius-sm);font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.send-btn:hover{background:var(--accent-2);}
.send-btn:disabled{background:var(--border);color:var(--text-mute);cursor:not-allowed;}

/* ── Linked Apps ── */
.linked{border-left:1px solid var(--border);background:var(--bg-2);display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.linked-h{height:44px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;background:var(--bg);}
.linked-h b{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-mute);}
.linked-h .spacer{flex:1;}
.linked-body{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;display:flex;flex-direction:column;gap:8px;}
.lblock{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.lblock-h{display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:12px;cursor:pointer;background:var(--surface);border-bottom:1px solid var(--border);}
.lblock.collapsed .lblock-h{border-bottom:0;}
.lblock-h:hover{background:var(--bg-2);}
.lblock-h b{font-weight:600;font-size:12px;color:var(--text);}
.lblock-h .spacer{flex:1;}
.lblock-b{padding:10px 12px 12px;display:flex;flex-direction:column;gap:6px;}
.origin-badge{font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:.04em;padding:1px 5px;border-radius:3px;}
.o-OS{background:var(--origin-OS-bg);color:var(--origin-OS-fg);}
.o-CRM{background:var(--origin-CRM-bg);color:var(--origin-CRM-fg);}
.o-FIN{background:var(--origin-FIN-bg);color:var(--origin-FIN-fg);}
.o-PNT{background:var(--origin-PNT-bg);color:var(--origin-PNT-fg);}
.lkv{display:flex;align-items:baseline;gap:8px;font-size:12px;padding:2px 0;}
.lkv span:first-child{color:var(--text-mute);font-size:11px;min-width:76px;flex:0 0 auto;}
.lkv b{color:var(--text);font-weight:500;flex:1;min-width:0;}
.lkv b.mono{font-family:var(--font-mono);font-size:11.5px;}
.lstage{display:inline-flex;background:var(--origin-OS-bg);color:var(--origin-OS-fg);padding:1px 7px;border-radius:999px;font-size:11px;font-weight:500;}
.lhint{font-size:11.5px;color:var(--text-dim);line-height:1.4;}
.lrow-btns{display:flex;gap:6px;margin-top:4px;}

function SidebarMenuItem({ item, activeHref, onNav, depth=0 }) {
  const hasChildren = !!(item.children?.length);
  const isSelfActive = item.href && item.href !== "#" && (activeHref === item.href || activeHref?.startsWith(item.href + "/"));
  const isChildActive = hasChildren && item.children.some(c => c.href && (activeHref === c.href || activeHref?.startsWith(c.href + "/")));
  const isActive = isSelfActive || isChildActive;
  const [open, setOpen] = useState(isActive);
  const IconComp = IC[item.icon] || IC.folder;
  const pad = depth > 0 ? {paddingLeft: 28} : {};

  if (hasChildren) {
    return (
      <div>
        <div className={`sb-item ${isActive?"active":""}`} style={pad} onClick={() => setOpen(v=>!v)}>
          <IconComp size={16} cls=""/>
          <span className="label">{item.label}</span>
          {item.badge ? <span className="badge-n">{item.badge}</span> : null}
          <IC.chevR size={10} cls="" style={{marginLeft:"auto",transform:open?"rotate(90deg)":"rotate(0deg)",transition:"transform .15s",opacity:.5}}/>
        </div>
        {open && item.children.map((child, i) => (
          <SidebarMenuItem key={i} item={child} activeHref={activeHref} onNav={onNav} depth={depth+1}/>
        ))}
      </div>
    );
  }
  return (
    <div
       className={`sb-item ${isSelfActive?"active":""}`}
       style={pad}
       onClick={() => onNav && onNav(item.href, item.label)}>
      <IconComp size={16} cls=""/>
      <span className="label">{item.label}</span>
      {item.badge ? <span className="badge-n" style={{fontSize:9,padding:"1px 5px"}}>{item.badge}</span> : null}
    </div>
  );
}

function Thread({ conv, msgs, onSend, typing }) {
  const [text, setText] = useState("");
  const taRef = useRef(null);
  const scrollRef = useRef(null);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [msgs.length, typing]);
  useEffect(() => {
    if (!taRef.current) return;
    taRef.current.style.height = "auto";
    taRef.current.style.height = Math.min(taRef.current.scrollHeight, 160) + "px";
  }, [text]);
  const handleSend = () => {
    const t = text.trim();
    if (!t) return;
    onSend(t);
    setText("");
  };
  const onKey = e => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); } };
  if (!conv) return (
    <section className="thread">
      <div className="empty"><div><div className="ico"><IC.chat size={22} cls=""/></div><div>Selecione uma conversa</div></div></div>
    </section>
  );
  const rows = msgs.map((m, i) => {
    const prev = msgs[i-1];
    const continued = prev && prev.side===m.side && prev.who===m.who && !m.note;
    const showDay = !prev || prev.d!==m.d;
    return { ...m, continued, showDay };
  });
  return (
    <section className="thread">
      <header className="th-head">
        <div className={`th-av ${conv.grad}`}>{conv.av}</div>
        <div className="who">
          <b>{conv.title}</b>
          <small style={{color:"var(--text-dim)"}}>
            {conv.online && <span style={{display:"inline-block",width:6,height:6,borderRadius:"50%",background:"oklch(0.72 0.18 145)",marginRight:5,verticalAlign:"middle"}}></span>}
            {conv.kind==="os" ? `${conv.os} · ${conv.client}` : conv.kind==="team" ? "Canal da equipe" : conv.client||"Cliente"}
          </small>
        </div>
        <div className="actions">
          <button className="icon-btn"><IC.phone size={14} cls=""/></button>
          <button className="icon-btn"><IC.info size={14} cls=""/></button>
          <button className="icon-btn"><IC.more size={14} cls=""/></button>
        </div>
      </header>
      {(conv.os||conv.stage) && (
        <div className="th-context">
          {conv.os && <span>OS <span className="pill">{conv.os}</span></span>}
          {conv.client && <span><b>{conv.client}</b></span>}
          {conv.stage && <span className="stage">● {conv.stage}</span>}
          <span style={{marginLeft:"auto",fontSize:11}}>Entrega: <b style={{color:"var(--text)"}}>30/04</b></span>
        </div>
      )}
      <div className="msgs" ref={scrollRef}>
        {rows.map((m, i) => (
          <React.Fragment key={i}>
            {m.showDay && <div className="day-sep">{m.d}</div>}
            <div className={`row ${m.side}${m.continued?" continued":""}`}>
              {m.side==="them" && <div className={`av ${m.grad||"av-1"}`}>{(m.who||"").slice(0,2).toUpperCase()}</div>}
              {m.note ? (
                <div className="bubble note"><span className="author">📌 Nota · {m.who}</span>{m.t}<span className="meta">{m.time}</span></div>
              ) : m.file ? (
                <div className="bubble file">
                  <div className="fic"><IC.paper size={18} cls=""/></div>
                  <div><b style={{display:"block",fontSize:13}}>{m.file.name}</b><small style={{fontSize:11.5,opacity:.7,fontFamily:"var(--font-mono)"}}>{m.file.size} · PDF</small></div>
                </div>
              ) : (
                <div className="bubble">
                  {m.side==="them" && !m.continued && <span className="author">{m.who}</span>}
                  {m.t}
                  <span className="meta">{m.time}{m.side==="me" && <span style={{marginLeft:5}}>{m.read?"✓✓":"✓"}</span>}</span>
                </div>
              )}
            </div>
          </React.Fragment>
        ))}
        {typing && (
          <div className="row" style={{alignSelf:"flex-start"}}>
            <div className={`av ${conv.msgs?.[0]?.grad||"av-1"}`}>{(conv.msgs?.[0]?.who||"").slice(0,2).toUpperCase()}</div>
            <div className="typing"><span/><span/><span/></div>
          </div>
        )}
      </div>
      <div className="composer">
        <div className="composer-inner">
          <textarea ref={taRef} value={text} onChange={e=>setText(e.target.value)} onKeyDown={onKey}
            placeholder={`Mensagem para ${conv.title}...`} rows={1}/>
          <div className="composer-toolbar">
            <button className="icon-btn" style={{border:0,background:"transparent"}}><IC.paper size={14} cls=""/></button>
            <button className="icon-btn" style={{border:0,background:"transparent"}}><IC.smile size={14} cls=""/></button>
            <button className="icon-btn" style={{border:0,background:"transparent"}}><IC.hash size={14} cls=""/></button>
            <span className="spacer"/>
            <span className="hint"><kbd>Enter</kbd> envia · <kbd>⇧Enter</kbd> nova linha</span>
            <button className="send-btn" disabled={!text.trim()} onClick={handleSend}>Enviar <IC.send size={13} cls=""/></button>
          </div>
        </div>
      </div>
    </section>
  );
}

// ── Linked Apps ──
function useCollapsed(key, initial=false) {
  const [c, setC] = useState(() => ls(`oimpresso.linked.${key}.collapsed`, initial?"1":"0")==="1");
  useEffect(() => { lsSet(`oimpresso.linked.${key}.collapsed`, c?"1":"0"); }, [c, key]);
  return [c, setC];
}

function LBlock({ title, badge, children, bKey, cta }) {
  const [collapsed, setCollapsed] = useCollapsed(bKey, false);
  return (
    <section className={`lblock${collapsed?" collapsed":""}`}>
      <header className="lblock-h" onClick={() => setCollapsed(v=>!v)}>
        <b>{title}</b>
        {badge && <span className={`origin-badge o-${badge}`}>{badge}</span>}
        <span className="spacer"/>
        <IC.chevR size={11} cls="" style={{color:"var(--text-mute)",transition:"transform .15s",transform:collapsed?"rotate(0)":"rotate(90deg)"}}/>
      </header>
      {!collapsed && (
        <div className="lblock-b">
          {children}
          {cta && <button className="lblock-cta">{cta} <IC.chevR size={11} cls=""/></button>}
        </div>
      )}
    </section>
  );
}

          {isTeam && (

                  <li key={i}><span className="lhist-when">{e.when}</span><span className="lhist-who"><b>{e.who}</b> {e.what}</span></li>

// ── Tasks page ──
function TasksPage() {
  const [activeId, setActiveId] = useState(() => ls("oimpresso.task","t1"));
  const [filter, setFilter] = useState("all");
  useEffect(() => { lsSet("oimpresso.task", activeId); }, [activeId]);

  const groups = [{key:"hoje",label:"Hoje"},{key:"atrasadas",label:"Atrasadas"},{key:"semana",label:"Esta semana"}];
  const filters = [{key:"all",label:"Todas"},{key:"hoje",label:"Hoje"},{key:"atrasadas",label:"Atrasadas"},{key:"OS",label:"OS"},{key:"CRM",label:"CRM"},{key:"FIN",label:"FIN"},{key:"PNT",label:"Ponto"}];
  const filtered = useMemo(() => {
    if (filter==="all") return TASKS;
    if (["OS","CRM","FIN","PNT"].includes(filter)) return TASKS.filter(t=>t.origin===filter);
    return TASKS.filter(t=>t.group===filter);
  }, [filter]);
  const task = TASKS.find(t=>t.id===activeId);

  return (
    <div className="tk-page">
      <div className="tk-list">
        <div className="tk-list-h"><h2>Tarefas</h2><span className="tk-count">{TASKS.length}</span></div>
        <div className="tk-filters">
          {filters.map(f=><button key={f.key} className={`tk-filter ${filter===f.key?"active":""}`} onClick={()=>setFilter(f.key)}>{f.label}</button>)}
        </div>
        <div className="tk-list-body">
          {groups.map(g=>{
            const items = filtered.filter(t=>t.group===g.key);
            if (!items.length) return null;
            return (
              <div key={g.key}>
                <div className="tk-group-h"><span>{g.label}</span><span className="tk-group-c">{items.length}</span></div>
                {items.map(t=>(
                  <div key={t.id} className={`tk-card ${t.id===activeId?"active":""} ${t.urgent?"urgent":""}`} onClick={()=>setActiveId(t.id)}>
                    <div className="tk-card-h">
                      <span className="tk-origin" style={{background:`var(--origin-${t.origin}-bg)`,color:`var(--origin-${t.origin}-fg)`}}>{t.origin}</span>
                      {t.unread && <span className="tk-dot"/>}
                      <span className="tk-when">{t.when}</span>
                    </div>
                    <b className="tk-title">{t.title}</b>
                    <small className="tk-sub">{t.subtitle}</small>
                    <div className="tk-foot"><span>de {t.from}</span></div>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </div>
      <div className="tk-detail">
        {task ? (
          <>
            <div className="tk-detail-h">
              <span className="tk-origin lg" style={{background:`var(--origin-${task.origin}-bg)`,color:`var(--origin-${task.origin}-fg)`}}>{task.origin}</span>
              <div className="tk-detail-title" style={{flex:1,minWidth:0}}>
                <b>{task.title}</b>
                <small>{task.subtitle} · {task.when}</small>
              </div>
              <button className="icon-btn"><IC.more size={14} cls=""/></button>
            </div>
            <div className="vw">
              {task.origin==="OS" && (
                <div className="vw-card">
                  <h3>Ordem de Serviço</h3>
                  <dl className="vw-dl">
                    <dt>Número</dt><dd className="mono">{task.os}</dd>
                    <dt>Cliente</dt><dd>{task.client}</dd>
                    <dt>Estágio</dt><dd><span className="lstage">● {task.stage}</span></dd>
                    <dt>Prazo</dt><dd className="urgent">{task.deadline}</dd>
                    <dt>Arte</dt><dd>{task.artFile} · {task.artSize}</dd>
                  </dl>
                  {task.history?.length>0 && (
                    <>
                      <h3 style={{marginTop:12}}>Histórico</h3>
                      <ul className="lhist">
                        {task.history.map((h,i)=><li key={i}><span className="lhist-when">{h.when}</span><span className="lhist-who"><b>{h.who}</b> {h.what}</span></li>)}

                    <dt>Último contato</dt><dd>{task.lastTouch}</dd>
                  </dl>
                  <div className="vw-actions">
                    <button className="vw-btn ghost"><IC.chat size={13} cls=""/> WhatsApp</button>
                    <span className="vw-spacer"/>
                    <button className="vw-btn primary"><IC.phone size={13} cls=""/> Ligar agora</button>

              {task.origin==="FIN" && (

                    <dt>Vencimento</dt><dd className="urgent">{task.due}</dd>
                  </dl>
                  <div className="vw-actions">
                    <button className="vw-btn ghost">Ver NF</button>
                    <span className="vw-spacer"/>
                    <button className="vw-btn danger">Rejeitar</button>
                    <button className="vw-btn primary">Aprovar pagamento</button>

              )}
              {task.origin==="PNT" && (
                <div className="vw-card">
                  <h3>Marcação do dia</h3>
                  <div className="vw-pnt-grid" style={{marginBottom:12}}>
                    {task.marcacoes?.map((m,i)=>(
                      <div key={i} className={`vw-pnt-cell${m.missing?" miss":""}`}>
                        <small>{m.label}</small>
                        <b>{m.time}</b>
                      </div>
                    ))}

                      <button key={s} className="vw-chip">{s}</button>
                    ))}
                  </div>
                  <textarea className="vw-textarea" rows={2} placeholder="Descreva o motivo (opcional)..."/>
                  <div className="vw-actions">
                    <span className="vw-spacer"/>
                    <button className="vw-btn primary">Enviar justificativa</button>
                  </div>
                </div>
              )}
            </div>
          </>
        ) : (
          <div className="tk-detail empty">
            <div className="empty">
              <div className="ico"><IC.inbox size={24} cls=""/></div>
              <div>Selecione uma tarefa</div>
              <small style={{display:"block",marginTop:8,opacity:.7}}>J/K navegar · E concluir · A adiar</small>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Module Stub ──
function ModuleStub({ routeId, label }) {
  function findItem(items, href) {
    for (const item of items) {
      if (item.href && href && (href === item.href || href.startsWith(item.href + "/"))) return item;
      if (item.children) { const f = findItem(item.children, href); if (f) return f; }
    }
    return null;
  }
  const item = findItem(MENU, routeId) || findItem(MENU, `/${routeId}`);
  const displayLabel = label || item?.label || routeId;
  const IconComp = IC[item?.icon] || IC.folder;
  return (
    <div className="mod-stub">
      <div className="mod-stub-bc"><span>Oimpresso</span><IC.chevR size={11} cls=""/><b>{displayLabel}</b></div>
      <div className="mod-stub-body">
        <div className="mod-stub-ico"><IconComp size={32} cls=""/></div>
        <h2>{displayLabel}</h2>
        <p>Esta tela ainda é Blade no sistema atual.<br/>Será migrada para React seguindo o padrão Cockpit.</p>
        <div className="mod-stub-tag">rota: {routeId}</div>
      </div>
    </div>
  );
}

// ── Topbar ──
function Topbar({ company, route, activeHref }) {
  // Encontra o item ativo percorrendo menu recursivamente
  function findActive(items, href) {
    for (const item of items) {
      if (item.href && href && (href === item.href || href.startsWith(item.href + "/"))) return item;
      if (item.children) {
        const found = findActive(item.children, href);
        if (found) return found;
      }
    }
    return null;
  }
  const active = findActive(MENU, activeHref);
  const crumbLabel = active?.label || (route === "tarefas" ? "Tarefas" : route === "chat" ? "Chat" : route);
  return (
    <header className="topbar">
      <div className="bc">
        <span className="bc-tenant">{company.name}</span>
        <span className="bc-sep">/</span>
        <span className="bc-cur">{crumbLabel}</span>
      </div>
      <div className="topbar-r">
        <button className="icon-btn"><IC.search size={14} cls=""/></button>
        <button className="icon-btn"><IC.bell size={14} cls=""/></button>
      </div>
    </header>
  );
}

// ── App root ──
function App() {
  const [company, setCompany] = useState(() => {
    const id = ls("oimpresso.company","oi");
    return COMPANIES.find(c=>c.id===id)||COMPANIES[0];
  });
  const [tab, setTab] = useState(() => ls("oimpresso.sidebar.tab","menu"));
  const [route, setRoute] = useState(() => ls("oimpresso.route","tarefas"));
  const [activeHref, setActiveHref] = useState(() => ls("oimpresso.href","/tarefas"));
  const [moduleLabel, setModuleLabel] = useState("");
  const [activeConvId, setActiveConvId] = useState(() => ls("oimpresso.conv","c1"));
  const [linkedCollapsed, setLinkedCollapsed] = useState(() => ls("oimpresso.linked.collapsed","0")==="1");
  const [convs, setConvs] = useState(CONVS);
  const [typing, setTyping] = useState(false);
  const [theme, setTheme] = useState(() => ls("oimpresso.theme","light"));

  useEffect(() => { lsSet("oimpresso.company", company.id); }, [company]);
  useEffect(() => { lsSet("oimpresso.sidebar.tab", tab); }, [tab]);
  useEffect(() => { lsSet("oimpresso.route", route); }, [route]);
  useEffect(() => { lsSet("oimpresso.href", activeHref); }, [activeHref]);
  useEffect(() => { lsSet("oimpresso.conv", activeConvId); }, [activeConvId]);
  useEffect(() => { lsSet("oimpresso.linked.collapsed", linkedCollapsed?"1":"0"); }, [linkedCollapsed]);
  useEffect(() => { document.documentElement.dataset.theme = theme; lsSet("oimpresso.theme", theme); }, [theme]);

  const conv = convs.find(c=>c.id===activeConvId)||null;
  const [msgs, setMsgs] = useState(conv?.msgs||[]);
  useEffect(() => { setMsgs(conv?.msgs||[]); }, [activeConvId]);

  const handleSend = text => {
    const m = { d:"Hoje", who:"você", side:"me", t:text, time:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}), read:false };
    setMsgs(ms => [...ms, m]);
    setTimeout(() => setTyping(true), 600);
    setTimeout(() => {
      setTyping(false);
      const reply = { d:"Hoje", who:conv?.msgs[0]?.who||"Equipe", side:"them", grad:conv?.msgs[0]?.grad||"av-1", t:"Recebido, vou verificar e te respondo já já 👍", time:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}) };
      setMsgs(ms => [...ms, reply]);
    }, 2400);
  };

  const handleSelectRoute = r => {
    setRoute(r);
    setActiveHref(`/${r}`);
    if (r==="chat") setTab("chat");
  };
  const handleSelectConv = id => {
    setActiveConvId(id);
    setRoute("chat");
    setActiveHref("/chat");
    setTab("chat");
  };
  const handleNav = (href, label) => {
    setActiveHref(href);
    setRoute("module");
    setModuleLabel(label || href);
  };

  let content;
  if (route==="chat") content = (
    <div className="chat-page">
      <div className="chat-main">
        <div className="chat-tabsbar">
          <div className="chat-tabs">
            {["Todos","OS","Equipe","Clientes"].map(t=>(
              <button key={t} className={`chat-tab${t==="Todos"?" active":""}`}>{t}</button>
            ))}
          </div>
          <div className="chat-search"><IC.search size={12} cls=""/><input placeholder="Buscar nesta conversa..."/></div>
        </div>
        <Thread conv={conv} msgs={msgs} onSend={handleSend} typing={typing}/>
      </div>
      <LinkedApps conv={conv} collapsed={linkedCollapsed} onToggle={()=>setLinkedCollapsed(v=>!v)}/>
    </div>
  );
  else if (route==="tarefas") content = <TasksPage/>;
  else if (route==="module") content = <ModuleStub routeId={activeHref} label={moduleLabel}/>;
  else content = <ModuleStub routeId={route}/>;

  return (
    <div className="app">
      <Sidebar
        company={company} companies={COMPANIES} onCompany={setCompany}
        tab={tab} onTab={setTab}
        convs={convs} activeConvId={activeConvId}
        onSelectConv={handleSelectConv} activeHref={activeHref}
        onSelectRoute={handleSelectRoute} onNav={handleNav}/>
      <div className="main">
        <Topbar company={company} route={route} activeHref={activeHref}/>
        <div className="main-body">{content}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
