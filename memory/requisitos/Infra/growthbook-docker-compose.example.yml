# GrowthBook self-hosted — docker-compose exemplo pro CT 100
# Copiar pra ~/docker/growthbook/docker-compose.yml no CT 100 e preencher os 3 valores marcados.
# Ver: memory/requisitos/Infra/RUNBOOK-growthbook-deploy.md

services:
  growthbook:
    image: growthbook/growthbook:latest
    container_name: growthbook
    restart: unless-stopped
    depends_on:
      growthbook-mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://growthbook-mongo:27017/growthbook
      APP_ORIGIN: https://growthbook.oimpresso.com    # PREENCHER
      API_HOST: https://growthbook-api.oimpresso.com  # PREENCHER
      JWT_SECRET: GERAR_COM_openssl_rand_-hex_32      # PREENCHER
      ENCRYPTION_KEY: GERAR_COM_openssl_rand_-hex_32  # PREENCHER
      NODE_ENV: production
    networks:
      - traefik
      - growthbook-internal
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik"

      # UI admin
      traefik.http.routers.growthbook-ui.rule: "Host(`growthbook.oimpresso.com`)"
      traefik.http.routers.growthbook-ui.entrypoints: "websecure"
      traefik.http.routers.growthbook-ui.tls: "true"
      traefik.http.routers.growthbook-ui.tls.certresolver: "letsencrypt"
      traefik.http.routers.growthbook-ui.service: "growthbook-ui"
      traefik.http.services.growthbook-ui.loadbalancer.server.port: "3000"

      # API endpoint (SDK)
      traefik.http.routers.growthbook-api.rule: "Host(`growthbook-api.oimpresso.com`)"
      traefik.http.routers.growthbook-api.entrypoints: "websecure"
      traefik.http.routers.growthbook-api.tls: "true"
      traefik.http.routers.growthbook-api.tls.certresolver: "letsencrypt"
      traefik.http.routers.growthbook-api.service: "growthbook-api"
      traefik.http.services.growthbook-api.loadbalancer.server.port: "3100"

  growthbook-mongo:
    image: mongo:7
    container_name: growthbook-mongo
    restart: unless-stopped
    volumes:
      - growthbook-mongo-data:/data/db
    networks:
      - growthbook-internal
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  traefik:
    external: true
  growthbook-internal:
    driver: bridge

volumes:
  growthbook-mongo-data:
    driver: local
