  score_total: 77
  vs_meta_bucket: '77 / 85 = 91% (abaixo meta vertical_client_facing)'
  vs_meta_excelente: '77 / 90 = 86%'
  vs_meta_aspiracional: '77 / 95 = 81%'

  comparacao_com_rubrica_v3_atual:
    nota_v3_atual: 77  # bate com module:grade --all 2026-05-16
    nota_yaml_simulado: 77
    diferenca: 0
