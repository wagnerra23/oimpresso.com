      F2.b: 0    # ❌ ainda não consumido por outros módulos (Manufacturing/Sells poderiam mas não importam)
      F2.c: 1    # parcial — sem Contracts/CrmLeadRepositoryInterface ainda
      subtotal: 5
    F3_perf_padrao:
