# Custom firebird.conf para o pipeline legacy-migration.
# Apontar via env FIREBIRD=D:\oimpresso.com\scripts\legacy-migration\fbclient-config
#
# Servidores WR Comercial migrados de FB 2.5 → 3.0 frequentemente ficam com
# `WireCrypt = Required` no server-side mas SEM o WireCryptPlugin
# (Arc4 ou ChaCha) habilitado. Cliente FB 3.0 padrão tenta negociar crypt e
# falha. Workaround: cliente força WireCrypt=Disabled + Legacy_Auth ativo.

# Cliente aceita conexão sem crypt (compat com server FB 2.5 e FB 3.0 sem plugin)
WireCrypt = Disabled

# Sem compressão (alguns servers legacy quebram com compress)
WireCompression = false

# Auth: aceita Srp256 (FB 4+), Srp (FB 3), Legacy_Auth (FB 2.5 legacy)
AuthClient = Srp256, Srp, Legacy_Auth, Win_Sspi
