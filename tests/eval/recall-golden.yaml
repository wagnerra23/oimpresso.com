# ─────────────────────────────────────────────────────────────────────────────
# recall-golden.yaml — golden set DETERMINÍSTICO de recall (sem judge LLM).
#
# Frente KL-C2 (plano memory/sessions/2026-06-12-plano-reestruturacao-sdd-ondas-paralelas.md).
# Consumido por: php artisan jana:recall-eval (--mode=mock local | --mode=real CT 100 fase 2).
#
# Contrato por query:
#   expected:   slugs que DEVEM aparecer no top-K (meta.top_k) do recall
#   violations: slugs historical/superseded que NÃO podem aparecer no top-N
#               (meta.violation_window) — ADR 0270 D-4 (decaimento) + ADR 0275
#               métrica recall_eval_violations (→ 0)
#   collision_number + must_resolve_slug: par colidido do alias map (ADR 0274) —
#               a query DEVE resolver pro slug certo do par, nunca pro irmão
#
# Resolução de slug → disco (validada em --mode=mock):
#   NNNN-titulo       → memory/decisions/<slug>.md
#   briefing:<Modulo> → memory/requisitos/<Modulo>/BRIEFING.md (porta única, ADR 0270 D-2)
#
# Regra anti-stale: todo slug daqui foi verificado contra o disco no commit que
# o introduziu; o comando re-verifica a cada run (slug morto = gate fail).
# ─────────────────────────────────────────────────────────────────────────────

meta:
  version: "1"
  top_k: 5
  violation_window: 3
  adr_dir: "memory/decisions"
  briefing_dir: "memory/requisitos"
  alias_map: "governance/adr-alias-map.json"
  meilisearch_index: "mcp_memory_documents"
  refs:
    - "0270-ciclo-de-vida-da-informacao-porta-unica-destilacao-decaimento"
    - "0274-referencia-adr-por-slug-alias-map-13-colisoes"
    - "0275-scorecard-sdd-canonico-10-metricas-calendario-promocoes"

queries:
  # ─── Pares colididos (ADR 0274 — número igual, assunto diferente) ───
  - id: colisao-0178-campos-fiscais
    query: "Onde ficam os campos fiscais brasileiros do cadastro de clientes (contacts)?"
    collision_number: "0178"
    must_resolve_slug: "0178-restauracao-campos-fiscais-br-canon"
    expected: ["0178-restauracao-campos-fiscais-br-canon"]
    violations: []

  - id: colisao-0178-sells-tabs
    query: "Como a tela Sells unificou Lista e Grade com tabs de Visão?"
    collision_number: "0178"
    must_resolve_slug: "0178-sells-unified-tabs-visao-supersede-0136"
    expected: ["0178-sells-unified-tabs-visao-supersede-0136"]
    violations: ["0136-sells-grade-avancada-modo-toggle"]

  - id: colisao-0235-accent-roxo
    query: "Qual é o accent de cor universal do design system v4?"
    collision_number: "0235"
    must_resolve_slug: "0235-ds-v4-accent-roxo-universal"
    expected: ["0235-ds-v4-accent-roxo-universal"]
    violations: []

  - id: colisao-0235-staging
    query: "Como funciona o ambiente de staging clone anonimizado da produção no CT 100?"
    collision_number: "0235"
    must_resolve_slug: "0235-staging-ct100-clone-anonimizado"
    expected: ["0235-staging-ct100-clone-anonimizado"]
    violations: []

  - id: colisao-0101-tests-business-id
    query: "Qual business_id os testes Pest devem usar?"
    collision_number: "0101"
    must_resolve_slug: "0101-tests-business-id-1-nunca-cliente"
    expected: ["0101-tests-business-id-1-nunca-cliente"]
    violations: []

  - id: colisao-0180-sidebar
    query: "Qual é o padrão canônico atual do sidebar (grupos e ghosts no header)?"
    collision_number: "0180"
    must_resolve_slug: "0180-sidebar-v3-5-grupos-ghosts-header"
    expected: ["0180-sidebar-v3-5-grupos-ghosts-header"]
    violations: ["0008-sidebar-unica-tabs-horizontais"]

  # ─── Vigente vs superseded (ADR 0270 D-4: o morto não volta no top-3) ───
  - id: runtime-broadcast
    query: "Qual runtime de websocket/broadcast roda em produção hoje?"
    expected: ["0058-reverb-substituido-por-centrifugo-frankenphp"]
