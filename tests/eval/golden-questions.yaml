# ─── Categoria: Larissa-style perguntas operacionais (Cycle 01 goal) ───
# Perguntas que Larissa (ROTA LIVRE biz=4) faria pro Copiloto. Valores
# devem ser preenchidos por Wagner com baseline real antes de rodar
# (substituir VALOR_REAL pelos números corretos via consulta ao DB prod).

- id: faturamento-mes-bruto
  category: larissa-faturamento
  question: "Quanto faturei em março de 2026?"
  must_contain:
    - "R$"
    - "março"
  must_not_contain:
    - "não tenho dados"
    - "sem informação"
  expected_source: "ContextoNegocio bruto"

