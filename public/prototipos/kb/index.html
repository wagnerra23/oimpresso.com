<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1280, initial-scale=1">
  <title>KB v2 — Preview Cowork (oimpresso)</title>

  <link rel="stylesheet" href="shell.css">
  <link rel="stylesheet" href="kb-page.css">

  <style>
    /* Wrapper standalone — só pra preview isolado do KB.
       Reproduz mínimo do shell Cowork sem sidebar/topbar (foco no módulo). */
    html, body { margin: 0; height: 100%; background: var(--bg); }
    body { font-family: var(--font-sans); color: var(--text); font-size: 13.5px; }
    .preview-shell {
      display: flex; flex-direction: column;
      height: 100vh; width: 100vw; overflow: hidden;
    }
    .preview-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 6px 14px; border-bottom: 1px solid var(--border);
      background: var(--bg-2); flex-shrink: 0; font-size: 12px;
    }
    .preview-bar b { font-weight: 600; }
    .preview-bar .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px;
      background: oklch(0.94 0.025 240); color: oklch(0.40 0.10 240);
      font-weight: 600; font-size: 11px;
    }
    .preview-bar .right { margin-left: auto; color: var(--text-dim); }
    .preview-bar a { color: var(--accent); text-decoration: none; }
    .preview-bar a:hover { text-decoration: underline; }
    #root { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }

    .boot {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--text-dim); font-size: 14px;
    }
    .boot small { display: block; margin-top: 6px; color: var(--text-mute); font-size: 11px; }

    .boot-err {
      max-width: 720px; margin: 40px auto; padding: 16px 20px;
      background: oklch(0.96 0.06 25); color: oklch(0.35 0.15 25);
      border: 1px solid oklch(0.85 0.08 25); border-radius: 8px;
      font-family: var(--font-mono); font-size: 12px; white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="preview-shell">
    <div class="preview-bar">
      <span class="pill">PREVIEW</span>
      <b>KB v2</b>
      <span>protótipo Cowork — mock, sem DB, sem business_id</span>
      <span class="right">
        bench self-score 9,40/10 ·
        <a href="Bench%20KB%20v2.html" target="_blank">ver bench</a> ·
        <a href="../../prototipo-ui/prototipos/kb/README.md" target="_blank">README</a>
      </span>
    </div>
    <div id="root">
      <div class="boot">
        carregando preview KB v2…
        <small>compilando 6 arquivos JSX via Babel standalone (~1s)</small>
      </div>
    </div>
  </div>

  <!-- React 18 + Babel (in-browser compile, idêntico ao Cowork) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script>
    // Mock window.claude.complete (Cowork fake — protótipo usa pra Resumir/Perguntar/Tag IA).
    // Em produção: roteia via Modules/Copiloto/Ai/ + laravel/ai SDK (ADR 0035).
    window.claude = {
      complete: async (prompt) => {
        await new Promise(r => setTimeout(r, 600));
        return [
          "**[Preview mock — sem IA real conectada]**",
          "",
          "Em produção este conteúdo vem do `Modules/Copiloto/Ai/` (ADR 0035, laravel/ai SDK).",
          "Aqui só retornamos placeholder pra demonstrar o fluxo da UI.",
          "",
          "Prompt recebido (primeiros 200 chars):",
          "`" + String(prompt || "").slice(0, 200) + "…`"
        ].join("\n");
      }
    };

    // Mostra erros de compile/runtime na tela em vez de fail silencioso.
    window.addEventListener("error", (e) => {
      const root = document.getElementById("root");
      if (!root) return;
      const box = document.createElement("div");
      box.className = "boot-err";
      box.textContent = "Erro carregando preview KB:\n" + (e.error?.stack || e.message || e);
      root.innerHTML = "";
      root.appendChild(box);
    });
  </script>

  <!-- Ordem de deps (cada JSX é IIFE que expõe window.X):
       1) kb-paths        → KB_SUBCATS, KB_PATHS, KBPathsDialog, KBCommentBlock
       2) kb-trouble-lib  → KB_TROUBLES, KBTroubleshooterDialog, KBPresenter, kbLinkifyText
       3) kb-trouble-editor → editor visual (depende KB_TROUBLES)
       4) kb-extras       → KBAIDialog, KBComposer, KBRelated
       5) kb-images-print → favoritos + imprimir
       6) kb-page         → KBPage (entry) -->
  <script type="text/babel" data-presets="react" src="kb-paths.jsx"></script>
  <script type="text/babel" data-presets="react" src="kb-trouble-lib.jsx"></script>
  <script type="text/babel" data-presets="react" src="kb-trouble-editor.jsx"></script>
  <script type="text/babel" data-presets="react" src="kb-extras.jsx"></script>
  <script type="text/babel" data-presets="react" src="kb-images-print.jsx"></script>
  <script type="text/babel" data-presets="react" src="kb-page.jsx"></script>

  <script type="text/babel" data-presets="react">
    // Mount — Babel processa este bloco DEPOIS dos 6 src= acima (ordem garantida pelo Babel standalone).
    (() => {
      const root = document.getElementById("root");
      if (!window.KBPage) {
        root.innerHTML = '<div class="boot-err">window.KBPage não definido. Algum dos JSX falhou de compilar — veja console.</div>';
        return;
      }
      root.innerHTML = "";
      const reactRoot = ReactDOM.createRoot(root);
      reactRoot.render(React.createElement(window.KBPage));
    })();
  </script>
</body>
</html>
