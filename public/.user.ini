; Herd/PHP-FPM lê este arquivo por documento root.
; Esconde ruído de deprecation do PHP 8.4 contra Laravel 9/pacotes antigos.
; Erros reais (E_ERROR, E_WARNING, E_PARSE) continuam aparecendo.

error_reporting = E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED & ~E_NOTICE
display_errors = On
display_startup_errors = Off
log_errors = On

; Permite upload razoável para AFD (padrão do PHP é 2M)
upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 512M
max_execution_time = 300
