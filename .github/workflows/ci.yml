name: CI

on:
  push:
    branches: [main, 6.7-react]
  pull_request:
  # FV-F1 (plano SDD 2026-06-12 semana 0): dispatch manual pra provar a coleta
  # JUnit sem depender de PR (artefato pest-ci-junit >0 bytes).
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP / Pest (Unit)
    runs-on: ubuntu-latest

    # NOTE: Suite UPos legacy boota providers que consultam system.crm_version
    # ANTES de migrate criar a tabela. Setup MySQL+migrate full em CI fica pra
    # PR separado. Por ora rodamos apenas tests offline-safe (sem boot DB).

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, intl, gd, pdo_mysql, zip, opentelemetry
          coverage: none
          tools: composer:v2

      - name: Validate composer.json + lock em sync (gate anti-drift)
        # Bloqueia PR onde composer.json foi editado sem regenerar composer.lock.
        # Drift causa "Required package X is not present in the lock file" em
        # `composer install`, quebrando deploy. Pra resolver, dispare o workflow
        # `composer-lock-sync` (workflow_dispatch) ou rode `composer update <pkgs>
        # --no-install` localmente e commit do lock.
        run: composer validate --strict --no-check-publish

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Prepare storage + bootstrap dirs
        run: mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache

      - name: Install PHP deps (sem scripts ate .env existir)
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: PHP syntax lint (app/ + Modules/)
        run: |
          set -e
          find app Modules -name '*.php' -not -path '*/vendor/*' -not -path '*/node_modules/*' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Prepare .env (sqlite, sem boot DB-heavy)
        run: |
          cat > .env <<'EOF'
          APP_NAME=oimpresso-ci
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          LOG_CHANNEL=stderr
          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          MAIL_MAILER=array
          BCRYPT_ROUNDS=4
          EOF
          php artisan key:generate
          php artisan package:discover --ansi

      - name: Run Pest (Form shim + FeatureFlagService offline-safe + UI Judge catraca)
        # ModuleUtil::isModuleInstalled e getModuleVersionInfo agora sao
        # graceful (try/catch) — boot da app funciona sem migrate completo.
        #
        # FeatureFlagServiceTest e DB-less (sem RefreshDatabase): so usa Http::fake
        # + Cache array, entao roda em sqlite :memory:. Damos cobertura a esse
        # contrato (fallback offline-safe) que antes ficava dormente — nenhum
        # workflow rodava tests/Feature/Services/.
        # NAO incluir o diretorio inteiro: GrowthBookAdminServiceTest usa
        # RefreshDatabase e esbarra na migration MySQL-only (ALTER TABLE
        # transactions MODIFY COLUMN type ENUM) — fica pra um setup MySQL em CI.
        #
        # PrUiJudgeAgentTest e DB-less (reflexao nos atributos + string do prompt):
        # trava provider/model do juiz de UI (canon openai/gpt-4o pos-migracao
        # OpenAI; ex "mentira do Sonnet", parecer PR #2270). Modules/Jana nao
        # esta no modules-pest.yml, entao ancoramos a
        # catraca aqui pra ela rodar de fato em todo PR.
        #
        # TaskCrudServiceCanonicalIdTest + McpTasksOrphansCommandTest (incidente
        # US-RB-052, 2026-06-20): bootstram um mcp_tasks minimo (sem RefreshDatabase,
        # logo sem a migration ENUM MySQL-only) e provam que tasks-create nao reusa
        # task_id de row orfa no DB. Antes ficavam dormentes — o alocador usava
        # SUBSTRING (MySQL-only) e nenhum workflow rodava Tests/Feature/TaskRegistry.
        # FV-F1: --log-junit adicionado SEM mudar o subset de testes acima.
        run: |
          mkdir -p test-results
          vendor/bin/pest tests/Feature/Form tests/Feature/Services/FeatureFlagServiceTest.php Modules/Jana/Tests/Feature/Ai/PrUiJudgeAgentTest.php Modules/Jana/Tests/Feature/Ai/UiJudgeRunMeasurementTest.php Modules/Jana/Tests/Feature/Mcp/WorkLeaseServiceTest.php Modules/Jana/Tests/Feature/TaskRegistry/TaskCrudServiceCanonicalIdTest.php Modules/Jana/Tests/Feature/TaskRegistry/McpTasksOrphansCommandTest.php --no-coverage --log-junit test-results/junit.xml

      # FV-F1 (plano SDD 2026-06-12): coleta JUnit que SOBREVIVE a falha de teste.
      # A tentativa anterior rendeu artefato 0 bytes porque nada validava o XML
      # antes do upload. Agora: sumário JSON por arquivo de teste com n_testcases
      # checado contra o declarado no <testsuite> raiz (exit!=0 se XML ausente,
      # 0 bytes ou incoerente) + upload com if: always() e if-no-files-found: error.
      - name: Sumario JUnit por arquivo (junit-summary.mjs)
        if: always()
        run: node scripts/tests/junit-summary.mjs test-results/junit.xml --out test-results/junit-summary.json

      - name: Upload JUnit + sumario (sempre — a falha E o dado)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pest-ci-junit
          path: |
            test-results/junit.xml
            test-results/junit-summary.json
          retention-days: 14
          if-no-files-found: error

  frontend:
    name: Frontend / Vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS deps
        run: npm ci

      - name: Build production bundle (Inertia/React pipeline)
        run: npm run build:inertia
