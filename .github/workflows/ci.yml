name: CI

on:
  push:
    branches: [main, 6.7-react]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP / Pest (Unit)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: oimpresso_ci
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, intl, gd, pdo_mysql, zip
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Prepare storage + bootstrap dirs
        run: mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache

      - name: Install PHP deps (sem scripts ate .env existir)
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: PHP syntax lint (app/ + Modules/)
        run: |
          set -e
          find app Modules -name '*.php' -not -path '*/vendor/*' -not -path '*/node_modules/*' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Prepare .env (CI com MySQL)
        run: |
          cat > .env <<'EOF'
          APP_NAME=oimpresso-ci
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          LOG_CHANNEL=stderr
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=oimpresso_ci
          DB_USERNAME=root
          DB_PASSWORD=root
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          MAIL_MAILER=array
          BCRYPT_ROUNDS=4
          EOF

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -P 3306 -u root -proot --silent && break
            echo "MySQL not ready, waiting..."
            sleep 2
          done

      - name: APP_KEY + migrate (core + modules) ANTES de package:discover
        run: |
          php artisan key:generate
          php artisan migrate --force
          php artisan module:migrate --force || true
          php artisan package:discover --ansi

      - name: Run Pest (full suite Financeiro + Form)
        run: vendor/bin/pest tests/Feature/Modules/Financeiro/ tests/Feature/Form --no-coverage

  frontend:
    name: Frontend / Vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS deps
        run: npm ci

      - name: Build production bundle (Inertia/React pipeline)
        run: npm run build:inertia
