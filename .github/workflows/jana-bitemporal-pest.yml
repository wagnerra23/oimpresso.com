name: Jana bi-temporal Pest (T4)

# ADR 0295 — verifica a LOGICA pura do event-time no CI (sem DB):
#   - slice 1: predicado BiTemporalResolver (BiTemporalResolverTest)
#   - slice 3: DECISAO de supersede SupersedeDetector::decidir (SupersedeDetectorTest,
#     mocka o LLM — threshold, guard multi-tenant id∈candidatos, FAILSAFE)
# Escopo ESTREITO: roda SO esses 2 arquivos (pura-logica), NAO o modulo Jana inteiro
# nem o dir Unit todo — Jana so tem allowlist MySQL (jana-pest.yml) e jogar tudo
# exporia debito alheio a este PR. A consolidacao no banco (event-time + supersedes_id)
# e MySQL-only e roda na lane jana-pest.yml (SupersedeConsolidacaoTest). Extensoes
# casam com modules-pest.yml (composer.lock exige opentelemetry/gd/pdo_mysql).

on:
  pull_request:
    branches: [main]
    paths:
      - 'Modules/Jana/Services/Memoria/BiTemporalResolver.php'
      - 'Modules/Jana/Services/Memoria/SupersedeDetector.php'
      - 'Modules/Jana/Ai/Agents/DetectarSupersedeAgent.php'
      - 'Modules/Jana/Tests/Unit/BiTemporalResolverTest.php'
      - 'Modules/Jana/Tests/Unit/SupersedeDetectorTest.php'
      - 'Modules/Jana/Config/memoria.php'
      - 'Modules/Jana/Database/Migrations/*_add_event_time_to_jana_memoria_facts.php'
      - '.github/workflows/jana-bitemporal-pest.yml'
  workflow_dispatch:

concurrency:
  group: jana-bitemporal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pest:
    name: Pest event-time (logica pura · predicado + supersede)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, dom, fileinfo, intl, json, mbstring, openssl, pdo, pdo_sqlite, pdo_mysql, tokenizer, xml, zip, gd, opentelemetry
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Prepare dirs
        run: mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache

      - name: Install PHP deps
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Create .env
        run: |
          printf '%s\n' \
            'APP_NAME=oimpresso-ci' \
            'APP_ENV=testing' \
            'APP_DEBUG=true' \
            'APP_URL=http://localhost' \
            'LOG_CHANNEL=stderr' \
            'DB_CONNECTION=sqlite' \
            'DB_DATABASE=:memory:' \
            'CACHE_DRIVER=array' \
            'QUEUE_CONNECTION=sync' \
            'SESSION_DRIVER=array' \
            'MAIL_MAILER=array' \
            'BCRYPT_ROUNDS=4' \
            'TELESCOPE_ENABLED=false' \
            'SCOUT_DRIVER=null' \
            'MCP_TOOLS_EXPOSED=false' > .env
          php artisan key:generate
          php artisan package:discover --ansi

      - name: Run Pest (event-time logica pura)
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_DRIVER: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: |
          vendor/bin/pest \
            Modules/Jana/Tests/Unit/BiTemporalResolverTest.php \
            Modules/Jana/Tests/Unit/SupersedeDetectorTest.php \
            --no-coverage \
            --colors=always
