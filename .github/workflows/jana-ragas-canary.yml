name: Jana RAGAS Canary (daily 06:00 UTC)

# US-COPI-116 — Canary diário RAGAS Jana detectando drift fora-de-PR.
#
# Diferença vs workflows RAGAS existentes:
#   - jana-ragas-gate.yml (W28-2) — PR-triggered + weekly Mon cron, BLOQUEANTE só threshold absoluto
#   - ragas-gate.yml (W22 MVP)   — workflow_dispatch + weekly cron, ALERTA (não bloqueia)
#   - jana-ragas-canary.yml (US-116) — DAILY cron 06:00 UTC, detecta REGRESSÃO RELATIVA
#                                       vs governance/jana-ragas-baseline.json (>5% drift = fail)
#
# Estado-da-arte 2026 (Premai blog / DataVLab / Kalibra Mar/2026):
#   "Quality gates should be set at your baseline plus a small improvement target,
#    rather than jumping directly to recommended thresholds. Start lower, establish
#    baselines, then tighten thresholds iteratively."
#
# Reutiliza `php artisan jana:ragas-ci-eval --json` (sem reinventar — SoC brutal §5
# Constituição v2). Python runner scripts/jana-ragas-runner.py é adapter fino que:
#   1. Chama o artisan command (PHP é fonte da verdade)
#   2. Lê baseline JSON
#   3. Calcula delta percentual por métrica
#   4. Falha se ANY métrica regrediu > REGRESSION_THRESHOLD_PCT
#
# Custo prod (re-derivado 2026-06-12: golden set 51 perguntas × 2 judge calls × $0.0004):
#   - Sem secret OPENAI_API_KEY no repo: TODO run cai em mock = $0 (warning claro no summary)
#   - Com secret: cron diário roda REAL ~$0.04/run × 30 dias = ~$1.22/mês (≤$1.80 conservador)
#
# SDD F1 KL-D1 (2026-06-12) — saída do mock-teatro:
#   Antes, RAGAS_FORCE_MOCK=true era hardcoded no .env e JanaRagasCiCommand faz
#   `$forceMock = $mode === 'mock' || env('RAGAS_FORCE_MOCK')` — dispatch com mode=real
#   rodava MOCK silenciosamente. Agora o step `mode` resolve o modo EFETIVO:
#   real só quando solicitado (input dispatch OU cron) E secret OPENAI_API_KEY existe.
#   Sem secret → fallback mock + warning (nunca quebra). Cron SOLICITA real — vira real
#   automaticamente quando Wagner adicionar o secret (1 clique, Settings → Secrets).
#   Summary mostra em destaque qual modo RODOU (anti-teatro).
#
# Workflow_dispatch input `update_baseline: true` regrava baseline com run atual
# (Wagner usa pra estabelecer baseline inicial + recalibrar após improvements aprovados).

on:
  schedule:
    # 06:00 UTC = 03:00 BRT — antes do brief:generate daily (06:00 BRT).
    # Não conflita com jana-ragas-gate weekly Mon 08:00 UTC nem ragas-gate Mon 09:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'mock (zero $) | real (consome LLM ~$0.06)'
        required: false
        default: 'mock'
        type: choice
        options:
          - mock
          - real
      update_baseline:
        description: 'Sobrescreve governance/jana-ragas-baseline.json com scores deste run (Wagner: use após calibrar)'
        required: false
        default: false
        type: boolean
      regression_threshold_pct:
        description: 'Tolerância de regressão por métrica (default 5.0 = 5%)'
        required: false
        default: '5.0'

concurrency:
  group: jana-ragas-canary-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # Pra commit baseline atualizado (workflow_dispatch)
  issues: write     # Pra abrir issue auto-alert em fail
  pull-requests: write   # Pra auto-PR do baseline (branch protection exige PR — não push direto)

jobs:
  ragas-canary:
    name: Jana RAGAS Canary (diff vs baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # KL-D1 anti-teatro — resolve o modo EFETIVO antes de tudo:
      #   workflow_dispatch → input `mode` (default mock)
      #   schedule (cron)   → SOLICITA real; sem secret OPENAI_API_KEY cai em mock
      #                       (= continua mock até Wagner adicionar o secret, 1 clique)
      # real sem secret NUNCA roda (judge devolveria 0.0 em tudo) → fallback mock + warning.
      - name: Resolve modo efetivo (mock|real)
        id: mode
        env:
          REQUESTED_MODE: ${{ github.event_name == 'schedule' && 'real' || github.event.inputs.mode || 'mock' }}
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          effective="${REQUESTED_MODE}"
          fallback=""
          if [ "${effective}" = "real" ] && [ "${HAS_OPENAI_KEY}" != "true" ]; then
            effective="mock"
            fallback="modo real solicitado, mas secret OPENAI_API_KEY ausente no repo — fallback pra MOCK (Settings → Secrets pra ligar; ~\$1.22/mês)"
            echo "::warning::RAGAS canary: ${fallback}"
          fi
          {
            echo "requested=${REQUESTED_MODE}"
            echo "effective=${effective}"
            echo "fallback=${fallback}"
          } >> "$GITHUB_OUTPUT"
          echo "Modo solicitado: ${REQUESTED_MODE} | efetivo: ${effective}"

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, dom, fileinfo, intl, json, mbstring, openssl, pdo, pdo_sqlite, tokenizer, xml, zip, opentelemetry
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Composer install
        run: composer install --no-progress --prefer-dist --no-interaction --no-scripts

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Stdlib-only runner — sem pip install (ver scripts/jana-ragas-runner.py header).
      # Nada de instalar `ragas` lib aqui: a métrica é calculada PHP-side via RagasJudgeService
      # (mock ou real OpenAI). Runner Python só lê JSON + compara baseline.

      - name: Prepare Laravel storage dirs
        run: mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs storage/app/ragas bootstrap/cache

      # RAGAS_FORCE_MOCK condicional ao modo efetivo (KL-D1) — hardcoded true era o
      # que tornava dispatch mode=real um teatro (JanaRagasCiCommand OR-eia com env).
      - name: Create .env (RAGAS_FORCE_MOCK condicional ao modo efetivo)
        env:
          EFFECTIVE_MODE: ${{ steps.mode.outputs.effective }}
        run: |
          force_mock=true
          if [ "${EFFECTIVE_MODE}" = "real" ]; then force_mock=false; fi
          printf '%s\n' \
            'APP_NAME=oimpresso-jana-canary' \
            'APP_ENV=testing' \
            'APP_DEBUG=false' \
            'APP_URL=http://localhost' \
            'LOG_CHANNEL=stderr' \
            'DB_CONNECTION=sqlite' \
            'DB_DATABASE=:memory:' \
            'CACHE_DRIVER=array' \
            'QUEUE_CONNECTION=sync' \
            'SESSION_DRIVER=array' \
            'MAIL_MAILER=array' \
            'BCRYPT_ROUNDS=4' \
            'TELESCOPE_ENABLED=false' \
            'SCOUT_DRIVER=null' \
            'MCP_TOOLS_EXPOSED=false' \
            'RAGAS_ENABLED=true' \
            "RAGAS_FORCE_MOCK=${force_mock}" > .env
          php artisan key:generate
          php artisan package:discover --ansi

      - name: Run canary (PHP eval + Python diff vs baseline)
        id: canary
        env:
          RAGAS_MODE: ${{ steps.mode.outputs.effective }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REGRESSION_THRESHOLD_PCT: ${{ github.event.inputs.regression_threshold_pct || '5.0' }}
        run: |
          set -o pipefail
          python3 scripts/jana-ragas-runner.py \
            --mode="${RAGAS_MODE}" \
            --baseline=governance/jana-ragas-baseline.json \
            --threshold-pct="${REGRESSION_THRESHOLD_PCT}" \
            --output=canary-result.json
          # Echo do resultado pra logs
          cat canary-result.json

      - name: Render GITHUB_STEP_SUMMARY
        if: always()
        env:
          REQUESTED_MODE: ${{ steps.mode.outputs.requested }}
          MODE_FALLBACK: ${{ steps.mode.outputs.fallback }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib
          out = pathlib.Path('canary-result.json')
          if not out.exists():
              print('canary-result.json ausente — runner falhou antes de gerar output')
              raise SystemExit(0)
          r = json.loads(out.read_text())
          gate = 'PASS' if r.get('gate_status') == 'pass' else 'FAIL'
          icon = ':white_check_mark:' if gate == 'PASS' else ':x:'
          # Anti-teatro (KL-D1): banner usa o modo que RODOU de fato (report PHP),
          # não o que o workflow pediu — impossível confundir mock com real.
          ran_mode = r.get('mode', 'unknown')
          requested = os.environ.get('REQUESTED_MODE', '?')
          fallback = os.environ.get('MODE_FALLBACK', '')
          if ran_mode == 'real':
              banner = f"# :money_with_wings: MODO: REAL — LLM judge consumido (custo ${r.get('cost_usd', 0)})"
          else:
              banner = f"# :performing_arts: MODO: MOCK — scores fixos, zero LLM (NÃO é avaliação real)"
          lines = [
              banner,
              "",
              f"Solicitado: `{requested}` · Rodou: `{ran_mode}`",
          ]
          if fallback:
              lines += ["", f"> :warning: {fallback}"]
          lines += [
              "",
              f"## {icon} Jana RAGAS Canary — {gate}",
              "",
              f"- Threshold regressão: `{r.get('regression_threshold_pct')}%`",
              f"- Perguntas avaliadas: `{r.get('n_questions')}` (baseline: `{r.get('baseline_n_questions', 'N/A')}`)",
              "",
              "| Métrica | Atual | Baseline | Delta % | Status |",
              "|---|---|---|---|---|",
          ]
          for m in r.get('metrics_diff', []):
              lines.append(
                  f"| {m['metric']} | {m['current']:.4f} | {m['baseline']:.4f} "
                  f"| {m['delta_pct']:+.2f}% | {':white_check_mark:' if m['status']=='ok' else ':rotating_light:'} |"
              )
          if r.get('regressions'):
              lines.append("")
              lines.append(f"### :rotating_light: Regressões detectadas ({len(r['regressions'])})")
              for reg in r['regressions']:
                  lines.append(f"- `{reg['metric']}`: {reg['delta_pct']:+.2f}% (limite -{r['regression_threshold_pct']}%)")
          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              pathlib.Path(summary).write_text('\n'.join(lines), encoding='utf-8')
          print('\n'.join(lines))
          PY

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jana-ragas-canary-${{ github.run_id }}
          path: |
            canary-result.json
            ragas-eval.json
          retention-days: 90

      - name: Update baseline (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_baseline == 'true' && steps.canary.outcome == 'success'
        env:
          # Sem isto, re-run em modo real judgaria 0.0 e gravaria baseline zerada
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Regrava o baseline com os scores deste run (Wagner aprovou via dispatch flag).
          # NÃO faz git ops — o commit vai via auto-PR abaixo (branch protection exige PR).
          python3 scripts/jana-ragas-runner.py \
            --mode="${{ steps.mode.outputs.effective }}" \
            --baseline=governance/jana-ragas-baseline.json \
            --threshold-pct="${{ github.event.inputs.regression_threshold_pct || '5.0' }}" \
            --output=canary-result.json \
            --update-baseline

      # Auto-PR (NÃO push direto): main exige PR + required checks desde 2026-06-11
      # (enforce_admins:true). O `git push` direto era rejeitado (GH013). Padrão
      # copiado de sdd-scorecard-publish.yml (#3442) / shipped-log-cron.yml.
      - name: Abre auto-PR com o baseline RAGAS atualizado
        id: cpr
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.update_baseline == 'true' && steps.canary.outcome == 'success'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.COWORK_BOT_PAT }}
          base: main
          branch: chore/ragas-baseline
          add-paths: governance/jana-ragas-baseline.json
          commit-message: |
            chore(ragas): atualiza baseline do canary via workflow_dispatch (run ${{ github.run_id }})

            Baseline RAGAS medido em modo real (secret OPENAI_API_KEY presente) — tira o gate
            da tautologia (baseline 0.0 -> scores reais >0). Substitui o `git push` direto
            (rejeitado por branch protection desde ~24/jun — GH013) pelo padrão auto-PR.

            Refs: roadmap SDD P12-D
            Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>
          title: 'chore(ragas): atualiza baseline RAGAS (run ${{ github.run_id }})'
          body: |
            **Atualização automática do baseline RAGAS** (P12-D · decay-real).

            O canary rodou em modo **real** (secret presente) e computou os scores; este PR
            traz o baseline pro `main` (repo = SSOT). Mata a tautologia `baseline=0 -> nunca alerta`.

            Substitui o `git push` direto (rejeitado por branch protection — GH013) pelo padrão
            auto-PR de `sdd-scorecard-publish.yml` (#3442). Auto-merge habilitado.

            🤖 Generated by Jana RAGAS Canary
          labels: |
            governance
            automated
          delete-branch: true

      - name: Auto-merge no PR do baseline
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.COWORK_BOT_PAT }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --auto --delete-branch

      - name: Auto-open issue on regression (scheduled only)
        if: github.event_name == 'schedule' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = {};
            try { report = JSON.parse(fs.readFileSync('canary-result.json', 'utf8')); } catch (e) { report = {error: String(e)}; }
            const regressions = (report.regressions || []).map(r =>
              `- \`${r.metric}\`: ${r.delta_pct.toFixed(2)}% (atual ${r.current.toFixed(4)} / baseline ${r.baseline.toFixed(4)})`
            ).join('\n') || 'N/A';
            const title = `:rotating_light: RAGAS canary regrediu > ${report.regression_threshold_pct || 5}% (${new Date().toISOString().slice(0,10)})`;
            const body = [
              `Workflow run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `Modo: \`${report.mode || 'unknown'}\` · Threshold: \`${report.regression_threshold_pct || 5}%\``,
              ``,
              `## Regressões`,
              regressions,
              ``,
              `## Próximos passos`,
              `1. Investigar últimas mudanças em \`Modules/Jana/\` e \`Modules/Copiloto/\` (RAG pipeline)`,
              `2. Rodar \`php artisan jana:ragas-ci-eval --mode=real\` local pra reproduzir`,
              `3. Se regressão é esperada (ex: trade-off aceito) → \`workflow_dispatch\` com \`update_baseline=true\``,
              `4. Se regressão é bug → rollback + reabrir story`,
              ``,
              `Ver RUNBOOK: \`memory/requisitos/Jana/RUNBOOK-ragas-canary.md\``,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ragas-regression', 'P0', 'jana']
            });
