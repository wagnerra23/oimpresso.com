name: PHPStan / Larastan (ADR 0208)

# Onda 1.1 do dossier prevenção bugs MWART 2026-05-28.
# Bloqueia PR que introduzir regressão PHPStan vs phpstan-baseline.neon.
#
# Pattern ratchet idêntico ao ui-lint.yml — falha só em delta > 0.
# Nível 5 inicial. Custom rules entram nas Ondas 2-3 (PRs futuros).
#
# Comando manual local: composer phpstan

on:
  push:
    branches: [main, 6.7-react]
    paths:
      - '**/*.php'
      - 'phpstan.neon.dist'
      - 'phpstan-baseline.neon'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/phpstan-gate.yml'
  pull_request:
    paths:
      - '**/*.php'
      - 'phpstan.neon.dist'
      - 'phpstan-baseline.neon'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/phpstan-gate.yml'

concurrency:
  group: phpstan-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpstan:
    name: PHPStan / Larastan · ratchet vs baseline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          # PHP-patch PINADO (não floating '8.4'): a inferência Larastan pode mudar
          # entre patches, e o phpstan-baseline.neon é gerado contra um patch exato.
          # Patch floating fazia o baseline drift silenciosamente quando a imagem do
          # runner atualizava o PHP. Manter SINCRONIZADO com phpstan-baseline-regen.yml
          # — ao bumpar aqui, rodar o regen e commitar o baseline novo no mesmo PR.
          php-version: '8.4.21'
          extensions: mbstring, xml, ctype, json, opentelemetry, pcntl, posix
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-phpstan-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-phpstan-${{ runner.os }}-

      # NÃO persistir o PHPStan result cache entre runs (determinismo — ADR 0208).
      #
      # Bug 2026-06-05 (PR #2287): o result cache restaurado via actions/cache servia
      # resultados de uma inferência Larastan ANTIGA (versão/PHP-patch diferente) que
      # casava com o phpstan-baseline.neon congelado. Quando o cache invalidava (bump de
      # PHP-patch na imagem do runner, mudança em composer.lock, ou perturbação ampla do
      # grafo de models — ex: novo Entity), o PHPStan rodava frio e a inferência ATUAL
      # produzia mensagens diferentes (tipos literais precisos vs `mixed`, identifiers
      # distintos) que o regex do baseline não casava → ~55 erros pré-existentes/baselined
      # "ressurgiam" como regressão nova em arquivos que o PR nem tocou.
      #
      # Sem cache persistido, TODA run é fria/determinística e sempre bate com o baseline
      # gerado frio (mesma inferência). Custo: análise full a cada PR (~minutos) — aceitável
      # pra um gate de correção. Regenerar baseline via workflow phpstan-baseline-regen.yml.
      #
      # Alternativa (mais rápida, mais peças): manter o cache mas (a) pinar PHP-patch exato,
      # (b) trocar restore-keys por chave exata incluindo a versão Larastan, pra nunca
      # restaurar cache cross-toolchain. Optamos pelo caminho à prova de balas.

      - name: Install PHP deps
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Prepare storage dirs + .env mínimo
        run: |
          mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
          cat > .env <<'EOF'
          APP_NAME=oimpresso-phpstan
          APP_ENV=testing
          APP_DEBUG=false
          APP_URL=http://localhost
          LOG_CHANNEL=stderr
          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          MAIL_MAILER=array
          TELESCOPE_ENABLED=false
          VIEW_COMPILED_PATH=storage/framework/views
          BCRYPT_ROUNDS=4
          APP_KEY=
          EOF
          php artisan key:generate --force

      - name: PHPStan analyse (falha só em regressão vs baseline)
        run: |
          vendor/bin/phpstan analyse \
            --memory-limit=1G \
            --error-format=github \
            --no-progress

      - name: Diagnóstico em caso de falha
        if: failure()
        run: |
          echo ""
          echo "❌ PHPStan detectou REGRESSÃO vs phpstan-baseline.neon"
          echo ""
          echo "Próximos passos:"
          echo "  1. Local: composer phpstan · vê quais arquivos regrediram"
          echo "  2. Refatorar PR pra eliminar typing issues novos"
          echo "  3. Se regressão intencional/aceita, atualizar baseline em commit separado:"
          echo "       vendor/bin/phpstan analyse --generate-baseline=phpstan-baseline.neon"
          echo "     (commit + justificativa no PR — vai aparecer no diff do .neon)"
          echo ""
          echo "Refs: ADR 0208 · memory/sessions/2026-05-28-arte-prevencao-bugs-mwart-larissa.md"
