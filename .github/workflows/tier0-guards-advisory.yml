name: Tier-0 guards

# US-GOV-019 — pluga 2 guards Tier-0 de segurança que existiam mas NÃO rodavam
# em nenhum workflow ("armados mas não plugados"):
#   - tests/Unit/Guards/WithoutGlobalScopesCommentGuardTest.php
#       varredura estática: toda `withoutGlobalScopes(` em produção exige
#       `// SUPERADMIN: <razão>` na mesma linha ou nas 3 anteriores (ADR 0093).
#   - tests/Unit/BusinessIdGuardTest.php
#       varredura estática Tier-0: nenhum test/fixture usa `business_id = 4`
#       (cliente RotaLivre) como default.
#
# ── ENFORCING (ADR 0261: gate novo nasce advisory → enforcing) ───────────────
# ARMADO 2026-06-30: PR #3438 zerou as 2 violações; CT 100 (oimpresso-staging) e o
# CI provaram `2 passed (4 assertions)`. O `continue-on-error: true` foi REMOVIDO —
# o job agora reporta FAILURE de verdade se qualquer guard violar (não mascara mais).
# O check entrou no governance/required-checks-baseline.json no MESMO lote; o flip
# pra required na branch protection é ação do Wagner (ADR 0275 §5 / R10).
# ⚠️ O nome do job ("...advisory...") é mantido LITERAL — é o context string já
# registrado no baseline; renomear quebraria o binding do required check.
#
# Guards são varredura estática + unit (Symfony Finder sobre o filesystem): NÃO
# precisam de MySQL/migrate. Por isso o setup mais leve disponível (sqlite :memory:),
# idêntico ao de multi-tenant-gate.yml.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tier0-guards-advisory-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guards:
    name: Tier-0 guards (WithoutGlobalScopes + BusinessId)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, opentelemetry
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-tier0guards-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-tier0guards-${{ runner.os }}-

      - name: Install PHP deps
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Prepare storage dirs + .env mínimo
        run: |
          mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
          cat > .env <<'EOF'
          APP_NAME=oimpresso-tier0-guards
          APP_ENV=testing
          APP_DEBUG=false
          APP_URL=http://localhost
          LOG_CHANNEL=stderr
          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          MAIL_MAILER=array
          EOF
          php artisan key:generate

      - name: Pest — Tier-0 guards
        run: |
          vendor/bin/pest \
            tests/Unit/Guards/WithoutGlobalScopesCommentGuardTest.php \
            tests/Unit/BusinessIdGuardTest.php \
            --no-coverage \
            --colors=always
