name: Debug Financeiro Counts (one-shot)

on:
  workflow_dispatch:
    inputs:
      biz_id:
        description: 'business_id alvo'
        required: true
        default: '1'
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: SSH helper
        run: |
          cat > /tmp/ssh_exec.sh <<'EOF'
          #!/bin/bash
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }} \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "$@"
          EOF
          chmod +x /tmp/ssh_exec.sh

      - name: Run debug query
        run: |
          /tmp/ssh_exec.sh "cd /home/u906587222/domains/oimpresso.com/public_html && cat <<'PHPEOF' | php artisan tinker
          \$bid = ${{ inputs.biz_id }};
          \$titulos = \DB::table('fin_titulos')->where('business_id', \$bid)->whereNull('deleted_at')->count();
          \$titulosDemo = \DB::table('fin_titulos')->where('business_id', \$bid)->whereNull('deleted_at')->where('observacoes', 'LIKE', 'SEEDER_DEMO%')->count();
          \$baixas = \DB::table('fin_titulo_baixas')->where('business_id', \$bid)->whereNull('deleted_at')->count();
          \$baixasDemo = \DB::table('fin_titulo_baixas')->where('business_id', \$bid)->whereNull('deleted_at')->where('observacoes', 'LIKE', 'SEEDER_DEMO%')->count();
          \$baixas30d = \DB::table('fin_titulo_baixas')->where('business_id', \$bid)->whereNull('deleted_at')->whereNull('estorno_de_id')->where('data_baixa', '>=', now()->subDays(30)->toDateString())->count();
          \$contas = \DB::table('fin_contas_bancarias')->where('business_id', \$bid)->whereNull('deleted_at')->count();
          \$saldoSum = \DB::table('fin_contas_bancarias')->where('business_id', \$bid)->whereNull('deleted_at')->sum('saldo_cached');
          echo 'TITULOS_TOTAL=' . \$titulos . PHP_EOL;
          echo 'TITULOS_DEMO=' . \$titulosDemo . PHP_EOL;
          echo 'BAIXAS_TOTAL=' . \$baixas . PHP_EOL;
          echo 'BAIXAS_DEMO=' . \$baixasDemo . PHP_EOL;
          echo 'BAIXAS_ULTIMOS_30D=' . \$baixas30d . PHP_EOL;
          echo 'CONTAS_BANCARIAS_COUNT=' . \$contas . PHP_EOL;
          echo 'SALDO_CACHED_SUM=' . \$saldoSum . PHP_EOL;
          PHPEOF
          "
