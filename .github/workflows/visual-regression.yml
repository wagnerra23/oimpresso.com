name: Visual Regression (Pest 4 Browser)

# ADR 0108 — Camada Tier 2 de validação visual.
# Roda Pest browser snapshot tests em PRs que tocam Pages Inertia.
# Falha se diff > 0.1% sem update-snapshots aprovado.

on:
  pull_request:
    paths:
      - 'resources/js/Pages/**/*.tsx'
      - 'resources/js/Layouts/**/*.tsx'
      - 'resources/js/Components/**/*.tsx'
      - 'tests/Browser/**/*.php'
      - '.github/workflows/visual-regression.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, pdo_sqlite, gd
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --no-scripts

      - name: Install NPM dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Setup Laravel
        # .env.testing/.env.example não existem no repo — gera inline (mesmo
        # padrão do ci.yml). DB sqlite file path real (Pest Browser HTTP precisa).
        # TELESCOPE_ENABLED=false: terminate hook tenta count() em telescope_entries
        # que não existe em sqlite zero — quebra package:discover/migrate.
        # Cria sqlite file ANTES de qualquer artisan command.
        run: |
          touch database/database.sqlite
          cat > .env <<'EOF'
          APP_NAME=oimpresso-visreg
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          LOG_CHANNEL=stderr
          DB_CONNECTION=sqlite
          DB_DATABASE=database/database.sqlite
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          MAIL_MAILER=array
          BCRYPT_ROUNDS=4
          TELESCOPE_ENABLED=false
          EOF
          php artisan key:generate --force
          php artisan package:discover --ansi
          php artisan migrate --force --database=sqlite

      - name: Build Inertia bundles
        run: npm run build:inertia

      - name: Run Pest Browser tests
        id: pest-browser
        run: |
          if [ -d tests/Browser ]; then
            ./vendor/bin/pest tests/Browser/ --parallel || echo "fail=1" >> "$GITHUB_OUTPUT"
          else
            echo "Sem tests/Browser/ — skipped"
          fi

      - name: Upload screenshots on failure
        if: failure() || steps.pest-browser.outputs.fail == '1'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-diff
          path: tests/Browser/Screenshots/
          retention-days: 7

      - name: Comment on PR if regression detected
        if: failure() || steps.pest-browser.outputs.fail == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## 📸 Visual Regression Detected',
              '',
              'Screenshots têm diff > threshold contra baseline.',
              '',
              '### Como resolver',
              '1. Baixar artifact `screenshots-diff` deste workflow run',
              '2. Comparar `actual.png` vs `expected.png` lado-a-lado',
              '3. Se mudança intencional (refator visual aprovado em F1.5):',
              '   ```bash',
              '   ./vendor/bin/pest tests/Browser/ --update-snapshots',
              '   git add tests/Browser/Screenshots/ && git commit',
              '   ```',
              '4. Se regressão não-intencional: revisar mudanças de código',
              '',
              '### Override',
              'Comentar `/mwart-override <razão>` se mudança visual é intencional mas baseline não foi atualizada.',
              '',
              '_Ver [ADR 0108](../../memory/decisions/0108-regressao-visual-pest-browser-tier-2.md)._'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
