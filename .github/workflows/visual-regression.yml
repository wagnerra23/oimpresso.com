name: Visual Regression (Pest 4 Browser)

# ADR 0108 — Camada Tier 2 de validação visual.
# Roda Pest browser snapshot tests em PRs cujo diff pode alterar o render.
# O double-threshold separa ruído, zona cinza revisável e regressão clara.
#
# REQUIRED-READINESS (2026-06-11, aprovação Wagner — padrão ADR 0271 onda 2 item 4,
# idêntico ao financeiro-pest.yml): `pull_request` SEM paths (always-run) pra ser
# promovível a required sem deadlock "Expected — waiting". O custo (PHP + composer +
# playwright + migrate + Pest ~10min) é evitado por skip-as-pass interno: o classificador
# `ui-impact.mjs` detecta se algo visual mudou; se não, pula o pesado e conclui
# verde (~1-2min, só checkout + boot do service).

on:
  pull_request:
    branches: [main]
  # MODO UPDATE (2026-07-07, ADR UI-0020 §4): dispatch manual re-gera as baselines
  # NO MESMO runner que sempre as gerou (rendering determinístico) e abre PR com os
  # .snap novos — o gate do PR re-roda e PROVA que a baseline nova bate (anti-#3297).
  # Uso: mudança de Fundação aprovada [W] (ex.: retune dark warm). Desde 2026-07-10 um PR
  # que toca `resources/css/tokens/**` RODA o gate pesado (não é mais skip-as-pass — ver o
  # classificador abaixo): a baseline antiga falha e prova a mudança visual. O dispatch serve
  # pra REGENERAR as baselines no runner canônico quando a mudança é intencional/aprovada.
  workflow_dispatch:

permissions:
  # O modo update autentica push/PR exclusivamente com COWORK_BOT_PAT. O GITHUB_TOKEN
  # do job não precisa escrever no repositório em nenhum evento.
  contents: read
  pull-requests: write

concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: oimpresso_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 100

      # Gate L2 — lint charter `states:` ⇄ manifesto (cheap, node pre-instalado no runner).
      # Roda SEMPRE (antes do classificador de UI): drift charter↔manifesto precisa falhar
      # mesmo em PR documental. --selftest prova o comparador
      # (L-31, dois lados) antes do lint real.
      # PROMOVIDO A ENFORCING (2026-07-06, ADR 0271/0275 "promover = remover o continue-on-error"):
      # verde em todos os runs desde a criação (0 fail em 30+), critério "2 verdes" cumprido com
      # folga. Sem clique de branch protection — o check `visual-regression` já é required; remover
      # o continue-on-error só para de mascarar a falha. Drift charter↔JSON agora BLOQUEIA merge.
      - name: Lint L2 — charter states ⇄ manifesto
        run: |
          node scripts/visreg-states-lint.mjs --selftest
          node scripts/visreg-states-lint.mjs
          node scripts/visreg-flows-lint.mjs --selftest
          node scripts/visreg-flows-lint.mjs
          node scripts/visreg-sells-lint.mjs --selftest
          node scripts/visreg-sells-lint.mjs
          node scripts/governance/ui-impact.mjs --selftest

      # Fonte única do skip-as-pass. Diferente da antiga allowlist duplicada, cobre
      # CSS global, assets/fontes, Blade, toolchain e Controllers/rotas Inertia.
      # Falha fechado se não conseguir ler o diff (anti-verde-vazio).
      - name: Classificar impacto visual do diff
        id: impact
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --no-tags --depth=100 origin "$BASE_SHA"
          node scripts/governance/ui-impact.mjs --base="$BASE_SHA" --head=HEAD --github-output="$GITHUB_OUTPUT"

      # Fonte única do "roda o pesado?": dispatch = sempre true (modo update);
      # pull_request = decisão estruturada do ui-impact.mjs.
      - name: Modo de execução (ui efetivo)
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ui=true" >> "$GITHUB_OUTPUT"
          else
            echo "ui=${{ steps.impact.outputs.visual_required }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip-as-pass (nada de UI mudou)
        if: steps.mode.outputs.ui == 'false'
        run: echo "✅ Sem mudanças de UI/Browser tests — skip-as-pass (required-ready, padrão ADR 0271 onda 2)."

      - name: Setup PHP
        if: steps.mode.outputs.ui == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          # SEM `opentelemetry`: a auto-instrumentação opentelemetry-auto-laravel
          # (QueryWatcher) acessa contexto OTel não-inicializado DENTRO do fiber do
          # servidor do Pest Browser → ErrorException fatal em toda query DB das telas
          # autenticadas (Fase B). O gate visual não precisa de telemetria.
          extensions: mbstring, dom, fileinfo, pdo_mysql, gd
          coverage: none

      - name: Wait for MySQL ready
        if: steps.mode.outputs.ui == 'true'
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -uroot -proot --silent; then
              echo "MySQL ready"
              break
            fi
            echo "Waiting MySQL... $i"
            sleep 2
          done

      - name: Setup Node
        if: steps.mode.outputs.ui == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0

      - name: Cache Composer
        if: steps.mode.outputs.ui == 'true'
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Cache Playwright browsers
        if: steps.mode.outputs.ui == 'true'
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ubuntu-24.04-${{ runner.arch }}-playwright-all-browsers-v1-${{ hashFiles('**/package-lock.json') }}

      - name: Install Composer dependencies
        if: steps.mode.outputs.ui == 'true'
        # --ignore-platform-req=ext-opentelemetry: o pacote opentelemetry-auto-laravel
        # exige a ext no platform check, mas removemos a ext de propósito (ver Setup PHP).
        # O pacote degrada gracioso sem a ext (hooks não registram).
        run: composer install --no-progress --no-interaction --prefer-dist --no-scripts --ignore-platform-req=ext-opentelemetry

      - name: Install NPM dependencies
        if: steps.mode.outputs.ui == 'true'
        run: npm ci

      - name: Verify Playwright npm client from lockfile
        if: steps.mode.outputs.ui == 'true'
        # @playwright/test é devDependency e o lock materializa `playwright` na raiz.
        # Proíbe `npm install --no-save`, que consultava o registry e podia trocar a
        # versão depois do npm ci sem alterar o diff revisado.
        run: |
          node -e "const fs=require('fs'); const lock=require('./package-lock.json'); const expected=lock.packages['node_modules/playwright']?.version; const actual=JSON.parse(fs.readFileSync('./node_modules/playwright/package.json','utf8')).version; if (!expected || actual !== expected) throw new Error('Playwright fora do lock: '+actual+' != '+expected); console.log('Playwright lockado:', actual)"

      - name: Install Playwright system dependencies
        if: steps.mode.outputs.ui == 'true'
        run: npx playwright install-deps chromium firefox webkit

      - name: Install Playwright browsers
        if: steps.mode.outputs.ui == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium firefox webkit

      - name: Setup Laravel
        if: steps.mode.outputs.ui == 'true'
        # SCHEMA-SQUASH MODE (US-GOV-013, supersede INFRA-ONLY): `migrate` carrega
        # `database/schema/mysql-schema.sql` (squash do staging saudável, anonimizado)
        # ANTES de replayar — bypassa a podridão histórica de fresh-migrate (view×table
        # copiloto_metas, FK INT×BIGINT nfse etc) que quebrava o setup. Só migrations
        # NOVAS (pós-staging) rodam por cima. `continue-on-error` REMOVIDO — agora o
        # migrate tem que passar de verdade (gate real). Regenerar schema: RUNBOOK US-GOV-013.
        run: |
          mkdir -p storage/framework/{cache,views,sessions,testing} bootstrap/cache
          cat > .env <<'EOF'
          APP_NAME=oimpresso-visreg
          APP_KEY=
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          LOG_CHANNEL=stderr
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=oimpresso_test
          DB_USERNAME=root
          DB_PASSWORD=root
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=file
          MAIL_MAILER=array
          BCRYPT_ROUNDS=4
          TELESCOPE_ENABLED=false
          VIEW_COMPILED_PATH=storage/framework/views
          # MWART_CLIENTE_INDEX=true: sem o flag, /cliente cai no Blade legacy e dá 500
          # (provado por screenshot do artifact #2320) → fica fora do gate. Com o flag,
          # renderiza a Page Inertia canônica de Clientes — que é o que o gate deve proteger.
          MWART_CLIENTE_INDEX=true
          EOF
          php artisan key:generate --force
          php artisan package:discover --ansi
          php artisan migrate --force
          echo "=== schema-squash check: tabelas criadas ==="
          php artisan tinker --execute="echo count(DB::select('show tables')).' tabelas';"

      - name: Seed demo tenant (business + admin + role Admin#1)
        if: steps.mode.outputs.ui == 'true'
        # O schema-squash é schema-only (sem dados) → as telas autenticadas (Fase B)
        # precisam de um business + admin seedados.
        #
        # 2026-06-06: o DummyBusinessSeeder (demo UltimatePOS de 2018) estava PODRE contra
        # o schema atual (inseria contacts.first_name, coluna removida → "Unknown column")
        # → sem business → AuthBridgeSmokeTest skipava. Trocado pelo VisregTenantSeeder
        # MINIMAL (business 1 + location + admin id=1 + role spatie Admin#1), idempotente e
        # alinhado ao schema. Sem `|| echo` que mascarava: agora o seed é GATE REAL — se
        # quebrar, o job falha. Vide database/seeders/VisregTenantSeeder.php.
        run: |
          php artisan db:seed --force
          php artisan db:seed --class=Database\\Seeders\\VisregTenantSeeder --force
          # Título determinístico semeado ANTES do servidor Browser subir. Os fluxos
          # Financeiro precisam de linha aberta para drawer, baixa e lote.
          php artisan db:seed --class=Database\\Seeders\\VisregFinanceiroFlowSeeder --force
          # TENANT-B SENTINELA (gate L3 Tier 0 — Tier0RenderIsolationTest): business 99 +
          # admin id=99 + dado com token ZZLEAK99 nos campos visíveis. Sem este segundo
          # tenant é IMPOSSÍVEL provar não-vazamento no render (o VisregTenantSeeder é
          # mono-tenant). GATE REAL — se quebrar, o job falha. Vide VisregTenantBLeakSeeder.php.
          php artisan db:seed --class=Database\\Seeders\\VisregTenantBLeakSeeder --force
          # TENANT-VAZIO (gate L2 estado `empty`): business 98 + admin id=98, scaffold-only
          # (zero dado de dominio) → as telas-lista renderizam o empty-state REAL e estavel.
          # GATE REAL — se quebrar, o job falha. Vide VisregEmptyTenantSeeder.php.
          php artisan db:seed --class=Database\\Seeders\\VisregEmptyTenantSeeder --force
          echo "=== seed check ==="
          php artisan tinker --execute="echo 'business='.\App\Business::count().' users='.\App\User::count().' roles='.\Spatie\Permission\Models\Role::count().' fin_titulos='.DB::table('fin_titulos')->where('business_id', 1)->count();"

      - name: Build Inertia bundles
        if: steps.mode.outputs.ui == 'true'
        run: npm run build:inertia

      - name: Run Pest Browser tests
        if: steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        id: pest-browser
        # GATE REAL — Fase A (públicas) + INÍCIO da Fase B (autenticadas).
        # 2026-06-06: destravado o auth cross-process via rota /_visreg-login/{id}?to=
        # (routes/web.php, env-guarded) + SESSION_DRIVER=file (persiste cross-request).
        # AuthBridgeSmokeTest cobre Financeiro/Unificado + Sells/Lista (autenticadas) —
        # prova de conceito do harness. Amplia pro CoreScreens-6 inteiro depois que estas
        # 2 passarem verde no CI (cada tela pode precisar ajuste de slug-permissão/seed).
        #
        # A11yAxeBrowserTest (Fase 3 a11y determinística): roda axe-core no CHROMIUM REAL
        # numa tela core (Financeiro/Unificado) pra pegar contraste/foco/ARIA-em-contexto
        # que o jsdom da Fase 2 não enxerga. Piso conservador: 0 violações CRITICAL (ratchet
        # level 0). Mesmo harness auth-bridge do AuthBridgeSmokeTest.
        #
        # ConformanceProbesTest (PACOTE-Q9 PR-3): espelho CI da semântica G2/G3/G4 do
        # qa-conformance.js v2 (Cowork) — computed-style no Chromium real, drawer Oficina
        # com o estado "adicionando" ABERTO (o que vazava), controle-negativo embutido (L-31).
        #
        # Tier0RenderIsolationTest (gate L3 — princípio #1 IRREVOGÁVEL, ADR 0093): prova no
        # RENDER que a tela do biz=1 NÃO vaza dado do biz=99 (token ZZLEAK99) — nem no DOM
        # visível (assertDontSee) nem no payload cru (data-page Inertia, via ->content()/
        # ->script()). Dois lados: CONTROLE (biz=99 VÊ o token) + ISOLAMENTO (biz=1 NÃO vê).
        # BLOCKING (sem continue-on-error): o princípio #1 não admite merge-vermelho.
        run: ./vendor/bin/pest tests/Browser/Public/ tests/Browser/CoreScreens/AuthBridgeSmokeTest.php tests/Browser/CoreScreens/A11yAxeBrowserTest.php tests/Browser/CoreScreens/ConformanceProbesTest.php tests/Browser/CoreScreens/PixelDimensionProbesTest.php tests/Browser/CoreScreens/Tier0RenderIsolationTest.php

      - name: Cross-browser smoke · Firefox
        if: steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        run: ./vendor/bin/pest tests/Browser/CoreScreens/AuthBridgeSmokeTest.php --browser firefox

      - name: Cross-browser smoke · WebKit
        if: steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        run: ./vendor/bin/pest tests/Browser/CoreScreens/AuthBridgeSmokeTest.php --browser safari

      # ── Onda Q4 (US-GOV-013) — GATE VISUAL DE PIXEL das núcleo-6 ─────────────────────
      # FASE ENFORCING (ADR 0261: gate novo nasce advisory → 2 verdes → enforcing).
      # Promoção L1 = remover o continue-on-error deste step (não muda required
      # check, só para de mascarar a falha; sem clique de branch protection: o
      # check `visual-regression` já é required). O contrato source→rota→âncora→baseline
      # vive em tests/Browser/visreg-screens.json. Diff targeted executa exatamente as
      # telas mapeadas; diff global executa a matriz núcleo-6. Baseline ausente BLOQUEIA.
      # Mudança intencional: npm run visreg:update (CI) + aprovação [W] (F1.5).
      - name: Pixel-diff afetadas/núcleo-6 (ENFORCING · double-threshold L7)
        if: steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        id: pixel-diff
        env:
          VISREG_SCOPE: ${{ steps.impact.outputs.scope }}
          VISREG_SCREENS: ${{ steps.impact.outputs.screens }}
        # DOUBLE-THRESHOLD (L7): o teste roteia cada tela por 3 bandas (PixelBaselineTest
        # + Tests\Browser\Support\VisregThreshold) — auto-aprova < τ_baixo (VISREG_TAU_LOW,
        # default 0.1%), auto-falha > τ_alto (VISREG_TAU_HIGH, default 2%), e o MEIO é a
        # ZONA CINZA que NÃO falha (só coleta + diff-view + step summary pro [W] revisar).
        # Calibrar sem mexer no código: setar VISREG_TAU_LOW / VISREG_TAU_HIGH aqui.
        #
        # PROMOVIDO A ENFORCING (L1) — `continue-on-error` REMOVIDO: o step agora BLOQUEIA
        # o merge se ao menos 1 tela núcleo-6 passar de τ_alto (VISREG_TAU_HIGH, 2%). Seguro
        # porque o L7 (double-threshold) absorve os diffs pequenos na ZONA CINZA — que NÃO
        # falha e segue indo pro step summary + artifact pixel-diff-views pro [W] revisar.
        run: ./vendor/bin/pest tests/Browser/CoreScreens/PixelBaselineTest.php

      # ── Gate L2 (US derivada do mandato VRT) — SNAPSHOTS DE ESTADOS ISOLADOS ───────────
      # Fecha o maior gap de cobertura: o pixel-diff (L7) acima só snapshota o estado SEEDADO
      # (default). Aqui cada (tela × estado) declarado no charter `states:` + no manifesto
      # tests/Browser/visreg-states.json (empty/loading/dark/error) vira baseline — o estado é
      # forçado pela rota /_visreg-state + VisregStateMiddleware (sem tocar controller/Page,
      # forçado pela rota /_visreg-state + VisregStateMiddleware (sem tocar controller/Page,
      # mesmo princípio não-invasivo do L3).
      # L2-v2 usa a mesma classificação 3-bandas do L7: ruído não interrompe PR, mas uma
      # regressão clara falha no step e a zona cinza sobe diff-view para revisão humana.
      #
      # ONDA 3 — MATRIZ GLOBAL 100% ENFORCING (2026-07-14): a matriz de estados isolados deixa
      # de ter QUALQUER estado advisory. `oficina-os · dark` (o último drift) foi resolvido em
      # #4248 — a baseline stale mostrava "Quadro não configurado" (pipeline FSM ausente) e o
      # render real do gate é o kanban; a baseline foi corrigida pro kanban real do runner
      # canônico e o gate provou verde (run 29285558238: oficina 3/3 pass). Agora TODAS as 6
      # telas × estados rodam num único step enforcing.
      - name: Estados isolados matriz (ENFORCING — matriz global completa · 6 telas)
        # MATRIZ GLOBAL ENFORCING COMPLETA. Ondas: 1 Financeiro (#4239) · 2 Sells+Clientes+
        # Compras+Caixa (#4243) · 3 Oficina (#4248 baseline fix + esta promoção). Cada tela com
        # ≥2 runs VERDES determinísticos contra a baseline commitada (ADR 0261 "advisory → 2
        # verdes → enforcing" cumprido por tela). Sem continue-on-error: regressão clara em
        # QUALQUER estado das 6 telas BLOQUEIA o merge. Não há mais radar advisory — a matriz
        # inteira é gate duro.
        if: steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        id: matriz-states
        # RETRY-ONCE anti-flake (scripts/tests/visreg-flake-retry.sh, mesma política do #4241):
        # re-roda UMA vez SÓ na assinatura de EXECUÇÃO (browser não sobe/timeout/socket). Uma
        # REGRESSÃO DE PIXEL real (double-threshold "REGRESSÃO CLARA" > τ_alto) NUNCA re-roda —
        # o wrapper falha com o código original, preservando o que o gate enforcing existe p/ pegar.
        # Sem --filter: a matriz inteira (todas as telas do manifesto) é enforcing.
        run: bash scripts/tests/visreg-flake-retry.sh tests/Browser/CoreScreens/IsolatedStatesBaselineTest.php

      - name: Fluxos visuais Financeiro (ENFORCING — L2.5 · interação × viewport)
        # Executa mesmo se o núcleo-6 falhar: o fluxo novo não pode ficar sem
        # evidência por uma regressão independente de outra tela.
        # PROMOVIDO A ENFORCING (2026-07-13): os 12 fluxos × viewport foram armados
        # via #4237/#4238. Sem continue-on-error: regressão clara pós-clique agora
        # BLOQUEIA merge.
        if: always() && steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        id: financeiro-flows
        # RETRY-ONCE anti-flake (mesma política do financeiro-states): re-roda UMA vez só na
        # assinatura de execução (o fluxo levou 11 patches por relógio cross-processo → o
        # residual é flake de timing/browser, não pixel). Diff de pixel real NUNCA re-roda.
        run: bash scripts/tests/visreg-flake-retry.sh tests/Browser/CoreScreens/FinanceiroFlowBaselineTest.php

      - name: Fluxos visuais Compras (ENFORCING — L2.5 · interação × viewport)
        # PROMOVIDO A ENFORCING (2026-07-14, ADR 0261 "promover = remover o continue-on-error"):
        # os 9 baselines (3 fluxos pós-clique do cockpit /compras — visibilidade de colunas,
        # menu de Ações da linha, drawer × 3 viewports) foram armados via #4251 e provaram
        # match (9 passed nos runs 29297033941 e 29298250328). Sem continue-on-error: regressão
        # clara pós-clique de Compras agora BLOQUEIA merge. O double-threshold (VisregThreshold)
        # roteia por bandas; a zona cinza (não-falha) sobe diff-view pro [W]. Baseline via modo
        # update (dispatch) NO runner canônico — nunca local (Tier 0: testes no CT100/CI).
        # `always()`: roda mesmo se um passo anterior falhar (fluxo novo não pode ficar
        # sem evidência por regressão independente de outra tela).
        if: always() && steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        id: compras-flows
        # RETRY-ONCE anti-flake (scripts/tests/visreg-flake-retry.sh, mesmo do Sells/Financeiro):
        # re-roda só em FLAKE de execução (browser/socket/timeout), NUNCA em regressão de pixel
        # (double-threshold é veredito duro). Sem ele, um flake de browser travaria o merge do time.
        run: bash scripts/tests/visreg-flake-retry.sh tests/Browser/CoreScreens/ComprasFlowBaselineTest.php

      - name: Fluxos visuais Sells/Create (ENFORCING — L2.5 · interação × viewport)
        # PROMOVIDO A ENFORCING (2026-07-14, ADR 0261 "promover = remover o continue-on-error"):
        # as 12 baselines (4 fluxos × 3 viewports) foram armadas no runner canônico (#4251) e o
        # gate comparou verde. Cobre a tela de 99% do volume (venda balcão, ROTA LIVRE):
        # adicionar produto, abrir a busca, aplicar desconto e adicionar pagamento em
        # compact/desktop/wide — estado pós-clique, antes de persistir. Baselines geradas via
        # workflow_dispatch (modo update), nunca local (Tier 0). Sem continue-on-error:
        # regressão clara pós-clique agora BLOQUEIA merge (o double-threshold absorve a zona
        # cinza; só > τ_alto falha). Roda mesmo se o Financeiro falhar (always()).
        if: always() && steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        id: sells-flows
        # Retry-once guard (mesmo do Financeiro/Compras): re-roda só em FLAKE de execução
        # (browser/socket/timeout), NUNCA em regressão de pixel (double-threshold é veredito
        # duro). O motor VisregThreshold segue intocado.
        run: bash scripts/tests/visreg-flake-retry.sh tests/Browser/CoreScreens/SellsCreateFlowBaselineTest.php

      # ── MODO UPDATE (dispatch): regenera as baselines e abre PR ─────────────────
      - name: Regenerar baselines (pixel + estados + fluxos) — modo update
        if: github.event_name == 'workflow_dispatch'
        run: |
          npm run visreg:update
          npm run visreg:states:update
          npm run visreg:flows:update
          npm run visreg:sells:update
          npm run visreg:flows:compras:update

      # COWORK_BOT_PAT, NÃO GITHUB_TOKEN (anti-recursão do Actions): o GitHub NÃO dispara
      # workflows `pull_request` em eventos causados pelo GITHUB_TOKEN → PR de baselines
      # criado com ele nascia SEM NENHUM check e ficava órfão nos required ("Expected —
      # waiting"). Evidência 2026-07-10: #3987/#3994 órfãos por 1 dia (0 checks);
      # #4081/#4086 só destravaram com close/reopen manual. PR criado com o PAT dispara
      # CI normal (ex.: #3985 do shipped-log-cron, 80 checks). Mesmo padrão de
      # shipped-log-cron.yml / sdd-scorecard-publish.yml. NÃO "simplificar" de volta pra
      # GITHUB_TOKEN. O push do branch também usa o PAT (URL autenticada) porque o
      # checkout persiste credencial do GITHUB_TOKEN no remote `origin`. Merge continua
      # humano — ADR 0283 bloqueia auto-merge; o PAT aqui só CRIA o PR.
      - name: Abrir PR com as baselines regeneradas — modo update
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.COWORK_BOT_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BR="vrt/baselines-${{ github.run_id }}"
          git checkout -b "$BR"
          git add tests/.pest/snapshots
          if git diff --cached --quiet; then
            echo "Baselines já em dia — nada a commitar."; exit 0
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::COWORK_BOT_PAT ausente. Baixe o artifact pixel-snapshots e publique manualmente."
            exit 1
          fi
          if [ "$(gh api "repos/${{ github.repository }}" --jq '.permissions.push // false')" != "true" ]; then
            echo "::error::COWORK_BOT_PAT sem contents:write. Artifact pixel-snapshots preservado para recuperação; corrija a permissão antes do próximo dispatch."
            exit 1
          fi
          git commit -m "test(visreg): baselines regeneradas no runner canônico (modo update) [CC]" -m "Disparo manual pós-mudança de Fundação aprovada [W] — ADR UI-0020 §4 (dark warm): o PR de tokens sofre skip-as-pass neste gate e as baselines antigas quebrariam o próximo PR de UI. O gate do PR destas baselines re-roda e PROVA que batem com o render atual (anti-#3297)."
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" -u "$BR"
          gh pr create --title "test(visreg): baselines regeneradas (modo update) [CC]" --base main --head "$BR" --body "Baselines de pixel + estados isolados regeneradas NO runner canônico via workflow_dispatch (modo update). Motivo: Fundação aprovada [W] — ADR UI-0020 (dark warm). O gate required deste PR re-roda os testes contra estas baselines e prova que batem (anti-#3297)."

      - name: Veredito advisory dos fluxos Financeiro (L2.5 · visível no log)
        if: always() && steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        run: |
          if [ "${{ steps.financeiro-flows.outcome }}" = "failure" ]; then
            echo "🔴 L2.5 ADVISORY FALHOU — fluxo ou viewport divergiu acima de τ_alto. Ver pixel-diff-views."
          elif [ "${{ steps.financeiro-flows.outcome }}" = "success" ]; then
            echo "✅ fluxos Financeiro OK — criar, drawer, baixa e lote capturados em compact/desktop/wide."
          fi

      - name: Veredito advisory dos fluxos Sells/Create (L2.5 · visível no log)
        if: always() && steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        run: |
          if [ "${{ steps.sells-flows.outcome }}" = "failure" ]; then
            echo "🔴 L2.5 Sells/Create ADVISORY FALHOU — fluxo ou viewport divergiu acima de τ_alto (ou baseline ausente na 1ª execução). Ver pixel-diff-views."
          elif [ "${{ steps.sells-flows.outcome }}" = "success" ]; then
            echo "✅ fluxos Sells/Create OK — adicionar produto, abrir busca, aplicar desconto e adicionar pagamento capturados em compact/desktop/wide."
          fi

      - name: Veredito advisory dos fluxos Compras (L2.5 · visível no log)
        if: always() && steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        run: |
          if [ "${{ steps.compras-flows.outcome }}" = "failure" ]; then
            echo "🔴 L2.5 COMPRAS ADVISORY FALHOU — fluxo ou viewport divergiu acima de τ_alto. Ver pixel-diff-views."
            echo "   1ª execução sem baseline GERA e passa (artifact pixel-snapshots comita). Regressão? conserte. Fix aprovado? modo update (dispatch) regenera."
          elif [ "${{ steps.compras-flows.outcome }}" = "success" ]; then
            echo "✅ fluxos Compras OK — visibilidade de colunas, menu de Ações e drawer capturados em compact/desktop/wide."
          fi

      # Prova contrafactual final: mudança visual nunca pode concluir verde se o
      # classificador, o modo e a execução real do pixel-diff divergirem.
      - name: Canário anti-verde-vazio
        if: always() && github.event_name == 'pull_request'
        env:
          IMPACT: ${{ steps.impact.outputs.visual_required }}
          MODE: ${{ steps.mode.outputs.ui }}
          PIXEL_OUTCOME: ${{ steps.pixel-diff.outcome }}
          UNCOVERED_SCREENS: ${{ steps.impact.outputs.uncovered_screens }}
          EXPECTED: ${{ steps.pixel-diff.outputs.expected }}
          EXECUTED: ${{ steps.pixel-diff.outputs.executed }}
          COMPARED: ${{ steps.pixel-diff.outputs.compared }}
        run: |
          node scripts/governance/ui-impact.mjs --assert-execution \
            --visual-required="$IMPACT" --mode="$MODE" --pixel-outcome="$PIXEL_OUTCOME" \
            --uncovered-screens="${UNCOVERED_SCREENS:-[]}" \
            --expected="$EXPECTED" --executed="$EXECUTED" --compared="$COMPARED"

      - name: Upload baseline/snapshots de pixel (sempre que rodou)
        if: ${{ !cancelled() && steps.mode.outputs.ui == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pixel-snapshots
          path: tests/.pest/snapshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload diff views do pixel (falha OU zona cinza — double-threshold L7)
        # Sobe os diff-views SEMPRE que o pixel-diff rodou: a ZONA CINZA (L7) NÃO falha o
        # step, mas grava diff-views em tests/Browser/Screenshots/ImageDiffView/ pro [W]
        # revisar — só uploadar on-failure perderia exatamente o caso de uso do L7.
        # `if-no-files-found: ignore` cobre o caso "nenhuma tela na zona cinza nem falhou".
        if: ${{ !cancelled() && steps.mode.outputs.ui == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pixel-diff-views
          path: tests/Browser/Screenshots/ImageDiffView/
          retention-days: 7
          if-no-files-found: ignore

      - name: Veredito advisory do pixel-diff (visível no log · double-threshold L7)
        if: steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        run: |
          if [ "${{ steps.pixel-diff.outcome }}" = "failure" ]; then
            echo "🔴 PIXEL-DIFF ADVISORY FALHOU — ao menos 1 tela com diff > τ_alto (regressão clara) contra baseline."
            echo "   Intencional? npm run visreg:update + aprovação [W]. Regressão? conserte antes do enforcing (L1)."
            echo "   Telas em ZONA CINZA (τ_baixo..τ_alto) NÃO falham — ver o resumo 'Zona Cinza' no step summary + artifact pixel-diff-views."
          else
            echo "✅ pixel-diff afetadas/núcleo-6 OK — nenhuma tela acima de τ_alto."
            echo "   Se houve ZONA CINZA, ela está no step summary (resumo 'Pixel-diff — Zona Cinza') + artifact pixel-diff-views pro [W] revisar."
          fi

      # ── Camada L5 — PERF BUDGET QUE MORDE (Lighthouse CI · median-of-3) ───────────────
      # Hoje LCP/CLS só eram coletados pós-merge advisory e nada falhava. Esta camada mede
      # as telas núcleo AUTENTICADAS no MESMO boot+seed do gate, reusando o auth-bridge
      # /_visreg-login/{id}?to=<tela> (routes/web.php, env-guarded) — admin id=1 do
      # VisregTenantSeeder. Config: lighthouserc.json (raiz).
      #
      # ARMADURA EM 3 ESTÁGIOS (segue ADR 0275 §3 armamento + §5 calendário; e a LIÇÃO do
      # visual-regression que mergeou vermelho 2× por virar required cedo — PRs #2544/#2548):
      #   Estágio 0 (nascimento — AGORA): step `continue-on-error: true` ⇒ ADVISORY. O job
      #     `visual-regression` JÁ é required, então o continue-on-error é o que mantém L5
      #     sem morder (mesmo padrão do pixel-diff acima). No lighthouserc: CLS = `error`
      #     (morde já, na severidade) @ 0.1; LCP/TBT = `warn`. `lhci assert` roda e imprime,
      #     mas nada reprova o PR. Coletar 3 medições válidas consecutivas (regra de armamento).
      #   Estágio 1 (ARMADO 2026-06-23): 3 medianas estáveis (var <1.5%) confirmaram o orçamento —
      #     LCP 3448/3461/3469ms (Financeiro) e 3528/3543/3569ms (Sells); CLS<0.1 e TBT<300 nas 3.
      #     Flipado `warn` → `error` no lighthouserc: LCP error@4000 + TBT error@600 (tetos "poor"
      #     do Web Vitals — anti-regressão acima do real ~3,5s; o alvo "good" 2,5s vira meta de
      #     otimização à parte). CLS segue error@0.1. Step ainda advisory (continue-on-error) →
      #     o assert reprova no LOG, não no PR; hoje passa VERDE (tudo dentro do teto).
      #   Estágio 2 (promover a required): pelo CALENDÁRIO ADR 0275 §5 (máx 1/semana, [W] flipa,
      #     evidência linkada = runs, PR atualiza required-checks-baseline.json citando 0275).
      #     Promover = REMOVER o `continue-on-error: true` deste step (sem clique de branch
      #     protection: o check `visual-regression` já é required — idêntico à nota do pixel-diff).

      - name: Instalar Lighthouse CI (L5 — pin compatível com Node 22.17.0)
        if: steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        # continue-on-error PERMANENTE (≠ lever de promoção): instalar o LHCI é INFRA do gate
        # ADVISORY — uma falha transitória de npm NÃO pode reprovar o job `visual-regression`
        # (que já é required). O lever de promoção é remover o continue-on-error do step `lhci`,
        # NÃO deste. Sem o LHCI, o step `lhci` falha e é engolido → nenhuma medição, sem dano.
        continue-on-error: true
        # @lhci/cli@0.15.1 empacota lighthouse@12.6.1 (engine node >=18.20) → compatível com
        # Node 22.17.0 fixado no job. Pin explícito (NÃO `@latest`) pra build determinístico.
        # Chrome: o runner ubuntu-latest já traz google-chrome-stable → chrome-launcher acha sozinho.
        run: npm install -g @lhci/cli@0.15.1

      - name: L5 — Perf budget Lighthouse (median-of-3 · ADVISORY · ARMADO ADR 0275)
        if: steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        id: lhci
        continue-on-error: true
        env:
          # Built-in PHP server é single-thread; sem workers, requests concorrentes de assets
          # do SPA serializam e inflam o LCP (flake). 4 workers = medição estável.
          PHP_CLI_SERVER_WORKERS: "4"
        # autorun = collect (sobe `php artisan serve`, mede 3×, derruba) + assert (median) + upload.
        run: lhci autorun --config=lighthouserc.json

      - name: Upload resultados Lighthouse (L5 — leitura das medianas p/ armar)
        if: ${{ !cancelled() && steps.mode.outputs.ui == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-perf-budget
          path: .lighthouseci/
          # include-hidden-files: o LHCI escreve em `.lighthouseci/` (dot-dir = "hidden");
          # upload-artifact@v4 IGNORA hidden por default → o artifact saía vazio. Sem isto
          # as medianas não eram inspecionáveis (só liam no log). Vide ADR 0275 (armar).
          include-hidden-files: true
          retention-days: 14
          if-no-files-found: ignore

      - name: Veredito advisory L5 perf budget (visível no log)
        if: steps.mode.outputs.ui == 'true' && github.event_name != 'workflow_dispatch'
        run: |
          if [ "${{ steps.lhci.outcome }}" = "failure" ]; then
            echo "🟡 L5 PERF BUDGET ADVISORY FALHOU — alguma métrica acima do orçamento (ver artifact lighthouse-perf-budget)."
            echo "   ARMADO (ADR 0275 §3): CLS error@0.1 · LCP error@4000 · TBT error@600 (tetos anti-regressão)."
            echo "   Regressão? conserte. Orçamento irreal? ajuste lighthouserc.json com evidência das medianas."
          else
            echo "✅ L5 perf budget OK (advisory · ARMADO — verde dentro dos tetos; pronto p/ promoção [W] ADR 0275 §5)."
          fi

      - name: Upload screenshots on failure
        if: failure() || steps.pest-browser.outputs.fail == '1'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-diff
          path: tests/Browser/Screenshots/
          retention-days: 7

      - name: Comment on PR if regression detected
        if: (failure() || steps.pest-browser.outputs.fail == '1') && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## 📸 Visual Regression Detected',
              '',
              'Screenshots têm diff > threshold contra baseline no **gate real** (Pest Browser smoke: telas públicas + auth-bridge + a11y axe + conformance). Esse check é **REQUIRED** — o PR não mergeia vermelho.',
              '',
              '> ℹ️ O **pixel-diff afetadas/núcleo-6** é **ENFORCING**: diff targeted executa as telas afetadas mapeadas; diff global executa o núcleo-6. Tela sem contrato ou baseline, ou diff acima de τ_alto (2%), bloqueia o merge. A ZONA CINZA só vira diff-view pro [W] revisar.',
              '>',
              '> ℹ️ O **lint L2** (charter `states:` ⇄ manifesto) é **ENFORCING** desde 2026-07-06 (aprovação [W]) — drift charter↔JSON bloqueia o merge. Os **snapshots L2 de estados isolados** são **ENFORCING pra a matriz global inteira** — as 6 telas (Financeiro+Sells+Clientes+Compras+Caixa+Oficina) × estados (onda 3, 2026-07-14) — regressão clara em qualquer estado bloqueia o merge. Não há mais estado advisory na matriz L2. Segue advisory: L5 perf Lighthouse (calendário ADR 0275 §5).',
              '',
              '### Como resolver',
              '1. Baixar artifact `screenshots-diff` deste workflow run',
              '2. Comparar `actual.png` vs `expected.png` lado-a-lado',
              '3. Se mudança intencional: **aprovação visual do Wagner (gate F1.5)** registrada no PR, e ATUALIZAR snapshots no mesmo PR:',
              '   ```bash',
              '   ./vendor/bin/pest tests/Browser/ --update-snapshots',
              '   git add tests/Browser/Screenshots/ && git commit',
              '   ```',
              '4. Se regressão não-intencional: revisar mudanças de código',
              '',
              '(2026-06-11: removida a oferta de `/mwart-override` — nunca houve handler que a processasse; o único caminho real é atualizar snapshots com aprovação do Wagner.)',
              '',
              '_Ver [ADR 0108](../../memory/decisions/0108-regressao-visual-pest-browser-tier-2.md)._'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
