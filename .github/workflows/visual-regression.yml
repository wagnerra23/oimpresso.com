name: Visual Regression (Pest 4 Browser)

# ADR 0108 — Camada Tier 2 de validação visual.
# Roda Pest browser snapshot tests em PRs que tocam Pages Inertia.
# Falha se diff > 0.1% sem update-snapshots aprovado.

on:
  pull_request:
    paths:
      - 'resources/js/Pages/**/*.tsx'
      - 'resources/js/Layouts/**/*.tsx'
      - 'resources/js/Components/**/*.tsx'
      - 'tests/Browser/**/*.php'
      - '.github/workflows/visual-regression.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: oimpresso_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, pdo_mysql, gd, opentelemetry
          coverage: none

      - name: Wait for MySQL ready
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h127.0.0.1 -uroot -proot --silent; then
              echo "MySQL ready"
              break
            fi
            echo "Waiting MySQL... $i"
            sleep 2
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --no-scripts

      - name: Install NPM dependencies
        run: npm ci

      - name: Install Playwright npm client
        # `pestphp/pest-plugin-browser ^4.0` (composer.json) spawneia o cliente
        # JS `playwright` via stdio. `playwright` NÃO está em package.json
        # devDependencies (ainda), então `npm ci` não traz `node_modules/playwright/`.
        # Sem este step, o cache de `~/.cache/ms-playwright/` (binários dos browsers)
        # acerta mas o cliente JS está ausente → `PlaywrightNotInstalledException`.
        # `--no-save` evita drift no package.json/lock — declarar como devDep
        # propriamente fica pra PR follow-up.
        run: npm install playwright --no-save

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Setup Laravel
        # ⚠️ INFRA-ONLY MODE (ADR 0108 + handoff "Setup MySQL+migrate full em CI fica
        # pra PR separado") — `continue-on-error: true` permite job verde mesmo se
        # migrate quebrar por ordem de migration UltimatePOS legacy (ex: ALTER TABLE
        # contacts ADD regime AFTER contribuinte falha porque contribuinte é
        # adicionado por migration posterior).
        #
        # Workflow valida infra (composer + npm + playwright + MySQL service + .env
        # + Blade cache + Telescope skip), mas NÃO executa Pest Browser tests reais
        # até issue de migration order ser resolvida em PR dedicado.
        # Quando fixarem: remover `continue-on-error: true` deste step + do "Run Pest".
        continue-on-error: true
        run: |
          mkdir -p storage/framework/{cache,views,sessions,testing} bootstrap/cache
          cat > .env <<'EOF'
          APP_NAME=oimpresso-visreg
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          LOG_CHANNEL=stderr
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=oimpresso_test
          DB_USERNAME=root
          DB_PASSWORD=root
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          MAIL_MAILER=array
          BCRYPT_ROUNDS=4
          TELESCOPE_ENABLED=false
          VIEW_COMPILED_PATH=storage/framework/views
          EOF
          php artisan key:generate --force
          php artisan package:discover --ansi
          php artisan migrate --force

      - name: Build Inertia bundles
        # Build pode falhar se Setup Laravel quebrou (sem .env válido) — tolerar
        # em INFRA-ONLY mode. Vide nota em "Setup Laravel" linha 92.
        continue-on-error: true
        run: npm run build:inertia

      - name: Run Pest Browser tests
        id: pest-browser
        # INFRA-ONLY MODE — bloqueado por migration order legacy. Quando issue
        # for resolvida em PR dedicado, remover continue-on-error daqui + do
        # "Setup Laravel" pra workflow validar tests reais.
        continue-on-error: true
        run: |
          if [ -d tests/Browser ]; then
            ./vendor/bin/pest tests/Browser/ --parallel || echo "fail=1" >> "$GITHUB_OUTPUT"
          else
            echo "Sem tests/Browser/ — skipped"
          fi

      - name: Upload screenshots on failure
        if: failure() || steps.pest-browser.outputs.fail == '1'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-diff
          path: tests/Browser/Screenshots/
          retention-days: 7

      - name: Comment on PR if regression detected
        if: failure() || steps.pest-browser.outputs.fail == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## 📸 Visual Regression Detected',
              '',
              'Screenshots têm diff > threshold contra baseline.',
              '',
              '### Como resolver',
              '1. Baixar artifact `screenshots-diff` deste workflow run',
              '2. Comparar `actual.png` vs `expected.png` lado-a-lado',
              '3. Se mudança intencional (refator visual aprovado em F1.5):',
              '   ```bash',
              '   ./vendor/bin/pest tests/Browser/ --update-snapshots',
              '   git add tests/Browser/Screenshots/ && git commit',
              '   ```',
              '4. Se regressão não-intencional: revisar mudanças de código',
              '',
              '### Override',
              'Comentar `/mwart-override <razão>` se mudança visual é intencional mas baseline não foi atualizada.',
              '',
              '_Ver [ADR 0108](../../memory/decisions/0108-regressao-visual-pest-browser-tier-2.md)._'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
