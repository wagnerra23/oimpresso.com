name: dSIH ratchet (anti-XSS · conteúdo em .tsx)

# ORÁCULO DE CONTEÚDO (parcela 1). Bloqueia dangerouslySetInnerHTML NOVO em resources/js/**/*.tsx.
# dSIH é o sink de XSS nº1 do React; render de dado de usuário via dSIH = stored-XSS.
#
# Motivo: red-team 2026-06-17 achou stored-XSS vivo (Messages #2891, Todo+endereço #2893) que
# passou pelos 17 required checks — nenhum gate mordia CONTEÚDO em .tsx. Este é o primeiro.
#
# Ratchet only-down: o teto (.dsih-baseline.json, versionado) só pode CAIR. dSIH novo = exit 1.
# Determinístico, zero-dep, zero-flake. Self-test embutido roda ANTES (prova que o gate morde).
#
# SEM path filter no pull_request (ADR 0263): roda em TODO PR. É ratchet — sem .tsx novo passa
# trivial. Rodar sempre permite torná-lo REQUIRED sem o deadlock de "Expected" em PR sem .tsx.
#
# Refs: proposals/handoff-loop-zero-paste.md (§9) · espelha conformance-gate.yml (ADR 0209).

on:
  push:
    branches: [main]
    paths:
      - 'resources/js/**/*.tsx'
      - 'scripts/dsih-gate.mjs'
      - '.dsih-baseline.json'
      - '.github/workflows/dsih-gate.yml'
  pull_request:

concurrency:
  group: dsih-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dsih:
    name: dSIH ratchet vs baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Self-test (prova que o gate morde — quem vigia o vigia)
        run: node scripts/dsih-gate.mjs --selftest

      - name: dSIH gate (falha só em dangerouslySetInnerHTML NOVO vs baseline)
        run: node scripts/dsih-gate.mjs --all

      - name: Diagnóstico em caso de falha
        if: failure()
        run: |
          echo ""
          echo "🔴 dSIH gate: dangerouslySetInnerHTML NOVO num .tsx (sink de XSS)."
          echo ""
          echo "Próximos passos:"
          echo "  1. Renderize como TEXTO (React escapa): {valor} em vez de dangerouslySetInnerHTML."
          echo "     Para quebras de linha use whitespace-pre-wrap (+ .replace(/<br>/,'\\n') se houver legado)."
          echo "  2. Se precisar mesmo de HTML, sanitize antes (DOMPurify/rehype-sanitize) — nunca dado cru."
          echo "  3. Se REMOVEU um sink (baixou a contagem), re-crave o teto:"
          echo "       node scripts/dsih-gate.mjs --update   (commit separado — diff do JSON é auditável)"
          echo ""
          echo "Refs: PRs #2891/#2893 (stored-XSS) · proposals/handoff-loop-zero-paste.md (§9 oráculo de conteúdo)."
