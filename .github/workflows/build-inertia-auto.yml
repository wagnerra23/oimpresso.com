name: Build inertia auto

# Detecta drift entre fonte (resources/js/**, resources/css/**) e bundles
# (public/build-inertia/**). Quando push em main toca fonte, roda
# `npm run build:inertia` e commita o resultado direto em main.
#
# Por que existe: 2026-05-05 5 commits do sidebar foram pushados sem rodar
# build local → public/build-inertia/ ficou stale → Hostinger serviu
# bundles velhos → Wagner viu sidebar "perder alterações". Esta action
# previne reprise.
#
# Anti-loop: action ignora commits que ela mesma criou ([skip-build-auto]).
#
# Hostinger continua puxando via git pull (sem rodar build local).

on:
  push:
    branches: [main]
    paths:
      - 'resources/js/**'
      - 'resources/css/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.inertia.config.mjs'
      - 'vite.config.js'

concurrency:
  group: build-inertia-auto-${{ github.ref }}
  cancel-in-progress: false  # nunca cancela mid-build (commit pode escapar)

permissions:
  contents: write

jobs:
  build:
    name: Rebuild bundles + commit
    runs-on: ubuntu-latest

    # Anti-loop: pula commits criados por esta própria action
    if: ${{ !contains(github.event.head_commit.message, '[skip-build-auto]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Token com write permission pra committar de volta
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history pra pushar de volta sem conflito
          fetch-depth: 0

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build inertia
        run: npm run build:inertia

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet public/build-inertia/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "→ Nada mudou em public/build-inertia/ — bundles já sincronizados."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "→ Mudanças detectadas em public/build-inertia/:"
            git diff --stat public/build-inertia/ | tail -5
          fi

      - name: Commit + push
        if: steps.diff.outputs.changed == 'true'
        # Trigger msg vai por env var (não interpolada no shell) pra evitar
        # shell injection quando commit message contém backticks ou $(...).
        # Bug em 2026-05-06 quando US-NFE-041 fase 2 trouxe `nfe.configuracao.manage`
        # no body do commit e o backtick foi interpretado como command substitution.
        env:
          TRIGGER_MSG: ${{ github.event.head_commit.message }}
          RUN_ID: ${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/build-inertia/
          # printf %s preserva caracteres especiais sem reinterpretação shell
          MSG=$(printf 'build(inertia): auto-rebuild após push tocar resources/\n\nTrigger: %s\nRun: %s\n\n[skip-build-auto]' "$TRIGGER_MSG" "$RUN_ID")
          git commit -m "$MSG"
          # Retry simples se push falhar por race (alguém pushou enquanto buildava)
          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "→ Push OK na tentativa $i"
              exit 0
            fi
            echo "→ Push falhou na tentativa $i, fazendo pull --rebase e tentando de novo"
            git pull --rebase origin main
          done
          echo "::error::Push falhou após 3 tentativas"
          exit 1

      - name: Resumo
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "✅ Bundles regenerados e commitados em main."
            echo "   Hostinger pega no próximo git pull (cron quick-sync ou manual)."
          else
            echo "✓ Bundles já estavam sincronizados — nada a fazer."
          fi
