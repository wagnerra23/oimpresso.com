name: Layout primitives guard (flex/grid solto)

# Enforcement da ADR 0253 (primitivos de layout). A própria ADR diz, nas
# Consequências: "Enforcement por lint (proibir flex solto) = ADR/PR seguinte,
# depois da camada + piloto." A camada (#2371) e a tela-piloto (#2372) existem —
# este é o PR seguinte.
#
# Escaneia resources/js/Pages/** + Components/** (exceto layout/ e ui/) e FALHA o PR
# só se um arquivo GANHAR flex/grid solto vs baseline (ou nascer com flex/grid solto).
# Legado tolerado (baseline fotografa ~2450 ocorrências); compor com primitivos é OK.
# Ratchet por arquivo — espelha no-mock/eslint/css-size (ADR 0209), "teste pra não piorar".
#
# Node puro (fs), sem deps, sem npm ci. Comando local: npm run layout:check
#
# REQUIRED-READINESS (2026-07-15, padrão ADR 0271 onda 2, idêntico ao e2e-gate.yml /
# visual-regression.yml): `pull_request` SEM `paths:` (always-run) pra ser promovível a
# required sem deadlock "Expected — waiting for status" em PR que não toca os paths. O
# custo é evitado por skip-as-pass interno: dorny/paths-filter detecta se algo relevante
# mudou; se não, conclui verde (~segundos) sem rodar o ratchet.

on:
  push:
    branches: [main]
    paths:
      - 'resources/js/Pages/**/*.tsx'
      - 'resources/js/Components/**/*.tsx'
      - 'scripts/layout-primitives-guard.mjs'
      - 'scripts/layout-primitives-baseline.json'
      - '.github/workflows/layout-primitives-guard.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: layout-primitives-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  layout-primitives-guard:
    name: Layout primitives · ratchet
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detectar mudanças relevantes (skip-as-pass — required-readiness)
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - 'resources/js/Pages/**/*.tsx'
              - 'resources/js/Components/**/*.tsx'
              - 'scripts/layout-primitives-guard.mjs'
              - 'scripts/layout-primitives-baseline.json'
              - '.github/workflows/layout-primitives-guard.yml'

      - name: Decidir execução
        id: decide
        run: echo "run=${{ github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true' }}" >> "$GITHUB_OUTPUT"

      - name: Skip-as-pass (nada de layout mudou)
        if: steps.decide.outputs.run != 'true'
        run: echo "✅ Sem mudanças de layout/primitivos — skip-as-pass (required-ready, padrão ADR 0271 onda 2)."

      - name: Setup Node.js
        if: steps.decide.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Layout ratchet (falha em aumento de flex/grid solto)
        if: steps.decide.outputs.run == 'true'
        run: node scripts/layout-primitives-guard.mjs

      - name: Diagnóstico em caso de falha
        if: failure()
        run: |
          echo ""
          echo "❌ Uma tela/componente ganhou flex/grid solto vs baseline (ADR 0253)."
          echo ""
          echo "Layout é COMPOSIÇÃO de primitivos — não '<div className=\"flex …\">' cru:"
          echo "  flex-col  → <Stack>      ·  flex-row → <Inline>"
          echo "  grid      → <Grid>       ·  superfície/padding → <Box>"
          echo "  (resources/js/Components/layout)"
          echo ""
          echo "  1. Local: npm run layout:check · vê os achados novos file:line"
          echo "  2. Componha com os primitivos — é o ponto do gate."
          echo "  3. Se for legítimo/intencional, absorva conscientemente:"
          echo "       npm run layout:baseline:write   # commit + justificativa no PR"
          echo ""
          echo "Refs: memory/decisions/0253-primitivos-layout.md · tela-piloto Financeiro/ProvaViva.tsx"
