name: Debug Timezone Info (one-shot)

# Diagnóstico bug Larissa 2026-05-27: recibo mostrando 23:47 quando hora real BRT
# era 18:00. business.time_zone reportado como "São Paulo". Investiga camadas:
# user.time_zone + transaction_date raw + format_date vs Carbon parse.

on:
  workflow_dispatch:
    inputs:
      biz_id:
        description: 'business_id alvo (Larissa Rota Livre = 4)'
        required: true
        default: '4'
        type: string
      invoice_no:
        description: 'Nº da venda pra inspecionar transaction_date raw'
        required: false
        default: '2026/2986'
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: SSH helper
        run: |
          cat > /tmp/ssh_exec.sh <<'EOF'
          #!/bin/bash
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }} \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "$@"
          EOF
          chmod +x /tmp/ssh_exec.sh

      - name: Run debug query
        run: |
          /tmp/ssh_exec.sh "cd /home/u906587222/domains/oimpresso.com/public_html && cat <<'PHPEOF' | php artisan tinker
          \$bid = ${{ inputs.biz_id }};
          \$invoiceNo = '${{ inputs.invoice_no }}';

          echo '=== CONFIG ===' . PHP_EOL;
          echo 'app.timezone=' . config('app.timezone') . PHP_EOL;
          echo 'date_default_timezone_get=' . date_default_timezone_get() . PHP_EOL;
          echo 'Carbon::now()=' . \Carbon\Carbon::now()->toIso8601String() . PHP_EOL;
          echo 'Carbon::now()->format=' . \Carbon\Carbon::now()->format('Y-m-d H:i:s T') . PHP_EOL;

          echo PHP_EOL . '=== BUSINESS biz_id=' . \$bid . ' ===' . PHP_EOL;
          \$biz = \DB::table('business')->where('id', \$bid)->first(['id', 'name', 'time_zone', 'date_format', 'time_format']);
          if (\$biz) {
            echo 'name=' . \$biz->name . PHP_EOL;
            echo 'time_zone=' . \$biz->time_zone . PHP_EOL;
            echo 'date_format=' . \$biz->date_format . PHP_EOL;
            echo 'time_format=' . \$biz->time_format . PHP_EOL;
          } else {
            echo 'NOT FOUND' . PHP_EOL;
          }

          // users.time_zone column not exists — skip user-level tz

          echo PHP_EOL . '=== TRANSACTION invoice_no=' . \$invoiceNo . ' ===' . PHP_EOL;
          \$tx = \DB::table('transactions')->where('business_id', \$bid)->where('invoice_no', \$invoiceNo)->first(['id', 'invoice_no', 'transaction_date', 'created_at', 'updated_at', 'contact_id']);
          if (\$tx) {
            echo 'transaction_id=' . \$tx->id . PHP_EOL;
            echo 'transaction_date_RAW_DB=' . \$tx->transaction_date . PHP_EOL;
            echo 'created_at_RAW_DB=' . \$tx->created_at . PHP_EOL;

            // Reformat usando Carbon parse + setTimezone SP
            \$parsed = \Carbon\Carbon::parse(\$tx->transaction_date);
            echo 'Carbon::parse(transaction_date)->tz=' . \$parsed->timezone->getName() . PHP_EOL;
            echo 'Carbon::parse(transaction_date)->format=' . \$parsed->format('Y-m-d H:i:s T') . PHP_EOL;
            echo 'Carbon::parse->setTimezone(America/Sao_Paulo)=' . \$parsed->copy()->setTimezone('America/Sao_Paulo')->format('Y-m-d H:i:s T') . PHP_EOL;

            // Reformat usando format_date (helper existente, com bug +3h documentado)
            try {
              \$bizDetails = (object)['date_format' => \$biz->date_format ?? 'd/m/Y', 'time_format' => \$biz->time_format ?? 24];
              \$util = app(\App\Utils\Util::class);
              echo 'format_date(transaction_date, true, biz)=' . \$util->format_date(\$tx->transaction_date, true, \$bizDetails) . PHP_EOL;
              echo 'format_date_no_shift(transaction_date, true, biz)=' . \$util->format_date_no_shift(\$tx->transaction_date, true, \$bizDetails) . PHP_EOL;
            } catch (\Throwable \$e) {
              echo 'format_date ERROR=' . \$e->getMessage() . PHP_EOL;
            }
          } else {
            echo 'TRANSACTION NOT FOUND - invoice_no=' . \$invoiceNo . ' biz=' . \$bid . PHP_EOL;
          }
          PHPEOF
          "
