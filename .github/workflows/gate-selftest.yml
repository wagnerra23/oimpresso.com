name: Gate Selftest

# QUEM VIGIA OS VIGIAS — frente GT-G6 do plano SDD (memory/sessions/
# 2026-06-12-plano-reestruturacao-sdd-ondas-paralelas.md §2, "TESTADA nível 2").
#
# Roda cada catraca de governança contra fixtures VERSIONADAS boa+ruim
# (tests/governance-fixtures/) e falha se alguma parou de morder (caso ruim
# passou) ou se a fixture boa avermelhou (46 catracas em 2026-07-01 — cresce
# com o repo: knowledge-drift, foundation-ratchet, ledger-check, anchor-lint,
# sdd-scorecard --ratchet ARMADO + counterfactuals P14 do floor, e cia).
#
# Job `selftest` REQUIRED desde 2026-07-02 (Wagner-explícito, pós-avaliação
# adversarial 75/100 — fechou o risco nº 5: "a prova de que as catracas mordem
# não bloqueia merge"; um selftest quebrado deixava os gates pararem de morder
# em silêncio). Nasceu advisory (ADR 0271/0275), rodou verde semanas, 46/46
# live na avaliação. Always-run sem paths = require-safe (nunca "Expected").
# Node puro, sem deps/DB/rede — segundos (<60s garantido).
# O job `hooks-selftest` (windows) SEGUE advisory — runner Windows, mais flaky.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gate-selftest-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  selftest:
    name: gate selftest (as catracas mordem · GT-G6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Selftest — todas as catracas × fixtures boa/ruim (+ tabela no job summary)
        run: node scripts/governance/gate-selftest.mjs

  # GT-G6 (cont.) — os ~50 hooks Claude Code (camada que bloqueia o agente em
  # tempo real) só rodavam LOCAL (test-all-hooks-smoke.ps1). Em mai/2026 isso
  # deixou 4 hooks quebrarem em prod sem CI pegar. Roda em windows-latest porque
  # o smoke valida compat PS 5.1 (encoding/BOM/$input reservada) — Windows-coupled.
  hooks-selftest:
    name: hooks selftest (advisory · PS 5.1 smoke + node hook tests)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Parse-check de TODO hook .ps1 (PS 5.1, deterministico, sem depender de payload)
        shell: powershell
        run: |
          $fail = Get-ChildItem .claude/hooks -Filter *.ps1 |
            Where-Object { $_.Name -notmatch '\.test\.ps1$' -and $_.Name -notmatch '^test-' } |
            Where-Object {
              $e = $null
              [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$e)
              if ($e -and $e.Count -gt 0) { Write-Host ("PARSE FAIL: " + $_.Name); $e | ForEach-Object { Write-Host ("  " + $_.Message) }; $true } else { Write-Host ("ok " + $_.Name); $false }
            }
          if (@($fail).Count -gt 0) { Write-Error ([string]@($fail).Count + " hook(s) .ps1 com erro de parse PS 5.1"); exit 1 }
          Write-Host "OK: todos os .ps1 parseiam limpo (PS 5.1; cobre TODOS os hooks, nao so os 12 com payload no smoke)."
      - name: PowerShell hooks smoke (compat PS 5.1 — encoding/reserved-var)
        shell: powershell
        run: .\.claude\hooks\test-all-hooks-smoke.ps1
      - name: Node hook tests (*.test.mjs)
        run: node --test .claude/hooks/
