name: No-mock-in-prod ratchet (stub/mock em controller)

# Nasce das lições do F3-Financeiro rejeitado (LICOES_F3_FINANCEIRO_REJEITADO):
# controllers de produção entregues com mock data / rand() / mutação NO-OP / stub disfarçado
# de feature (T-AP-12, T-AP-13, M-AP-2). Nenhum gate pegava isso.
#
# Escaneia Modules/**/Http/Controllers + app/Http/Controllers e FALHA o PR só se a contagem
# de achados (por regra) AUMENTAR vs baseline. Legado tolerado; encolher é sempre OK.
# Ratchet por regra — espelha eslint/css-size (ADR 0209), "teste pra não piorar".
#
# Node puro (fs), sem deps, sem npm ci. Comando local: npm run no-mock:check

on:
  push:
    branches: [main]
    paths:
      - 'Modules/**/Http/Controllers/**'
      - 'app/Http/Controllers/**'
      - 'scripts/no-mock-in-prod.mjs'
      - 'scripts/no-mock-baseline.json'
      - '.github/workflows/no-mock-gate.yml'
  # ADR 0271 onda 2 (item 4 — required-readiness): pull_request SEM paths
  # (always-run) pra ser promovível a required sem deadlock "Expected — waiting".
  # Ratchet escaneia o repo inteiro vs baseline → passa trivial em PR sem controller.
  pull_request: {}

concurrency:
  group: no-mock-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-mock-gate:
    name: No-mock-in-prod · ratchet
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: No-mock ratchet (falha em aumento de stub/mock)
        run: node scripts/no-mock-in-prod.mjs

      - name: Diagnóstico em caso de falha
        if: failure()
        run: |
          echo ""
          echo "❌ Aumentou stub/mock/rand()/NO-OP em controller de produção vs baseline."
          echo ""
          echo "Controller de prod não pode ter: rand()/fake(), // TODO/FIXME/stub-marker,"
          echo "ou mutação que só faz return back() sem tocar Model/DB/Service (T-AP-12/13/M-AP-2)."
          echo ""
          echo "  1. Local: npm run no-mock:check · vê os achados novos file:line"
          echo "  2. Implemente de verdade (sem mock) — é o ponto do gate."
          echo "  3. Se o achado for legítimo/intencional, absorva conscientemente:"
          echo "       npm run no-mock:baseline:write   # commit + justificativa no PR"
          echo ""
          echo "Refs: prototipo-ui/LICOES_F3_FINANCEIRO_REJEITADO.md (T-AP-12/13, M-AP-2)"
