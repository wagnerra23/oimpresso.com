name: Memory schema gate (ONDA 5 S1)

# ONDA 5 S1 — Schema rígido CI híbrido.
# Workflow A do híbrido (gate PR remark-lint + AJV via npx).
# Gate C complementar = `php artisan jana:validate-memory` (cron daily 06:30 BRT).
#
# Schemas: scripts/memory-schemas/*.schema.json
# Mapa glob→schema: scripts/memory-schemas/README.md
#
# 2026-05-25 (Wagner "endureça"): mudança de regra — gate valida APENAS
# arquivos modificados/criados no PR vs base (não toda a árvore memory/).
# Strict mode ON por default pra esses. Append-only canon (ADR 0095 +
# Constituição v2 Art. 3) impede edição retroativa de ADRs/handoffs
# aceitos — logo, legacy debt forever fica em estado "ignorado" pelo gate
# (não bloqueia mas também não some). Workflow novo + arquivos novos
# precisam estar válidos.
#
# 2026-06-30 (ADR 0314 F2 · poda onda 2): FUNDIDO com o antigo
# memory-schema-gate-extended.yml (D6 #4) — mesma fonte (validação de schema
# de memory/**). O job `validate` (matrix AJV/frontmatter) + os 3 jobs
# `validate-*-schema` (validate-memory-schema.sh · filename + seções do corpo +
# US-<MOD>-<NNN>) agora vivem num único workflow. TODOS os sub-checks dos 2
# antigos rodam aqui (counterfactual por sub-check provado antes da fusão).
# Nenhum dos check contexts era required (branch protection confirmado) — fusão
# não toca branch protection. memory-schema-gate-extended.yml DELETADO +
# registros sincronizados (gates-registry.json + .memory-health-baseline.json).
#
# Trigger: PR que toca memory/**/*.md OU charter ao lado de Page Inertia OU o
# script validador de schema do corpo.

on:
  pull_request:
    paths:
      - 'memory/**/*.md'
      - 'resources/js/Pages/**/*.charter.md'
      - 'scripts/memory-schemas/**'
      - '.github/scripts/validate-memory-schema.sh'
      - '.remarkrc.cjs'
      - '.github/workflows/memory-schema-gate.yml'
  push:
    branches: [main]
    paths:
      - 'memory/**/*.md'
      - 'resources/js/Pages/**/*.charter.md'
      - 'scripts/memory-schemas/**'
      - '.github/scripts/validate-memory-schema.sh'
      - '.remarkrc.cjs'

concurrency:
  group: memory-schema-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ADR (memory/decisions/*.md)
            schema: scripts/memory-schemas/adr.schema.json
            glob: "memory/decisions/[0-9][0-9][0-9][0-9]-*.md"
          - label: SPEC (memory/requisitos/*/SPEC.md)
            schema: scripts/memory-schemas/spec.schema.json
            glob: "memory/requisitos/*/SPEC.md"
          - label: RUNBOOK (memory/requisitos/**/RUNBOOK*.md)
            schema: scripts/memory-schemas/runbook.schema.json
            glob: "memory/requisitos/**/RUNBOOK*.md"
          - label: Session log (memory/sessions/*.md)
            schema: scripts/memory-schemas/session.schema.json
            glob: "memory/sessions/[0-9][0-9][0-9][0-9]-*.md"
          - label: Handoff (memory/handoffs/*.md)
            schema: scripts/memory-schemas/handoff.schema.json
            glob: "memory/handoffs/[0-9][0-9][0-9][0-9]-*.md"
          - label: Charter (resources/js/Pages/**/*.charter.md)
            schema: scripts/memory-schemas/charter.schema.json
            glob: "resources/js/Pages/**/*.charter.md"
          # 2026-07-12 (proposal estrutura-canon-memoria · Fase 0): as famílias
          # BRIEFING + reference entram em GRACE (warn-only, diff-aware) — o
          # campo `grace: true` força STRICT=false SÓ pra elas (ver step
          # "Compute strict mode flag"), independente da var global. Motivo:
          # ~143 reference + ~55 BRIEFING legados divergentes; required só
          # após backfill zerar o FP por família (ADR 0314 — gate novo nasce
          # grace, nunca required de nascença). Reference escopado a
          # memory/reference/*.md (os 5 @imports do CLAUDE.md em memory/*.md
          # ficam FORA — instrução Tier 0 do reference.schema.json).
          - label: BRIEFING (memory/requisitos/*/BRIEFING.md) [grace]
            schema: scripts/memory-schemas/briefing.schema.json
            glob: "memory/requisitos/*/BRIEFING.md"
            grace: true
          - label: Reference (memory/reference/*.md) [grace]
            schema: scripts/memory-schemas/reference.schema.json
            glob: "memory/reference/*.md"
            grace: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 2026-05-25 (Wagner "endureça"): precisa do main pra git diff

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install AJV CLI (validation only — sem deps custos do remark)
        run: |
          npm install --no-save \
            ajv@^8.17.1 \
            ajv-cli@^5.0.0 \
            ajv-formats@^3.0.1 \
            gray-matter@^4.0.3 \
            glob@^11.0.0

      - name: Compute strict mode flag
        id: strict
        run: |
          # 2026-05-25 (Wagner "endureça"): default STRICT=true pra arquivos
          # NOVOS/MODIFICADOS. Override via var JANA_VALIDATE_MEMORY_STRICT=false
          # caso precise emergência (downgrade pra warning).
          STRICT="${{ vars.JANA_VALIDATE_MEMORY_STRICT || 'true' }}"
          # 2026-07-12 (estrutura-canon-memoria · Fase 0): famílias marcadas
          # `grace: true` na matriz (BRIEFING + reference) ficam warn-only
          # SEMPRE, independente da var global — gate novo nasce grace (ADR
          # 0314), required só após backfill FP=0. STRICT=false já aciona o
          # continue-on-error do step de validação + a redação "grace" no
          # comentário do PR (nada de código extra).
          if [ "${{ matrix.grace }}" = "true" ]; then
            STRICT="false"
          fi
          echo "value=$STRICT" >> "$GITHUB_OUTPUT"
          echo "Strict mode: $STRICT (false=warning, true=fail merge)"

      - name: Compute changed files (diff vs base)
        id: changed
        run: |
          # PR: diff vs base (origin/main em geral)
          # Push main: diff vs HEAD~1
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=50 2>/dev/null || true
            CHANGED=$(git diff --name-only --diff-filter=AM "$BASE...HEAD" 2>/dev/null || true)
          else
            CHANGED=$(git diff --name-only --diff-filter=AM HEAD~1...HEAD 2>/dev/null || true)
          fi
          echo "$CHANGED" > changed-files.txt
          echo "Total changed: $(wc -l < changed-files.txt)"

      - name: Validate frontmatter against schema
        id: validate
        continue-on-error: ${{ steps.strict.outputs.value != 'true' }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const matter = require('gray-matter');
          const { globSync } = require('glob');
          const Ajv = require('ajv/dist/2020').default;
          const addFormats = require('ajv-formats').default;

          const schemaPath = process.env.SCHEMA;
          const pattern = process.env.GLOB;

          if (!fs.existsSync(schemaPath)) {
            console.error(`[SKIP] schema não existe: ${schemaPath}`);
            process.exit(0);
          }

          const schema = JSON.parse(fs.readFileSync(schemaPath, 'utf8'));
          const ajv = new Ajv({ allErrors: true, strict: false });
          addFormats(ajv);
          const validate = ajv.compile(schema);

          // 2026-05-25 (Wagner "endureça"): valida APENAS changed files que
          // batem o glob da matriz. Legacy debt em ADRs/handoffs antigos não
          // é re-avaliada (append-only canon — ADR 0095 + Constituição Art. 3
          // proíbe edição retroativa pra fix de schema).
          const changedRaw = fs.existsSync('changed-files.txt')
            ? fs.readFileSync('changed-files.txt', 'utf8').trim().split('\n').filter(Boolean)
            : [];

          // Glob match — usa globSync com pattern original + intersect com changed
          const allMatching = globSync(pattern, { ignore: ['**/_*.md', '**/README.md', '**/INDEX.md'] });
          const allMatchingSet = new Set(allMatching);

          const files = changedRaw.filter(f => allMatchingSet.has(f));

          if (files.length === 0) {
            console.log(`[OK] nenhum arquivo NOVO/MODIFICADO bate ${pattern}`);
            console.log(`(${changedRaw.length} arquivos no diff, ${allMatching.length} bateriam glob, mas nenhum interseccão)`);
            process.exit(0);
          }
          console.log(`Validando ${files.length} arquivo(s) novo(s)/modificado(s) que batem ${pattern}`);

          let failed = 0;
          const violations = [];
          for (const file of files) {
            const raw = fs.readFileSync(file, 'utf8');
            // 2026-06-17: frontmatter YAML malformado (backslash não-escapado,
            // flow-seq `[W]` com texto colado, multiline key, etc) faz gray-matter
            // THROW. Sem este try/catch a exceção derruba o job inteiro (exit 1 +
            // stack trace) em vez de reportar a violação por-arquivo e seguir
            // validando o resto. Conta como erro (strict bloqueia merge).
            let data;
            try {
              ({ data } = matter(raw));
            } catch (e) {
              failed++;
              const reason = e && e.message ? e.message.split('\n')[0] : String(e);
              violations.push({ file, level: 'error', errors: [`YAML parse error: ${reason}`] });
              continue;
            }
            // grace period: arquivos sem frontmatter (legacy) — só warning
            if (!data || Object.keys(data).length === 0) {
              violations.push({ file, level: 'warn', errors: ['frontmatter ausente (legacy)'] });
              continue;
            }
            const ok = validate(data);
            if (!ok) {
              failed++;
              violations.push({
                file,
                level: 'error',
                errors: validate.errors.map((e) => `${e.instancePath || '/'} ${e.message}`),
              });
            }
          }

          console.log(`Arquivos validados: ${files.length} (apenas novos/modificados)`);
          console.log(`Falharam (erro): ${failed}`);
          console.log(`Avisos (legacy sem frontmatter): ${violations.filter((v) => v.level === 'warn').length}`);

          for (const v of violations) {
            const tag = v.level === 'error' ? '::error file=' + v.file + '::' : '::warning file=' + v.file + '::';
            console.log(tag + v.errors.join(' | '));
          }

          // Persist pra job summary + comment PR
          fs.writeFileSync('violations.json', JSON.stringify(violations, null, 2));

          process.exit(failed > 0 ? 1 : 0);
          NODE
        env:
          SCHEMA: ${{ matrix.schema }}
          GLOB: ${{ matrix.glob }}

      - name: Upload violations artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: violations-${{ strategy.job-index }}
          path: violations.json
          if-no-files-found: ignore

      - name: Comment PR with violations
        if: github.event_name == 'pull_request' && steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('violations.json')) return;
            const violations = JSON.parse(fs.readFileSync('violations.json', 'utf8'));
            const errors = violations.filter((v) => v.level === 'error');
            if (errors.length === 0) return;
            const strict = '${{ steps.strict.outputs.value }}';
            const label = '${{ matrix.label }}';
            const lines = errors.slice(0, 20).map((v) => `- \`${v.file}\` → ${v.errors.join(' · ')}`);
            const body = [
              `### Memory schema gate — ${label}`,
              '',
              strict === 'true'
                ? `**STRICT mode ligado** (escopo: apenas arquivos novos/modificados deste PR) — ${errors.length} violação(ões) BLOQUEIA merge.`
                : `**Grace period (strict=false)** — ${errors.length} violação(ões) reportada(s) como warning.`,
              '',
              ...lines,
              errors.length > 20 ? `\n_...mais ${errors.length - 20} omitidas (ver job logs)._` : '',
              '',
              `Schema: \`${'${{ matrix.schema }}'}\``,
              '',
              '> 2026-05-25 (Wagner "endureça"): legacy debt em ADRs/handoffs antigos NÃO é re-avaliada pra fix retroativo (append-only canon — ADR 0095 + Constituição Art. 3). Gate valida apenas novos.',
              '',
              'Como corrigir → ver [scripts/memory-schemas/README.md](../tree/${{ github.head_ref }}/scripts/memory-schemas/README.md).',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ── Sub-checks do corpo markdown (ex-memory-schema-gate-extended.yml · D6 #4) ──
  # validate-memory-schema.sh valida schema RÍGIDO de conteúdo (não só frontmatter):
  #   - filename regex (YYYY-MM-DD-<slug>.md session, YYYY-MM-DD-HHMM-<slug>.md handoff)
  #   - seções obrigatórias do CORPO markdown
  #   - lista US no formato US-<MOD>-<NNN>
  #   - seção "Estado MCP no momento do fechamento" em handoffs (ADR 0130 §6)
  # Override: linha `<!-- schema-allowlist: <razão> -->` no arquivo pula validação.

  validate-spec-schema:
    name: Schema SPEC.md (frontmatter + seções)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python (PyYAML pra parse frontmatter)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Detectar SPEC.md modificados
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          FILES="$(git diff --name-only --diff-filter=AM "${BASE}" "${HEAD}" -- 'memory/requisitos/**/SPEC.md' || true)"
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [[ -z "$FILES" ]]; then
            echo "Nenhum SPEC.md alterado."
          else
            echo "SPECs alterados:"
            echo "$FILES"
          fi

      - name: Validar SPEC schema
        id: validate
        if: steps.changed.outputs.files != ''
        run: |
          chmod +x .github/scripts/validate-memory-schema.sh
          echo "${{ steps.changed.outputs.files }}" | xargs -r .github/scripts/validate-memory-schema.sh spec
        env:
          VIOLATIONS_JSON: violations-spec.json

      - name: Upload violations
        if: always() && steps.changed.outputs.files != ''
        uses: actions/upload-artifact@v4
        with:
          name: violations-spec
          path: violations-spec.json
          if-no-files-found: ignore

      - name: Comentar PR com violations
        if: always() && github.event_name == 'pull_request' && steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const file = 'violations-spec.json';
            if (!fs.existsSync(file)) return;
            const violations = JSON.parse(fs.readFileSync(file, 'utf8'));
            const errors = violations.filter(v => v.level === 'error');
            const warns = violations.filter(v => v.level === 'warn');
            if (errors.length === 0 && warns.length === 0) return;
            const errLines = errors.slice(0, 15).map(v => `- \`${v.file}\` → ${v.error}`);
            const warnLines = warns.slice(0, 5).map(v => `- \`${v.file}\` → ${v.error}`);
            const body = [
              '### Memory schema gate EXTENDED — SPEC.md',
              '',
              errors.length > 0
                ? `**${errors.length} erro(s) de schema** — corrigir antes do merge:`
                : '_Sem erros._',
              ...errLines,
              warns.length > 0 ? '\n**Avisos (não bloqueiam):**' : '',
              ...warnLines,
              '',
              'Como corrigir → ver [memory/requisitos/Infra/RUNBOOK-memory-schema-gate-extended.md](../tree/${{ github.head_ref }}/memory/requisitos/Infra/RUNBOOK-memory-schema-gate-extended.md).',
              '',
              'Override emergencial: adicionar `<!-- schema-allowlist: <razão> -->` no SPEC.md.',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  validate-session-schema:
    name: Schema session log (filename + TL;DR)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Detectar sessions modificadas
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          FILES="$(git diff --name-only --diff-filter=AM "${BASE}" "${HEAD}" -- 'memory/sessions/**/*.md' \
            | grep -v '_TEMPLATE' \
            | grep -v 'README.md' \
            | grep -v '_INDEX' || true)"
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validar Session schema
        id: validate
        if: steps.changed.outputs.files != ''
        run: |
          chmod +x .github/scripts/validate-memory-schema.sh
          echo "${{ steps.changed.outputs.files }}" | xargs -r .github/scripts/validate-memory-schema.sh session
        env:
          VIOLATIONS_JSON: violations-session.json

      - name: Upload violations
        if: always() && steps.changed.outputs.files != ''
        uses: actions/upload-artifact@v4
        with:
          name: violations-session
          path: violations-session.json
          if-no-files-found: ignore

      - name: Comentar PR com violations
        if: always() && github.event_name == 'pull_request' && steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const file = 'violations-session.json';
            if (!fs.existsSync(file)) return;
            const violations = JSON.parse(fs.readFileSync(file, 'utf8'));
            const errors = violations.filter(v => v.level === 'error');
            if (errors.length === 0) return;
            const errLines = errors.slice(0, 15).map(v => `- \`${v.file}\` → ${v.error}`);
            const body = [
              '### Memory schema gate EXTENDED — Session log',
              '',
              `**${errors.length} erro(s) de schema** — corrigir antes do merge:`,
              '',
              ...errLines,
              '',
              'Filename deve bater `^YYYY-MM-DD-<slug-kebab>.md$`.',
              'Pelo menos uma seção `## TL;DR` ou `## Resumo executivo` ou `## Contexto` obrigatória.',
              '',
              'Template em [memory/sessions/_TEMPLATE.md](../tree/${{ github.head_ref }}/memory/sessions/_TEMPLATE.md).',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  validate-handoff-schema:
    name: Schema handoff (filename HHMM + Estado MCP)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Detectar handoffs modificados
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          # Handoffs são append-only (ADR 0130) — só pegamos arquivos ADDED
          # (diff-filter=A). Modified seria violação de ADR.
          FILES="$(git diff --name-only --diff-filter=A "${BASE}" "${HEAD}" -- 'memory/handoffs/**/*.md' \
            | grep -v '_TEMPLATE' \
            | grep -v 'README.md' || true)"
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validar Handoff schema
        id: validate
        if: steps.changed.outputs.files != ''
        run: |
          chmod +x .github/scripts/validate-memory-schema.sh
          echo "${{ steps.changed.outputs.files }}" | xargs -r .github/scripts/validate-memory-schema.sh handoff
        env:
          VIOLATIONS_JSON: violations-handoff.json

      - name: Upload violations
        if: always() && steps.changed.outputs.files != ''
        uses: actions/upload-artifact@v4
        with:
          name: violations-handoff
          path: violations-handoff.json
          if-no-files-found: ignore

      - name: Comentar PR com violations
        if: always() && github.event_name == 'pull_request' && steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const file = 'violations-handoff.json';
            if (!fs.existsSync(file)) return;
            const violations = JSON.parse(fs.readFileSync(file, 'utf8'));
            const errors = violations.filter(v => v.level === 'error');
            if (errors.length === 0) return;
            const errLines = errors.slice(0, 15).map(v => `- \`${v.file}\` → ${v.error}`);
            const body = [
              '### Memory schema gate EXTENDED — Handoff',
              '',
              `**${errors.length} erro(s) de schema** — corrigir antes do merge:`,
              '',
              ...errLines,
              '',
              '**Regras ADR 0130:**',
              '- Filename: `^YYYY-MM-DD-HHMM-<slug-kebab>.md$`',
              '- Seção obrigatória: `## Estado MCP no momento do fechamento` (prova MCP-first)',
              '- Append-only: NUNCA modificar handoff antigo (sempre arquivo novo)',
              '',
              'Template em [memory/handoffs/_TEMPLATE.md](../tree/${{ github.head_ref }}/memory/handoffs/_TEMPLATE.md).',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
