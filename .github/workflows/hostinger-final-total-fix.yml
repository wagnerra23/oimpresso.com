name: Hostinger — corrigir final_total inflado (incidente num_uf 2026-06-05)

# HOTFIX OUTAGE 2026-06-05: prod 500 = ScribeServiceProvider not found (require-dev
# não instalado em prod, mas no packages.php cacheado). Remove o manifest stale.

on:
  workflow_dispatch:
    inputs:
      mode: { description: 'ignorado', required: false, default: 'recovery2', type: string }
      since: { description: 'ignorado', required: false, default: '-', type: string }

concurrency:
  group: hostinger-final-total-fix
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Hostinger → recovery2 (rm manifest scribe)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            cd domains/oimpresso.com/public_html
            echo "===== Scribe em config/app.php (hardcoded?) ====="
            grep -in scribe config/app.php 2>&1 | head || echo "nao no app.php"
            echo "===== Scribe em composer.json ====="
            grep -in scribe composer.json 2>&1 | head || echo "nao no composer.json"
            echo "===== vendor/knuckles instalado? ====="
            ls -d vendor/knuckles 2>&1 || echo "AUSENTE (require-dev nao instalado em prod)"
            echo "===== packages.php menciona Scribe? ====="
            grep -ic scribe bootstrap/cache/packages.php 2>/dev/null || echo "0/sem-arquivo"
            echo "===== RM manifest stale (Laravel reconstroi sem scribe) ====="
            rm -fv bootstrap/cache/packages.php bootstrap/cache/services.php 2>&1 || true
            echo "===== rebuild via package:discover ====="
            php artisan package:discover --ansi 2>&1 | tail -15 || echo "discover FALHOU (scribe pode estar hardcoded em app.php)"
            echo "===== HEALTH externo real ====="
            curl -s -o /dev/null -w "ext https login: %{http_code}\n" --max-time 20 https://oimpresso.com/login 2>&1 || true
            echo "===== done ====="
