name: Hostinger — corrigir final_total inflado (incidente num_uf 2026-06-05)

on:
  workflow_dispatch:
    inputs:
      mode: { description: 'ignorado', required: false, default: 'recovery5', type: string }
      since: { description: 'ignorado', required: false, default: '-', type: string }

concurrency:
  group: hostinger-final-total-fix
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Hostinger → recovery5 composer install
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            cd domains/oimpresso.com/public_html
            set +e
            echo "===== composer install --no-dev --no-scripts (reconcilia installed.json sem scribe) ====="
            composer install --no-dev --no-scripts --no-interaction 2>&1 | tail -25
            echo "===== rm manifest + config cache stale ====="
            rm -fv bootstrap/cache/packages.php bootstrap/cache/services.php bootstrap/cache/config.php 2>&1
            echo "===== php artisan up (boota com installed.json reconciliado) ====="
            php artisan up 2>&1 | tail -6
            echo "===== force rm down files ====="
            rm -fv storage/framework/down bootstrap/cache/down storage/framework/maintenance.php 2>&1
            echo "===== HEALTH externo 5x ====="
            for i in 1 2 3 4 5; do curl -s -o /dev/null -w "%{http_code} " --max-time 15 https://oimpresso.com/login; sleep 3; done
            echo ""
            echo "===== done ====="
