name: Hostinger — corrigir final_total inflado (incidente num_uf 2026-06-05)

# HOTFIX OUTAGE 2026-06-05: reaproveitado pra diagnóstico+recovery do prod 500.
# Roda via gh workflow run --ref <branch>. Remover pós-incidente.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'ignorado (recovery)'
        required: false
        default: 'recovery'
        type: string
      since:
        description: 'ignorado'
        required: false
        default: '-'
        type: string

concurrency:
  group: hostinger-final-total-fix
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Hostinger → diagnóstico + recovery prod 500
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            cd domains/oimpresso.com/public_html
            echo "===== GIT HEAD ====="
            git log --oneline -3 2>&1 || true
            echo "===== laravel.log (tail 50) ====="
            tail -50 storage/logs/laravel.log 2>&1 || echo "(sem log)"
            echo "===== PHP error_log (tail 30) ====="
            tail -30 error_log 2>&1 || echo "(sem error_log)"
            echo "===== RECOVERY: optimize:clear ====="
            php artisan optimize:clear 2>&1 || echo "optimize:clear FALHOU"
            echo "===== RECOVERY: dump-autoload --no-scripts ====="
            composer dump-autoload --optimize --no-scripts --no-interaction 2>&1 | tail -8 || echo "dump-autoload FALHOU"
            echo "===== RECOVERY: config+route+view cache ====="
            php artisan config:clear 2>&1 || true
            php artisan view:clear 2>&1 || true
            php artisan route:clear 2>&1 || true
            echo "===== HEALTH local ====="
            curl -s -o /dev/null -w "localhost/login: %{http_code}\n" http://localhost/login 2>&1 || true
            echo "===== done ====="
