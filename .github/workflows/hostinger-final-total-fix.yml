name: Hostinger — corrigir final_total inflado (incidente num_uf 2026-06-05)

on:
  workflow_dispatch:
    inputs:
      mode: { description: 'ignorado', required: false, default: 'recovery4', type: string }
      since: { description: 'ignorado', required: false, default: '-', type: string }

concurrency:
  group: hostinger-final-total-fix
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Hostinger → recovery4 sair manutenção
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            cd domains/oimpresso.com/public_html
            echo "===== scribe require vs dev ====="
            php -r '$c=json_decode(file_get_contents("composer.json"),true); echo "require=".(isset($c["require"]["knuckleswtf/scribe"])?"SIM":"nao")." dev=".(isset($c["require-dev"]["knuckleswtf/scribe"])?"SIM":"nao")."\n";' 2>&1 || true
            echo "===== arquivos de manutenção ====="
            ls -la storage/framework/down bootstrap/cache/down 2>&1 || echo "(sem down file via ls)"
            echo "===== rm manifest stale (garante sem scribe) ====="
            rm -fv bootstrap/cache/packages.php bootstrap/cache/services.php 2>&1 || true
            echo "===== php artisan up (rebuilda manifest sem scribe + sai manutencao) ====="
            php artisan up 2>&1 | tail -8 || echo "up FALHOU"
            echo "===== force rm down files ====="
            rm -fv storage/framework/down bootstrap/cache/down storage/framework/maintenance.php 2>&1 || true
            echo "===== HEALTH externo 4x ====="
            for i in 1 2 3 4; do curl -s -o /dev/null -w "%{http_code} " --max-time 15 https://oimpresso.com/login; sleep 3; done; echo
            echo "===== done ====="
