name: Hostinger — corrigir final_total inflado (incidente num_uf 2026-06-05)

on:
  workflow_dispatch:
    inputs:
      mode: { description: 'ignorado', required: false, default: 'recovery3', type: string }
      since: { description: 'ignorado', required: false, default: '-', type: string }

concurrency:
  group: hostinger-final-total-fix
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: SSH Hostinger → recovery3 diag
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            cd domains/oimpresso.com/public_html
            echo "===== scribe: require vs require-dev ====="
            php -r '$c=json_decode(file_get_contents("composer.json"),true); echo "require: ".(isset($c["require"]["knuckleswtf/scribe"])?"SIM":"nao")."\n"; echo "require-dev: ".(isset($c["require-dev"]["knuckleswtf/scribe"])?"SIM":"nao")."\n";' 2>&1
            echo "===== packages.php atual tem scribe? ====="
            grep -ic -i scribe bootstrap/cache/packages.php 2>/dev/null || echo "0/sem-arquivo"
            echo "===== services.php tem scribe? ====="
            grep -ic -i scribe bootstrap/cache/services.php 2>/dev/null || echo "0/sem-arquivo"
            echo "===== optimize:clear (manifest limpo agora) ====="
            php artisan optimize:clear 2>&1 | tail -12
            echo "===== config:clear + cache:clear ====="
            php artisan config:clear 2>&1 | tail -2 || true
            echo "===== HEALTH externo 3x ====="
            for i in 1 2 3; do curl -s -o /dev/null -w "%{http_code} " --max-time 15 https://oimpresso.com/login; sleep 3; done; echo
            echo "===== laravel.log tail 6 (erro atual) ====="
            tail -6 storage/logs/laravel.log 2>&1 | head -6 || true
            echo "===== done ====="
