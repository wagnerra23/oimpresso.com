name: Design-memory gate (advisory)

# 2026-06-30 (ADR 0314 F2 · poda onda 2): FUSÃO de 3 workflows advisory de
# design-memory num único `design-memory-gate.yml`, 1 job por sub-check (mesmos
# scripts, mesmos self-tests, mesmos exits). TODOS os sub-checks dos 3 antigos
# rodam aqui — counterfactual por sub-check provado antes da fusão (component-
# registry .test.mjs MORDE export ausente/import quebrado · dtcg .test.mjs MORDE
# token divergente · design-memory selftests good/bad). Nenhum dos 3 era required
# (branch protection confirmado) → fusão não toca branch protection. Originais
# DELETADOS + registros sincronizados (gates-registry.json + .memory-health-
# baseline.json checkM).
#
# Componentes fundidos:
#   - registry-check (ex-component-registry.yml · Onda O2): sentinela de drift do
#     registro bloco-de-protótipo → componente React (prototipo-ui/
#     component-registry.json). self-test obrigatório (bloqueia se o gate mentir)
#     + drift advisory.
#   - gates (ex-design-memory-gates.yml): Cowork SSOT guard (hard) + ds-guard §8
#     nos arquivos tocados + relatório de dívida + integrity-check §15 + selftests
#     da espinha de import (detectar-telas/ancora/importar-bundle/gerar-contrato/
#     recortar-regiao/analise-regiao) + ancora-adversário (hard).
#   - prove (ex-dtcg-equivalence.yml): equivalência DTCG ↔ CSS canônico (tokens
#     editados no JSON portável, CSS é SAÍDA) + self-test que morde.
#
# ADVISORY de nascença (ADR 0271/0275/0298): cada sub-check de drift roda em
# continue-on-error (não bloqueia merge); os self-tests/guards rodam SEM
# continue-on-error (a suite que valida o gate não pode mentir). NÃO entra em
# branch protection. Node puro, sem DB/rede — segundos.
#
# Trigger: união dos paths dos 3 antigos (é exatamente onde cada drift nasce).

on:
  pull_request:
    branches: [main]
    paths:
      - 'resources/js/Components/ui/**'
      - 'resources/js/Components/layout/**'
      - 'resources/js/Pages/**/*.tsx'
      - 'prototipo-ui/**'
      - 'resources/css/tokens/**'   # inclui *.tokens.json, _generated-*.css e o style-dictionary.config
      - 'resources/css/inertia.css'
      - 'resources/css/foundations.css'
      - 'resources/css/cockpit.css'
      - 'scripts/governance/component-registry-check.mjs'
      - 'scripts/governance/component-registry-check.test.mjs'
      - 'scripts/governance/dtcg-equivalence.mjs'
      - 'scripts/governance/dtcg-equivalence.test.mjs'
      - '.github/workflows/design-memory-gate.yml'
  workflow_dispatch:

concurrency:
  group: design-memory-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── ex-component-registry.yml (Onda O2) ──────────────────────────────────────
  registry-check:
    name: component-registry drift (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # self-test do próprio gate PRIMEIRO — prova que a sentinela morde/libera (sem máscara)
      - name: self-test da sentinela (.test.mjs · bloqueia se o gate mentir)
        run: node scripts/governance/component-registry-check.test.mjs
      # drift do registry real — advisory (não bloqueia)
      - name: component-registry-check (advisory · report-only)
        continue-on-error: true
        run: node scripts/governance/component-registry-check.mjs --check --strict

  # ── ex-design-memory-gates.yml ──────────────────────────────────────────────
  gates:
    name: design-memory gates (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # historico suficiente pro git diff vs origin/main funcionar
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cowork SSOT guard: fonte ÚNICA do design — cowork/ build-only (zero .md) ·
      # sem bundles datados cowork-* · sem protótipo fora do allowlist. SEM
      # continue-on-error de propósito = falha VERMELHO (Wagner: "deve dar erro").
      # Workflow segue fora de branch-protection até maturar (ADR 0271/0275).
      - name: Cowork SSOT guard (fonte única · build-only)
        run: node scripts/governance/cowork-ssot-guard.mjs

      # DS-GUARD nos arquivos TOCADOS (css/html de design-memory). O ds-guard so
      # checa .css/.html; .tsx e ignorado por ele (log '. ... ignorado'), entao
      # alimentamos so o que ele entende. Sem arquivos tocados -> ds-guard imprime
      # uso e sai 0 (nao bloqueia). continue-on-error = advisory.
      - name: DS-GUARD (arquivos tocados · §8)
        if: always()  # advisory roda mesmo se o ssot-guard (hard-fail) falhar antes — senao skipa
        continue-on-error: true
        run: |
          BASE="origin/${{ github.base_ref }}"
          if [ -z "${{ github.base_ref }}" ]; then BASE="origin/main"; fi
          CHANGED=$(git diff --name-only "$BASE"...HEAD -- 'prototipo-ui/**' 'resources/js/Pages/**' | grep -E '\.(css|html)$' || true)
          if [ -z "$CHANGED" ]; then
            echo "Nenhum .css/.html de design-memory tocado neste PR — nada a checar (ds-guard so checa css/html)."
            exit 0
          fi
          echo "Arquivos tocados (css/html) que o ds-guard vai checar:"
          echo "$CHANGED"
          echo "---"
          node prototipo-ui/ds-guard.mjs $CHANGED

      # DS-GUARD --all: relatorio de divida da arvore (NAO bloqueia por design · §8).
      # Sempre roda, da visibilidade da divida acumulada (paleta inventada / tela na raiz).
      - name: DS-GUARD relatorio de divida (--all · §8)
        if: always()
        continue-on-error: true
        run: node prototipo-ui/ds-guard.mjs --all

      # integrity-check: a propria memoria nao corrompeu (espinha · pares charter/decisoes ·
      # LICOES contiguas · benchmark). Sai 1 se algum IT duro falhar; advisory aqui.
      - name: Integrity check (espinha da memoria · §15)
        if: always()
        continue-on-error: true
        run: node prototipo-ui/integrity-check.mjs

      # detectar-telas --selftest: trava de regressao do gate de import (Fase 0/0.5 do
      # protocolo aplicar-prototipo). O fixture hermetico (prototipo-ui/fixtures/detectar-telas/)
      # prova: mockup sem charter resolvido por ALIAS (P0 lock) · orfao detectado · diff
      # diffavel correto. O modo --staging (bundle->repo) so roda local (bundle vive fora do
      # repo). Advisory de nascenca (ADR 0271/0275). TODO: integrar good/bad em gate-selftest.mjs.
      - name: detectar-telas selftest (gate de import · Fase 0/0.5)
        # if: always() — roda mesmo quando um step hard-fail antes (ex: cowork-ssot-guard com
        # drift pre-existente prototipos/perfil) skiparia os steps seguintes. O selftest e'
        # independente do ssot-guard; continue-on-error mantem o job advisory.
        if: always()
        continue-on-error: true
        run: node prototipo-ui/detectar-telas.mjs --selftest
      # detectar-telas.test.mjs: a sentinela ALIAS↔charter (fonte única) JÁ existia e provava
      # que morde (anti-drift A/B + meta-tests c1/c2), mas NUNCA rodava em CI (defesa construída
      # e DESARMADA). Armada aqui. Check C endurece B: charter que COBRE um mockup do ALIAS
      # (component/bundle_source) = redundante (2 fontes do mesmo fato). Node puro, segundos.
      - name: detectar-telas anti-drift ALIAS↔charter (fonte única · A+B+C)
        if: always()
        continue-on-error: true
        run: node prototipo-ui/detectar-telas.test.mjs
      # ancora.mjs (#7 2026-06-30): a âncora de uma tela é computada do charter, nunca um png
      # de auditoria no olho. importar-bundle: só troca o staging quando extraídos==entries
      # (delete-before-verify fechado). Ambos selftest puro (rodam em Linux/CI).
      - name: ancora selftest (âncora = charter, não print de auditoria)
        if: always()
        continue-on-error: true
        run: node prototipo-ui/ancora.mjs --selftest
      # Conteúdo da âncora (Wagner 2026-07-06): o ancora.mjs prova PROVENIÊNCIA (declarada no
      # charter), não CORREÇÃO (o arquivo bate com a tela). 2/9 âncoras estavam podres
      # (shell/fantasma) e nenhum gate viu — Wagner pegou no instinto. Este abre a âncora.
      - name: anchor-content selftest (o gate morde e libera certo)
        if: always()
        continue-on-error: true
        run: node scripts/governance/anchor-content-check.test.mjs
      - name: anchor-content-check (âncora aponta pro FONTE da tela, não shell/fantasma · advisory)
        if: always()
        continue-on-error: true
        run: node scripts/governance/anchor-content-check.mjs --check
      # Frescor do espelho (Wagner 2026-07-06, ADR 0324): o anchor-content prova que a âncora
      # aponta pro arquivo certo (correção), não que a cópia do repo ainda BATE com o design
      # VIVO no Cowork (ponto cego #2: "bubble velha" — arquivo existe mas é design antigo).
      # SÓ o SELFTEST roda aqui (node puro, prova a classificação): a checagem VIVA (--compare)
      # usa DesignSync.get_file, que exige /design-login (auth claude.ai) e NÃO roda em CI
      # headless (ADR 0315 §Furos) — é rotina local/dispatch por agente, nunca gate de PR.
      - name: cowork-mirror-freshness selftest (o gate de frescor morde e libera certo)
        if: always()
        continue-on-error: true
        run: node scripts/governance/cowork-mirror-freshness.test.mjs
      - name: importar-bundle selftest (import atômico · verifica antes de trocar)
        if: always()
        continue-on-error: true
        run: node prototipo-ui/importar-bundle.mjs --selftest
      # adversário permanente: ATAQUE 1 (hook auto-contido, não falha-aberto) é GATE DURO —
      # se o hook voltar a importar ancora.mjs (regride pra fail-open), este step FALHA. Gaps
      # conhecidos (rename/tool-bypass) ficam documentados com fix; mudar de comportamento avisa.
      - name: ancora-adversário (ATAQUE 1 não pode regredir pra fail-open)
        if: always()
        run: node scripts/evals/ancora-adversario.eval.mjs
      # W1 do processo região-a-região: deriva o esqueleto do <tela>.contract.json do gap.md
      # (não "no olho"). Selftest hermético (fixture gap.md 2 regiões + par bom/ruim do --check).
      - name: gerar-contrato selftest (W1 região-a-região)
        if: always()
        continue-on-error: true
        run: node prototipo-ui/gerar-contrato.mjs --selftest
      # W2: recorte do screenshot pela âncora da região (aprova a PARTE, não a tela). O PLANO
      # de recorte é puro (testável no CI); o crop (PowerShell) e a coleta de bbox (browser) só
      # rodam local. Selftest = região sem bbox → AUSENTE explícito, nunca tela-inteira em silêncio.
      - name: recortar-regiao selftest (W2 região-a-região)
        if: always()
        continue-on-error: true
        run: node prototipo-ui/recortar-regiao.mjs --selftest
      # W3: roteia cada região ao crítico especializado (design-critique/ux-copy/a11y/screen-grade)
      # ESCOPADO ao recorte do W2, não à tela. Selftest = roteamento determinístico (a crítica é o agente).
      - name: analise-regiao selftest (W3 região-a-região)
        if: always()
        continue-on-error: true
        run: node prototipo-ui/analise-regiao.mjs --selftest

  # ── ex-dtcg-equivalence.yml (Onda DTCG ATIVADA) ──────────────────────────────
  prove:
    name: equivalencia DTCG <-> CSS canonico (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Self-test (fixture boa passa + fixture ruim falha)
        run: node scripts/governance/dtcg-equivalence.test.mjs

      - name: Provar equivalencia (advisory)
        id: prove
        continue-on-error: true  # advisory: divergencia nunca derruba o PR (ADR 0271/0275)
        run: |
          node scripts/governance/dtcg-equivalence.mjs --json > /tmp/dtcg.json
          node scripts/governance/dtcg-equivalence.mjs --detail | tee /tmp/dtcg.txt

      - name: Job summary (provados iguais / divergencias)
        if: always()
        run: |
          {
            echo '## DTCG <-> CSS canonico — equivalencia (Onda DTCG)'
            echo ''
            echo 'ADVISORY (nao bloqueia). Onda DTCG ATIVADA: prova que cada token DTCG tem'
            echo 'o MESMO valor que o CSS emitido (_generated-*.css) que o build consome.'
            echo 'Divergencia aqui = edicao manual no gerado OU regressao do gerador.'
            echo ''
            echo '```'
            cat /tmp/dtcg.txt 2>/dev/null || echo '(sem saida — ver passo anterior)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
