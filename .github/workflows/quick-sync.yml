name: Quick Sync (auto on push)

# Deploy leve pra fixes pequenos (views, configs, assets estaticos).
# Dispara automatico em push pra main, E manual via workflow_dispatch.
# Pra mudancas pesadas (composer, migrations), usar deploy.yml.
on:
  push:
    branches:
      - main
    paths:
      - 'resources/**'
      - 'public/**'
      - 'config/**'
      - 'routes/**'
      - 'lang/**'
      - 'app/**'
      - '!app/Console/Commands/**'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  quick-sync:
    name: Quick sync to Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: SSH helper
        run: |
          cat > /tmp/ssh_exec.sh <<'EOF'
          #!/bin/bash
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }} \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "$@"
          EOF
          chmod +x /tmp/ssh_exec.sh

      - name: Git pull
        run: |
          /tmp/ssh_exec.sh "
            cd /home/u906587222/domains/oimpresso.com/public_html &&
            git fetch origin &&
            git reset --hard origin/main &&
            git log --oneline -3
          "

      - name: Clear view + config + route caches
        run: |
          /tmp/ssh_exec.sh "
            cd /home/u906587222/domains/oimpresso.com/public_html &&
            php artisan view:clear &&
            php artisan config:clear &&
            php artisan route:clear
          "

      - name: Smoke test
        run: |
          curl -sL -o /dev/null -w "HTTP %{http_code} (%{time_total}s)\n" https://oimpresso.com/login

      - name: Sync concluido
        run: echo "Quick sync deployado. Para mudancas pesadas use deploy.yml (backup + composer + migrate)."
