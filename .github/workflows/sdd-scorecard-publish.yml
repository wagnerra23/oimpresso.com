name: SDD Scorecard publish (commit-back do floor · ADR 0279)

# Gap-1a do roadmap SDD (P01): ATERRISSAGEM do floor medido de volta no main.
#
# O elo MEDIR→GOVERNAR estava parcialmente reconectado:
#   - write-side (CT100, ADR 0279 PR-2): publica governance/nightly-floor.json na
#     branch órfã governance/nightly-floor via git-push [skip ci] (floor vivo = 295).
#   - read-side (ADR 0279 PR-1 · US-GOV-023): sdd-scorecard.mjs lê esse arquivo e
#     vira full_suite_pass_rate = measured.
#   - materialização CI (sdd-scorecard.yml): durante o run, faz git fetch + git show
#     da branch órfã → o scorecard ENXERGA o floor vivo.
# MAS nenhum job COMMITAVA o valor de volta em governance/sdd-scorecard.json no main.
# Resultado: o scorecard commitado fica DEFASADO (not_yet_measured/null) enquanto o
# floor real já é 295. O número que o time enxerga no main MENTE por defasagem.
#
# Este workflow fecha esse elo: materializa o floor da branch órfã, roda o agregador
# e COMMITA governance/sdd-scorecard.json no main quando (e só quando) o valor mudou.
# Padrão ADR 0279 Opção A (repo = SSOT). O commit-back vai via AUTO-PR (peter-evans +
# COWORK_BOT_PAT + auto-merge), padrão copiado de shipped-log-cron.yml — NÃO push direto.
# Por quê: main exige PR + ~25 required checks (gates LIGADOS 2026-06-11, enforce_admins:true),
# então `git push origin HEAD` é REJEITADO (GH013 — "Changes must be made through a pull
# request"). Era esse o bug: o commit-back nascia vermelho toda noite desde ~24/jun e o floor
# nunca aterrissava (scorecard mentia not_yet_measured apesar do floor vivo). O PAT (não
# GITHUB_TOKEN) é obrigatório: PR aberto pelo GITHUB_TOKEN não dispara CI → ficaria preso no
# branch protection. SEM force-push em main; a branch chore/ é efêmera (delete-branch).
#
# ESCOPO P01: só ATERRISSA o número (mede honesto). NÃO arma o ratchet — armar o
# baseline (armed:true após 3 medições válidas) é P02. Sem P02, o floor MEDE mas
# ainda não GOVERNA; este workflow garante apenas que o número chega correto.
#
# Triggers: schedule + push(main · paths SPEC/scripts) + workflow_dispatch — NUNCA pull_request.
# O push(main) fecha o item (c) "frescor" da proposta 2026-06-24: SPEC mergeado RECOMPUTA o
# scorecard na hora (anchor_coverage etc.) em vez de esperar até 1 dia pelo cron — o número que o
# time enxerga no main para de mentir por defasagem. RECURSÃO-SAFE: o commit-back é [skip ci] (pula
# todos os workflows) E só toca governance/sdd-scorecard.json, que NÃO está nos paths do push aqui.
# NUNCA pull_request (sdd-scorecard.json está nos paths de sdd-scorecard.yml — disparo em PR recursaria).
# Cron 10:10 UTC (07:10 BRT) vira BACKSTOP — pós-nightly CT100 (02:00) + scorecard advisory (09:50);
# pega o floor nightly + drift de código-move-sem-SPEC (que o push de SPEC não cobre).

on:
  schedule:
    - cron: '10 10 * * *' # 07:10 BRT diário (pós-nightly CT100 + pós-scorecard advisory) — BACKSTOP
  push:
    branches: [main]
    paths: # frescor (item c · proposta 2026-06-24): fontes vivas do scorecard que mudam no merge
      - 'memory/requisitos/**/SPEC.md'
      - 'scripts/governance/sdd-scorecard.mjs'
      - 'scripts/governance/anchor-lint.mjs'
  workflow_dispatch:

concurrency:
  group: sdd-scorecard-publish
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: read # drift_alarms (GT-G4): protection-drift.mjs lê last run verde dos workflows-fonte

jobs:
  publish:
    name: Commit-back do floor no main (ADR 0279 · só quando muda · [skip ci])
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # distiller_freshness usa data-git do doc mais novo por módulo (ADR 0291 D-D);
          # shallow (depth 1) faz todo doc voltar a data do HEAD → stale fantasma aterrissado
          # no main (mesmo bug já corrigido no sdd-scorecard-ratchet.yml).
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read-side do floor — meta-teste (hard · ADR 0279 PR-1 · US-GOV-023)
        run: node scripts/governance/sdd-floor-read.test.mjs

      - name: Read-side do ragas_real_uptime — meta-teste (hard · ADR 0318 · transporte 0279)
        run: node scripts/governance/sdd-ragas-read.test.mjs

      - name: Materializa floor + coverage da branch governance/nightly-floor (ADR 0279/0275 transporte)
        run: |
          if git fetch origin governance/nightly-floor --depth 1 2>/dev/null \
             && git show FETCH_HEAD:governance/nightly-floor.json > governance/nightly-floor.json 2>/dev/null; then
            echo "floor materializado da branch governance/nightly-floor:"; cat governance/nightly-floor.json
          else
            echo "::warning::branch/arquivo de floor ausente — nada a aterrissar (read-side cai em not_yet_measured)"
          fi
          # SDD P07 (ADR 0275 §2): sem esta materialização o scorecard PUBLICADO nunca
          # veria coverage_pct measured (o ratchet materializava, o publish não — o
          # aterrissado em main ficava not_yet_measured pra sempre). Soft: coverage
          # ausente na órfã = read-side cai em not_yet_measured honesto, nunca mente 0.
          if git show FETCH_HEAD:governance/nightly-coverage.json > governance/nightly-coverage.json 2>/dev/null; then
            echo "coverage materializado:"; cat governance/nightly-coverage.json
          else
            echo "coverage ausente na órfã — coverage_pct segue not_yet_measured"
          fi
          # Trend do RAGAS real (ADR 0318): órfã PRÓPRIA (a de floor é force-pushed
          # toda noite; o trend acumula). Soft: ausente = ragas_real_uptime segue
          # not_yet_measured honesto (esperado até a 1ª publicação dominical do CT100).
          if git fetch origin governance/ragas-real-trend --depth 1 2>/dev/null \
             && git show FETCH_HEAD:governance/ragas-real-trend.json > governance/ragas-real-trend.json 2>/dev/null; then
            echo "trend ragas materializado:"; cat governance/ragas-real-trend.json
          else
            echo "órfã governance/ragas-real-trend ausente — ragas_real_uptime segue not_yet_measured (1º cron 2026-07-05)"
          fi

      - name: Medir — agregador reescreve governance/sdd-scorecard.json
        # GH_TOKEN: sem ele, measureDriftAlarms cai no fallback honesto (not_yet_measured)
        # e a métrica NUNCA aterrissa — o protection-drift.mjs (fonte GT-G4) exige gh
        # autenticado. Mesmo token do protection-drift.yml (rotas públicas, read-only).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node scripts/governance/sdd-scorecard.mjs | tee /tmp/scorecard.txt
          { echo '## SDD Scorecard publish (medição desta run)'; echo '```'; cat /tmp/scorecard.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Detecta mudança no scorecard
        id: diff
        run: |
          # nightly-floor.json é gitignored (materialização runtime) → nunca entra no diff.
          if git diff --quiet -- governance/sdd-scorecard.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "scorecard já em dia com o floor vivo — nada a aterrissar."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            FLOOR=$(node -e "const j=require('./governance/sdd-scorecard.json');console.log(j.metrics.full_suite_pass_rate.value)")
            echo "floor=$FLOOR" >> "$GITHUB_OUTPUT"
            git diff --stat governance/sdd-scorecard.json
            { echo "### Floor desta medição: ${FLOOR}"; } >> "$GITHUB_STEP_SUMMARY"
          fi

      # Auto-PR (NÃO push direto): main exige PR + required checks. O PAT dispara o CI;
      # GITHUB_TOKEN não dispararia → PR preso. add-paths garante que SÓ o scorecard entra
      # (nightly-floor.json materializado é gitignored, mas add-paths é defesa explícita).
      - name: Auto-PR de aterrissagem do floor
        if: steps.diff.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.COWORK_BOT_PAT }}
          base: main
          branch: chore/sdd-scorecard-floor
          add-paths: governance/sdd-scorecard.json
          commit-message: |
            chore(governance): aterrissa floor do scorecard SDD (floor=${{ steps.diff.outputs.floor }} · ADR 0279 · P01)

            Fecha o elo MEDIR->GOVERNAR: floor vivo da branch órfã governance/nightly-floor
            aterrissado no scorecard canônico em main (repo = SSOT · ADR 0279 Opção A).

            Refs: US-GOV-023
            Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>
          title: 'chore(governance): aterrissa floor do scorecard SDD (floor=${{ steps.diff.outputs.floor }} · ADR 0279)'
          body: |
            **Aterrissagem automática do floor SDD** (P01 / Gap-1a · ADR 0279).

            O write-side CT100 publica o floor vivo na branch órfã `governance/nightly-floor`;
            este PR traz o número medido pro scorecard canônico em `main` (repo = SSOT).
            Floor desta medição: **${{ steps.diff.outputs.floor }}** arquivos-que-falham.

            Substitui o `git push origin HEAD` direto (rejeitado por branch protection desde
            ~24/jun — GH013) pelo padrão auto-PR de `shipped-log-cron.yml`. Auto-merge habilitado.

            🤖 Generated by SDD Scorecard publish
          labels: |
            governance
            automated
          delete-branch: true

      - name: Auto-merge no PR gerado
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.COWORK_BOT_PAT }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --auto --delete-branch
