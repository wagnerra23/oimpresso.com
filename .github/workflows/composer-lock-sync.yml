name: Composer lock sync

# Sincroniza composer.lock com composer.json sem atualizar deps existentes.
# Resolve drift quando alguém adicionou pacote ao composer.json sem rodar
# `composer update`. Conservador: --lock só atualiza o arquivo de lock dos
# pacotes mencionados, sem instalar novas versões.
#
# Uso: gh workflow run composer-lock-sync.yml -f packages="laravel/mcp laravel/octane"
#      ou disparar pelo GitHub UI em Actions → "Composer lock sync" → Run workflow

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Pacotes pra sincronizar no lock (espaço-separado). Vazio = lock completo.'
        required: false
        default: 'laravel/mcp laravel/octane'
      base_branch:
        description: 'Branch base pra abrir o PR'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Update composer.lock
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, bcmath, intl, gd, pdo_mysql, zip, pcntl, posix
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-lock-sync-${{ hashFiles('composer.json') }}
          restore-keys: composer-lock-sync-

      - name: Composer update --lock
        run: |
          set -e
          if [ -z "${{ inputs.packages }}" ]; then
            echo "→ Sincronizando lock completo"
            composer update --lock --no-interaction --no-progress --no-scripts
          else
            echo "→ Sincronizando lock para: ${{ inputs.packages }}"
            composer update --lock ${{ inputs.packages }} --no-interaction --no-progress --no-scripts
          fi

      - name: Diff resumido
        id: diff
        run: |
          if git diff --quiet composer.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nada mudou no composer.lock — já estava sincronizado."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat composer.lock
          fi

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ inputs.base_branch }}
          branch: chore/composer-lock-sync-${{ github.run_id }}
          commit-message: |
            chore(composer): sincroniza composer.lock com composer.json

            Pacotes: ${{ inputs.packages }}
            Disparado por: ${{ github.actor }} via workflow_dispatch
          title: 'chore(composer): sincroniza composer.lock (${{ inputs.packages }})'
          body: |
            **Composer lock sync automático.**

            Pacotes solicitados: `${{ inputs.packages }}`

            Roda `composer update --lock <pacotes>` — só sincroniza o lock file
            sem mexer nas versões dos demais pacotes.

            Disparado por @${{ github.actor }}.

            **Antes de mergear:**
            - [ ] Conferir que diff só toca composer.lock
            - [ ] CI verde
            - [ ] Hostinger tem `ext-pcntl` + `ext-posix` (Octane requer; quase certo que sim)

            🤖 Generated by Composer lock sync workflow
          labels: |
            chore
            dependencies
            automated
          delete-branch: true
