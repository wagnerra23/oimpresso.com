name: Governance Drift Framework — ADR 0216

# Generaliza secrets-governance.yml (ADR 0215) — orquestra TODOS DriftCheckers
# via governance:audit. (secrets-governance.yml legacy foi consolidado aqui
# na ADR 0271 onda 2 — canary ADR 0216 encerrado.)

on:
  # ADR 0271 onda 2 (follow-up B — required-readiness): pull_request SEM paths
  # (always-run) pra promover "ADR 0216 PR scan" a required sem deadlock
  # "Expected — waiting". O --diff-only passa trivial em diff fora de escopo;
  # o custo fixo (composer+npm ~2-3min) foi aceito por Wagner 2026-06-11.
  pull_request:
    branches: [main]
  schedule:
    # Daily 06:35 BRT (09:35 UTC) — Camada 3 ADR 0216 health-check + auto-PR
    - cron: '35 9 * * *'
  workflow_dispatch:

jobs:
  drift-scan-pr:
    name: ADR 0216 PR scan (governance:audit --diff-only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need diff against base
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, opentelemetry
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install PHP dependencies (no-dev)
        # --no-scripts: pula o post-autoload-dump da OTel (_register.php) que
        # THROW em CI (extension_loaded('opentelemetry') runtime check). CI nunca
        # emite spans (só CT 100, ADR 0062). Paridade com phpstan-gate.yml. Incident 2026-05-28.
        run: composer install --no-progress --no-interaction --prefer-dist --no-scripts
      - name: Install Node dependencies (for npm_audit checker — ADR 0223)
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Prepare storage dirs + .env mínimo
        # governance:audit boota o framework (AppServiceProvider → Blade) que exige
        # config('view.compiled') válido. Sem .env/storage o boot dá "Please provide
        # a valid cache path". --no-persist já evita acesso a DB. Paridade phpstan-gate.yml.
        run: |
          mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
          cat > .env <<'EOF'
          APP_NAME=oimpresso-governance-pr
          APP_ENV=testing
          APP_DEBUG=false
          APP_URL=http://localhost
          LOG_CHANNEL=stderr
          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          MAIL_MAILER=array
          TELESCOPE_ENABLED=false
          VIEW_COMPILED_PATH=storage/framework/views
          BCRYPT_ROUNDS=4
          APP_KEY=
          EOF
          php artisan key:generate --force
      - name: Run governance:audit on PR (block-level fail)
        run: |
          # PR mode: --diff-only + fail-on=block (CI gate)
          # No-persist pra não escrever em mcp_alertas_eventos durante CI
          php artisan governance:audit \
            --diff-only \
            --no-persist \
            --fail-on=block \
            --json > governance-drift-report.json || EXIT_CODE=$?
          cat governance-drift-report.json
          exit ${EXIT_CODE:-0}
      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-drift-report
          path: governance-drift-report.json
          retention-days: 14

  drift-audit-scheduled:
    name: ADR 0216 daily health-check (governance:audit --all)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, opentelemetry
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install PHP dependencies
        # --no-scripts: idem job drift-scan-pr — pula post-autoload-dump OTel.
        run: composer install --no-progress --no-interaction --prefer-dist --no-scripts
      - name: Install Node dependencies (for npm_audit checker — ADR 0223)
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Prepare storage dirs + .env mínimo
        # Idem job drift-scan-pr: framework precisa bootar pra rodar governance:audit.
        run: |
          mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
          cat > .env <<'EOF'
          APP_NAME=oimpresso-governance-daily
          APP_ENV=testing
          APP_DEBUG=false
          APP_URL=http://localhost
          LOG_CHANNEL=stderr
          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          MAIL_MAILER=array
          TELESCOPE_ENABLED=false
          VIEW_COMPILED_PATH=storage/framework/views
          BCRYPT_ROUNDS=4
          APP_KEY=
          EOF
          php artisan key:generate --force
      - name: Run governance:audit --all
        run: |
          # Schedule mode: --all + JSON output pra inspeção; --no-persist porque
          # CI runner não tem acesso ao DB live (cron real roda no CT 100 — Kernel.php)
          php artisan governance:audit \
            --all \
            --no-persist \
            --json > governance-drift-report.json || EXIT_CODE=$?
          cat governance-drift-report.json
          # exit 0 sempre — schedule é diagnóstico, não bloqueante (cron CT 100 abre PRs)
          exit 0
      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-drift-report-daily
          path: governance-drift-report.json
          retention-days: 30

  # =====================================================================
  # JOB 3 — secrets:audit --auto-pr (portado de secrets-governance.yml)
  # ADR 0271 onda 2 (item F3): consolida o canary 7d da ADR 0216, nunca
  # fechado. O secrets:scan de PR já é coberto por governance:audit (o
  # SecretsDriftChecker roda dentro do --diff-only acima). O que faltava
  # migrar era a Camada 3 de auto-PR de rotação — vive aqui agora.
  # secrets-governance.yml foi deletado nesta mesma onda.
  # =====================================================================
  secrets-audit-autopr:
    name: Secrets audit --auto-pr (Camada 3 · scheduled)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json, opentelemetry
      - name: Install dependencies
        # --no-scripts: pula o post-autoload-dump da OTel (_register.php) que
        # THROW em CI (extension_loaded('opentelemetry') runtime check). Incident 2026-05-28.
        run: composer install --no-progress --no-interaction --prefer-dist --no-scripts
      - name: Prepare storage dirs + .env mínimo
        # secrets:audit boota o framework (AppServiceProvider → Blade) que exige
        # config('view.compiled') válido. Sem .env/storage o boot dá "valid cache path".
        run: |
          mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
          cat > .env <<'EOF'
          APP_NAME=oimpresso-secrets-audit
          APP_ENV=testing
          APP_DEBUG=false
          APP_URL=http://localhost
          LOG_CHANNEL=stderr
          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          MAIL_MAILER=array
          TELESCOPE_ENABLED=false
          VIEW_COMPILED_PATH=storage/framework/views
          BCRYPT_ROUNDS=4
          APP_KEY=
          EOF
          php artisan key:generate --force
      - name: Run secrets:audit --auto-pr
        run: |
          git config user.name "secrets-governance-bot"
          git config user.email "bot@oimpresso.com"
          php artisan secrets:audit --auto-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
