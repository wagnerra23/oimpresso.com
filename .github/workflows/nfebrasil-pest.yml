name: NfeBrasil · Pest (MySQL)

# Lane MySQL pro Modules/NfeBrasil. Os testes fiscais MySQL-only (UNIQUE / lockForUpdate /
# isolamento multi-tenant) SKIPam no lane sqlite (modules-pest.yml :memory:), então "verde"
# lá MENTE. Aqui rodam de verdade contra MySQL + emitem JUnit, que alimenta o verde@ do gate
# de entrada (G1b · âncora improvada). Reusa .github/actions/pest-mysql-setup (biz=1/biz=2).
#
# POR QUE IMPORTA (risco fiscal ×150 clientes — escala-migracao-carteira-delphi.md): uma nota
# fiscal certificada "verde" por uma suite que pulou as regras tributárias = nota errada ×150.
#
# ADVISORY (ADR 0271/0298 — gate novo nasce advisory): continue-on-error no Pest → a falha NÃO
# derruba o PR; o JUnit registra a VERDADE (qual teste fiscal passa no MySQL). Allowlist =
# testes que cobrem as US/R-NFE fiscais (reconciliados 2026-06-23, #3312). Cresce (ratchet)
# conforme prova verde; arming a required por calendário (ADR 0275).

on:
  workflow_dispatch: {}
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'Modules/NfeBrasil/**'
      - 'Modules/NFSe/DTO/NfseEmissaoPayload.php'
      - 'tests/Feature/Calculo/CalculoTributarioTest.php'
      - 'database/schema/mysql-schema.sql'
      - '.github/workflows/nfebrasil-pest.yml'
      - '.github/actions/pest-mysql-setup/**'

concurrency:
  group: nfebrasil-pest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pest:
    name: PHP / Pest (NfeBrasil · MySQL)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: oimpresso_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Detectar mudanças do NfeBrasil (skip-as-pass)
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            nfe:
              - 'Modules/NfeBrasil/**'
              - 'Modules/NFSe/DTO/NfseEmissaoPayload.php'
              - 'tests/Feature/Calculo/CalculoTributarioTest.php'
              - 'database/schema/mysql-schema.sql'
              - '.github/workflows/nfebrasil-pest.yml'
              - '.github/actions/pest-mysql-setup/**'

      - name: Skip-as-pass (nada do NfeBrasil mudou)
        if: steps.changes.outputs.nfe == 'false'
        run: echo "✅ Sem mudanças no Modules/NfeBrasil — skip-as-pass."

      - name: Setup Pest MySQL (PHP + deps + .env + migrate + seed biz=1/biz=2)
        if: steps.changes.outputs.nfe == 'true'
        uses: ./.github/actions/pest-mysql-setup

      - name: Stub Vite manifest (Inertia root view sem build do front)
        if: steps.changes.outputs.nfe == 'true'
        run: |
          mkdir -p public/build-inertia
          cat > public/build-inertia/manifest.json <<'EOF'
          {
            "resources/css/inertia.css": { "file": "assets/inertia.css", "src": "resources/css/inertia.css", "isEntry": true },
            "resources/js/app.tsx": { "file": "assets/app.js", "src": "resources/js/app.tsx", "isEntry": true }
          }
          EOF

      - name: Run Pest (NfeBrasil · MySQL · ADVISORY — JUnit é a verdade) — ALLOWLIST VERDE (catraca)
        if: steps.changes.outputs.nfe == 'true'
        # ARMADO (ADR 0275): continue-on-error removido — a allowlist dos 7 arquivos (todos VERDES no MySQL, ratchet concluído) agora MORDE; skip-as-pass cobre PR fora do NfeBrasil. JUnit segue como evidência.
        #
        # CATRACA (ratchet — espelha financeiro-pest.yml / US-FIN-053): a lane roda só os
        # arquivos comprovadamente VERDES contra o MySQL real semeado (biz=1/biz=2). Cada
        # lote de fix dos testes adiciona arquivos AQUI (ratchet up) — arming a required por
        # calendário (ADR 0275).
        #
        # 1ª run (2026-06-23, run 28066696584 · 12 failed / 60 passed): os arquivos abaixo,
        # excluídos na 1ª run, NÃO revelaram bug fiscal de produção — TODAS as 12 falhas são
        # defeito de TESTE/HARNESS que o lane sqlite escondia (os testes SKIPavam lá).
        # Diagnóstico arquivo-a-arquivo em memory/sessions/2026-06-23-nfebrasil-mysql-lane-achados.md.
        #
        # RATCHET UP — já re-adicionados (verde após fix do teste):
        #   - NfeBrasilMultiTenantIsolationTest (2026-06-24): actingAs(user biz=1) +
        #     session('user.business_id') faz o scope exercitar isolamento de verdade;
        #     `SHOW COLUMNS ... LIKE ?` → information_schema (portável). De volta na allowlist.
        #   - Wave25NfeSaturationTest (2026-06-24): mesma causa — actingAs(biz=1) +
        #     session('user.business_id') faz o count() cross-tenant isolar de verdade.
        #   - NfeServiceIdempotenciaRetryTest (2026-06-24): `new NfeService()` (0 args) →
        #     `app(NfeService::class)` resolve a dep CertificadoService via container.
        #   - CertificadoServiceTest (2026-06-24): `salvar(99, ...)` (FK nfe_certificados→business,
        #     biz=99 não semeado) → biz=2 (semeado). Cleanup [1,99] → [1,2].
        #   - EmitirNfceAoFinalizarVendaTest (2026-06-24): 2 testes de dispatch semeiam
        #     NfeBusinessConfig(auto_emission_enabled=true) pro per-business gate (ADR 0093).
        #
        # ✅ Allowlist completa — os 7 arquivos da 1ª run estão de volta, todos VERDES no MySQL
        #    real. Ratchet concluído (12 falhas eram 100% defeito de teste/harness, 0 bug fiscal).
        #    Próximo passo: arming a required por calendário (ADR 0275).
        #
        # RATCHET UP (2026-07-03): + tests/Feature/Calculo/CalculoTributarioTest.php — dente de
        #   cálculo do motor tributário (arredondamento ICMS/ISS ao centavo, indefeso até #3735).
        #   DatabaseTransactions (não RefreshDatabase — não envenena o seed); nfe_fiscal_rules.business_id
        #   é int indexado SEM FK → não depende de seed. Verde no CT100 (17/17) + provado nesta lane.
        #
        # NÃO incluir arquivos com RefreshDatabase/migrate:fresh — dropam o schema baseline e
        # limpam o seed biz=1/biz=2, envenenando os demais.
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_DATABASE: oimpresso_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: |
          mkdir -p test-results
          vendor/bin/pest --no-coverage --colors=always \
            --log-junit test-results/pest-nfebrasil-junit.xml \
            Modules/NfeBrasil/Tests/Feature/NfeDomainModelsTest.php \
            Modules/NfeBrasil/Tests/Feature/OndaIbsCbsScaffoldTest.php \
            Modules/NfeBrasil/Tests/Feature/NfeBrasilMultiTenantIsolationTest.php \
            Modules/NfeBrasil/Tests/Feature/Wave25NfeSaturationTest.php \
            Modules/NfeBrasil/Tests/Feature/NfeServiceIdempotenciaRetryTest.php \
            Modules/NfeBrasil/Tests/Feature/CertificadoServiceTest.php \
            Modules/NfeBrasil/Tests/Feature/EmitirNfceAoFinalizarVendaTest.php \
            Modules/NfeBrasil/Tests/Feature/ReformaSchemaModoTest.php \
            Modules/NfeBrasil/Tests/Feature/SerializacaoIbsCbsTest.php \
            tests/Feature/Calculo/CalculoTributarioTest.php

      - name: Upload JUnit (verdade fiscal MySQL — alimenta o verde@ do gate de entrada)
        if: ${{ !cancelled() && steps.changes.outputs.nfe == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pest-nfebrasil-junit
          path: test-results/pest-nfebrasil-junit.xml
          retention-days: 14
