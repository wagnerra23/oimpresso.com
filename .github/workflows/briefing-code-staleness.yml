name: Staleness reporters (BRIEFING + visual-comparison × código)

# Reporters de STALENESS contra o CÓDIGO (não presence-gate). DOIS eixos irmãos:
#   · BRIEFING.md            × Modules/<X> ∪ Pages/<X>   (briefing-code-staleness.mjs)
#   · <tela>-visual-comparison.md × inertia_target .tsx  (visual-comparison-staleness.mjs)
# O 2º fecha o ÚLTIMO órfão de frescor do loop de design (Wagner 2026-07-09 "acho que
# já está velho, quem atualiza?"): o comparativo visual só atualizava quando alguém
# rodava a skill mwart-comparative; a Fase 5 do RUNBOOK esquecia dele. Mesmo núcleo
# (classifyCodeStaleness reusado), alvo por-tela em vez de por-módulo.
#
# POR QUE (incidente-âncora 2026-07-03 / #3714): o BRIEFING do Compras ficou
# "scaffold 05-21" por 41 dias / 18 commits enquanto o módulo virou grade 59 +
# cockpit live. A regra "✅ BRIEFING atualizado por PR" + skill brief-update (Tier B
# soft) não dispararam. Os sentinelas de staleness existentes (knowledge-drift.mjs
# `stale` + sdd-scorecard measureDistillerFreshness) só medem porta-vs-docs-irmãos;
# nenhum media porta-vs-CÓDIGO — o eixo que apodrece calado. Este reporter mede a
# derivada certa: data declarada do BRIEFING vs data-git de Modules/<X> ∪ Pages/<X>.
#
# CLASSE: automacao/reporter — NUNCA bloqueia (o step do reporter sai 0 sempre;
# emite ::warning:: visível no PR). ADR 0314: required = só Tier 0 (dinheiro/PII/
# multi-tenant/fiscal); frescor de BRIEFING é higiene. A LÓGICA vive no script
# canônico scripts/governance/briefing-code-staleness.mjs (sem duplicação).
#
# NÃO é presence-gate ("BRIEFING no diff") — padrão REJEITADO (proibicoes §5
# 2026-07-01 charter-sync-gate + L-24 "presença ≠ correção"). Mede tempo, não presença.

on:
  pull_request:
    branches: [main]
    paths:
      # dispara no PR que MOVE o código (o momento exato do drift) …
      - 'Modules/**'
      - 'resources/js/Pages/**'
      # … e quando a porta ou o próprio sentinela mudam.
      - 'memory/requisitos/**/BRIEFING.md'
      - 'memory/requisitos/**/*-visual-comparison.md'
      - 'scripts/governance/briefing-code-staleness.mjs'
      - 'scripts/governance/briefing-code-staleness.test.mjs'
      - 'scripts/governance/visual-comparison-staleness.mjs'
      - 'scripts/governance/adr-proposto-parado.mjs'
      - 'memory/decisions/**'
      - '.github/workflows/briefing-code-staleness.yml'
  schedule:
    # Segunda 06h40 BRT (09h40 UTC) — heartbeat semanal (após memory-health 06h30).
    - cron: '40 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: briefing-code-staleness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  report:
    name: BRIEFING atrás do código? (reporter — não bloqueia)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git log -1 na superfície de código precisa do histórico
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Meta-teste: protege o próprio detector (bite/release determinístico). Pode
      # ficar vermelho se alguém quebrar o núcleo — legítimo, e não bloqueia (não é required).
      - name: self-test do núcleo puro (determinístico)
        run: node scripts/governance/briefing-code-staleness.test.mjs
      # Reporter: exit 0 SEMPRE. Emite ::warning:: por porta stale (visível no PR).
      - name: reporter BRIEFING × código (advisory)
        run: node scripts/governance/briefing-code-staleness.mjs
      # Eixo 2 — visual-comparison × tela. Selftest hermético (bite/release do núcleo
      # reusado) + reporter advisory (::warning:: por comparativo atrás da sua tela).
      - name: self-test visual-comparison-staleness (bite/release · determinístico)
        run: node scripts/governance/visual-comparison-staleness.mjs --selftest
      - name: reporter visual-comparison × tela (advisory)
        run: node scripts/governance/visual-comparison-staleness.mjs
      # Eixo 3 — ADR pendente (Wagner 2026-07-09: "isso vai acabar não sendo feito").
      # A: decidido PRESO em proposals/ = lei invisível ao MCP (o sync não varre subpasta — caso
      # real 0320 aceita+invisível). B: numerado em proposals/ ainda proposto (0314). C: proposto
      # top-level >14d sem ratificação (feature-wish excluído — dormência intencional, ADR 0105).
      - name: self-test adr-proposto-parado (bite/release · determinístico)
        run: node scripts/governance/adr-proposto-parado.mjs --selftest
      - name: reporter ADR pendente de ratificação (advisory)
        run: node scripts/governance/adr-proposto-parado.mjs
