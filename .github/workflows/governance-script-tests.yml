name: Governance script tests (advisory)

# Roda os testes de regressao dos scripts de governanca (scripts/governance/*.test.mjs).
# Fecha o gap "test local-only" (auditoria IA OS Onda 1, gap #2) para os scripts de
# governanca: ate aqui esses .test.mjs so rodavam na maquina do dev.
#   - adr-index-generate.test.mjs       decoder de titulo !!binary (Onda 1, gap #1, PR #3056)
#   - shipped-log-generate.test.mjs     fonte honesta do shipped-log (porta de saida, ADR 0294 ext)
# (R10 block-pr-without-approval removido a pedido do Wagner 2026-06-24 — ver commit.)
# Node puro, sem deps/DB/rede -- segundos. Advisory de nascenca (gates novos nunca
# nascem required -- ADR 0271/0275); nao entra em branch protection.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: governance-script-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: governance script tests (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Decoder de titulo !!binary (adr-index-generate)
        run: node scripts/governance/adr-index-generate.test.mjs
      - name: Shipped-log gerador honesto (fixtures-armadilha)
        run: node scripts/governance/shipped-log-generate.test.mjs
      - name: Dup-detector L3 (overlap/ack/exclude)
        run: node scripts/governance/dup-detector.test.mjs
      - name: Outcome metrics (medidor de aceitacao · fixtures-armadilha · Onda O1)
        run: node scripts/governance/outcome-metrics.test.mjs
      - name: Agent PR outcomes (DORA do agente · CFR morde/libera · card #0 grade-das-reguas)
        run: node scripts/governance/agent-pr-outcomes.test.mjs
      - name: Block-test-fora-ct100 PORTE .mjs (logica + E2E · roda em Linux · card #2 cross-platform)
        run: node .claude/hooks/block-test-fora-ct100.test.mjs
      - name: Block-test-fora-ct100 REGISTRADO como node (correcao != invocacao)
        run: node scripts/governance/settings-test-fora-ct100-registration.test.mjs
      - name: Block-automem PORTE .mjs (ADR 0061/0131 · logica + E2E · roda em Linux)
        run: node .claude/hooks/block-automem.test.mjs
      - name: Block-mwart-violation PORTE .mjs (ADR 0104 F1 · logica + E2E · roda em Linux)
        run: node .claude/hooks/block-mwart-violation.test.mjs
      - name: Block-automem + block-mwart REGISTRADOS como node (correcao != invocacao)
        run: node scripts/governance/settings-automem-mwart-registration.test.mjs
      - name: Registro Figma-não-é-fonte em settings.json (camada L4)
        run: node scripts/governance/settings-figma-registration.test.mjs
      - name: Registro âncora-no-olho em settings.json (incidente #7)
        run: node scripts/governance/settings-ancora-registration.test.mjs
      - name: Baseline armado Figma-não-é-fonte (camada L5 · vetores de ataque)
        run: node scripts/evals/design-source-of-truth.eval.mjs
      - name: Lógica + E2E block-design-sync (ADR 0315 · fecha Gap 1 da 0299)
        run: node .claude/hooks/block-design-sync-without-optin.test.mjs
      - name: Lógica + E2E block-skill-design-sync (ADR 0315 · Eixo B via matcher Skill)
        run: node .claude/hooks/block-skill-design-sync-without-optin.test.mjs
      - name: Registro design-sync-não-é-fonte em settings.json (camada L4 · DesignSync + Skill)
        run: node scripts/governance/settings-design-sync-registration.test.mjs
      - name: ds-push orquestrador morde (dry-run VALOR:0 + determinismo · loop diff-first)
        run: node scripts/design-sync/ds-push.test.mjs
      - name: ds-token-version morde (seed + bumps MINOR/MAJOR + gate --check · loop diff-first)
        run: node scripts/design-sync/ds-token-version.test.mjs
      - name: ds-token-diff MOTOR morde (diverge/designOnly/gitOnly/alias-skip/companion · loop diff-first)
        run: node scripts/design-sync/ds-token-diff.test.mjs
      - name: ds-mirror-drift SENTINELA morde (bite/release/catraca · loop diff-first)
        run: node scripts/governance/ds-mirror-drift.test.mjs
      - name: design-coverage CATRACA morde (bite/release · cobertura de design UI-0013)
        run: node scripts/qa/design-coverage.test.mjs
      - name: pt-conformance morde (declaração de PT falsificável · PT-02..05)
        run: node scripts/governance/pt-conformance.mjs --selftest
      - name: criar-tela GERADOR carimba conforme ao PT (máquina de nascimento de tela · UI-0013)
        run: node scripts/governance/criar-tela.mjs --selftest
      - name: Design-memory gate wired no CI (Onda O3 · fundido ADR 0314 F2)
        run: node scripts/governance/design-memory-gate.test.mjs
      - name: Catraca de path-fantasma morde/solta (P16 · knowledge-drift --selftest)
        run: node scripts/governance/knowledge-drift.mjs --selftest
      # P10 — integridade referencial rota↔código (T-AP-3/14/15 · M-AP-1 do F3 rejeitado).
      # A catraca é hermética (fixtures bite/release, ancorada no contrato LICOES_F3); se ela
      # parar de morder, ESTE passo falha. O relatório é ADVISORY (ADR 0314 — não-Tier-0): roda
      # em seguida, exit 0 sempre, só imprime os achados no log (o valor é o relatório).
      - name: ref-integrity — selftest da catraca (bite/release · T-AP-3/14/15/M-AP-1)
        run: node scripts/governance/ref-integrity.mjs --selftest
      - name: ref-integrity — relatório advisory rota↔código (exit 0 · nunca bloqueia)
        run: node scripts/governance/ref-integrity.mjs
      # US-GOV-052 P31+P32 — fonte única de skills-tier e de hue primário (ADR 0314: advisory).
      - name: Skills index gerador morde/solta (P31 · bite/release hermético)
        run: node scripts/governance/skills-index-generate.test.mjs
      - name: Skills index em dia (P31 · CLAUDE.md AUTO:SKILLS + _SKILLS-INDEX vs frontmatter)
        run: node scripts/governance/skills-index-generate.mjs --check
      - name: Hue-canon check morde/solta (P32 · construção, nunca número cru)
        run: node scripts/governance/hue-canon-check.test.mjs
      - name: Hue primário íntegro (P32 · declarações expected_hue/hue_correct vs governance/hue-canon.json)
        run: node scripts/governance/hue-canon-check.mjs
      - name: pr-critic — roteamento diff→contratos (fixtures-armadilha · ataque ① grade-das-réguas)
        run: node scripts/pr-critic/coleta.test.mjs
      - name: pr-critic — trava de citação + AGREGAÇÃO DE VOTOS das lentes + comentário honesto (determinístico)
        run: node scripts/pr-critic/critica.test.mjs
      - name: pr-critic — precisão do próprio critic (agiu/ignorado morde · fecha o loop grade v3)
        run: node scripts/pr-critic/precisao.test.mjs
      - name: Block-claim-without-evidence PORTE .mjs (advisory ADR 0224 · logica + E2E · roda em Linux)
        run: node .claude/hooks/block-claim-without-evidence.test.mjs
      - name: Post-merge-ui-smoke PORTE .mjs (R1 · bite/release/TTL · roda em Linux)
        run: node .claude/hooks/post-merge-ui-smoke-required.test.mjs
      - name: Evidence + ui-smoke REGISTRADOS como node nos 4 pontos (correcao != invocacao)
        run: node scripts/governance/settings-evidence-smoke-registration.test.mjs
      - name: Block-memory-drift PORTE .mjs (Tier-0 append-only ADR/handoff · 7 regras · roda em Linux)
        run: node .claude/hooks/block-memory-drift.test.mjs
      - name: Block-destructive PORTE .mjs (Tier-0 US-COPI-085 · 8 categorias + whitelist rm · roda em Linux)
        run: node .claude/hooks/block-destructive.test.mjs
      - name: Pii-redactor PORTE .mjs (Tier-0 LGPD US-COPI-086 · commit-only opcao B · roda em Linux)
        run: node .claude/hooks/pii-redactor.test.mjs
