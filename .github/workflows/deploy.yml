name: Deploy to Hostinger

# AUTOMÁTICO (ADR 0269) — merge na main publica sozinho.
# Trigger:
#  - push em main (exceto paths de docs/memória) → build no runner + deploy
#  - workflow_dispatch → mesmo fluxo, com inputs de escape (skip backup/migrate, artisan extra)
#
# Política anterior (até 2026-06-10): deploy era 100% manual (workflow_dispatch) E
# o JS buildava NO Hostinger (npm no shared host → hashes stale, incidente 20/05).
# Agora: BUILD NO RUNNER (ubuntu, determinístico) + bundles publicados via tar/ssh
# com swap atômico. Autorização Wagner 2026-06-10 ("automação máxima do deploy").
on:
  push:
    branches: [main]
    paths-ignore:
      - 'memory/**'
      - '**.md'
      - 'prototipo-ui/**'
  workflow_dispatch:
    inputs:
      skip_backup:
        description: 'Pular backup? (risk)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_migrate:
        description: 'Pular artisan migrate?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      extra_artisan:
        description: 'Comando artisan extra (ex: db:seed --class=...). Vazio = nada.'
        required: false
        default: ''
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── JOB 1: BUILD NO RUNNER ───────────────────────────────────────────────
  # Builda os bundles Vite num ubuntu-latest determinístico (não no shared host).
  # Causa raiz dos hashes stale de 20/05 era npm rodando no Hostinger. Wayfinder
  # (vite.inertia.config.mjs) é auto-guardado: sem vendor/autoload.php no runner,
  # o plugin pula (comentário no próprio config) — build JS-only funciona.
  build:
    name: Build Vite bundles (runner)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      frontend_changed: ${{ steps.diff.outputs.frontend_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # precisa do commit `before` pra diff de frontend

      - name: Detecta se resources/js|css mudou neste push
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "push" ] && \
             [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- resources/js resources/css | grep -q .; then
              echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "frontend_changed=unknown" >> "$GITHUB_OUTPUT"
          fi
          echo "frontend_changed = $(grep frontend_changed "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'   # casa com v24.15.0 que o Hostinger usava (build proven)
          cache: 'npm'

      - name: npm ci
        run: npm ci --no-audit --no-fund

      - name: Build Inertia bundles (public/build-inertia)
        run: npm run build:inertia

      - name: Build Tailwind/Blade legacy (public/css/tailwind.css)
        run: npm run build

      - name: Inventário pós-build
        run: |
          echo "=== public/build-inertia/assets ===" && ls -la public/build-inertia/assets 2>/dev/null | head -10 || echo '(vazio)'
          echo "=== public/css ===" && ls -la public/css 2>/dev/null || echo '(vazio)'

      - name: Upload artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: vite-build
          # build:inertia → public/build-inertia/ (dir, com manifest); build → public/css/tailwind.css.
          # Ambos gitignored (/public/build-inertia/ + /public/css/) → publicados pelo deploy.
          path: |
            public/build-inertia
            public/css
          retention-days: 2
          if-no-files-found: error

  # ── JOB 2: DEPLOY ────────────────────────────────────────────────────────
  deploy:
    name: Deploy L13 to Hostinger oimpresso.com
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RDIR: /home/u906587222/domains/oimpresso.com/public_html
    steps:
      - name: Baixa artefato de build (bundles do runner)
        uses: actions/download-artifact@v4
        with:
          name: vite-build
          path: artifact

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # `|| true`: ssh-keyscan falha intermitente (rede runner→Hostinger) NÃO pode
          # matar o deploy sob `bash -e`. Host key já coberta por
          # StrictHostKeyChecking=accept-new no SSH helper. Mesmo fix do quick-sync
          # (#2162). Catalogado 2026-06-10: deploy 27293791287 morreu aqui 2× em 8s.
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: SSH helper
        run: |
          cat > /tmp/ssh_exec.sh <<'EOF'
          #!/bin/bash
          # Flags canônicos Hostinger (memory/reference/hostinger.md §"SSH config robusto").
          #  -4  IPv4 OBRIGATÓRIO — IPv6 falha e dá "Connection timed out".
          #  BatchMode=yes falha rápido em prompt inesperado.
          #  ControlMaster (multiplexing) NÃO é usado: falha "mux_client_request_session".
          #  Uma conexão por comando é o caminho suportado.
          #
          # ⚠️ ConnectTimeout ALTO É CANON (2026-06-11): o manual diz textual
          # "ConnectTimeout=900 (Hostinger leva minutos pra handshake)". Em 2026-06-11
          # eu (CC) ENCURTEI pra 30s achando que ajudaria — fez o oposto: o SSH desistia
          # ANTES do handshake lento do Hostinger completar, causando o "sempre quebra"
          # pós-fix. Restaurado pro espírito do manual (timeout em MINUTOS), só bounded
          # a 180s×3 (≤9min/invocação) pra caber no job timeout de 30min. ServerAlive
          # 3/200 (manual) mantém a conexão viva durante comandos remotos longos
          # (composer/migrate) — router intermediário derruba conexão ociosa sem keepalive.
          # SEM retry-loop externo agressivo (Wagner "cuidado com hostinger" — não
          # martelar/arriscar ban): o próprio ConnectionAttempts=3 do ssh é a resiliência.
          ssh -4 \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=180 \
              -o ConnectionAttempts=3 \
              -o ServerAliveInterval=3 \
              -o ServerAliveCountMax=200 \
              -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }} \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "$@"
          EOF
          chmod +x /tmp/ssh_exec.sh

      - name: Captura hash dos bundles ANTES (baseline pra smoke)
        run: |
          curl -s https://oimpresso.com/login \
            | grep -oE '/assets/(inertia|app)-[a-zA-Z0-9_-]+\.(js|css)' \
            | sort -u > /tmp/bundle_before.txt || true
          echo "BEFORE:" && cat /tmp/bundle_before.txt || true

      - name: Warm-up do caminho SSH (curl 5x + ssh true — Hostinger flaky, ver hostinger.md)
        # Manual §"warm-up + retry": 5 hits curl IPv4 acordam a rota runner→Hostinger
        # antes do 1º SSH. + 1 `ssh true` tolerante pra PAGAR o 1º connect lento
        # (handshake "leva minutos" — manual) AQUI, fora do Pré-deploy check gated.
        # O TCP probe `/dev/tcp` com `timeout 8` foi REMOVIDO (2026-06-11): com handshake
        # de minutos, um probe de 8s sempre falha e só queima tempo/CI — quem espera o
        # handshake lento é o ConnectTimeout=180 do ssh_exec.sh, não um probe curto.
        run: |
          for i in 1 2 3 4 5; do
            curl -4 -s -o /dev/null -w "$i:%{http_code} " https://oimpresso.com/login --max-time 15 || true
          done; echo
          echo "=== ssh true (paga o 1º connect lento aqui, tolerante) ==="
          /tmp/ssh_exec.sh "true" && echo "warm-up SSH OK" \
            || echo "warm-up SSH ainda frio — o Pré-deploy check valida pra valer"

      - name: Pré-deploy check — server state
        run: |
          echo "=== PHP ==="
          /tmp/ssh_exec.sh "php -v | head -1"
          echo "=== Path + branch ==="
          /tmp/ssh_exec.sh "cd $RDIR && pwd && git branch --show-current"
          echo "=== Disco livre ==="
          /tmp/ssh_exec.sh "df -h /home/u906587222 | tail -1"

      - name: Cleanup stale locks (git + maintenance órfãos)
        run: |
          /tmp/ssh_exec.sh "cd $RDIR && rm -f .git/index.lock .git/refs/heads/main.lock 2>&1; echo OK"
          /tmp/ssh_exec.sh "cd $RDIR && php artisan up 2>&1 || rm -f storage/framework/down 2>&1; echo OK"

      - name: Backup (arquivos + DB) com rotação (mantém 5 mais recentes)
        if: ${{ inputs.skip_backup != 'true' }}
        run: |
          TS=$(date +%Y%m%d-%H%M)
          /tmp/ssh_exec.sh "
            cd $RDIR &&
            tar czf ~/backup-predeploy-${TS}.tar.gz \
              --exclude='node_modules' \
              --exclude='vendor' \
              --exclude='storage/logs' \
              . 2>&1 | tail -3 &&
            ls -lh ~/backup-predeploy-${TS}.tar.gz &&
            echo '=== rotação: removendo backups além dos 5 mais recentes ===' &&
            ls -t ~/backup-predeploy-*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm -v || true
          "

      - name: Maintenance mode ON
        id: maint_on
        # --secret=<token aleatório por deploy>: cria a rota de bypass do maintenance
        # (https://oimpresso.com/<secret> seta o cookie laravel_maintenance). Usada SÓ pelo
        # "Boot gate WEB" mais abaixo pra smokar /login no SAPI real ANTES de tirar o site
        # do ar — usuário comum segue vendo o 503 normal. Secret mascarado nos logs +
        # exportado pro $GITHUB_ENV (escopo do job). openssl está no ubuntu-latest.
        run: |
          SECRET=$(openssl rand -hex 16)
          echo "::add-mask::$SECRET"
          echo "DEPLOY_BYPASS_SECRET=$SECRET" >> "$GITHUB_ENV"
          /tmp/ssh_exec.sh "cd $RDIR && php artisan down --secret='$SECRET' --retry=60 --refresh=60 || true"

      - name: Git pull — branch main (apenas código-fonte; bundles vêm do runner)
        run: |
          /tmp/ssh_exec.sh "
            cd $RDIR &&
            git fetch origin &&
            git checkout main &&
            git reset --hard origin/main &&
            git log --oneline -3
          "

      - name: Composer install (produção)
        # NÃO usar --no-dev: Faker é usado em prod (incidente 2026-04-25, tela branca Inertia "null.component").
        # --ignore-platform-req=ext-opentelemetry: Hostinger shared NÃO tem ext-opentelemetry (PECL out/2025).
        #   OTel pacotes vivem em require-dev (ADR 0166) + OtelHelper fail-safe. Hostinger nunca emite spans.
        # set -o pipefail: sem ele o exit do pipeline `composer | tail` mascara falha do composer (deploy verde com
        #   classmap stale → 500 no boot, incidente 2026-05-26).
        run: |
          /tmp/ssh_exec.sh "
            set -o pipefail &&
            cd $RDIR &&
            composer install --optimize-autoloader --no-interaction --no-scripts --ignore-platform-req=ext-opentelemetry --ignore-platform-req=ext-sodium 2>&1 | tail -20 &&
            echo '=== dump-autoload force ===' &&
            composer dump-autoload -o --classmap-authoritative --no-interaction --no-scripts --ignore-platform-req=ext-opentelemetry --ignore-platform-req=ext-sodium 2>&1 | tail -10
          "

      - name: Verifica classmap autoritativo (re-dump 1× se stale) — emenda ADR 0269 (incidente 2026-06-23)
        id: classmap
        # Gate DETERMINÍSTICO logo após o dump-autoload, AINDA em maintenance ON e ANTES
        # do migrate / de tirar o site do ar. scripts/deploy/verify-classmap.php confere
        # (léxico via token_get_all + pertencimento ao classmap, SEM bootar o app) que toda
        # classe App\ referenciada no Handler / HTTP Kernel (middleware web+global) / Console
        # Kernel / bootstrap está no classmap-authoritative recém-gerado.
        #
        # Pega o modo de falha que o boot-smoke console (php artisan about, passo seguinte)
        # NÃO vê: middleware WEB fora do classmap. O kernel CLI não monta o pipeline HTTP,
        # então um \App\Http\Middleware\X::class irresolvível passa "verde" pelo about — mas
        # em toda request web vira BindingResolutionException → 500. Foi o incidente 2026-06-23
        # (VisregStateMiddleware, grupo web; deploy a9d0593ff CANCELADO no meio → source à
        # frente do classmap). Também cobre o caso 2026-06-18 (ErrorReporter no Handler).
        #
        # Se faltar classe, re-roda dump-autoload UMA vez (cobre "source pegou arquivo em
        # fluxo" — deploy-recovery-patterns §10) e re-verifica; se ainda faltar, FALHA o
        # deploy AQUI. Como ainda estamos em maintenance ON, o site permanece em 503 gracioso
        # e NUNCA expõe o 500. set -o pipefail: senão o exit do `| tail` do composer mascara
        # a falha do re-dump.
        run: |
          /tmp/ssh_exec.sh "
            set -o pipefail &&
            cd $RDIR &&
            if php scripts/deploy/verify-classmap.php; then exit 0; fi;
            echo '=== classmap stale — re-dump 1x e re-verifica ===' &&
            composer dump-autoload -o --classmap-authoritative --no-interaction --no-scripts --ignore-platform-req=ext-opentelemetry --ignore-platform-req=ext-sodium 2>&1 | tail -10;
            php scripts/deploy/verify-classmap.php
          "

      - name: Boot smoke CONSOLE — falha o deploy AGORA se o artisan não bootar (ADR 0216 + incidente 2026-06-17)
        # Gate DURO logo após o composer/dump-autoload, AINDA em maintenance ON e ANTES do migrate.
        # Pega o modo de falha que o smoke web /login NÃO vê: um ServiceProvider que registra
        # commands() dentro de runningInConsole() (ex. TeamMcpServiceProvider → handoff:stale-alert,
        # PR #2906) referencia uma classe nova; se ela ficou fora do classmap-authoritative, TODO
        # `php artisan` crasha com BindingResolutionException — incl. o `schedule:run` que o cron do
        # Hostinger dispara a cada minuto — enquanto a WEB segue 200 (boot() só registra o comando
        # quando runningInConsole). Resultado: deploy "verde" sobre um scheduler 100% quebrado, downtime
        # silencioso no console até o próximo deploy bem-sucedido (mesmo padrão da ADR 0216, que checava
        # só a web via curl /). `php artisan about` constrói o console Application → dispara
        # resolveCommands() → instancia cada comando registrado → reproduz o crash AQUI, no ato, falhando
        # o deploy antes de expor o cron quebrado. set -o pipefail: senão o exit do `about` é mascarado
        # pelo `| tail` e o gate fica decorativo.
        run: /tmp/ssh_exec.sh "set -o pipefail && cd $RDIR && php artisan about 2>&1 | tail -40"

      - name: Artisan migrate (se necessário)
        if: ${{ inputs.skip_migrate != 'true' }}
        # set -o pipefail: senão migrate --force que falha tem exit mascarado pelo | tail → deploy verde com schema drift.
        run: /tmp/ssh_exec.sh "set -o pipefail && cd $RDIR && php artisan migrate --force 2>&1 | tail -20"

      - name: Artisan extra (input customizado)
        if: ${{ inputs.extra_artisan != '' }}
        run: /tmp/ssh_exec.sh "set -o pipefail && cd $RDIR && php artisan ${{ inputs.extra_artisan }} 2>&1 | tail -30"

      - name: Publicar bundles buildados no runner (tar/ssh → swap atômico)
        # Substitui o build-no-Hostinger (causa raiz dos hashes stale). Os artefatos
        # chegam prontos do JOB build: build-inertia/ (dir Inertia com manifest) +
        # css/ (só tailwind.css do build legado). tar-pipe usa só tar+ssh (sem
        # dependência de rsync no servidor). build-inertia faz swap de DIRETÓRIO
        # (mantém .old pra rollback); css é COPIADO por cima (public/css é gitignored
        # e só recebe build, então não há arquivo estático pra preservar). Roda sob
        # maintenance ON — janela de microssegundos do swap é invisível.
        run: |
          set -euo pipefail
          test -d artifact/build-inertia
          test -d artifact/css
          tar -C artifact -czf - build-inertia css \
            | /tmp/ssh_exec.sh "cd $RDIR/public && rm -rf .deploy_incoming && mkdir .deploy_incoming && tar -C .deploy_incoming -xzf - && echo UPLOAD_OK && ls .deploy_incoming"
          /tmp/ssh_exec.sh "
            cd $RDIR/public &&
            if [ -d .deploy_incoming/build-inertia ]; then
              rm -rf build-inertia.old
              [ -d build-inertia ] && mv build-inertia build-inertia.old
              mv .deploy_incoming/build-inertia build-inertia
              echo 'swapped build-inertia'
            fi &&
            if [ -d .deploy_incoming/css ]; then
              mkdir -p css
              cp -af .deploy_incoming/css/. css/
              echo 'published css'
            fi &&
            rm -rf .deploy_incoming &&
            echo '=== manifest inertia ===' &&
            head -c 200 build-inertia/manifest.json 2>/dev/null; echo
          "

      - name: Garante token de OPcache reset no servidor (self-heal — fora do git/webroot)
        # Endpoint _ops_opcache_reset.php lê o token deste arquivo (ADR 0269) porque script
        # PHP cru NÃO lê o .env da app via getenv() no LSPHP. storage/app é gitignored e
        # sobrevive a `git reset --hard`. Idempotente.
        #
        # Self-heal (incidente 2026-06-23): o arquivo NUNCA pode ficar vazio. Antes, secret
        # ausente fazia early-exit SEM escrever → o reset HTTP (obrigatório, ADR 0269) caía
        # com token vazio (foi o que travou a recuperação manual de 2026-06-23, quando o
        # deploy cancelado nem chegou neste passo e o arquivo ficou vazio). Ordem do token
        # efetivo: (1) GitHub Secret OPCACHE_RESET_TOKEN; (2) arquivo existente válido no
        # servidor; (3) gerar um novo no servidor. `test -s` garante não-vazio ou falha o
        # passo. O reset HTTP (pré-gate e pós-up) lê este MESMO arquivo → token sempre casa.
        env:
          OPCACHE_TOKEN: ${{ secrets.OPCACHE_RESET_TOKEN }}
        run: |
          /tmp/ssh_exec.sh "
            cd $RDIR &&
            mkdir -p storage/app &&
            umask 077 &&
            SEED='$OPCACHE_TOKEN' &&
            EXIST=\$(cat storage/app/opcache_reset_token 2>/dev/null | tr -d '\r\n') &&
            TOK=\${SEED:-\${EXIST:-\$(openssl rand -hex 32 2>/dev/null || head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n')}} &&
            printf '%s' \"\$TOK\" > storage/app/opcache_reset_token &&
            chmod 600 storage/app/opcache_reset_token &&
            test -s storage/app/opcache_reset_token &&
            echo \"opcache token file ok (\$(wc -c < storage/app/opcache_reset_token) bytes)\"
          "

      - name: Clear caches + re-cache (sem route:cache — ver hotfix 2026-05-27)
        # route:cache removido: em prod o bootstrap/cache/routes-v7.php some logo após
        # gerado (cron/cleanup do shared host) → 500 em toda request autenticada.
        run: |
          /tmp/ssh_exec.sh "
            cd $RDIR &&
            php artisan config:clear &&
            php artisan route:clear &&
            php artisan view:clear &&
            php artisan cache:clear &&
            php artisan config:cache
          "

      - name: Package discover
        run: /tmp/ssh_exec.sh "cd $RDIR && php artisan package:discover --ansi 2>&1 | tail -10"

      - name: Permissions storage + bootstrap/cache
        run: /tmp/ssh_exec.sh "cd $RDIR && chmod -R 775 storage bootstrap/cache 2>&1 | tail -3 || true"

      - name: Force OPcache invalidate (touch mtime — best-effort)
        # LSPHP/LiteSpeed segura bytecode entre deploys. `find -exec touch` bump o mtime
        # dos PHPs → LSPHP re-stata (validate_timestamps). `public` incluído pra recompilar
        # o próprio _ops_opcache_reset.php antes do reset HTTP (senão o endpoint que vai
        # resetar o OPcache poderia ser servido como bytecode velho — paradoxo de bootstrap).
        # `-name '*.php'` mantém barato (ignora bundles .js/.css).
        #
        # NÃO roda `composer dump-autoload` aqui: o step "Composer install" já faz o
        # dump-autoload canônico (-o --classmap-authoritative). Rodar de novo era redundante
        # E flaky — em 2026-06-10 o `dump-autoload --optimize` standalone abortou com help/exit 1
        # (platform-req), derrubando o deploy DEPOIS do publish. Best-effort (`|| true`): o
        # reset real e confirmado é o step HTTP seguinte; o failsafe protege o site.
        run: |
          /tmp/ssh_exec.sh "cd $RDIR && find app bootstrap config routes public -name '*.php' -exec touch {} + 2>&1 | tail -3" || echo "::warning::touch best-effort falhou — seguindo (reset confirmado é via HTTP)"

      - name: Reset OPcache (pré-gate, atrás de maintenance) — best-effort
        # Garante que o "Boot gate WEB" abaixo bata em bytecode FRESCO. LSPHP segura
        # bytecode entre deploys e validate_timestamps pode estar off → o touch de mtime
        # acima é best-effort. O endpoint é arquivo PHP cru em public/ → servido direto
        # pelo webserver mesmo com Laravel em maintenance (o rewrite só manda pro index.php
        # quando o arquivo NÃO existe). Token lido do arquivo do servidor (mesma fonte do
        # endpoint). Best-effort: se não confirmar, o gate web degrada (não bloqueia) e o
        # reset pós-up (ADR 0269) continua sendo o reset obrigatório/confirmado.
        if: steps.maint_on.outcome == 'success'
        run: |
          TOKEN=$(/tmp/ssh_exec.sh "cat $RDIR/storage/app/opcache_reset_token 2>/dev/null" | tr -d '\r\n' || true)
          if [ -n "$TOKEN" ]; then echo "::add-mask::$TOKEN"; fi
          if [ -z "$TOKEN" ]; then echo "::warning::sem token pra reset pré-gate — gate web vai degradar"; exit 0; fi
          RESP=$(curl -fsS --max-time 30 "https://oimpresso.com/_ops_opcache_reset.php?token=$TOKEN" || echo "FAIL")
          echo "OPcache pré-gate: $RESP"

      - name: Boot gate WEB — smoke /login atrás do maintenance bypass (ANTES de tirar o site do ar)
        id: webgate
        # Pega resolução de middleware/Handler WEB quebrada que o boot-smoke console
        # (php artisan about) NÃO enxerga — o kernel CLI não monta o pipeline HTTP. Foi o
        # incidente 2026-06-23 (VisregStateMiddleware no grupo web → 500 em /login, mas o
        # `about` bootava). Smoka /login no SAPI REAL usando o cookie de bypass do
        # maintenance (rota /<secret> do passo "Maintenance mode ON") — usuário comum segue
        # vendo 503. Como o site AINDA está em maintenance, um 5xx aqui NÃO foi exposto.
        #
        # FAIL-SAFE-DEGRADANTE: só BLOQUEIA (exit 1 → mantém 503 + deploy vermelho) com
        # evidência POSITIVA de 5xx no SAPI real. Resultado ambíguo (503 = bypass não
        # engatou; curl falhou; etc.) NÃO bloqueia — degrada pro smoke pós-up + failsafe,
        # pra não tornar o deploy MAIS frágil. O classmap-verify (determinístico, mais
        # acima) é a malha primária; este é defesa-em-profundidade no SAPI real.
        if: steps.maint_on.outcome == 'success'
        run: |
          set -uo pipefail
          SECRET="${DEPLOY_BYPASS_SECRET:-}"
          if [ -z "$SECRET" ]; then
            echo "::warning::sem bypass secret — pulando boot gate web (degrada pro smoke pós-up + failsafe)"
            exit 0
          fi
          # 1) hit em /<secret> → 302 + Set-Cookie laravel_maintenance (cookie de bypass)
          curl -fsS -c /tmp/byp.txt -o /dev/null --max-time 30 "https://oimpresso.com/$SECRET" || true
          # 2) /login com o cookie → resposta REAL atravessando o grupo web inteiro
          CODE=$(curl -sL -b /tmp/byp.txt -o /tmp/webgate.html -w '%{http_code}' --max-time 30 "https://oimpresso.com/login" || echo 000)
          echo "Boot gate WEB: /login (bypass) => HTTP $CODE"
          case "$CODE" in
            5*)
              echo "::error::Boot gate WEB: /login = $CODE atrás do bypass — middleware/Handler WEB não resolve no SAPI real (classmap stale?). Mantendo 503 e falhando o deploy."
              /tmp/ssh_exec.sh "cd $RDIR && tail -40 storage/logs/laravel.log 2>&1 || true"
              exit 1
              ;;
            200|301|302)
              echo "✅ Boot gate WEB OK ($CODE)"
              ;;
            503)
              echo "::warning::Boot gate WEB inconclusivo ($CODE — bypass não engatou). Degradando pro smoke pós-up + failsafe."
              ;;
            *)
              echo "::warning::Boot gate WEB inconclusivo (HTTP $CODE). Degradando pro smoke pós-up + failsafe."
              ;;
          esac

      - name: Maintenance mode OFF
        run: /tmp/ssh_exec.sh "cd $RDIR && php artisan up"

      - name: Reset OPcache via HTTP (LSPHP/LiteSpeed) — OBRIGATÓRIO
        # ADR 0269: promovido de warning pra FALHA. opcache_reset() roda na MESMA SAPI
        # FPM que serve o site (config:clear roda em CLI, não compartilha OPcache).
        # Sem reset confirmado = deploy vermelho. Única tolerância: extensão opcache
        # genuinamente ausente (OPCACHE_UNAVAILABLE), que não é misconfiguração nossa.
        #
        # Token lido do ARQUIVO do servidor (storage/app/opcache_reset_token) — a MESMA
        # fonte que _ops_opcache_reset.php usa — então o token do curl SEMPRE casa com o
        # que o endpoint espera, mesmo se o secret e o arquivo divergirem ou o self-heal
        # tiver gerado um (2026-06-23). O passo "Garante token" acima garante não-vazio.
        run: |
          TOKEN=$(/tmp/ssh_exec.sh "cat $RDIR/storage/app/opcache_reset_token 2>/dev/null" | tr -d '\r\n' || true)
          if [ -n "$TOKEN" ]; then echo "::add-mask::$TOKEN"; fi
          if [ -z "$TOKEN" ]; then
            echo "::error::token OPcache vazio/ausente no servidor — reset não pode ser confirmado. Deploy FALHA (ADR 0269)."
            exit 1
          fi
          RESP=$(curl -fsS --max-time 30 "https://oimpresso.com/_ops_opcache_reset.php?token=$TOKEN" || echo "FAIL_CURL")
          echo "OPcache reset response: $RESP"
          if echo "$RESP" | grep -q "OPCACHE_RESET_OK"; then
            echo "✅ OPcache resetado"
          elif echo "$RESP" | grep -q "OPCACHE_UNAVAILABLE"; then
            echo "::warning::opcache extension ausente nesta SAPI — tolerado (não é misconfiguração)."
          else
            echo "::error::Reset OPcache NÃO confirmado (resp: $RESP). Verificar token no servidor / endpoint 403/503. Deploy FALHA."
            exit 1
          fi

      - name: Smoke test — HTTPS /login + verificação de bundle hash
        id: smoke
        env:
          FRONTEND_CHANGED: ${{ needs.build.outputs.frontend_changed }}
        run: |
          set -uo pipefail
          echo "=== HTTP /login ==="
          CODE=$(curl -sL -o /tmp/smoke.html -w "%{http_code}" https://oimpresso.com/login)
          echo "HTTP $CODE"
          AFTER=$(grep -oE '/assets/(inertia|app)-[a-zA-Z0-9_-]+\.(js|css)' /tmp/smoke.html | sort -u | tr '\n' ' ')
          BEFORE=$(tr '\n' ' ' < /tmp/bundle_before.txt 2>/dev/null || true)
          echo "BEFORE: $BEFORE"
          echo "AFTER:  $AFTER"
          if [ "$CODE" != "200" ] && [ "$CODE" != "302" ]; then
            echo "::error::Smoke FAILED — HTTP $CODE pra /login (esperado 200/302). Ver Tail laravel.log abaixo."
            echo "smoke_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Gate de bundle: se o frontend mudou neste push mas o hash servido NÃO mudou,
          # o build/rsync não publicou (regressão tipo hashes stale 20/05).
          if [ "$FRONTEND_CHANGED" = "true" ] && [ -n "$AFTER" ] && [ "$BEFORE" = "$AFTER" ]; then
            echo "::error::resources/js|css mudou neste push mas o hash dos bundles servidos é IDÊNTICO ($AFTER). Publicação não chegou ao prod. Deploy FALHA."
            echo "smoke_failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "✅ Smoke OK (frontend_changed=$FRONTEND_CHANGED)"

      - name: Failsafe — site no ar SÓ se bootar; senão mantém maintenance (503 gracioso)
        # Lição 2026-06-10: um step falhou entre `down` e `up`, deixando o site preso em 503
        # até intervenção manual → invariante "nunca ficar preso em maintenance".
        # Lição 2026-06-18: o failsafe forçava `up` INCONDICIONALMENTE, inclusive com código
        # que NÃO boota — classmap autoritativo stale após deploy interrompido entre
        # `git reset --hard` e `composer dump-autoload` → 500 em TODA rota por ~1h (web+console+cron),
        # sem nada no laravel.log (falha antes do logger). Invariante corrigido: nunca preso em
        # maintenance A MENOS que o código não boote — nesse caso 503 gracioso > 500, e o deploy
        # falha (vermelho) + alerta pra investigar. `php artisan about` reproduz o boot do app
        # (constrói o Handler + resolve binds) = mesmo gate do boot-smoke console.
        # Lição #9 (2026-06-20 · deploy-recovery-patterns.md): gateado em `maint_on`. Se o
        # Pré-deploy check flakou (rota SSH 65002 down), maintenance NUNCA ligou → o site já
        # está up → não faz sentido SSHar aqui (route down faria pendurar ~30min). Quando o
        # deploy entrou em maintenance de verdade, este step roda normal (invariante mantido).
        # Lição 2026-06-23: o `php artisan about` (CLI) NÃO reproduz middleware WEB fora do
        # classmap (kernel CLI não monta pipeline HTTP) → bootaria e exporia o 500. Se o
        # gate de classmap OU o boot gate WEB falhou, NÃO dar `up` — manter 503.
        if: always() && steps.maint_on.outcome == 'success'
        run: |
          if [ "${{ steps.classmap.outcome }}" = "failure" ] || [ "${{ steps.webgate.outcome }}" = "failure" ]; then
            /tmp/ssh_exec.sh "cd $RDIR && php artisan down --retry=60 --refresh=60 2>&1 || true; echo 'MANTIDO EM MAINTENANCE (503) — gate classmap/web falhou'"
            echo "::error::Gate de classmap/web falhou — site mantido em MAINTENANCE (503). 'php artisan about' (CLI) não reproduz esse caso (middleware web). Recuperar: 'composer dump-autoload -o --classmap-authoritative --no-scripts --ignore-platform-req=ext-opentelemetry --ignore-platform-req=ext-sodium' + reset OPcache, OU re-deploy do main saudável. Ver Tail laravel.log abaixo."
            exit 1
          fi
          if /tmp/ssh_exec.sh "cd $RDIR && php artisan about > /dev/null 2>&1"; then
            /tmp/ssh_exec.sh "cd $RDIR && php artisan up 2>&1 || rm -f storage/framework/down storage/framework/maintenance.php 2>&1 || true; echo 'maintenance OFF (boot OK)'"
          else
            /tmp/ssh_exec.sh "cd $RDIR && php artisan down --retry=60 --refresh=60 2>&1 || true; echo 'MANTIDO EM MAINTENANCE (503) — codigo nao boota'"
            echo "::error::Codigo deployado NAO boota (php artisan about falhou). Site mantido em MAINTENANCE (503 gracioso) em vez de servir 500. Recuperar no prod: 'composer dump-autoload -o --classmap-authoritative --no-scripts --ignore-platform-req=ext-opentelemetry --ignore-platform-req=ext-sodium' + reset OPcache, OU re-deploy. Ver Tail laravel.log abaixo."
            exit 1
          fi

      - name: Tail laravel.log (sempre que houve deploy real — diagnose + post-mortem)
        # Lição #9: gateado em maint_on (igual ao Failsafe) — sem deploy real (pré-check
        # flakou) não há o que tailar e a rota down penduraria o SSH.
        if: always() && steps.maint_on.outcome == 'success'
        run: |
          echo "=== Last 80 lines storage/logs/laravel.log ==="
          /tmp/ssh_exec.sh "cd $RDIR && tail -80 storage/logs/laravel.log 2>&1 || echo '(log vazio ou ausente)'"

      - name: Falha smoke (após log visível)
        if: steps.smoke.outputs.smoke_failed == 'true'
        run: |
          echo "::error::Smoke test FAILED — ver step 'Tail laravel.log' acima pra causa raiz."
          exit 1

      - name: Verify Laravel version deployed
        run: /tmp/ssh_exec.sh "cd $RDIR && php artisan --version"

      - name: Deploy SUCCESS
        run: |
          echo "✅ Deploy concluído (build no runner + bundles publicados + OPcache reset confirmado)."
          echo "📦 Backups: ~/backup-predeploy-*.tar.gz (5 mais recentes)"
          echo "🌐 https://oimpresso.com"
