name: Governance Gate (pre-merge)

# Mecanismo #2 ENFORCEMENT вЂ” Pre-merge gate CI
# ConstituiГ§ГЈo v1.1.0 Art. 8 В§2 (Policy Gating) + ENFORCEMENT.md В§2 #2
# Implementa bloqueio de merge quando camadas crГ­ticas (CONSTITUTION,
# ADRs canon, handoffs append-only, Controllers fora SCOPE, PII LGPD)
# sГЈo tocadas sem artefatos obrigatГіrios.
#
# Diferente de scope-guard.yml (jГЎ existe, modo strict pra Controllers vs SCOPE):
# este workflow cobre append-only (decisions/handoffs/constitution) + PII scan +
# warn-mode pra Controllers novos (complementar ao scope-guard strict).
#
# Triggers: pull_request em qualquer branch + paths-filter por job.

on:
  # ADR 0271 onda 2 (item 4 вЂ” required-readiness): pull_request SEM paths
  # (always-run) pra ser promovГ­vel a required sem deadlock "Expected вЂ” waiting".
  # Cada job compara o diff base...HEAD do PR в†’ em PR sem arquivo canon o diff
  # Г© vazio e os jobs passam (append-only/pii/scope nada a checar).
  pull_request: {}

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: governance-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =====================================================================
  # JOB 1 вЂ” block-adr-edits
  # Bloqueia ediГ§ГЈo de ADR canon existente, handoff existente, e mudanГ§a
  # em CONSTITUTION sem label + audit cascade (В§10.4).
  # =====================================================================
  block-adr-edits:
    name: Append-only canon (ADRs, handoffs, ConstituiГ§ГЈo)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect arquivos canon modificados
        id: detect
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"

          # Lista A/M/D/R por arquivo entre base_sha e HEAD (3-dot = mudanГ§as do PR).
          git diff --name-status "$base_sha"...HEAD > /tmp/diff.txt

          # ADRs canon modificados (proibido)
          grep -E '^M\s+memory/decisions/[0-9]{4}-.*\.md$' /tmp/diff.txt > /tmp/adr_mod.txt || true
          # ADRs renamed (R = rename) вЂ” tambГ©m trata como edit, ADR mantГ©m nГєmero
          grep -E '^R[0-9]*\s+memory/decisions/[0-9]{4}-' /tmp/diff.txt > /tmp/adr_renamed.txt || true

          # Handoffs modificados (proibido вЂ” ADR 0130)
          grep -E '^M\s+memory/handoffs/.+\.md$' /tmp/diff.txt > /tmp/handoff_mod.txt || true

          # ConstituiГ§ГЈo modificada (exige label + audit)
          grep -E '^M\s+memory/governance/CONSTITUTION\.md$' /tmp/diff.txt > /tmp/const_mod.txt || true
          # ConstituiГ§ГЈo adicionada (caso raro вЂ” primeira vez) tambГ©m exige label
          grep -E '^A\s+memory/governance/CONSTITUTION\.md$' /tmp/diff.txt >> /tmp/const_mod.txt || true

          # Novo audit-* no mesmo PR (pra checar cascade)
          grep -E '^A\s+memory/governance/audit-.+\.md$' /tmp/diff.txt > /tmp/audit_new.txt || true

          {
            echo "adr_mod_count=$(wc -l < /tmp/adr_mod.txt)"
            echo "adr_renamed_count=$(wc -l < /tmp/adr_renamed.txt)"
            echo "handoff_mod_count=$(wc -l < /tmp/handoff_mod.txt)"
            echo "const_mod_count=$(wc -l < /tmp/const_mod.txt)"
            echo "audit_new_count=$(wc -l < /tmp/audit_new.txt)"
          } >> "$GITHUB_OUTPUT"

          echo "--- ADRs modificados (proibido) ---"
          cat /tmp/adr_mod.txt
          echo "--- Handoffs modificados (proibido) ---"
          cat /tmp/handoff_mod.txt
          echo "--- ConstituiГ§ГЈo modificada (exige cascade) ---"
          cat /tmp/const_mod.txt

      - name: ExceГ§ГЈo вЂ” normalizaГ§ГЈo cirГєrgica de metadados (ADR 0257)
        id: norm
        if: steps.detect.outputs.adr_mod_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # ExceГ§ГЈo append-only: sГі metadados (status/lifecycle/kind/authority), sob label.
          # Protege a DECISГѓO (corpo imutГЎvel); libera corrigir a ETIQUETA. ADR 0257.
          labels=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels" --jq '.[].name' 2>/dev/null || echo "")
          if ! echo "$labels" | grep -qFx "adr-metadata-normalization"; then
            echo "norm_ok=0" >> "$GITHUB_OUTPUT"
            echo "Label 'adr-metadata-normalization' ausente вЂ” append-only normal."
            exit 0
          fi
          base_sha="${{ github.event.pull_request.base.sha }}"
          ok=1
          while IFS= read -r line; do
            file=$(echo "$line" | sed -E 's/^M[[:space:]]+//')
            [ -z "$file" ] && continue
            bad=$(git diff "$base_sha"...HEAD -- "$file" | grep -E '^[+-]' | grep -vE '^(\+\+\+|---)' | grep -vE '^[+-](status|lifecycle|kind|authority|superseded_by|supersedes):' | grep -vE "^[+-][[:space:]]*-[[:space:]]*['\"]?[0-9]{3,4}" || true)
            if [ -n "$bad" ]; then
              echo "::warning::$file muda fora de status/lifecycle/kind/authority/superseded_by/supersedes вЂ” exceГ§ГЈo NГѓO aplica a esta PR."
              ok=0
            fi
          done < /tmp/adr_mod.txt
          echo "norm_ok=$ok" >> "$GITHUB_OUTPUT"
          if [ "$ok" = "1" ]; then echo "вњ“ NormalizaГ§ГЈo cirГєrgica validada (ADR 0257) вЂ” exceГ§ГЈo aplicada."; fi

      - name: ExceГ§ГЈo вЂ” migraГ§ГЈo legacyв†’canГґnico de frontmatter de ADR (ADR 0297)
        id: legacymig
        if: steps.detect.outputs.adr_mod_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # ExceГ§ГЈo append-only 0297 (emenda operacional de 0257): migraГ§ГЈo de
          # frontmatter legacyв†’canГґnico (adrв†’slug/number/type, decidersв†’decided_by,
          # dateв†’decided_at, referencesв†’related, +authority). Protege a DECISГѓO
          # exigindo que o CORPO (tudo apГіs o frontmatter) seja BYTE-IDГЉNTICO.
          # Sob label dedicado 'adr-legacy-schema-migration'.
          labels=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels" --jq '.[].name' 2>/dev/null || echo "")
          if ! echo "$labels" | grep -qFx "adr-legacy-schema-migration"; then
            echo "legacymig_ok=0" >> "$GITHUB_OUTPUT"
            echo "Label 'adr-legacy-schema-migration' ausente вЂ” exceГ§ГЈo 0297 nГЈo aplica."
            exit 0
          fi
          base_sha="${{ github.event.pull_request.base.sha }}"
          # Corpo = tudo apГіs o 2Вє fence '---' do frontmatter (preserva '---' do corpo).
          body_of() { awk 'BEGIN{c=0} /^---$/ && c<2 {c++; next} c>=2 {print}' "$1"; }
          ok=1
          while IFS= read -r line; do
            file=$(echo "$line" | sed -E 's/^M[[:space:]]+//')
            [ -z "$file" ] && continue
            if ! git show "$base_sha:$file" > /tmp/base_adr.md 2>/dev/null; then
              echo "::warning::$file вЂ” sem versГЈo na base; exceГ§ГЈo 0297 Г© sГі pra migraГ§ГЈo de ADR existente."
              ok=0; continue
            fi
            body_of /tmp/base_adr.md > /tmp/base_body.txt
            body_of "$file" > /tmp/head_body.txt
            if ! diff -q /tmp/base_body.txt /tmp/head_body.txt >/dev/null 2>&1; then
              echo "::warning::$file вЂ” CORPO da decisГЈo mudou; exceГ§ГЈo 0297 exige corpo byte-idГЄntico (sГі frontmatter pode migrar)."
              ok=0
            fi
          done < /tmp/adr_mod.txt
          echo "legacymig_ok=$ok" >> "$GITHUB_OUTPUT"
          if [ "$ok" = "1" ]; then echo "вњ“ MigraГ§ГЈo legacyв†’canГґnico validada (ADR 0297) вЂ” corpo intacto, exceГ§ГЈo aplicada."; fi

      - name: Block ADR canon edits (append-only)
        if: steps.detect.outputs.adr_renamed_count != '0' || (steps.detect.outputs.adr_mod_count != '0' && steps.norm.outputs.norm_ok != '1' && steps.legacymig.outputs.legacymig_ok != '1')
        run: |
          set -euo pipefail
          echo "::error::ADR CANON Г© append-only (ConstituiГ§ГЈo Art. 3 + ADR 0095)."
          echo ""
          echo "Arquivos violando a regra:"
          cat /tmp/adr_mod.txt /tmp/adr_renamed.txt
          echo ""
          echo "Como resolver:"
          echo "  1. REVERTER ediГ§ГЈo do ADR existente (git checkout origin/${{ github.base_ref }} -- <arquivo>)"
          echo "  2. CRIAR nova ADR em memory/decisions/NNNN-slug.md"
          echo "     com frontmatter 'supersedes: [NNNN]' apontando pra ADR antiga"
          echo "  3. Marcar ADR antiga como 'lifecycle: superseded' SE Wagner aprovar"
          echo "     (essa marcaГ§ГЈo Г© o ГљNICO patch permitido вЂ” ainda assim via PR separada)"
          echo ""
          echo "Justificativa: rastreabilidade histГіrica das decisГµes. Editar ADR"
          echo "ratificada apaga o trail e quebra ConstituiГ§ГЈo Art. 3 (governanГ§a)."
          exit 1

      - name: Block handoff edits (append-only ADR 0130)
        if: steps.detect.outputs.handoff_mod_count != '0'
        run: |
          set -euo pipefail
          echo "::error::Handoffs sГЈo append-only (ADR 0130)."
          echo ""
          echo "Arquivos violando:"
          cat /tmp/handoff_mod.txt
          echo ""
          echo "Como resolver:"
          echo "  1. REVERTER ediГ§ГЈo (git checkout origin/${{ github.base_ref }} -- <arquivo>)"
          echo "  2. CRIAR handoff novo em memory/handoffs/YYYY-MM-DD-HHMM-slug-kebab.md"
          echo "  3. Atualizar 1 linha no topo de memory/08-handoff.md (truncar 5Вє)"
          echo ""
          echo "Justificativa: handoff Г© snapshot temporal. Reescrever apaga o que"
          echo "outro Claude/humano leu вЂ” quebra continuidade de sessГЈo."
          exit 1

      - name: Block constitution edits sem label + audit cascade
        if: steps.detect.outputs.const_mod_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Checa label constitution-amendment
          labels=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels" --jq '.[].name' 2>/dev/null || echo "")
          has_label=$(echo "$labels" | grep -cFx "constitution-amendment" || echo "0")

          # Checa se PR traz audit cascade novo
          audit_count="${{ steps.detect.outputs.audit_new_count }}"

          missing=""
          if [ "$has_label" -eq "0" ]; then
            missing="${missing}- label 'constitution-amendment' nГЈo aplicada na PR\n"
          fi
          if [ "$audit_count" = "0" ]; then
            missing="${missing}- nenhum 'memory/governance/audit-*.md' novo no mesmo PR (В§10.4 Cascade Review obrigatГіria)\n"
          fi

          if [ -n "$missing" ]; then
            echo "::error::MudanГ§a em CONSTITUTION.md exige label + audit cascade (Art. 10 В§10.4)."
            echo ""
            echo "Faltando:"
            echo -e "$missing"
            echo ""
            echo "Como resolver:"
            echo "  1. Aplicar label 'constitution-amendment' nesta PR (UI GitHub)"
            echo "  2. Criar memory/governance/audit-YYYY-MM-DD-vX.Y.md documentando"
            echo "     cascade review das camadas L2-L7 impactadas"
            echo "  3. Bump version no frontmatter da CONSTITUTION + entry em amendments[]"
            echo "  4. ADR formal linkada (Refs: ADR-NNNN no corpo da PR ou commit)"
            echo ""
            echo "Ver memory/governance/CONSTITUTION.md В§10.4 + audit-2026-05-05-v1.1.md (exemplo)."
            exit 1
          fi

          echo "вњ… ConstituiГ§ГЈo editada COM label + audit cascade. OK."

  # =====================================================================
  # JOB 2 вЂ” scope-md-drift
  # Warn-only (nГЈo falha): posta comment quando Controller novo entra
  # sem aparecer em SCOPE.md.contains[] do mГіdulo. Complementar ao
  # scope-guard.yml que jГЎ roda strict pra mesmo cenГЎrio.
  # =====================================================================
  scope-md-drift:
    name: SCOPE.md drift (Controllers novos)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python (yq nativo)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Detect Controllers novos
        id: detect
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"

          # Status A = adicionado (novo arquivo)
          mapfile -t novos < <(
            git diff --name-status "$base_sha"...HEAD \
              | grep -E '^A\s+Modules/[^/]+/Http/Controllers/.*Controller\.php$' \
              | awk '{print $2}' \
              | sort -u
          )

          echo "count=${#novos[@]}" >> "$GITHUB_OUTPUT"
          {
            echo "list<<EOF"
            printf '%s\n' "${novos[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Detected ${#novos[@]} Controllers novos."

      - name: Verifica SCOPE.md.contains[]
        id: verify
        if: steps.detect.outputs.count != '0'
        run: |
          set -euo pipefail
          drifts=""

          while IFS= read -r controller_path; do
            [[ -z "$controller_path" ]] && continue

            # Extrai mГіdulo + nome controller
            modulo=$(echo "$controller_path" | sed -E 's|Modules/([^/]+)/.*|\1|')
            controller_name=$(basename "$controller_path" .php)

            scope="Modules/${modulo}/SCOPE.md"

            if [ ! -f "$scope" ]; then
              drifts="${drifts}- вљ пёЏ \`$controller_path\` вЂ” \`$scope\` nГЈo existe (mГіdulo sem charter, ADR 0079 Art. 7)\n"
              continue
            fi

            # Parsea YAML frontmatter via Python (yq nГЈo vem default)
            in_scope=$(python3 <<PYEOF
          import yaml, re, sys
          raw = open("$scope", encoding="utf-8").read()
          m = re.match(r'^---\n(.*?)\n---\n', raw, re.DOTALL)
          if not m:
              print("no-frontmatter")
              sys.exit(0)
          try:
              fm = yaml.safe_load(m.group(1)) or {}
          except Exception:
              print("parse-error")
              sys.exit(0)
          contains = fm.get("contains", []) or []
          # contains pode ser ["Foo"] OU ["FooController вЂ” descriГ§ГЈo"] вЂ” checa prefix
          name = "$controller_name"
          for entry in contains:
              if isinstance(entry, str) and (entry == name or entry.startswith(name + " ") or entry.startswith(name + "вЂ”")):
                  print("yes")
                  sys.exit(0)
          print("no")
          PYEOF
          )

            case "$in_scope" in
              yes)
                echo "вњ… $controller_name declarado em $scope"
                ;;
              no)
                drifts="${drifts}- вќЊ \`$controller_path\` вЂ” \`$controller_name\` NГѓO declarado em \`$scope\`.contains[]\n"
                ;;
              no-frontmatter)
                drifts="${drifts}- вљ пёЏ \`$controller_path\` вЂ” \`$scope\` sem frontmatter YAML vГЎlido\n"
                ;;
              parse-error)
                drifts="${drifts}- вљ пёЏ \`$controller_path\` вЂ” \`$scope\` frontmatter com erro de parse YAML\n"
                ;;
            esac
          done <<< "${{ steps.detect.outputs.list }}"

          {
            echo "drifts<<EOF"
            echo -e "$drifts"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment PR (warn-only)
        if: steps.detect.outputs.count != '0' && steps.verify.outputs.drifts != ''
        uses: actions/github-script@v7
        env:
          DRIFTS: ${{ steps.verify.outputs.drifts }}
          COUNT: ${{ steps.detect.outputs.count }}
        with:
          script: |
            const drifts = process.env.DRIFTS || '';
            const count = process.env.COUNT || '0';
            if (!drifts.trim()) return;
            const body = [
              `## рџ›ЎпёЏ Governance Gate вЂ” SCOPE.md drift (warn)`,
              ``,
              `**Controllers novos detectados:** ${count}`,
              ``,
              `### Drift`,
              drifts,
              ``,
              `### Como resolver`,
              `- Adicione cada Controller em \`Modules/<X>/SCOPE.md.contains[]\` no mesmo PR`,
              `- OU mova o Controller pro mГіdulo correto`,
              `- OU declare em \`drift_alerts[]\` com ADR justificando (transitГіrio)`,
              ``,
              `> **Warn-only mode** вЂ” nГЈo bloqueia merge. Workflow \`scope-guard.yml\` jГЎ roda strict pro mesmo cenГЎrio; este job posta detalhes humanos. Quando \`scope-guard\` falhar com hard error, este comment ajuda a resolver.`,
              ``,
              `_ConstituiГ§ГЈo Art. 7 + ADR 0079 вЂ” Module Charter._`,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # =====================================================================
  # JOB 3 вЂ” pii-scan
  # Defesa LGPD: bloqueia PR que contenha CPF/CNPJ literal em cГіdigo.
  # Falsos-positivos: linha com '# pii-allowlist' Г© ignorada.
  # =====================================================================
  pii-scan:
    name: PII scan (CPF/CNPJ literal)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run pii-scan.sh nos arquivos do PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/pii-scan.sh
          # Lista arquivos AM (Added|Modified) do PR вЂ” exclui deletados
          mapfile -t arquivos < <(
            git diff --name-only --diff-filter=AM "$BASE_SHA"...HEAD \
              | grep -vE '^(vendor|node_modules|public|storage|bootstrap/cache)/' \
              | grep -vE '\.(lock|min\.js|min\.css|map|svg|png|jpg|jpeg|gif|webp|pdf|zip)$' \
              | grep -vE '\.github/scripts/pii-scan\.sh$' \
              | grep -vE '\.github/workflows/governance-gate\.yml$' \
              | grep -vE '^prototipo-ui/cowork/' \
              || true
          )

          if [ ${#arquivos[@]} -eq 0 ]; then
            echo "Nenhum arquivo elegГ­vel pra PII scan no PR."
            exit 0
          fi

          echo "Scanning ${#arquivos[@]} arquivosвЂ¦"
          .github/scripts/pii-scan.sh -v "${arquivos[@]}"
