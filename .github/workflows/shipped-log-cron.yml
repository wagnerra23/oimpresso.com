name: Shipped log cron (auto-PR)

# Mantém memory/governance/shipped/<CYCLE>.md FRESCO sem ninguém rodar à mão —
# fecha a porta de saída do loop (estende ADR 0294). Descobre cycle+since lendo
# o shipped-log mais recente (sem depender do MCP), regenera com until=hoje via
# gerador honesto (REST sub-janela + cross-check), e abre PR com auto-merge.
#
# Padrão copiado de composer-lock-sync.yml (peter-evans). Schedule 2x/semana
# Usa COWORK_BOT_PAT (não GITHUB_TOKEN): PR aberto pelo GITHUB_TOKEN NÃO dispara CI
# (regra anti-loop do Actions) → ficaria preso no branch protection. PAT dispara.
# (seg+qui) mantém abaixo do FRESH_DAYS=4 do gate. workflow_dispatch p/ cycle novo.

on:
  schedule:
    - cron: '0 9 * * 1,4'   # 09:00 UTC — segunda e quinta
  workflow_dispatch:
    inputs:
      cycle:
        description: 'Cycle (ex CYCLE-09). Vazio = lê do shipped-log mais recente.'
        required: false
        default: ''
      since:
        description: 'Início da janela YYYY-MM-DD. Vazio = lê do shipped-log mais recente.'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Regenera shipped-log + auto-PR
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.COWORK_BOT_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Descobre cycle + since (input ou shipped-log mais recente)
        id: win
        run: |
          set -e
          CYCLE="${{ inputs.cycle }}"
          SINCE="${{ inputs.since }}"
          LATEST=$(ls -t memory/governance/shipped/*.md 2>/dev/null | head -1 || true)
          if [ -z "$CYCLE" ] && [ -n "$LATEST" ]; then
            CYCLE=$(sed -n 's/^cycle:[[:space:]]*//p' "$LATEST" | head -1)
          fi
          if [ -z "$SINCE" ] && [ -n "$LATEST" ]; then
            SINCE=$(sed -n 's/^window:[[:space:]]*"\{0,1\}\([0-9-]\{10\}\)\.\..*/\1/p' "$LATEST" | head -1)
          fi
          if [ -z "$CYCLE" ] || [ -z "$SINCE" ]; then
            echo "✗ não consegui descobrir cycle/since (sem shipped-log seed e sem inputs)"; exit 1
          fi
          echo "cycle=$CYCLE" >> "$GITHUB_OUTPUT"
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "→ cycle=$CYCLE since=$SINCE until=$(date -u +%F)"

      - name: Regenera (gerador honesto --write)
        run: node scripts/governance/shipped-log-generate.mjs --since=${{ steps.win.outputs.since }} --until=$(date -u +%F) --cycle=${{ steps.win.outputs.cycle }} --write

      - name: Diff
        id: diff
        run: |
          if git diff --quiet memory/governance/shipped/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nada mudou — registro já estava fresco."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat memory/governance/shipped/
          fi

      - name: Auto-PR
        if: steps.diff.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.COWORK_BOT_PAT }}
          base: main
          branch: chore/shipped-log-${{ steps.win.outputs.cycle }}-${{ github.run_id }}
          commit-message: |
            docs(governance): atualiza shipped-log ${{ steps.win.outputs.cycle }} (cron)

            Regenerado pelo gerador honesto (fonte completa). Porta de saída do loop.

            Refs: ${{ steps.win.outputs.cycle }}
            Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>
          title: 'docs(governance): shipped-log ${{ steps.win.outputs.cycle }} fresco (cron)'
          body: |
            **Shipped-log automático** — regenera o registro de entrega do cycle.

            Gerado por `shipped-log-generate.mjs` (REST sub-janela + cross-check de contagem).
            Mantém o gate `shipped-log-gate` verde (FRESH_DAYS=4). Auto-merge habilitado.

            🤖 Generated by Shipped log cron
          labels: |
            governance
            automated
          delete-branch: true

      - name: Auto-merge no PR gerado
        if: steps.cpr.outputs.pull-request-number
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --auto --delete-branch
