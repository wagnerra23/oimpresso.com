name: Governance Gate (umbrella)

# A REDE (ADR 0256/0258) — UM check que agrega os gates determinísticos de governança.
# Roda em TODO PR pro main (SEM path-filter) → sempre reporta → pode ser marcado
# `required` no ruleset sem travar PR não-relacionado (resolve o deadlock de path-filter).
#
# FASE: nasceu advisory e o flip JÁ OCORREU — o context "Governance Gate (índice +
# memory-health + meta-teste)" está nos required do ruleset (fonte: governance/required-checks-baseline.json).
# Break-glass = ruleset bypass-actor
# com audit log (mantém escape de emergência, mas registrado) — não enforce_admins binário.
#
# Agrega: índice de ADR (--check + supersede-integrity) · memory-health (enforce) ·
# meta-teste vitest (controle-negativo dos próprios gates). Append-only canon segue no
# governance-gate.yml (lógica de label/gh-api própria).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  governance:
    name: Governance Gate (índice + memory-health + meta-teste)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # memory-health Check B usa git log -1 (scorecard fantasma)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps (pro vitest)
        run: npm ci
      - name: Índice de ADR em dia + supersede íntegra
        run: node scripts/governance/adr-index-generate.mjs --check
      - name: Paleta de cor em dia (PALETA.html == cockpit.css)
        run: node scripts/governance/palette-generate.mjs --check
      - name: memory-health (enforce — segredo novo / colisão / ressurreição bloqueiam)
        run: node scripts/governance/memory-health.mjs
      - name: Meta-teste dos scripts de governança (controle-negativo)
        run: npm run test:adr-governance
      - name: Meta-teste dos checks G/H/I do memory-health (Onda Q5 — controle-negativo)
        run: npm run test:memory-health
      - name: Teste canário do gerador de planos (controle-negativo · ADR 0294)
        run: node scripts/governance/plans-index.test.mjs
      - name: Índice de Planos em dia (advisory · ADR 0294 · nasce advisory ADR 0271)
        continue-on-error: true
        run: node scripts/governance/plans-index.mjs --check
      # ENFORCE (GT-G5 · ledger §D — promovido 2026-07-04, avaliação adversarial SDD
      # 2026-07-03 risco sistêmico nº2): refutação adversarial de lote-IA de BRIEFINGs/SPECs
      # (PROTOCOLO-REFUTADOR-BACKFILL). Só dispara em PR com >10 arquivos em memory/requisitos/
      # — sem entry válida no ledger governance/sdd-verification-ledger.json → exit 1 falha o
      # job umbrella (já required — ADR 0314: fusão em gate existente, sem context novo).
      # PR pequeno / push direto / fora de PR = no-op exit 0. Só em PR (precisa nº + base_ref).
      - name: ledger-check — refutação de lote IA (enforce · GT-G5)
        if: github.event_name == 'pull_request'
        run: node scripts/governance/ledger-check.mjs --pr ${{ github.event.pull_request.number }} --base origin/${{ github.base_ref }} --head HEAD --enforce
      # ADVISORY (nasce sem morder — ONDAS-QUALIDADE regra 2): controle-negativo do
      # auditor de corruptores SQLite (sensibilidade + especificidade). Promover a
      # required = remover continue-on-error após 2 verdes. Ref: sessão 2026-06-15.
      - name: Meta-teste do auditor de corruptores SQLite (advisory · 2 lados)
        run: npm run test:sqlite-corruptors
        continue-on-error: true
      # MORDENTE (promovido 2026-07-02 — ONDAS-QUALIDADE regra 2 cumprida: 2 verdes
      # registrados, runs 28589117253 + 28589786280, ambos 8/8): contract test do harness
      # do nightly (US-GOV-018 DoD A/B + US-GOV-020 grants — fixes PROVADOS no CT100 que
      # vivem em shell script sem cobertura Pest; sumir um deles num refactor só apareceria
      # na nightly horas depois). Falha aqui = artefato provado sumiu do canônico.
      # NÃO é flip de required check (isso é Wagner-only, ADR 0275 §5) — só faz o step
      # falhar o job advisory de forma visível.
      - name: Contract test do harness fullsuite (US-GOV-018/020)
        run: npm run test:fullsuite-harness
      # ADVISORY→pronto-pra-required (US-GOV-021 · ADR 0275): roda o AUDITOR EM SI
      # (`--strict`), não só o meta-teste do classifier. Desde 2026-06-30 há
      # **0 corruptores** (todos os 18+ isolados via GUARDAR-TEARDOWN, lotes 1-3) → exit 0.
      # continue-on-error MANTIDO até 2 verdes consecutivos (regra ADR 0275); remover daí
      # pra promover a REQUIRED. A partir disso, qualquer PR que reintroduza um drop
      # não-guardado de tabela compartilhada → exit 1. Counterfactual provado em US-GOV-021
      # (Schema::drop('business') solto → corruptsOnMysql=true tier S; reverter → null/exit 0).
      - name: Auditor de corruptores SQLite — gate (advisory · US-GOV-021 · 0 corruptores — pronto pra required após 2 verdes)
        run: node scripts/audit/sqlite-test-corruptors.mjs --strict --tier=A
        continue-on-error: true

  # Segredo NOVO em QUALQUER arquivo do diff (API key, token, senha) — fecha o gap
  # entre o memory-health (só memory/) e o secrets:audit (só scheduled, não barra PR).
  # Job SEPARADO de propósito: check context próprio ("Secret scan (gitleaks · só
  # linhas novas do PR)") — nasceu advisory pelo método faseado (ADR 0271) e o flip
  # JÁ OCORREU (fonte: governance/required-checks-baseline.json). Always-run sem paths.
  # gitleaks-action escaneia só os COMMITS do PR (linhas adicionadas) — segredos
  # históricos já catalogados (incidente memory/claude) NÃO flagam a menos que o PR
  # os toque. Falso-positivo (fixture fake etc) → allowlist em .gitleaks.toml na raiz.
  # Licença: GITLEAKS_LICENSE só é exigida em repo de ORG — wagnerra23 é user account.
  secret-scan:
    name: Secret scan (gitleaks · só linhas novas do PR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── G6 · watchdog dos crons de governança (ADR 0317 §2 — generaliza o auto-canário) ──
  # O GitHub DESABILITA workflow agendado após 60d sem atividade — EM SILÊNCIO. As
  # sentinelas (memory-health/drift/ragas/sdd…) param e o brief fica verde = regressão
  # disfarçada de saúde. Este job (always-run em PR) checa a idade da última run AGENDADA
  # de CADA workflow com schedule, DESCOBERTOS dinamicamente (cobre cron novo/removido).
  # 🔴 cron morto · 🟡 bootstrap. Generaliza o job cron-liveness de memory-health.yml
  # (1 → 13 crons). Advisory ao nascer (ADR 0271); promover a required depois.
  crons-watchdog:
    name: crons de governança vivos? (watchdog G6 · ADR 0317)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Watchdog — todo cron agendado com heartbeat < limite
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: node scripts/governance/cron-watchdog.mjs
