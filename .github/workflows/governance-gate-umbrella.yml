name: Governance Gate (umbrella)

# A REDE (ADR 0256/0258) — UM check que agrega os gates determinísticos de governança.
# Roda em TODO PR pro main (SEM path-filter) → sempre reporta → pode ser marcado
# `required` no ruleset sem travar PR não-relacionado (resolve o deadlock de path-filter).
#
# FASE: nasce ADVISORY (roda + mostra verde/vermelho, NÃO bloqueia até ser adicionado
# aos required-checks do ruleset). Flip pra enforce = passo deliberado após ~2 semanas
# limpo (ver memory: decisao-pendente-enforcement-gates). Break-glass = ruleset bypass-actor
# com audit log (mantém escape de emergência, mas registrado) — não enforce_admins binário.
#
# Agrega: índice de ADR (--check + supersede-integrity) · memory-health (enforce) ·
# meta-teste vitest (controle-negativo dos próprios gates). Append-only canon segue no
# governance-gate.yml (lógica de label/gh-api própria).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  governance:
    name: Governance Gate (índice + memory-health + meta-teste)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # memory-health Check B usa git log -1 (scorecard fantasma)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps (pro vitest)
        run: npm ci
      - name: Índice de ADR em dia + supersede íntegra
        run: node scripts/governance/adr-index-generate.mjs --check
      - name: Paleta de cor em dia (PALETA.html == cockpit.css)
        run: node scripts/governance/palette-generate.mjs --check
      - name: memory-health (enforce — segredo novo / colisão / ressurreição bloqueiam)
        run: node scripts/governance/memory-health.mjs
      - name: Meta-teste dos scripts de governança (controle-negativo)
        run: npm run test:adr-governance
      - name: Meta-teste dos checks G/H/I do memory-health (Onda Q5 — controle-negativo)
        run: npm run test:memory-health
      - name: Teste canário do gerador de planos (controle-negativo · ADR 0294)
        run: node scripts/governance/plans-index.test.mjs
      - name: Índice de Planos em dia (advisory · ADR 0294 · nasce advisory ADR 0271)
        continue-on-error: true
        run: node scripts/governance/plans-index.mjs --check
      # ADVISORY (GT-G5 · ledger §D): refutação adversarial de lote-IA de BRIEFINGs/SPECs
      # (PROTOCOLO-REFUTADOR-BACKFILL). Sem --enforce → exit 0 sempre nesta fase; promover a
      # required = adicionar --enforce após o protocolo assentar. Só em PR (precisa nº + base_ref).
      - name: ledger-check — refutação de lote IA (advisory · GT-G5)
        if: github.event_name == 'pull_request'
        run: node scripts/governance/ledger-check.mjs --pr ${{ github.event.pull_request.number }} --base origin/${{ github.base_ref }} --head HEAD
        continue-on-error: true
      # ADVISORY (nasce sem morder — ONDAS-QUALIDADE regra 2): controle-negativo do
      # auditor de corruptores SQLite (sensibilidade + especificidade). Promover a
      # required = remover continue-on-error após 2 verdes. Ref: sessão 2026-06-15.
      - name: Meta-teste do auditor de corruptores SQLite (advisory · 2 lados)
        run: npm run test:sqlite-corruptors
        continue-on-error: true

  # Segredo NOVO em QUALQUER arquivo do diff (API key, token, senha) — fecha o gap
  # entre o memory-health (só memory/) e o secrets:audit (só scheduled, não barra PR).
  # Job SEPARADO de propósito: check context próprio ("Secret scan ...") nasce
  # ADVISORY (método faseado ADR 0271 — promover a required via gh api após ~2
  # semanas sem falso-positivo). Always-run sem paths = required-ready desde já.
  # gitleaks-action escaneia só os COMMITS do PR (linhas adicionadas) — segredos
  # históricos já catalogados (incidente memory/claude) NÃO flagam a menos que o PR
  # os toque. Falso-positivo (fixture fake etc) → allowlist em .gitleaks.toml na raiz.
  # Licença: GITLEAKS_LICENSE só é exigida em repo de ORG — wagnerra23 é user account.
  secret-scan:
    name: Secret scan (gitleaks · só linhas novas do PR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
