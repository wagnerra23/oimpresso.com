name: Dominio-dict ratchet (coerência de domínio)

# Gate G-4 da Governança executável (ADR 0264). O vocabulário de domínio declarado em
# memory/dominio/<modulo>.md tem que bater com os enum() reais das migrations do módulo.
# É a camada que a alucinação "locação de caçamba" (ADR 0265) atravessou — nenhum gate
# pegava enum incoerente. Ratchet: FALHA só em divergência NOVA vs baseline.
#
# FASE 1 (ADR 0264 + ADR 0261): roda e reporta a dívida, NÃO é required ainda. Ex.: o
# baseline atual carrega `order_type=locacao` como débito; o PR de erradicação (ADR 0265)
# baixa o enum e a divergência zera sozinha. Vira required na Fase 2 (flip consciente).
#
# Node puro (node:fs), sem deps, sem npm ci. Comando local: npm run dominio:check

on:
  push:
    branches: [main]
    paths:
      - 'Modules/**/Database/Migrations/**'
      - 'memory/dominio/**'
      - 'scripts/domain-dict-guard.mjs'
      - 'scripts/domain-dict-baseline.json'
      - '.github/workflows/dominio-gate.yml'
  pull_request:
    paths:
      - 'Modules/**/Database/Migrations/**'
      - 'memory/dominio/**'
      - 'scripts/domain-dict-guard.mjs'
      - 'scripts/domain-dict-baseline.json'
      - 'tests/dominioGuard.spec.ts'
      - '.github/workflows/dominio-gate.yml'

concurrency:
  group: dominio-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dominio-gate:
    name: Dominio-dict · ratchet (enum ⇔ dicionário)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Relatório de dívida (informativo)
        run: node scripts/domain-dict-guard.mjs --report

      - name: Dominio ratchet (falha em divergência NOVA enum⇔dicionário)
        run: node scripts/domain-dict-guard.mjs

      - name: Diagnóstico em caso de falha
        if: failure()
        run: |
          echo ""
          echo "❌ Um enum de migration divergiu do dicionário de domínio do módulo (ADR 0264 G-4)."
          echo ""
          echo "Fonte única: memory/dominio/<modulo>.md (bloco json). O enum() da migration tem que"
          echo "bater com a lista canônica. Reintroduzir locacao/locada viola a ADR 0265 (proibicoes.md)."
          echo ""
          echo "  1. Local: npm run dominio:check   · vê as divergências novas"
          echo "  2. Se a mudança de domínio é legítima: atualize o dicionário + npm run dominio:baseline:write"
          echo ""
          echo "Refs: ADR 0264 (G-4) · ADR 0265 (erradica locação) · ADR 0261 (enforcement faseado)"

  meta-test:
    name: meta-teste do dominio-guard (vitest)
    # O gate só "vale" se o controle-negativo que o prova roda no CI (método ADR 0258).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install deps
        run: npm ci
      - name: Controle-negativo do dominio-guard (físico)
        run: npm run test:dominio-guard
