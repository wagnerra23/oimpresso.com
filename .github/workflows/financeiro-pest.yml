name: Financeiro · Pest (MySQL)

# Lane dedicado pra rodar a suíte Pest do Modules/Financeiro contra MySQL REAL
# + seed mínimo (biz=1 + biz=2 — via .github/actions/pest-mysql-setup, FV-F2).
# Existe porque ci.yml e modules-pest.yml rodam SQLite
# :memory: SEM migrate — e os testes Feature do Financeiro dependem de schema
# completo + business semeado (Business::first()), então lá eles dariam skip
# (falsa cobertura). Aqui executam de verdade. (US-FIN-052)
#
# Usa o SCHEMA BASELINE (database/schema/mysql-schema.sql, gerado via schema:dump
# da prod 2026-06-04 com as 820 migrations registradas). `migrate` carrega o
# schema final num passo só + roda só as migrations novas → sem o problema de
# fresh-install (FK ordering / type-mismatch) que as migrations legacy têm.

on:
  workflow_dispatch: {}
  # ADR 0271 onda 2 (item 4 — required-readiness): pull_request SEM paths
  # (always-run) pra ser promovível a required sem deadlock "Expected — waiting".
  # O custo (MySQL + migrate + Pest) é evitado por skip-as-pass interno: o step
  # dorny/paths-filter detecta se algo do Financeiro mudou; se não, pula o pesado
  # e conclui verde. push segue path-filtered (contém custo no main).
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'Modules/Financeiro/**'
      - 'tests/Feature/TravaSegunda/**'
      # Sessão meia-populada sem business_id = Financeiro inteiro vazio em silêncio
      # (incidente prod 2026-07-02, Tier 0 ADR 0093) — por isso o guard mora nesta lane.
      - 'tests/Feature/Middleware/SetSessionDataRebuildTest.php'
      - 'app/Http/Middleware/SetSessionData.php'
      - 'app/Http/Controllers/AccountController.php'
      - 'database/schema/mysql-schema.sql'
      - '.github/workflows/financeiro-pest.yml'
      - '.github/actions/pest-mysql-setup/**'

concurrency:
  group: financeiro-pest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pest:
    name: PHP / Pest (Financeiro · MySQL)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: oimpresso_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Detectar mudanças do Financeiro (skip-as-pass — ADR 0271 onda 2)
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            fin:
              - 'Modules/Financeiro/**'
              - 'tests/Feature/TravaSegunda/**'
              - 'tests/Feature/Middleware/SetSessionDataRebuildTest.php'
              - 'app/Http/Middleware/SetSessionData.php'
              - 'app/Http/Controllers/AccountController.php'
              - 'database/schema/mysql-schema.sql'
              - '.github/workflows/financeiro-pest.yml'
              - '.github/actions/pest-mysql-setup/**'

      - name: Skip-as-pass (nada do Financeiro mudou)
        if: steps.changes.outputs.fin == 'false'
        run: echo "✅ Sem mudanças no Modules/Financeiro — skip-as-pass (required-ready, ADR 0271 onda 2)."

      # FV-F2 (plano SDD 2026-06-12): setup extraído pra composite action reusável
      # pelas lanes de burn-down por módulo. PHP + Composer + .env + migrate
      # (schema baseline) + seed mínimo (biz=1 fixture completa + biz=2 Tier 0
      # cross-tenant). O service container MySQL permanece DECLARADO ACIMA no job
      # (composite action não pode declarar services — limitação GitHub Actions).
      - name: Setup Pest MySQL (PHP + deps + .env + migrate + seed biz=1/biz=2)
        if: steps.changes.outputs.fin == 'true'
        uses: ./.github/actions/pest-mysql-setup

      - name: Stub Vite manifest (Inertia root view sem build do front)
        if: steps.changes.outputs.fin == 'true'
        run: |
          mkdir -p public/build-inertia
          cat > public/build-inertia/manifest.json <<'EOF'
          {
            "resources/css/inertia.css": { "file": "assets/inertia.css", "src": "resources/css/inertia.css", "isEntry": true },
            "resources/js/app.tsx": { "file": "assets/app.js", "src": "resources/js/app.tsx", "isEntry": true }
          }
          EOF

      - name: Run Pest (Financeiro · MySQL) — ALLOWLIST VERDE (catraca)
        if: steps.changes.outputs.fin == 'true'
        # phpunit.xml força DB_CONNECTION=sqlite :memory: (sem force=) — se não
        # sobrescrever, o Pest roda em sqlite VAZIO e os testes (Business::first())
        # SKIPam (a falsa cobertura). Exportar aqui faz rodar no MySQL real semeado.
        #
        # CATRACA (US-FIN-053): a lane roda só os arquivos comprovadamente verdes
        # contra o baseline. Cada lote de fix adiciona arquivos AQUI (ratchet up).
        # Diagnóstico completo da suíte (172f/270p/133s · 2026-06-04) em
        # memory/sessions/2026-06-04-financeiro-suite-landscape.md.
        # NÃO incluir arquivos com RefreshDatabase/migrate:fresh — eles dropam o
        # schema (FK) e LIMPAM o biz=1 seedado, envenenando os demais.
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_DATABASE: oimpresso_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: |
          mkdir -p test-results
          vendor/bin/pest --no-coverage --colors=always \
            --log-junit test-results/pest-financeiro-junit.xml \
            tests/Feature/TravaSegunda/RetencaoLoopE2ETest.php \
            tests/Feature/Middleware/SetSessionDataRebuildTest.php \
            Modules/Financeiro/Tests/Feature/UnificadoCanceladoArquivadosKpiTest.php \
            Modules/Financeiro/Tests/Feature/Advisor/Onda31AdvisorPortalTest.php \
            Modules/Financeiro/Tests/Feature/AccountsLegacyMapMultiTenantTest.php \
            Modules/Financeiro/Tests/Feature/BankStatementLineModelTest.php \
            Modules/Financeiro/Tests/Feature/Onda10Canon100PercentTest.php \
            Modules/Financeiro/Tests/Feature/Onda8cSparklineRealTest.php \
            Modules/Financeiro/Tests/Feature/PluggyIntegrationTest.php \
            Modules/Financeiro/Tests/Feature/TituloRepositoryWave18Test.php \
            Modules/Financeiro/Tests/Feature/Wave27PolishTest.php \
            Modules/Financeiro/Tests/Feature/Wave28PolishTest.php \
            Modules/Financeiro/Tests/Feature/CaixaMovimentoFreshnessTest.php \
            Modules/Financeiro/Tests/Feature/MultiTenantComprehensiveTest.php \
            Modules/Financeiro/Tests/Feature/UnificadoFormaPagamentoGuardTest.php \
            Modules/Financeiro/Tests/Feature/UnificadoBaixaDialogGuardTest.php \
            Modules/Financeiro/Tests/Feature/UnificadoEditPlanoContaTest.php \
            Modules/Financeiro/Tests/Feature/UnificadoCommentsAuditTest.php \
            Modules/Financeiro/Tests/Feature/UnificadoConferirTest.php \
            Modules/Financeiro/Tests/Feature/UnificadoUpdateTest.php \
            Modules/Financeiro/Tests/Feature/AccountTransactionIdorTest.php \
            Modules/Financeiro/Tests/Feature/ImpostosGuardTest.php

      # Onda Q2 (G-7 / Salto #2): o JUnit do Pest alimenta o manifesto por-UC
      # (casos:results MERGE per-UC — vereditos UC-F01..03 do RetencaoLoopE2ETest).
      # Roda mesmo em falha: a falha É o veredito que o G-7 registra.
      - name: Upload JUnit (veredito por-UC — casos:results)
        if: ${{ !cancelled() && steps.changes.outputs.fin == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pest-financeiro-junit
          path: test-results/pest-financeiro-junit.xml
          retention-days: 14
