name: Financeiro · Pest (MySQL)

# Lane dedicado pra rodar a suíte Pest do Modules/Financeiro contra MySQL REAL
# + seed mínimo (biz=1). Existe porque ci.yml e modules-pest.yml rodam SQLite
# :memory: SEM migrate — e os testes Feature do Financeiro dependem de schema
# completo + business semeado (Business::first()), então lá eles dariam skip
# (falsa cobertura). Aqui executam de verdade. (US-FIN-052)
#
# Usa o SCHEMA BASELINE (database/schema/mysql-schema.sql, gerado via schema:dump
# da prod 2026-06-04 com as 820 migrations registradas). `migrate` carrega o
# schema final num passo só + roda só as migrations novas → sem o problema de
# fresh-install (FK ordering / type-mismatch) que as migrations legacy têm.

on:
  workflow_dispatch: {}
  pull_request:
    branches: [main]
    paths:
      - 'Modules/Financeiro/**'
      - 'database/schema/mysql-schema.sql'
      - '.github/workflows/financeiro-pest.yml'
  push:
    branches: [main]
    paths:
      - 'Modules/Financeiro/**'
      - 'database/schema/mysql-schema.sql'
      - '.github/workflows/financeiro-pest.yml'

concurrency:
  group: financeiro-pest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pest:
    name: PHP / Pest (Financeiro · MySQL)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: oimpresso_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, dom, fileinfo, intl, json, mbstring, openssl, pdo, pdo_mysql, tokenizer, xml, zip, gd, opentelemetry
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Prepare dirs
        run: mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache

      - name: Install PHP deps
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h127.0.0.1 -uroot -proot --silent; then echo "MySQL up"; break; fi
            echo "waiting mysql ($i)"; sleep 2
          done

      - name: Create .env (MySQL)
        run: |
          cat > .env <<'EOF'
          APP_NAME=oimpresso-fin
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost
          LOG_CHANNEL=stderr
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=oimpresso_test
          DB_USERNAME=root
          DB_PASSWORD=root
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          MAIL_MAILER=array
          BCRYPT_ROUNDS=4
          TELESCOPE_ENABLED=false
          SCOUT_DRIVER=null
          MCP_TOOLS_EXPOSED=false
          EOF
          php artisan key:generate --force
          php artisan package:discover --ansi

      - name: Migrate (carrega schema baseline + migrations novas)
        # Com database/schema/mysql-schema.sql presente, o Laravel carrega o
        # schema final + a tabela migrations (820 linhas) num passo, depois roda
        # só as migrations posteriores ao dump. Sem replay fresh-install.
        run: php artisan migrate --force

      - name: Seed mínimo (biz=1 + users + conta bancária)
        run: |
          php artisan db:seed --class="Database\\Seeders\\CurrenciesTableSeeder" --force || true
          php artisan db:seed --class="Database\\Seeders\\PermissionsTableSeeder" --force || true
          # DummyBusinessSeeder é stale: insere contacts.first_name (coluna removida
          # do schema real). Ele cria business+users ANTES de chegar em contacts, então
          # || true deixa o essencial (biz=1 + users) persistir e segue. Os testes só
          # precisam de Business::first()+User+conta, não de contacts/brands/categories.
          php artisan db:seed --class="Database\\Seeders\\DummyBusinessSeeder" --force || true
          php artisan tinker --execute="
            \$c = \Modules\Financeiro\Models\ContaBancaria::query()->where('business_id',1)->first();
            if (! \$c) {
              \Modules\Financeiro\Models\ContaBancaria::create([
                'business_id' => 1, 'account_id' => 999001, 'agencia' => '0001',
                'carteira' => '0', 'beneficiario_documento' => '00000000000000',
                'beneficiario_razao_social' => 'CI Test', 'saldo_cached' => 0,
              ]);
              echo 'conta criada';
            } else { echo 'conta ja existe'; }
          " || true

      - name: Stub Vite manifest (Inertia root view sem build do front)
        run: |
          mkdir -p public/build-inertia
          cat > public/build-inertia/manifest.json <<'EOF'
          {
            "resources/css/inertia.css": { "file": "assets/inertia.css", "src": "resources/css/inertia.css", "isEntry": true },
            "resources/js/app.tsx": { "file": "assets/app.js", "src": "resources/js/app.tsx", "isEntry": true }
          }
          EOF

      - name: Run Pest (Financeiro guards · MySQL)
        # phpunit.xml força DB_CONNECTION=sqlite :memory: (sem force=) — se não
        # sobrescrever, o Pest roda em sqlite VAZIO e os testes (Business::first())
        # SKIPam (a falsa cobertura). Exportar aqui faz rodar no MySQL real semeado.
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_DATABASE: oimpresso_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: vendor/bin/pest Modules/Financeiro/Tests/Feature/UnificadoCanceladoArquivadosKpiTest.php --no-coverage --colors=always
