name: Financeiro · Pest (MySQL)

# Lane dedicado pra rodar a suíte Pest do Modules/Financeiro contra MySQL REAL
# + seed mínimo (biz=1). Existe porque ci.yml ("Pest (Unit)") e modules-pest.yml
# rodam SQLite :memory: SEM migrate — e os testes Feature do Financeiro dependem
# de schema completo + business semeado (Business::first()), então lá eles
# dariam skip (falsa cobertura). Aqui executam de verdade. (US-FIN-052)
#
# Escopo inicial: UnificadoCanceladoArquivadosKpiTest (guards do bug do cancelado
# + Arquivados + KPI-segue-data_campo + shape paridade WR).
#
# NOTA migrate fresh: as migrations legacy UltimatePOS + módulos têm FKs cross-
# módulo fora de ordem (1824) e algum type-mismatch (3780) que só aparecem em
# migrate do-zero (no dogfood incremental nunca apareceram). Em vez de mutilar
# migrations de N módulos, desligamos FOREIGN_KEY_CHECKS só nesta sessão de CI:
# o que os testes precisam é o SCHEMA (tabelas/colunas), não as constraints FK.
# Não toca prod nem os arquivos de migration.

on:
  pull_request:
    branches: [main]
    paths:
      - 'Modules/Financeiro/**'
      - '.github/workflows/financeiro-pest.yml'
  push:
    branches: [main]
    paths:
      - 'Modules/Financeiro/**'
      - '.github/workflows/financeiro-pest.yml'

concurrency:
  group: financeiro-pest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pest:
    name: PHP / Pest (Financeiro · MySQL)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: oimpresso_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, dom, fileinfo, intl, json, mbstring, openssl, pdo, pdo_mysql, tokenizer, xml, zip, gd, opentelemetry
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Prepare dirs
        run: mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache

      - name: Install PHP deps
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h127.0.0.1 -uroot -proot --silent; then echo "MySQL up"; break; fi
            echo "waiting mysql ($i)"; sleep 2
          done

      - name: Relaxar FK checks (migrate fresh — ver nota no topo)
        # GLOBAL=0 vira o default das NOVAS sessões → a conexão do Laravel/migrate
        # herda foreign_key_checks=0 e cria as tabelas sem barrar FK fora de ordem.
        run: mysql -h127.0.0.1 -uroot -proot -e "SET GLOBAL FOREIGN_KEY_CHECKS=0;"

      - name: Create .env (MySQL)
        run: |
          cat > .env <<'EOF'
          APP_NAME=oimpresso-fin
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          LOG_CHANNEL=stderr
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=oimpresso_test
          DB_USERNAME=root
          DB_PASSWORD=root
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          MAIL_MAILER=array
          BCRYPT_ROUNDS=4
          TELESCOPE_ENABLED=false
          SCOUT_DRIVER=null
          MCP_TOOLS_EXPOSED=false
          EOF
          php artisan key:generate --force
          php artisan package:discover --ansi

      - name: Migrate (MySQL, FK checks off)
        run: php artisan migrate --force

      - name: Seed mínimo (biz=1 + users + conta bancária)
        run: |
          php artisan db:seed --class="Database\\Seeders\\CurrenciesTableSeeder" --force || true
          php artisan db:seed --class="Database\\Seeders\\PermissionsTableSeeder" --force || true
          php artisan db:seed --class="Database\\Seeders\\DummyBusinessSeeder" --force
          # Conta bancária mínima pra biz=1 (C1/S1 não skiparem). FK off → account_id solto.
          php artisan tinker --execute="
            \$c = \Modules\Financeiro\Models\ContaBancaria::query()->where('business_id',1)->first();
            if (! \$c) {
              \Modules\Financeiro\Models\ContaBancaria::create([
                'business_id' => 1, 'account_id' => 999001, 'agencia' => '0001',
                'carteira' => '0', 'beneficiario_documento' => '00000000000000',
                'beneficiario_razao_social' => 'CI Test', 'saldo_cached' => 0,
              ]);
              echo 'conta criada';
            } else { echo 'conta ja existe'; }
          " || true

      - name: Run Pest (Financeiro guards · MySQL)
        run: vendor/bin/pest Modules/Financeiro/Tests/Feature/UnificadoCanceladoArquivadosKpiTest.php --no-coverage --colors=always
