name: DTCG equivalence (advisory)

# PROVA que os tokens DTCG (resources/css/tokens/*.tokens.json) batem 1:1 com o
# CSS que o build vivo consome. Onda DTCG ATIVADA (feat/onda-dtcg-ativar): o
# token agora e EDITADO no JSON portavel e o CSS e SAIDA (_generated-*.css,
# importados por inertia/foundations/cockpit.css). Este check le os gerados (a
# fonte que o build consome) e prova JSON == CSS-emitido. Continua mordendo:
# pega edicao manual num _generated-*.css ou regressao do gerador.
#
# ADVISORY DE NASCENCA (ADR 0298 teto de governanca + ADR 0271/0275 -- gate novo
# nunca nasce required): continue-on-error no passo do check + NAO entra em branch
# protection. So prova/reporta; nunca bloqueia o PR. promote_by no gates-registry.
#
# So roda quando os tokens OU os CSS canonicos OU o pipeline mudam (paths-filter).
# Node puro, sem DB/rede. Self-test primeiro (quem vigia os vigias: prova que o
# check MORDE antes de confiar no verde).
#
# Registrado em scripts/governance/gates-registry.json classe "gate" terminal
# "advisory" (Check G/M, ADR 0298 teto). Ancora: ADR 0239 (DS git SSOT) + ADR 0249
# (DS v6 naming). A fonte real dos .css foi confirmada pela errata ao 0239 (proposta;
# nao-citada-como-dependencia-de-runtime aqui pra nao prender codigo a ADR nao-aceita).

on:
  pull_request:
    branches: [main]
    paths:
      - 'resources/css/tokens/**'   # inclui *.tokens.json, _generated-*.css e o style-dictionary.config
      - 'resources/css/inertia.css'
      - 'resources/css/foundations.css'
      - 'resources/css/cockpit.css'
      - 'scripts/governance/dtcg-equivalence.mjs'
      - 'scripts/governance/dtcg-equivalence.test.mjs'
      - '.github/workflows/dtcg-equivalence.yml'
  workflow_dispatch:

concurrency:
  group: dtcg-equivalence-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prove:
    name: equivalencia DTCG <-> CSS canonico (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Self-test (fixture boa passa + fixture ruim falha)
        run: node scripts/governance/dtcg-equivalence.test.mjs

      - name: Provar equivalencia (advisory)
        id: prove
        continue-on-error: true  # advisory: divergencia nunca derruba o PR (ADR 0271/0275)
        run: |
          node scripts/governance/dtcg-equivalence.mjs --json > /tmp/dtcg.json
          node scripts/governance/dtcg-equivalence.mjs --detail | tee /tmp/dtcg.txt

      - name: Job summary (provados iguais / divergencias)
        if: always()
        run: |
          {
            echo '## DTCG <-> CSS canonico — equivalencia (Onda DTCG)'
            echo ''
            echo 'ADVISORY (nao bloqueia). Onda DTCG ATIVADA: prova que cada token DTCG tem'
            echo 'o MESMO valor que o CSS emitido (_generated-*.css) que o build consome.'
            echo 'Divergencia aqui = edicao manual no gerado OU regressao do gerador.'
            echo ''
            echo '```'
            cat /tmp/dtcg.txt 2>/dev/null || echo '(sem saida — ver passo anterior)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
