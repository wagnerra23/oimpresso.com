name: Anchor & Doneness Drift

# 3 jobs irmãos sobre as SPECs (mesmo trigger, SoC separado — ADR 0298 teto:
# jobs no workflow EXISTENTE, sem criar workflow novo):
#   - anchor-lint        (ADR 0273): saúde da âncora spec↔código (existe/vivo/testado · dead/zombie).
#   - anchor-entry-covers (ADR 0303 SA-A2-ter): gate de entrada (US implementada sem aceite/teste-que-
#     cobre) + covers (teste citado sem @covers-us), com baseline GRANDFATHER do legado (43 aceite +
#     56 teste) → morde só mentira NOVA (no-new-lie). Contexto PRÓPRIO pra promoção independente.
#   - doneness-lint      (ADR 0302): conflito `status:` à mão × âncora (fonte-única de done-ness).
# Todos diff-aware no PR (--check só SPEC tocado = no-new-lie, grandfather legado), report full-tree
# no cron. 4 jobs são REQUIRED na branch protection — `anchor entry/covers gate` (2026-06-24, PR #3320)
# e `anchor-lint`/`doneness-lint`/`charter-live-signal` (2026-06-30, promoção conjunta; require-safe:
# paths-filter removido do trigger pra reportar em TODO PR — ver bloco `on:`). P14 rename 2026-07-01
# tirou "(advisory)" dos nomes. Segue advisory: só o gate verde nightly
# (fonte: governance/required-checks-baseline.json · higiene 2026-07-16, comentário estava stale).
#
# Lint do anchor spec↔código — SA-A3 do plano SDD (memory/sessions/2026-06-12-
# plano-reestruturacao-sdd-ondas-paralelas.md, frente SA) · gramática ADR 0273.
#
# SA-A2-bis (ADR 0303): o passo DIFF-AWARE dos PRs roda --check (exit 1) só nos
# SPECs TOCADOS — proíbe mentira NOVA (dead/zombie/teste-fantasma) sem travar a
# dívida legada (grandfathering por não-toque). REQUIRED desde 2026-06-30
# (context "anchor-lint ADR 0273" na branch protection · P14 rename 2026-07-01).
# CRON semanal e o fallback full-tree seguem REPORT (exit 0) — a dívida dos
# legados não pode avermelhar o cron antes de reconciliada.
#
# DIFF-AWARE nos PRs: --check só nos SPECs tocados (args posicionais do lint).
# CRON semanal: full-tree REPORT (anchor morre quando CÓDIGO move sem o SPEC
# mudar — só o full-tree periódico pega esse drift; report pra não travar legado).

on:
  # SEM paths-filter de propósito (require-safe · ADR 0263): GitHub TRAVA um required check
  # que não reporta — path-filter + required = PRs que não tocam SPEC/charter ficariam
  # "Expected — waiting for status" pra sempre (incidente 2026-06-08). Os 5 jobs são diff-aware
  # (--check só no que o PR toca) e o fallback "nada tocado" roda em report-mode exit 0
  # (anchor-lint.mjs sem --check → process.exit(0), L623) → passam trivial quando nada relevante
  # muda. Rodar em TODO PR é barato e habilita armar o "anchor entry/covers gate" como required.
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # segunda 06:00 UTC — full-tree semanal
  workflow_dispatch:

concurrency:
  group: anchor-drift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  anchor-lint:
    name: anchor-lint ADR 0273
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff contra base do PR
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: anchor-lint (diff-aware no PR · full-tree no cron/dispatch)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- 'memory/requisitos/*/SPEC.md')
            if [ -n "$CHANGED" ]; then
              echo "SPECs tocados no PR (--check: no-new-lies SA-A2-bis · ADR 0303):"; echo "$CHANGED"
              # shellcheck disable=SC2086
              node scripts/governance/anchor-lint.mjs --check $CHANGED
            else
              echo "Nenhum SPEC tocado (PR mudou lint/workflow) — full-tree:"
              node scripts/governance/anchor-lint.mjs
            fi
          else
            node scripts/governance/anchor-lint.mjs
          fi

  # ARMING SA-A2-ter (ADR 0275/0303): job PRÓPRIO (contexto separado) pro gate de entrada/covers,
  # pra Wagner poder promover SÓ ele a required no calendário (ADR 0275 §5 · 1 armamento/semana)
  # sem entrelaçar com o anchor-lint dead/zombie. Mesmo workflow (teto ADR 0298 — estende, não cria).
  anchor-entry-covers:
    name: anchor entry/covers gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff contra base do PR
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: gate de entrada + covers (diff-aware no PR · baseline grandfather do legado)
        if: github.event_name == 'pull_request'
        run: |
          # Gate de entrada (US implementada SEM aceite/teste-que-cobre) + covers (teste citado SEM
          # @covers-us), nos SPECs TOCADOS, com baseline grandfather do legado (43 aceite + 56 teste) →
          # morde só mentira NOVA (no-new-lie). REQUIRED desde 2026-06-24 (PR #3320 · P14 rename 2026-07-01 tirou "(advisory)" do nome).
          CHANGED=$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- 'memory/requisitos/*/SPEC.md')
          if [ -n "$CHANGED" ]; then
            echo "Gate de entrada + covers (no-new-lie · baseline grandfather · ADR 0275/0303) nos SPECs tocados:"; echo "$CHANGED"
            # shellcheck disable=SC2086
            node scripts/governance/anchor-lint.mjs --check-entry --check-covers --baseline governance/anchor-entry-baseline.json $CHANGED
          else
            echo "Nenhum SPEC tocado (PR mudou lint/workflow) — gate entrada/covers diff-aware não se aplica (legado segue grandfatherado)."
          fi
      - name: report full-tree (cron/dispatch · grandfather aplicado · advisory exit 0)
        if: github.event_name != 'pull_request'
        run: |
          # No cron/dispatch: report full-tree com baseline (mostra ATIVOS pós-grandfather, exit 0
          # nos modos default) — não trava o legado; visibilidade da dívida ainda-a-pagar.
          node scripts/governance/anchor-lint.mjs --baseline governance/anchor-entry-baseline.json

  doneness-lint:
    name: doneness-lint ADR 0302
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff contra base do PR
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: doneness-lint (diff-aware no PR · full-tree report no cron/dispatch)
        run: |
          # --baseline grandfathera o conflito status×âncora LEGADO (no-new-lie · ADR 0302/0275):
          # o --check só MORDE conflito NOVO/tocado, nunca a dívida pré-existente do SPEC legado.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- 'memory/requisitos/*/SPEC.md')
            if [ -n "$CHANGED" ]; then
              echo "SPECs tocados no PR (--check: no-new-conflict status×âncora · baseline grandfather legado · ADR 0302):"; echo "$CHANGED"
              # shellcheck disable=SC2086
              node scripts/governance/doneness-lint.mjs --check --baseline governance/doneness-baseline.json $CHANGED
            else
              echo "Nenhum SPEC tocado (PR mudou lint/workflow) — full-tree report (grandfather aplicado):"
              node scripts/governance/doneness-lint.mjs --baseline governance/doneness-baseline.json
            fi
          else
            node scripts/governance/doneness-lint.mjs --baseline governance/doneness-baseline.json
          fi

  charter-live-signal:
    name: charter status:live precisa de sinal de prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff contra base do PR
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: charter-live-signal (diff-aware no PR · full-tree report no cron/dispatch)
        run: |
          # status:live de charter precisa de SINAL de prod (governance/prod-flags.json ou campo smoke:).
          # Diff-aware nos charters TOCADOS → morde só `live` NOVO/TOCADO sem sinal (os ~57 live legados
          # sem sinal NÃO avermelham · grandfather por não-toque). REQUIRED desde 2026-06-30 (promoção
          # conjunta dos 3 jobs irmãos · P14 rename 2026-07-01). Cron/dispatch = report full-tree (exit 0).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- 'resources/js/Pages/' | grep '\.charter\.md$' || true)
            if [ -n "$CHANGED" ]; then
              echo "charters tocados no PR (--check: no-new-lie · status:live sem sinal de prod):"; echo "$CHANGED"
              # shellcheck disable=SC2086
              node scripts/governance/charter-live-signal.mjs --check $CHANGED
            else
              echo "Nenhum charter tocado (PR mudou lint/workflow/contrato) — full-tree report (advisory exit 0):"
              node scripts/governance/charter-live-signal.mjs
            fi
          else
            node scripts/governance/charter-live-signal.mjs
          fi

  # V6-B (elo 4 · avaliação SDD 2026-07-12): gate verde ADVISORY sobre a nightly full-suite.
  # Lê o summary per-file (files[]) da nightly sharded publicado na órfã governance/nightly-floor
  # pelo ct100-fullsuite.sh (elo 2) e roda anchor-lint --junit --check-verde. É a ÚNICA fonte que
  # cobre as ~42 US nightly-only. NUNCA-RED de nascença (report-only, `|| warning`): reporta o veredito
  # verde-por-arquivo sem bloquear merge — promoção a "morde"/required = flip do Wagner (ADR 0275 §5).
  # DORMANTE-SEGURO: sem summary na órfã (nenhuma nightly ainda) → anchor-lint (V6-A) degrada a
  # behavior_unknown → exit 0. Mesmo workflow (teto ADR 0298 — estende, não cria).
  verde-gate-advisory:
    name: gate verde nightly (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: materializa o summary da nightly (órfã governance/nightly-floor · ausente = dormante)
        run: |
          git fetch --no-tags --depth=1 origin governance/nightly-floor 2>/dev/null \
            || echo "órfã governance/nightly-floor ausente (nenhuma nightly publicada ainda) — gate fica dormante"
          if git show FETCH_HEAD:governance/nightly-fullsuite-summary.json > governance/nightly-fullsuite-summary.json 2>/dev/null; then
            echo "summary da nightly materializado:"; head -c 400 governance/nightly-fullsuite-summary.json; echo
          else
            echo "sem summary per-file na órfã — gate verde fica behavior_unknown (dormante até a 1ª nightly com o elo 2)"
          fi
      - name: anchor-lint --junit --check-verde (ADVISORY · nunca required · report-only)
        run: |
          # NUNCA-RED de nascença: reporta o veredito, não bloqueia. Sem summary → behavior_unknown → exit 0.
          # Wagner promove a "morde" (tirar o `|| ...`) / required por calendário quando confiar na fonte (ADR 0275 §5).
          node scripts/governance/anchor-lint.mjs --junit governance/nightly-fullsuite-summary.json --check-verde \
            || echo "::warning::gate verde (advisory): há US implementada+coberta com teste NÃO-verde na nightly full-suite — ver saída acima (não bloqueia; ADR 0275 §5)"

  # C8 (grade de réguas 2026-07-17) — 5º eixo da âncora: o TEMPORAL.
  # dead (path sumiu) e zombie (tela desligada) são estáticos e falam do PRESENTE. Faltava
  # "o código MUDOU desde que alguém verificou?" — e a base dessa resposta (`verificado@<sha7>`)
  # a gramática §1 já EXIGE há tempo, sem ninguém consumir: o SHA é capturado em 2 arquivos /
  # 5 sites e o único uso é PRESENÇA (SpecAnchorClassifier → deveFecharPorAncora).
  #
  # POR QUE JOB SEPARADO (e não um `--stale` nos jobs de cima): os jobs `anchor-lint ADR 0273`
  # e `anchor entry/covers gate` são REQUIRED (governance/required-checks-baseline.json) e o
  # anchor-lint é fs-puro por invariante (ADR 0303). Sem a flag ele não executa git NENHUM —
  # provado rodando o script com `PATH` sem git: exit 0, output byte-idêntico ao HEAD. O eixo
  # temporal precisa de git, então mora aqui, fora do caminho required. E a flag nasce COM
  # invocador de propósito: flag sem quem chame é a lápide do chokepoint fantasma
  # (proibicoes §5 2026-07-09 — o guard no `flag:set` que o fluxo real não atravessa).
  #
  # Enforcement: NÃO afirmo aqui em presente (lápide proibicoes §5 2026-07-16 — "segue advisory"
  # apodrece no 1º flip e já enganou um verificador por 22 dias; o nome do check viraria mentira
  # com certificado). FATO DATADO: nasceu fora de governance/required-checks-baseline.json em
  # 2026-07-17, que é o DONO único de "o que é required". Promoção só por emenda de ADR + flip [W]
  # (lápide §5 2026-07-01), e a régua da ADR 0314 é required = Tier 0 (dinheiro/PII/multi-tenant/
  # fiscal) — frescor de âncora é higiene, então o caminho natural dele é seguir reportando.
  anchor-stale:
    name: âncora stale — verificado@sha × HEAD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # OBRIGATÓRIO: em shallow o guard reporta unknown pra tudo (e está certo em fazê-lo)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # 2 camadas, de propósito: o selftest cobre o MATCHER puro (fronteira de path,
      # normalização, gramática — barato, sem git); o .test.mjs roda o script REAL contra um
      # REPO GIT DE VERDADE (bite/release + os 2 guards + a invariante fs-puro). Fixture em
      # memória provaria só o matcher; e um eixo que não morde passa verde "por não medir nada".
      - name: selftest do matcher (a régua tem que morder E soltar)
        run: node scripts/governance/anchor-lint.mjs --stale-selftest
      - name: teste e2e contra repo git real (US-GOV-055)
        run: node scripts/governance/anchor-stale.test.mjs
      - name: anchor-lint --stale (full-tree · report-only)
        run: |
          # Reporta o NÚMERO; não participa de --check* nem de anchor_coverage (exit 0 sempre).
          # unknown NUNCA vira "fresco": sha ausente / não-ancestral (squash-merge) / shallow = "não sei".
          node scripts/governance/anchor-lint.mjs --stale

  # (Os shims temporários do rename P14 viveram aqui — removidos no PR-2 do rename 2026-07-01;
  #  fragmento de comentário órfão limpo na higiene 2026-07-16.)
  # CATRACA "1 lugar fixo" (Wagner 2026-07-01 "não pode trocar de lugar nunca. deve ser isso que fica
  # errando"): a âncora de charter (related_prototype/canon_source) NÃO pode citar lugar velho/volátil
  # (public/cowork-preview, erp-shell, _cowork-handoff-staging, Downloads) e todo path prototipo-ui/cowork/
  # citado tem que EXISTIR. FULL-TREE (não diff-aware, sem baseline): a regra é absoluta e o legado já
  # nasceu limpo (0 violações no reaponte 2026-07-01) → morde QUALQUER regressão de lugar, nova ou velha.
  prototipo-lugar-fixo:
    name: protótipo em 1 lugar fixo (ancora-guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: self-test da catraca (a catraca não pode apodrecer)
        run: node prototipo-ui/ancora-guard.mjs --selftest
      - name: âncoras no lugar fixo prototipo-ui/cowork (full-tree · exit 1 se trocou de lugar)
        run: node prototipo-ui/ancora-guard.mjs
