name: Anchor Drift (advisory)

# Lint do anchor spec↔código — SA-A3 do plano SDD (memory/sessions/2026-06-12-
# plano-reestruturacao-sdd-ondas-paralelas.md, frente SA) · gramática ADR 0273.
#
# SA-A2-bis (ADR 0297): o passo DIFF-AWARE dos PRs roda --check (exit 1) só nos
# SPECs TOCADOS — proíbe mentira NOVA (dead/zombie/teste-fantasma) sem travar a
# dívida legada (grandfathering por não-toque). NÃO é required ainda: vermelho
# aqui sinaliza; branch protection é flip do Wagner (ADR 0275 §5 · calendário).
# CRON semanal e o fallback full-tree seguem REPORT (exit 0) — a dívida dos
# legados não pode avermelhar o cron antes de reconciliada.
#
# DIFF-AWARE nos PRs: --check só nos SPECs tocados (args posicionais do lint).
# CRON semanal: full-tree REPORT (anchor morre quando CÓDIGO move sem o SPEC
# mudar — só o full-tree periódico pega esse drift; report pra não travar legado).

on:
  pull_request:
    branches: [main]
    paths:
      - 'memory/requisitos/**/SPEC.md'
      - 'scripts/governance/anchor-lint.mjs'
      - '.github/workflows/anchor-drift.yml'
  schedule:
    - cron: '0 6 * * 1' # segunda 06:00 UTC — full-tree semanal
  workflow_dispatch:

concurrency:
  group: anchor-drift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  anchor-lint:
    name: anchor-lint ADR 0273 (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff contra base do PR
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: anchor-lint (diff-aware no PR · full-tree no cron/dispatch)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- 'memory/requisitos/*/SPEC.md')
            if [ -n "$CHANGED" ]; then
              echo "SPECs tocados no PR (--check: no-new-lies SA-A2-bis · ADR 0297):"; echo "$CHANGED"
              # shellcheck disable=SC2086
              node scripts/governance/anchor-lint.mjs --check $CHANGED
            else
              echo "Nenhum SPEC tocado (PR mudou lint/workflow) — full-tree:"
              node scripts/governance/anchor-lint.mjs
            fi
          else
            node scripts/governance/anchor-lint.mjs
          fi
