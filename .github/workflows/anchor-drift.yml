name: Anchor & Doneness Drift (advisory)

# 3 jobs irmãos sobre as SPECs (mesmo trigger, SoC separado — ADR 0298 teto:
# jobs no workflow EXISTENTE, sem criar workflow novo):
#   - anchor-lint        (ADR 0273): saúde da âncora spec↔código (existe/vivo/testado · dead/zombie).
#   - anchor-entry-covers (ADR 0303 SA-A2-ter): gate de entrada (US implementada sem aceite/teste-que-
#     cobre) + covers (teste citado sem @covers-us), com baseline GRANDFATHER do legado (43 aceite +
#     56 teste) → morde só mentira NOVA (no-new-lie). Contexto PRÓPRIO pra promoção independente.
#   - doneness-lint      (ADR 0302): conflito `status:` à mão × âncora (fonte-única de done-ness).
# Todos diff-aware no PR (--check só SPEC tocado = no-new-lie, grandfather legado), report full-tree
# no cron. `anchor entry/covers gate` PROMOVIDO a required em 2026-06-30 (require-safe: paths-filter
# removido do trigger pra reportar em TODO PR — ver bloco `on:`); os outros 4 jobs seguem advisory
# (flip do Wagner por calendário, 1/semana — ADR 0275 §5).
#
# Lint do anchor spec↔código — SA-A3 do plano SDD (memory/sessions/2026-06-12-
# plano-reestruturacao-sdd-ondas-paralelas.md, frente SA) · gramática ADR 0273.
#
# SA-A2-bis (ADR 0303): o passo DIFF-AWARE dos PRs roda --check (exit 1) só nos
# SPECs TOCADOS — proíbe mentira NOVA (dead/zombie/teste-fantasma) sem travar a
# dívida legada (grandfathering por não-toque). NÃO é required ainda: vermelho
# aqui sinaliza; branch protection é flip do Wagner (ADR 0275 §5 · calendário).
# CRON semanal e o fallback full-tree seguem REPORT (exit 0) — a dívida dos
# legados não pode avermelhar o cron antes de reconciliada.
#
# DIFF-AWARE nos PRs: --check só nos SPECs tocados (args posicionais do lint).
# CRON semanal: full-tree REPORT (anchor morre quando CÓDIGO move sem o SPEC
# mudar — só o full-tree periódico pega esse drift; report pra não travar legado).

on:
  # SEM paths-filter de propósito (require-safe · ADR 0263): GitHub TRAVA um required check
  # que não reporta — path-filter + required = PRs que não tocam SPEC/charter ficariam
  # "Expected — waiting for status" pra sempre (incidente 2026-06-08). Os 5 jobs são diff-aware
  # (--check só no que o PR toca) e o fallback "nada tocado" roda em report-mode exit 0
  # (anchor-lint.mjs sem --check → process.exit(0), L623) → passam trivial quando nada relevante
  # muda. Rodar em TODO PR é barato e habilita armar o "anchor entry/covers gate" como required.
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # segunda 06:00 UTC — full-tree semanal
  workflow_dispatch:

concurrency:
  group: anchor-drift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  anchor-lint:
    name: anchor-lint ADR 0273 (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff contra base do PR
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: anchor-lint (diff-aware no PR · full-tree no cron/dispatch)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- 'memory/requisitos/*/SPEC.md')
            if [ -n "$CHANGED" ]; then
              echo "SPECs tocados no PR (--check: no-new-lies SA-A2-bis · ADR 0303):"; echo "$CHANGED"
              # shellcheck disable=SC2086
              node scripts/governance/anchor-lint.mjs --check $CHANGED
            else
              echo "Nenhum SPEC tocado (PR mudou lint/workflow) — full-tree:"
              node scripts/governance/anchor-lint.mjs
            fi
          else
            node scripts/governance/anchor-lint.mjs
          fi

  # ARMING SA-A2-ter (ADR 0275/0303): job PRÓPRIO (contexto separado) pro gate de entrada/covers,
  # pra Wagner poder promover SÓ ele a required no calendário (ADR 0275 §5 · 1 armamento/semana)
  # sem entrelaçar com o anchor-lint dead/zombie. Mesmo workflow (teto ADR 0298 — estende, não cria).
  anchor-entry-covers:
    name: anchor entry/covers gate (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff contra base do PR
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: gate de entrada + covers (diff-aware no PR · baseline grandfather do legado)
        if: github.event_name == 'pull_request'
        run: |
          # Gate de entrada (US implementada SEM aceite/teste-que-cobre) + covers (teste citado SEM
          # @covers-us), nos SPECs TOCADOS, com baseline grandfather do legado (43 aceite + 56 teste) →
          # morde só mentira NOVA (no-new-lie). ADVISORY: não-required até flip do Wagner (ADR 0275 §5).
          CHANGED=$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- 'memory/requisitos/*/SPEC.md')
          if [ -n "$CHANGED" ]; then
            echo "Gate de entrada + covers (no-new-lie · baseline grandfather · ADR 0275/0303) nos SPECs tocados:"; echo "$CHANGED"
            # shellcheck disable=SC2086
            node scripts/governance/anchor-lint.mjs --check-entry --check-covers --baseline governance/anchor-entry-baseline.json $CHANGED
          else
            echo "Nenhum SPEC tocado (PR mudou lint/workflow) — gate entrada/covers diff-aware não se aplica (legado segue grandfatherado)."
          fi
      - name: report full-tree (cron/dispatch · grandfather aplicado · advisory exit 0)
        if: github.event_name != 'pull_request'
        run: |
          # No cron/dispatch: report full-tree com baseline (mostra ATIVOS pós-grandfather, exit 0
          # nos modos default) — não trava o legado; visibilidade da dívida ainda-a-pagar.
          node scripts/governance/anchor-lint.mjs --baseline governance/anchor-entry-baseline.json

  doneness-lint:
    name: doneness-lint ADR 0302 (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff contra base do PR
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: doneness-lint (diff-aware no PR · full-tree report no cron/dispatch)
        run: |
          # --baseline grandfathera o conflito status×âncora LEGADO (no-new-lie · ADR 0302/0275):
          # o --check só MORDE conflito NOVO/tocado, nunca a dívida pré-existente do SPEC legado.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- 'memory/requisitos/*/SPEC.md')
            if [ -n "$CHANGED" ]; then
              echo "SPECs tocados no PR (--check: no-new-conflict status×âncora · baseline grandfather legado · ADR 0302):"; echo "$CHANGED"
              # shellcheck disable=SC2086
              node scripts/governance/doneness-lint.mjs --check --baseline governance/doneness-baseline.json $CHANGED
            else
              echo "Nenhum SPEC tocado (PR mudou lint/workflow) — full-tree report (grandfather aplicado):"
              node scripts/governance/doneness-lint.mjs --baseline governance/doneness-baseline.json
            fi
          else
            node scripts/governance/doneness-lint.mjs --baseline governance/doneness-baseline.json
          fi

  charter-live-signal:
    name: charter status:live precisa de sinal de prod (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff contra base do PR
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: charter-live-signal (diff-aware no PR · full-tree report no cron/dispatch)
        run: |
          # status:live de charter precisa de SINAL de prod (governance/prod-flags.json ou campo smoke:).
          # Diff-aware nos charters TOCADOS → morde só `live` NOVO/TOCADO sem sinal (os ~57 live legados
          # sem sinal NÃO avermelham · grandfather por não-toque). ADVISORY: não-required até flip do
          # Wagner (ADR 0275 §5 · proposta 2026-06-24). Cron/dispatch = report full-tree (exit 0).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}...HEAD" -- 'resources/js/Pages/' | grep '\.charter\.md$' || true)
            if [ -n "$CHANGED" ]; then
              echo "charters tocados no PR (--check: no-new-lie · status:live sem sinal de prod):"; echo "$CHANGED"
              # shellcheck disable=SC2086
              node scripts/governance/charter-live-signal.mjs --check $CHANGED
            else
              echo "Nenhum charter tocado (PR mudou lint/workflow/contrato) — full-tree report (advisory exit 0):"
              node scripts/governance/charter-live-signal.mjs
            fi
          else
            node scripts/governance/charter-live-signal.mjs
          fi
