name: SDD Scorecard (advisory)

# Meta-catraca do scorecard SDD — GT-G3 do plano (memory/sessions/2026-06-12-
# plano-reestruturacao-sdd-ondas-paralelas.md §2 GARANTIDA + §4 Semanas 1-2)
# + ADR 0275 (regra de armamento §3, calendário de promoções §5 linha G3).
#
# 3 sinais sobre governance/sdd-scorecard.json + governance/sdd-scorecard-baseline.json:
#   1. determinismo — 2 runs do agregador = output idêntico (diff vazio)
#   2. staleness    — scorecard commitado ≠ medição atual (rodar e commitar)
#   3. ratchet      — métrica ARMADA (armed:true no baseline) regrediu vs baseline
#                     → piorar exige editar o baseline em diff visível no PR
#
# ADVISORY DE NASCENÇA (ADR 0261/0271/0275 — gate novo nunca nasce required):
# os 3 sinais rodam com continue-on-error, então o WORKFLOW fica sempre verde
# nesta fase; vermelho aparece como annotation no step + job summary. Promoção
# a required SÓ via calendário do ADR 0275 §5 (linha G3: 7 execuções diárias
# verdes + 0 falso-positivo em 14 dias) — no flip, remover os continue-on-error
# é parte do PR de promoção (com required-checks-baseline.json, GT-G4).
#
# Cron diário 06:50 BRT (09:50 UTC) — pós-nightly: alimenta a sequência de
# medições válidas que arma métricas (ADR 0275 §3).

on:
  pull_request:
    branches: [main]
    paths: # diff-aware: fontes vivas do scorecard
      - 'memory/requisitos/**'        # SPECs (anchor_coverage) + BRIEFINGs/docs (ghost_count, front_door)
      - 'Modules/*/module.json'       # criar/deletar módulo muda ghost_count/front_door_coverage
      - 'scripts/governance/sdd-scorecard.mjs'
      - 'scripts/governance/knowledge-drift.mjs'
      - 'governance/sdd-scorecard.json'
      - 'governance/sdd-scorecard-baseline.json'
      - 'governance/nightly-floor.json'        # floor publicado pelo write-side CT100 (ADR 0279)
      - 'governance/nightly-coverage.json'     # coverage publicado pelo write-side CT100 (SDD P07 · ADR 0275)
      - 'scripts/governance/sdd-floor-read.test.mjs'
      - 'scripts/governance/sdd-coverage-read.test.mjs'
      - 'scripts/governance/sdd-ragas-read.test.mjs'
      - 'scripts/tests/floor-compute.mjs'
      - 'scripts/tests/floor-compute.test.mjs'
      - 'scripts/tests/shards-plan.mjs'            # sharding do junit (SDD P04 · ADR 0279)
      - 'scripts/tests/shards-plan.test.mjs'
      - 'scripts/tests/shards-merge.mjs'
      - 'scripts/tests/shards-merge.test.mjs'
      - 'scripts/tests/coverage-compute.mjs'
      - 'scripts/tests/coverage-compute.test.mjs'
      - 'scripts/tests/ragas-trend-compute.mjs'
      - 'scripts/tests/ragas-trend-compute.test.mjs'
      - 'scripts/tests/junit-summary.mjs'          # tripwire + marcador invalid (FV-F4 · US-GOV-045)
      - 'scripts/tests/junit-summary.test.mjs'
      - 'scripts/tests/nightly-diff.mjs'           # guarda invalid (FV-F4 · US-GOV-045)
      - 'scripts/tests/nightly-diff.test.mjs'
      - '.github/workflows/sdd-scorecard.yml'
  schedule:
    - cron: '50 9 * * *' # 06:50 BRT diário (pós-nightly)
  workflow_dispatch:

concurrency:
  group: sdd-scorecard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read # drift_alarms (GT-G4): protection-drift.mjs lê last run verde dos workflows-fonte

jobs:
  scorecard:
    name: SDD scorecard meta-catraca (advisory · determinismo + staleness + ratchet)
    runs-on: ubuntu-latest
    # Job-level (não por step): o agregador roda 3× aqui (Medir + Determinismo + Ratchet)
    # e as 3 runs precisam do MESMO ambiente — com token só no Medir, drift_alarms sairia
    # measured na 1ª e not_yet_measured na 2ª → falso-vermelho de determinismo. Sem token
    # nenhum, Staleness viraria perma-warn (committed measured ≠ medição local sem gh).
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          # distiller_freshness usa data-git do doc mais novo por módulo (ADR 0291 D-D);
          # shallow (depth 1) mede stale fantasma → Staleness perma-warn vs o valor correto
          # commitado (mesmo bug já corrigido no sdd-scorecard-ratchet.yml).
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read-side do floor — meta-teste (hard · ADR 0279 PR-1 · US-GOV-023)
        run: node scripts/governance/sdd-floor-read.test.mjs

      - name: Write-side do floor — meta-teste do compute (hard · ADR 0279 PR-2)
        run: node scripts/tests/floor-compute.test.mjs

      - name: Sharding do junit — plano determinístico + universe-gate (hard · SDD P04)
        run: node scripts/tests/shards-plan.test.mjs

      - name: Sharding do junit — merge preserva shards vivos + anti-mascaramento (hard · SDD P04)
        run: node scripts/tests/shards-merge.test.mjs

      - name: Marcador de run inválido — junit-summary (hard · FV-F4 · US-GOV-045)
        # Prova que XML 0 bytes/ausente/incoerente grava {invalid,reason} no summary
        # E preserva o exit-code do tripwire FV-F1 (1=artefato, 2=incoerente). Se
        # alguém remover o marcador, o floor volta a congelar stale silenciosamente.
        run: node scripts/tests/junit-summary.test.mjs

      - name: Guarda invalid — nightly-diff (hard · FV-F4 · US-GOV-045)
        run: node scripts/tests/nightly-diff.test.mjs

      - name: Read-side do coverage — meta-teste (hard · SDD P07 · ADR 0275 §2)
        # Counterfactual P07: prova que measureCoverage() NÃO mente 0 com arquivo
        # ausente (DEVE dar exit 1 se alguém trocar o notYet por 0). Se ficar verde
        # com o read-side mentindo, o teste não morde — reabrir.
        run: node scripts/governance/sdd-coverage-read.test.mjs

      - name: Write-side do coverage — meta-teste do compute (hard · SDD P07 · ADR 0275)
        run: node scripts/tests/coverage-compute.test.mjs

      - name: Read-side do ragas_real_uptime — meta-teste (hard · ADR 0318 · transporte 0279)
        # Counterfactual: prova que measureRagasRealUptime() NÃO mente com trend
        # ausente (notYet, nunca 0/100) e que só-skips vira measured 0% (transporte
        # up, eval down). Se ficar verde com o read-side mentindo, o teste não morde.
        run: node scripts/governance/sdd-ragas-read.test.mjs

      - name: Write-side do trend ragas — meta-teste do compute (hard · ADR 0318)
        run: node scripts/tests/ragas-trend-compute.test.mjs

      - name: Materializa floor + coverage da branch governance/nightly-floor (ADR 0279 · SDD P07)
        run: |
          if git fetch origin governance/nightly-floor --depth 1 2>/dev/null; then
            if git show FETCH_HEAD:governance/nightly-floor.json > governance/nightly-floor.json 2>/dev/null; then
              echo "floor materializado da branch governance/nightly-floor:"; cat governance/nightly-floor.json
            else
              echo "floor ausente na branch — read-side de floor cai em not_yet_measured"
            fi
            if git show FETCH_HEAD:governance/nightly-coverage.json > governance/nightly-coverage.json 2>/dev/null; then
              echo "coverage materializado da branch governance/nightly-floor:"; cat governance/nightly-coverage.json
            else
              echo "coverage ausente na branch — read-side de coverage cai em not_yet_measured (esperado até pcov na imagem CT100 + 1ª nightly)"
            fi
          else
            echo "branch governance/nightly-floor ausente — floor+coverage caem em not_yet_measured (esperado até o 1º write-side do CT100)"
          fi

      - name: Materializa trend do RAGAS real da órfã governance/ragas-real-trend (ADR 0318)
        run: |
          if git fetch origin governance/ragas-real-trend --depth 1 2>/dev/null \
             && git show FETCH_HEAD:governance/ragas-real-trend.json > governance/ragas-real-trend.json 2>/dev/null; then
            echo "trend ragas materializado:"; cat governance/ragas-real-trend.json
          else
            echo "órfã governance/ragas-real-trend ausente — ragas_real_uptime cai em not_yet_measured (esperado até a 1ª publicação dominical do CT100; 1º cron 2026-07-05)"
          fi

      - name: Medir — agregador escreve governance/sdd-scorecard.json
        run: |
          node scripts/governance/sdd-scorecard.mjs | tee /tmp/scorecard.txt
          { echo '## SDD Scorecard (medição desta run)'; echo '```'; cat /tmp/scorecard.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Determinismo — 2ª run = diff vazio
        continue-on-error: true
        run: |
          node scripts/governance/sdd-scorecard.mjs --json > /tmp/run2.json
          if diff governance/sdd-scorecard.json /tmp/run2.json; then
            echo "determinismo OK — 2 runs idênticas (diff vazio)"
          else
            echo "::warning::agregador NÃO determinístico — 2 runs divergem (viola contrato do sdd-scorecard.mjs)"
            exit 1
          fi

      - name: Staleness — scorecard commitado bate com a medição atual?
        continue-on-error: true
        run: |
          if git diff --exit-code governance/sdd-scorecard.json; then
            echo "scorecard commitado em dia com a medição atual"
          else
            echo "::warning::governance/sdd-scorecard.json commitado está DEFASADO — rode 'node scripts/governance/sdd-scorecard.mjs' e commite o resultado"
            exit 1
          fi

      - name: Ratchet — métrica ARMADA regrediu vs baseline? (ADR 0275 §3)
        continue-on-error: true
        run: |
          set +e
          node scripts/governance/sdd-scorecard.mjs --ratchet > /tmp/ratchet.txt 2>&1
          rc=$?
          cat /tmp/ratchet.txt
          { echo '### Ratchet vs governance/sdd-scorecard-baseline.json'; echo '```'; cat /tmp/ratchet.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          exit $rc
