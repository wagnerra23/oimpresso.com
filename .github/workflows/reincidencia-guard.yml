name: Reincidência Guard (advisory · C3/C4/C5)

# Caçador de reincidência — PROCESSO_MEMORIA_CC.md §16.
# Recusa, no instante do PR, as classes de erro git-gate que reincidem no loop de handoff:
#   C3 bloco fundido · C4 órfão/ref-morta · C5 item ativo sem carimbo `verificado vs main`.
# Vigia a fila ATIVA (prototipo-ui/COWORK_NOTES.md, ACIMA de <!-- LINHA-DAGUA-HANDOFF -->) + os
# prompts duráveis (prototipo-ui/PROMPT_PARA_CODE_*.md). Baseline congela a dívida; só NOVO trava.
#
# ⚠️ Sobrepõe handoff-integrity.yml (C3/C4 já mecanizados lá) — mantido standalone por decisão [W];
# consolidar no futuro (Regra 7). ADVISORY de nascença (ADR 0271/0275): nunca bloqueia merge;
# promoção a required = decisão [W]. Node puro, sem deps/DB/rede.
# Manual: node scripts/reincidencia-guard.mjs · selftest: node scripts/reincidencia-guard.test.mjs

on:
  push:
    branches: [main]
    paths:
      - 'prototipo-ui/COWORK_NOTES.md'
      - 'prototipo-ui/PROMPT_PARA_CODE_*.md'
      - 'scripts/reincidencia-baseline.json'
      - 'scripts/reincidencia-guard.mjs'
      - 'scripts/reincidencia-guard.test.mjs'
      - 'package.json'
      - '.github/workflows/reincidencia-guard.yml'
  pull_request:
    paths:
      - 'prototipo-ui/COWORK_NOTES.md'
      - 'prototipo-ui/PROMPT_PARA_CODE_*.md'
      - 'scripts/reincidencia-baseline.json'
      - 'scripts/reincidencia-guard.mjs'
      - 'scripts/reincidencia-guard.test.mjs'
      - 'package.json'
      - '.github/workflows/reincidencia-guard.yml'
  workflow_dispatch:

concurrency:
  group: reincidencia-guard-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  reincidencia:
    name: reincidência guard (advisory · C3/C4/C5 novo = vermelho)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Selftest — controle-negativo prova que a catraca morde
        run: node scripts/reincidencia-guard.test.mjs

      - name: Catraca vs baseline
        run: node scripts/reincidencia-guard.mjs

      - name: Diagnóstico em caso de falha
        if: failure()
        run: |
          echo ""
          echo "❌ Reincidência detectada (PROCESSO_MEMORIA_CC.md §16)."
          echo ""
          echo "C3 BLOCO FUNDIDO = uma linha funde dois cabeçalhos (\`**Artefato:** > **…**\`) → ilegível."
          echo "C4 ÓRFÃO         = PROMPT_PARA_CODE_*.md criado sem citação na fila ativa → tarefa invisível."
          echo "C4 REF MORTA     = citação na fila ativa pra um PROMPT_PARA_CODE_*.md inexistente → [CL] erra o PR."
          echo "C5 SEM CARIMBO   = item ativo (\`> … → [CL]\`) sem \`verificado vs main\` no corpo."
          echo ""
          echo "Conserte na fila ATIVA (COWORK_NOTES.md, acima de <!-- LINHA-DAGUA-HANDOFF -->)."
          echo "Se a dívida muda legitimamente, no mesmo PR: node scripts/reincidencia-guard.mjs --write"
          echo ""
          echo "Refs: PROCESSO_MEMORIA_CC.md §16 (C3/C4/C5)."
