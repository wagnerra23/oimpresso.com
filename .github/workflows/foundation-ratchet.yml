name: Foundation Ratchet (advisory)

# Catracas "só diminui" da fundação de testes — SDD Semana 0 · frente FV-Q1
# (memory/sessions/2026-06-12-plano-reestruturacao-sdd-ondas-paralelas.md §4).
# 3 contadores congelados de medição REAL (scripts/tests/baselines/):
#   n_quarantine · n_refresh_database · n_business_first — subir qualquer um = vermelho.
# Convenção: marcador `@group legacy-quarantine` exige `quarantine-reason:` a ≤3 linhas.
#
# Nasceu ADVISORY (gates novos nunca nascem required — método faseado ADR 0271).
# HISTÓRICO: promovido a required em 2026-06-21 (1º dente SDD em L3 — #3143, roadmap Pfr;
# Wagner pulou a janela de 14d sob autorização explícita "pode fazer") → DEMOVIDO de volta
# a advisory em 2026-06-30 (ADR 0314 D-1 "poda onda 2 · LEI", #3466 — classificado
# quality/não-Tier-0, junto de module-grades/E2E/a11y; baseline required 29→22). Continua
# rodando e mostrando vermelho no PR, só NÃO bloqueia merge. Always-run sem paths em TODO
# PR. Determinístico, Node puro, sem MySQL. Re-promoção exige reabrir a 0314 pra este item
# (via janela + flip, NÃO merge no calado — ADR 0275 §5).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: foundation-ratchet-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ratchet:
    name: Foundation ratchet (advisory · quarentena/RefreshDatabase/Business::first)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Selftest — fixtures boa/ruim provam que a catraca morde
        run: node scripts/tests/foundation-ratchet.test.mjs
      - name: Catraca vs baseline (+ contadores no job summary)
        run: node scripts/tests/foundation-ratchet.mjs
