name: Foundation Ratchet

# Catracas "só diminui" da fundação de testes — SDD Semana 0 · frente FV-Q1
# (memory/sessions/2026-06-12-plano-reestruturacao-sdd-ondas-paralelas.md §4).
# 3 contadores congelados de medição REAL (scripts/tests/baselines/):
#   n_quarantine · n_refresh_database · n_business_first — subir qualquer um = vermelho.
# Convenção: marcador `@group legacy-quarantine` exige `quarantine-reason:` a ≤3 linhas.
#
# Nasceu ADVISORY (gates novos nunca nascem required — método faseado ADR 0271).
# PROMOÇÃO A REQUIRED (1º dente SDD em L3 — roadmap Pfr, BLUEPRINT-SDD-ONDA1 Gap 3,
# decisão Wagner 2026-06-21): este PR remove "advisory" do nome e adiciona o context
# a governance/required-checks-baseline.json no MESMO PR (ADR 0275 §5). O context fica
# required em main SÓ após o Wagner-flip (gh api branch protection) ao fim da janela de
# 14d (7 execuções diárias verdes + 0 falso-positivo; início 2026-06-21, elegível
# ~2026-07-05). Always-run sem paths em TODO PR. Determinístico, Node puro, sem MySQL.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: foundation-ratchet-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ratchet:
    name: Foundation ratchet (quarentena/RefreshDatabase/Business::first)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Selftest — fixtures boa/ruim provam que a catraca morde
        run: node scripts/tests/foundation-ratchet.test.mjs
      - name: Catraca vs baseline (+ contadores no job summary)
        run: node scripts/tests/foundation-ratchet.mjs
