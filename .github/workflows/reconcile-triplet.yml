name: Reconcile triplet (advisory)

# Gate de PARIDADE POR SETOR 3-way charterâ†”protĂ³tipoâ†”produĂ§Ă£o (6 slots PT-01).
# O loop designâ†’code comparava 2-way (protĂ³tipo Ă— cĂ³digo) e o CHARTER (o spec) nĂ£o era
# coluna â€” quando o protĂ³tipo contradiz o charter, o conflito sumia. Este gate torna o
# charter a 1Âª coluna e decompĂµe charter/protĂ³tipo/produĂ§Ă£o nos 6 slots PT-01.
#
# ADVISORY de nascenĂ§a (ADR 0298 / 0275 Â§5): roda em PRs que tocam telas/charters/protĂ³tipos,
# corre o reconciliador em modo --all (advisory, exit 0) + a auditoria de ponteiros Ă³rfĂ£os.
# NĂƒO entra em branch protection enquanto v1 heurĂ­stico amadurece (promote_by no
# gates-registry.json). Promover a --strict quando o ruĂ­do de v1 estiver domado.

on:
  pull_request:
    branches: [main]
    paths:
      - 'resources/js/Pages/**/*.tsx'
      - 'resources/js/Pages/**/*.charter.md'
      - 'prototipo-ui/**'
      - 'prototipo-ui/cowork-map.json'
      - 'scripts/governance/reconcile-triplet.mjs'
      - 'scripts/governance/charter-blueprint-pointers.mjs'
      - '.github/workflows/reconcile-triplet.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reconcile:
    name: paridade por setor (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Self-test do gate (prova que morde e libera)
        run: node scripts/governance/reconcile-triplet.test.mjs

      - name: Reconcile triplet â€” todas as telas (advisory, exit 0)
        run: node scripts/governance/reconcile-triplet.mjs --all

      - name: Auditoria de ponteiros de protĂ³tipo Ă³rfĂ£os (advisory)
        run: node scripts/governance/charter-blueprint-pointers.mjs
