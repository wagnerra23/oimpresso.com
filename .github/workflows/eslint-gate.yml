name: ESLint 9 (ADR 0209)

# Onda 1.2 do plano prevenção bugs MWART 2026-05-28.
# Bloqueia PR que introduzir regressão ESLint vs config/eslint-baseline.json.
#
# Pattern ratchet idêntico ao ui-lint.yml + phpstan-gate.yml — falha só em delta > 0.
# Captura react-hooks/exhaustive-deps (R7 raiz) entre outros bugs.
#
# Comando manual local: npm run lint:baseline:check
#
# REQUIRED-READINESS (2026-07-15, padrão ADR 0271 onda 2, idêntico ao e2e-gate.yml /
# visual-regression.yml): `pull_request` SEM `paths:` (always-run) pra ser promovível a
# required sem deadlock "Expected — waiting for status" em PR que não toca os paths. O
# custo é evitado por skip-as-pass interno: dorny/paths-filter detecta se algo relevante
# mudou; se não, conclui verde (~segundos) sem rodar o ratchet.

on:
  push:
    branches: [main, 6.7-react]
    paths:
      - 'resources/js/**'
      - 'eslint.config.js'
      - 'config/eslint-baseline.json'
      - 'scripts/eslint-baseline.mjs'
      - 'scripts/governance/ds-lint-selftest.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/eslint-gate.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: eslint-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eslint:
    name: ESLint · ratchet vs baseline
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detectar mudanças relevantes (skip-as-pass — required-readiness)
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - 'resources/js/**'
              - 'eslint.config.js'
              - 'config/eslint-baseline.json'
              - 'scripts/eslint-baseline.mjs'
              - 'scripts/governance/ds-lint-selftest.mjs'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/eslint-gate.yml'

      - name: Decidir execução
        id: decide
        run: echo "run=${{ github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true' }}" >> "$GITHUB_OUTPUT"

      - name: Skip-as-pass (nada de JS/TS mudou)
        if: steps.decide.outputs.run != 'true'
        run: echo "✅ Sem mudanças de JS/TS — skip-as-pass (required-ready, padrão ADR 0271 onda 2)."

      - name: Setup Node.js
        if: steps.decide.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install npm deps
        if: steps.decide.outputs.run == 'true'
        run: npm ci --no-audit --no-fund

      - name: ESLint ratchet (falha só em regressão vs baseline)
        if: steps.decide.outputs.run == 'true'
        run: node scripts/eslint-baseline.mjs

      # QUEM VIGIA O VIGIA — prova que as 13 regras ds/* MORDEM (bad-fixture) e não
      # falso-positivam (good-fixture). Sem isso, "simplificar" um selector quebra a
      # regra em silêncio e o ratchet acima conta 0 pra sempre (teatro). Auditoria
      # 2026-07-15 (controle-negativo visto falhar → revert).
      - name: ds/* selftest (as regras mordem)
        if: steps.decide.outputs.run == 'true'
        run: node scripts/governance/ds-lint-selftest.mjs

      - name: Diagnóstico em caso de falha
        if: failure()
        run: |
          echo ""
          echo "❌ ESLint detectou REGRESSÃO vs config/eslint-baseline.json"
          echo ""
          echo "Próximos passos:"
          echo "  1. Local: npm run lint · vê quais arquivos regrediram"
          echo "  2. Refatorar PR pra eliminar lint issues novos"
          echo "  3. Se regressão intencional/aceita, atualizar baseline em commit separado:"
          echo "       npm run lint:baseline:write"
          echo "     (commit + justificativa no PR — vai aparecer no diff do JSON)"
          echo ""
          echo "Refs: ADR 0209 · memory/sessions/2026-05-28-arte-prevencao-bugs-mwart-larissa.md F5-B"
