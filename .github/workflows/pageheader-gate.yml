name: PageHeader migration guard (F4 · congela header antigo)

# F4 do roadmap de convergência UI (MANUAL-CSS-JS.md §5).
# Bloqueia PR que faça uma tela NOVA adotar o PageHeader antigo
# (@/Components/shared/PageHeader). O contador só pode cair (migração pro canon
# @/Components/PageHeader v3.8 · ADR 0189/0190). Ratchet idêntico ao css-size-gate.
#
# Comando manual local: npm run pageheader:guard

on:
  push:
    branches: [main, 6.7-react]
    paths:
      - 'resources/js/**'
      - 'config/pageheader-shared-baseline.json'
      - 'scripts/pageheader-migration-guard.mjs'
      - 'package.json'
      - '.github/workflows/pageheader-gate.yml'
  pull_request:
    paths:
      - 'resources/js/**'
      - 'config/pageheader-shared-baseline.json'
      - 'scripts/pageheader-migration-guard.mjs'
      - 'package.json'
      - '.github/workflows/pageheader-gate.yml'

concurrency:
  group: pageheader-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pageheader:
    name: PageHeader · ratchet (header antigo só decresce)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: PageHeader migration guard (falha se tela nova adota o header antigo)
        run: node scripts/pageheader-migration-guard.mjs

      - name: Diagnóstico em caso de falha
        if: failure()
        run: |
          echo ""
          echo "❌ Uma tela NOVA adotou o PageHeader ANTIGO (@/Components/shared/PageHeader)."
          echo ""
          echo "O header antigo está em migração (F4) — não ganha adotantes novos."
          echo "Tela nova usa o canon: import PageHeader from '@/Components/PageHeader' (v3.8 · ADR 0189/0190)."
          echo ""
          echo "Se você MIGROU telas (antigo→canon), atualize o baseline no mesmo PR:"
          echo "  npm run pageheader:guard:write   (o contador desce no diff do JSON)"
          echo ""
          echo "Refs: MANUAL-CSS-JS.md §5 (F4) · INDEX-DESIGN-MEMORIAS.md"
