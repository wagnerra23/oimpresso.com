name: MWART Gate (soft)

# Camada 3 do enforcement do processo MWART canГґnico (ADR 0104).
# Verifica que PRs tocando Pages/<Mod>/<Tela>.tsx tГЄm RUNBOOK + SPEC correspondentes.
# Override: comentar '/mwart-override <razГЈo>' no PR вЂ” registra exceГ§ГЈo em ADR per-tela.

on:
  pull_request:
    paths:
      - 'resources/js/Pages/**/*.tsx'

permissions:
  contents: read
  pull-requests: write

jobs:
  mwart-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Pages alteradas
        id: detect
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          mapfile -t pages < <(
            git diff --name-only --diff-filter=AM "$base_sha"...HEAD \
              | grep -E '^resources/js/Pages/[^/_][^/]+/' \
              | grep -E '\.tsx$' \
              | grep -vE '/_[A-Za-z]' \
              | grep -vE '/_components/' \
              | sort -u
          ) || true
          echo "count=${#pages[@]}" >> "$GITHUB_OUTPUT"
          {
            echo "list<<EOF"
            printf '%s\n' "${pages[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Detected ${#pages[@]} Pages alteradas (excluindo _internals)."

      - name: Check override
        id: override
        run: |
          set -euo pipefail
          # Busca Гєltimo comentГЎrio '/mwart-override' no PR
          pr_comments=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --jq '.[].body' 2>/dev/null || echo "")
          if echo "$pr_comments" | grep -qE '^/mwart-override\s+'; then
            echo "Override detected вЂ” relaxing gate."
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify RUNBOOK + SPEC presence
        id: gate
        if: steps.detect.outputs.count != '0' && steps.override.outputs.active != 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          fail=0
          report=""

          while IFS= read -r page; do
            [[ -z "$page" ]] && continue

            # Extrair mГіdulo (1ВЄ pasta apГіs Pages/) e tela (basename .tsx)
            modulo=$(echo "$page" | sed -E 's|resources/js/Pages/([^/]+)/.*|\1|')
            tela_pascal=$(basename "$page" .tsx)

            # Pular helpers internos (jГЎ filtrado no detect, defensivo)
            if [[ "$tela_pascal" =~ ^_ ]]; then continue; fi
            if [[ "$tela_pascal" == "App" ]] || [[ "$tela_pascal" == "Layout" ]]; then continue; fi

            # PascalCase в†’ kebab-case
            tela_kebab=$(echo "$tela_pascal" | sed -E 's/([a-z0-9])([A-Z])/\1-\2/g' | tr '[:upper:]' '[:lower:]')

            runbook="memory/requisitos/${modulo}/RUNBOOK-${tela_kebab}.md"
            spec="memory/requisitos/${modulo}/SPEC.md"

            echo "::group::Page: $page (mГіdulo=$modulo, tela=$tela_kebab)"

            if [ ! -f "$runbook" ]; then
              echo "вќЊ RUNBOOK ausente: $runbook"
              report="${report}- вќЊ \`$page\` вЂ” RUNBOOK ausente em \`$runbook\` (ADR 0104 В§F1 PLAN)\n"
              fail=1
            else
              echo "вњ… RUNBOOK presente: $runbook"
            fi

            if [ ! -f "$spec" ]; then
              echo "вќЊ SPEC ausente: $spec"
              report="${report}- вќЊ \`$page\` вЂ” SPEC.md ausente em \`memory/requisitos/${modulo}/\` (ADR 0104 В§F1 PLAN exige epic + subtasks)\n"
              fail=1
            else
              # Verifica se tem ao menos 1 US no SPEC
              if ! grep -qE "^### US-[A-Z]+-[0-9]+" "$spec"; then
                echo "вљ  SPEC.md existe mas nГЈo tem US-* declaradas"
                report="${report}- вљ  \`$page\` вЂ” \`$spec\` sem nenhuma US declarada\n"
                fail=1
              else
                echo "вњ… SPEC presente com USs"
              fi
            fi

            # Charter ao lado do .tsx (convenГ§ГЈo firm вЂ” Repair/Sells/NfeBrasil todos tГЄm).
            # Pode ser <Tela>.charter.md (1 arquivo por Page) ou Index.charter.md (Page que Г© Pages/<Mod>/<Tela>/Index.tsx).
            charter_at="${page%.tsx}.charter.md"
            if [ ! -f "$charter_at" ]; then
              echo "вќЊ Charter ausente: $charter_at"
              report="${report}- вќЊ \`$page\` вЂ” \`<Tela>.charter.md\` ausente ao lado do .tsx (convenГ§ГЈo firm de Charter Pages вЂ” ver Repair/Dashboard, Sells/Create, NfeBrasil/Manifestacao)\n"
              fail=1
            else
              echo "вњ… Charter presente: $charter_at"
            fi

            # Pest test correspondente вЂ” se hГЎ Controller no mГіdulo (criado/alterado neste PR
            # OU jГЎ existente em main), exige <Tela>ControllerTest.php em Modules/<Mod>/Tests/Feature/.
            controller_path="Modules/${modulo}/Http/Controllers/${tela_pascal}Controller.php"
            test_path="Modules/${modulo}/Tests/Feature/${tela_pascal}ControllerTest.php"
            if [ -f "$controller_path" ]; then
              if [ ! -f "$test_path" ]; then
                echo "вќЊ Pest test ausente: $test_path"
                report="${report}- вќЊ \`$page\` вЂ” Pest test \`$test_path\` ausente (Controller \`$controller_path\` existe sem GUARD test вЂ” ADR 0093 multi-tenant Tier 0 sem cobertura automatizada)\n"
                fail=1
              else
                echo "вњ… Pest test presente: $test_path"
              fi
            fi

            # ADR 0107 вЂ” visual-comparison.md obrigatГіrio (gate F3)
            mod_lower=$(echo "$modulo" | tr '[:upper:]' '[:lower:]')
            visual_comp="memory/requisitos/${modulo}/${mod_lower}-${tela_kebab}-visual-comparison.md"
            visual_alt="memory/requisitos/${modulo}/${tela_kebab}-visual-comparison.md"

            if [ -f "$visual_comp" ]; then
              vc_path="$visual_comp"
            elif [ -f "$visual_alt" ]; then
              vc_path="$visual_alt"
            else
              vc_path=""
            fi

            if [ -z "$vc_path" ]; then
              echo "вќЊ visual-comparison.md ausente"
              report="${report}- вќЊ \`$page\` вЂ” \`<tela>-visual-comparison.md\` ausente em \`memory/requisitos/${modulo}/\` (ADR 0107 В§F1.5 obrigatГіrio)\n"
              fail=1
            else
              # Verifica frontmatter status: approved
              if ! grep -qE '^status:\s*approved' "$vc_path"; then
                echo "вљ  visual-comparison ainda em draft"
                report="${report}- вљ  \`$page\` вЂ” \`$vc_path\` com \`status: draft\` (Wagner ainda nГЈo aprovou вЂ” ADR 0107)\n"
                fail=1
              else
                echo "вњ… visual-comparison approved: $vc_path"
              fi

              # Verifica в‰Ґ6 dimensГµes preenchidas (8 totais вЂ” Layout, Hierarquia, Densidade, Iconografia, Estados, Atalhos, PersistГЄncia, Componentes)
              dim_count=$(grep -cE '^### [0-9]+\.' "$vc_path" || echo 0)
              if [ "$dim_count" -lt 6 ]; then
                echo "вќЊ <6 dimensГµes preenchidas (atual: $dim_count)"
                report="${report}- вќЊ \`$page\` вЂ” \`$vc_path\` tem sГі $dim_count/8 dimensГµes preenchidas (mГ­nimo 6)\n"
                fail=1
              fi

              # Verifica que coluna "DecisГЈo MWART" nГЈo tem TODO/???
              if grep -qE 'TODO|\?\?\?' "$vc_path"; then
                echo "вќЊ visual-comparison contГ©m TODO ou ???"
                report="${report}- вќЊ \`$page\` вЂ” \`$vc_path\` contГ©m TODO ou ??? (decisГµes pendentes)\n"
                fail=1
              fi
            fi

            echo "::endgroup::"
          done <<< "${{ steps.detect.outputs.list }}"

          echo "fail=$fail" >> "$GITHUB_OUTPUT"
          {
            echo "report<<EOF"
            echo -e "$report"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment results on PR
        if: always() && steps.detect.outputs.count != '0'
        uses: actions/github-script@v7
        env:
          # Passar via env evita SyntaxError quando outputs contГЄm backticks
          # markdown ou aspas вЂ” `${{ ... }}` Г© interpolado como string literal
          # antes do JS parsear, e qualquer ` no conteГєdo fecha a template string.
          # Ver: https://github.com/actions/github-script#use-env-as-input
          REPORT: ${{ steps.gate.outputs.report }}
          COUNT: ${{ steps.detect.outputs.count }}
          OVERRIDE_ACTIVE: ${{ steps.override.outputs.active }}
          GATE_FAIL: ${{ steps.gate.outputs.fail }}
        with:
          script: |
            const count = process.env.COUNT || '0';
            const overrideActive = process.env.OVERRIDE_ACTIVE === 'true';
            const gateFail = process.env.GATE_FAIL === '1';
            const report = process.env.REPORT || '';

            let status, body;
            if (overrideActive) {
              status = 'вљ пёЏ Override ativo';
              body = [
                `## рџ›ЎпёЏ MWART Gate вЂ” soft mode (override ativo)`,
                ``,
                `**Pages alteradas:** ${count}`,
                `**Status:** ${status}`,
                ``,
                `> Override detectado via comentГЎrio \`/mwart-override\`. Gate nГЈo bloqueia, mas exceГ§ГЈo deveria virar ADR per-tela em \`memory/decisions/<NNNN>-mwart-excecao-*.md\`.`,
                ``,
                `_Ver [ADR 0104](../../memory/decisions/0104-processo-mwart-canonico-unico-caminho.md)._`
              ].join('\n');
            } else if (gateFail) {
              status = 'вќЊ ViolaГ§Гµes detectadas';
              body = [
                `## рџ›ЎпёЏ MWART Gate вЂ” soft mode`,
                ``,
                `**Pages alteradas:** ${count}`,
                `**Status:** ${status}`,
                ``,
                `### ViolaГ§Гµes`,
                report || '_(ver workflow logs)_',
                ``,
                `### Como resolver`,
                `- **Charter ausente**: criar \`<Tela>.charter.md\` ao lado do \`.tsx\` (frontmatter + 8 seГ§Гµes вЂ” ver [Repair/Dashboard.charter.md](resources/js/Pages/Repair/Dashboard/Index.charter.md))`,
                `- **Pest test ausente**: criar \`Modules/<Mod>/Tests/Feature/<Tela>ControllerTest.php\` com в‰Ґ3 tests (Inertia component + KPIs shape + Tier 0 isolation ADR 0093)`,
                `- **RUNBOOK/SPEC ausentes**: rodar \`/cockpit-runbook /<rota_da_tela>\` no Claude Code`,
                `- **visual-comparison ausente**: rodar \`/mwart-comparative <tela>\` ou criar manual (ADR 0107)`,
                `- OU comentar \`/mwart-override <razГЈo>\` neste PR pra registrar exceГ§ГЈo (vira ADR per-tela)`,
                ``,
                `Ver checklist completo em [MWART-CHECKLIST.md](memory/requisitos/_processo/MWART-CHECKLIST.md).`,
                ``,
                `> **Soft mode** вЂ” nГЈo bloqueia merge ainda. Em fase 2 (apГіs backfill US-MWART-002), vira hard.`,
                ``,
                `_Ver [ADR 0104](../../memory/decisions/0104-processo-mwart-canonico-unico-caminho.md), [skill mwart-process](../../.claude/skills/mwart-process/SKILL.md)._`
              ].join('\n');
            } else {
              status = 'вњ… All clear';
              body = [
                `## рџ›ЎпёЏ MWART Gate вЂ” soft mode`,
                ``,
                `**Pages alteradas:** ${count}`,
                `**Status:** ${status}`,
                ``,
                `> Todos os Pages alterados tГЄm RUNBOOK + SPEC correspondentes (ADR 0104 В§F1 PLAN OK).`,
                ``,
                `_Ver [ADR 0104](../../memory/decisions/0104-processo-mwart-canonico-unico-caminho.md)._`
              ].join('\n');
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
