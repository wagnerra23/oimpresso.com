name: SDD Scorecard Ratchet

# 2º dente SDD (GT-G3 · ADR 0275 §3). O sinal RATCHET do scorecard isolado num
# workflow PRÓPRIO, HARD (sem continue-on-error), pra ser promovível a required.
#
# Por que separado do sdd-scorecard.yml (advisory):
#  - O sdd-scorecard.yml roda com `paths:` filtrado → NÃO dispara em todo PR →
#    promover um job dele a required daria DEADLOCK ("Expected — waiting").
#  - Os outros 2 sinais de lá (determinismo, staleness) são hygiene: a STALENESS
#    fica advisory (o scorecard commitado defasa a cada mudança do repo — vira
#    gate-que-grita-lobo se required; o lugar dela é um bot de auto-sync, não
#    bloquear PR humano).
#  - Aqui SÓ o ratchet: determinístico, verde, e o que de fato MORDE — bloqueia o
#    PR que regredir uma métrica ARMADA vs governance/sdd-scorecard-baseline.json.
#
# always-run (sem `paths:`) pra ser promovível a required sem deadlock.
# Flip (Wagner-only, ADR 0275 §5): adicionar o context do job aos
# required_status_checks do main + entry no required-checks-baseline (já incluso
# neste PR). Counterfactual: gate-selftest prova que o ratchet sai 1 quando uma
# métrica armada regride (catraca `sdd-scorecard`).

on:
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: sdd-scorecard-ratchet-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ratchet:
    name: SDD scorecard ratchet (métrica armada não regride · GT-G3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # distiller_freshness (measureDistillerFreshness) usa a data-git do doc
          # mais novo de cada módulo (ADR 0291 D-D). O default shallow (depth 1) do
          # checkout fazia o `git log` do doc voltar a data do HEAD → TODA porta
          # carimbada virava >7d → fantasma stale=5 (local, clone cheio, media 0).
          # fetch-depth:0 dá a history completa → medição correta. NÃO afrouxa o
          # floor 0 (ADR 0275) — conserta a MEDIÇÃO, não a trava.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # P14 (avaliação 2026-07-01, defeito nº 1): sem esta materialização o ratchet
      # lia not_yet_measured (governance/nightly-floor.json é gitignored, ausente no
      # checkout de PR) e PULAVA a métrica armada em silêncio — floor=298 era lei só
      # no papel. Ramo do floor é HARD (full_suite está armed:true no baseline; fetch
      # falho = vermelho, re-run resolve transiente). Coverage fica soft enquanto
      # coverage_pct estiver armed:false — endurecer no PR que armar C2.
      - name: Materializa floor + coverage da órfã governance/nightly-floor (P14 · ADR 0279/0275)
        run: |
          git fetch origin governance/nightly-floor --depth 1
          git show FETCH_HEAD:governance/nightly-floor.json > governance/nightly-floor.json
          echo "floor materializado:"; cat governance/nightly-floor.json
          if git show FETCH_HEAD:governance/nightly-coverage.json > governance/nightly-coverage.json 2>/dev/null; then
            echo "coverage materializado:"; cat governance/nightly-coverage.json
          else
            echo "coverage ausente na órfã — coverage_pct segue not_yet_measured (armed:false hoje; endurecer este ramo ao armar C2)"
          fi

      # Trend do RAGAS real (ADR 0318 · órfã própria — a de floor é force-pushed toda
      # noite, o trend acumula). Ramo SOFT enquanto ragas_real_uptime estiver
      # armed:false no baseline — endurecer (como o floor acima) no PR que armar
      # após 3 medições válidas consecutivas (ADR 0275 §3).
      - name: Materializa trend do RAGAS real da órfã governance/ragas-real-trend (ADR 0318)
        run: |
          if git fetch origin governance/ragas-real-trend --depth 1 2>/dev/null \
             && git show FETCH_HEAD:governance/ragas-real-trend.json > governance/ragas-real-trend.json 2>/dev/null; then
            echo "trend ragas materializado:"; cat governance/ragas-real-trend.json
          else
            echo "órfã governance/ragas-real-trend ausente — ragas_real_uptime segue not_yet_measured (armed:false hoje; 1º cron 2026-07-05)"
          fi

      - name: Ratchet — nenhuma métrica ARMADA regrediu vs baseline (ADR 0275 §3)
        run: node scripts/governance/sdd-scorecard.mjs --ratchet
