name: Screen Smoke After Merge

# ─────────────────────────────────────────────────────────────────────────────
# Fase C (Check) do PDCA MWART — smoke visual REAL pós-deploy, AUTOMÁTICO e
# INCONDICIONAL. Materializa a pendência §9.4 da ADR 0164.
#
# Regra Wagner (2026-07-08): "nemme pergunte mais isso é sempre sim automatize isso"
# → o smoke pós-deploy roda SOZINHO, sem HITL de decisão. Único HITL = merge (R10).
#
# ── MECANISMO (Wagner 2026-07-08: "use o openai") ───────────────────────────
# Roda TUDO num runner ubuntu do GitHub — SEM CT 100, SEM secret novo, SEM o
# browser-MCP-headless (que era o único ponto sem receita fechada da 1ª versão):
#   • Playwright headless (já é dep do repo — @playwright/test, gate E2E) navega
#     prod, loga por form, screenshota 1440+1280, coleta console errors + os 4
#     sinais de render determinísticos.
#   • OpenAI vision (o OPENAI_API_KEY que JÁ existe no repo — RAGAS) julga se a
#     tela renderizou ou está QUEBRADA (tela branca, erro, layout destruído).
#   • Motor: scripts/screen-smoke/smoke.mjs · rotas curadas: scripts/screen-smoke/routes.json.
#
#   Isto SUPERSEDE o mecanismo "browser MCP isolado no CT 100" da ADR 0164 §3
#   (que pressupunha a MCP claude-in-chrome). Como não usamos mais browser MCP, o
#   §3 não se aplica; ADR 0062 (Hostinger≠CT100) segue intacto — um runner ubuntu
#   efêmero batendo em prod por HTTPS não é daemon no host errado. Emendar a
#   ADR 0164 §3 pra registrar a troca de mecanismo é follow-up (append-only).
#
# Gaps que fecha:
#   • curl 302/200 do deploy.yml NÃO é smoke (prova rota, não render).
#   • Gap do PR #3945: mudança de ITEM DE MENU (Sidebar.tsx/AdminSidebarMenu.php/
#     LegacyMenuAdapter.php) não tocava Pages/*.tsx → agora também aciona o smoke.
#
# ── HARDENING (revisão adversarial 2026-07-08 — mantido) ────────────────────
#   • CRÍTICO 1 fail-safe: ativação é um SWITCH deliberado `SCREEN_SMOKE_ENABLED=true`
#     (+ OPENAI_API_KEY presente). Em ubuntu não há risco de job pendurado, mas o
#     switch mantém a ativação consciente.
#   • CRÍTICO 2 injeção: nomes de arquivo passam por allowlist ESTRITO [A-Za-z0-9/_.-].
#   • ALTO 3: input do dispatch vem por env + validação de charset.
#   • ALTO 4 least-privilege: o smoke.mjs é código FIXO e determinístico (não é um
#     agente-LLM com tools/shell) → a superfície de exfiltração de #2/#3 nem existe.
#     O job `smoke` fica `contents: read`; só o `persist` tem write.
#
# ── LOOP PDCA (Act) — #5 RESOLVIDO (persist via PR) ─────────────────────────
#   O smoke.mjs escreve `<Tela>.review.md` (append round N) ao lado do .tsx. O job
#   `persist` baixa esses .md e abre um PR `screen-smoke/review-<run>`. O MERGE do
#   Wagner = decisão Act (edita `decisão: approved|rejected|iterate`). Rounds
#   mergeados voltam pra main → o próximo smoke herda os anteriores (append-only real).
#
# ── RESIDUAIS (pendências Wagner — NÃO ligar o switch antes de #8) ──────────
#   • #8 credencial/PII/BRL: SMOKE_PROD_USER/PASS TÊM que ser conta biz=99 FAKE
#     read-only. Senão screenshots capturam dados reais + VALORES R$ (vazam no
#     artifact 30d E vão pra OpenAI). Sem creds, o smoke só cobre /login (público).
#   • #6 detecção multi-commit (squash cobre) · #7 race deploy-concluiu ≠ código-live.
#   • tsx→rota não é 1:1 → smokamos um conjunto CURADO (routes.json), priorizando as
#     rotas cujo `source` mudou. Expandir routes.json conforme telas críticas.
#
# ATIVAÇÃO (só Wagner — NESTA ORDEM):
#   1. Confirmar secret OPENAI_API_KEY (já existe — RAGAS).
#   2. (pra telas auth) gh secret set SMOKE_PROD_USER / SMOKE_PROD_PASS = conta biz=99 FAKE.
#   3. POR ÚLTIMO: gh variable set SCREEN_SMOKE_ENABLED --body true.
#
# Cross-refs: ADR 0164 · ADR 0269 (deploy.yml) · scripts/screen-smoke/ ·
# memory/reference/feedback-deploy-smoke-browser-obrigatorio.md §6 ·
# memory/requisitos/Infra/RUNBOOK-screen-smoke-ativacao.md.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_run:
    workflows: ["Deploy to Hostinger"]
    types: [completed]
  workflow_dispatch:
    inputs:
      rota:
        description: 'Rota/tela pra smoke manual (só [A-Za-z0-9/_.-], ex: Sells/Create). Vazio = telas do último deploy.'
        required: false
        default: ''
        type: string

concurrency:
  group: screen-smoke
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── JOB 1: DETECT — o que mudou + o smoke está LIGADO? ───────────────────────
  detect:
    name: Detectar telas/navegação alteradas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      should_smoke: ${{ steps.filter.outputs.should_smoke }}
      screens: ${{ steps.filter.outputs.screens }}
      infra_ready: ${{ steps.infra.outputs.ready }}
    steps:
      - name: Checkout do SHA deployado
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 2

      - name: Filtrar paths (telas + navegação)
        id: filter
        env:
          # ALTO 3: input do dispatch vem por env (nunca interpolado no run:).
          ROTA_INPUT: ${{ github.event.inputs.rota }}
        run: |
          set -uo pipefail
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            ROTA="$ROTA_INPUT"
            if ! printf '%s' "$ROTA" | grep -qE '^[A-Za-z0-9/_.-]*$'; then
              echo "::error::input 'rota' inválido — permitido só [A-Za-z0-9/_.-]."
              exit 1
            fi
            echo "should_smoke=true" >> "$GITHUB_OUTPUT"
            echo "screens=${ROTA:-__MANUAL__}" >> "$GITHUB_OUTPUT"
            echo "→ dispatch manual · rota='${ROTA:-(último deploy)}'"
            exit 0
          fi

          # Arquivos alterados no deploy (squash-merge → HEAD^ = main antes do merge).
          CHANGED="$(git diff --name-only HEAD^ HEAD 2>/dev/null || git show --name-only --format= HEAD)"
          echo "=== arquivos alterados ==="; printf '%s\n' "$CHANGED"

          # CRÍTICO 2: allowlist ESTRITO de charset (descarta nome com espaço/injeção).
          SCREENS="$(printf '%s\n' "$CHANGED" | grep -E '^resources/js/Pages/[A-Za-z0-9/_.-]+\.tsx$' || true)"
          # Navegação (gap #3945 — item de menu não é uma tela). Match exato.
          NAV="$(printf '%s\n' "$CHANGED" | grep -E '^(resources/js/Components/cockpit/Sidebar\.tsx|app/Http/Middleware/AdminSidebarMenu\.php|app/Services/LegacyMenuAdapter\.php)$' || true)"

          if [ -z "$SCREENS" ] && [ -z "$NAV" ]; then
            echo "should_smoke=false" >> "$GITHUB_OUTPUT"
            echo "screens=" >> "$GITHUB_OUTPUT"
            echo "→ nenhuma tela/navegação alterada — sem smoke."
            exit 0
          fi

          echo "should_smoke=true" >> "$GITHUB_OUTPUT"
          if [ -n "$SCREENS" ]; then
            LIST="$(printf '%s\n' "$SCREENS" | paste -sd ',' -)"
            echo "screens=${LIST}" >> "$GITHUB_OUTPUT"
            echo "→ smoke priorizando telas: ${LIST}"
          else
            echo "screens=__NAV__" >> "$GITHUB_OUTPUT"
            echo "→ mudança só de navegação — smoke nav-crítico."
          fi

      - name: Smoke LIGADO? (switch SCREEN_SMOKE_ENABLED + OPENAI_API_KEY)
        id: infra
        env:
          KEY: ${{ secrets.OPENAI_API_KEY }}
          ENABLED: ${{ vars.SCREEN_SMOKE_ENABLED }}
        run: |
          if [ -n "$KEY" ] && [ "$ENABLED" = "true" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "→ smoke LIGADO."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "→ smoke DESLIGADO (switch!=true ou OPENAI_API_KEY ausente)."
          fi

      - name: Avisar se DESLIGADO com tela pendente (WARN, não falha)
        if: steps.filter.outputs.should_smoke == 'true' && steps.infra.outputs.ready != 'true'
        run: |
          echo "::warning title=Screen smoke DESLIGADO::Telas/navegação mudaram mas o smoke não está ligado. Ativar: (1) confirmar secret OPENAI_API_KEY; (2) pra telas auth, gh secret set SMOKE_PROD_USER/SMOKE_PROD_PASS = conta biz=99 FAKE; (3) POR ÚLTIMO gh variable set SCREEN_SMOKE_ENABLED --body true. Ver RUNBOOK-screen-smoke-ativacao.md."

  # ── JOB 2: SMOKE — Playwright + OpenAI vision, em ubuntu ─────────────────────
  smoke:
    name: Smoke visual real (Playwright + OpenAI)
    needs: detect
    if: needs.detect.outputs.should_smoke == 'true' && needs.detect.outputs.infra_ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout do SHA deployado
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 2

      - name: Health gate — prod respondendo antes do smoke
        run: |
          set -uo pipefail
          OK=""
          for i in 1 2 3 4 5 6; do
            CODE="$(curl -4 -sL -o /dev/null -w '%{http_code}' --max-time 20 https://oimpresso.com/login || echo 000)"
            echo "tentativa $i: HTTP $CODE"
            if [ "$CODE" = "200" ] || [ "$CODE" = "302" ]; then OK=1; break; fi
            sleep 10
          done
          [ -z "$OK" ] && { echo "::error::prod não respondeu 200/302 em /login."; exit 1; }
          echo "→ prod alcançável. (curl NÃO é smoke — o render real vem a seguir.)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar deps + Chromium do Playwright
        run: |
          npm ci --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Smoke visual (Playwright + OpenAI vision)
        env:
          SMOKE_BASE_URL: https://oimpresso.com
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMOKE_VISION_MODEL: ${{ vars.SCREEN_SMOKE_MODEL || 'gpt-4o-mini' }}
          # Credenciais biz=99 FAKE (residual #8) — ausentes → só rotas públicas.
          SMOKE_PROD_USER: ${{ secrets.SMOKE_PROD_USER }}
          SMOKE_PROD_PASS: ${{ secrets.SMOKE_PROD_PASS }}
          SCREENS: ${{ needs.detect.outputs.screens }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node scripts/screen-smoke/smoke.mjs

      - name: Preservar evidência (screenshots + review.md + smoke-log)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screen-smoke-${{ github.run_id }}
          path: |
            storage/screen-smoke/**
            resources/js/Pages/**/*.review.md
          if-no-files-found: ignore
          retention-days: 30

  # ── JOB 3: PERSIST — #5 loop Act: leva o review.md pro git canon via PR ──────
  persist:
    name: Persistir review.md via PR (loop Act — Wagner decide)
    needs: [detect, smoke]
    if: always() && (needs.smoke.result == 'success' || needs.smoke.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Baixar artefatos do smoke (tolerante a ausência)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: screen-smoke-${{ github.run_id }}
          path: _smoke_artifacts

      - name: Aplicar review.md no canon + abrir PR do round
        env:
          BOT_PAT: ${{ secrets.COWORK_BOT_PAT }}
          GH_TOKEN: ${{ secrets.COWORK_BOT_PAT }}
          RUN_ID: ${{ github.run_id }}
          SCREENS: ${{ needs.detect.outputs.screens }}
        run: |
          set -uo pipefail
          if [ ! -d _smoke_artifacts ]; then
            echo "→ smoke não gerou artefato — nada a persistir."; exit 0
          fi
          # Só os review.md (screenshots ficam no artifact; review.md os referencia).
          FOUND=0
          while IFS= read -r f; do
            rel="${f#_smoke_artifacts/}"
            case "$rel" in
              resources/js/Pages/*.review.md)
                mkdir -p "$(dirname "$rel")"; cp "$f" "$rel"; FOUND=1 ;;
            esac
          done < <(find _smoke_artifacts -type f -name '*.review.md')
          rm -rf _smoke_artifacts

          [ "$FOUND" = "0" ] && { echo "→ nenhum review.md no artifact."; exit 0; }
          if git diff --quiet -- resources/js/Pages; then
            echo "→ review.md idêntico ao canon — nada a commitar."; exit 0
          fi
          if [ -z "${BOT_PAT:-}" ]; then
            echo "::warning::COWORK_BOT_PAT ausente — review.md ficou só no artifact screen-smoke-${RUN_ID}."; exit 0
          fi

          BR="screen-smoke/review-${RUN_ID}"
          git config user.name "oimpresso-ci"
          git config user.email "ci@oimpresso.com"
          git remote set-url origin "https://x-access-token:${BOT_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git checkout -b "$BR"
          git add -A -- resources/js/Pages
          git commit -m "docs(screen-review): round de smoke pós-deploy — ${SCREENS} [smoke]" \
                     -m "Fase C→A do PDCA (ADR 0164). review.md gerado pelo smoke automático (Playwright+OpenAI). Screenshots no artifact screen-smoke-${RUN_ID}. Wagner (Act): edite 'decisão: approved|rejected|iterate' e mergeie."
          git push -u origin "$BR"
          gh pr create --base main --head "$BR" \
            --title "docs(screen-review): round smoke — ${SCREENS} [smoke]" \
            --body "Round de smoke visual pós-deploy (ADR 0164 fase C→A). Screenshots: artifact \`screen-smoke-${RUN_ID}\`.

          **Wagner (Act):** edite o round no \`<Tela>.review.md\` com \`decisão: approved | rejected | iterate\` e mergeie." \
          || echo "::warning::gh pr create falhou (talvez PR já exista pra este run)."
