name: System Map (matriz gerada · advisory)

# Painel do sistema como MATRIZ gerada (proposal painel-sistema-matriz-gerada.md).
# Deriva memory/reference/PAINEL-SISTEMA.md das fontes canônicas — índice que aponta
# pros donos, não cópia. Anti-drift: editar à mão é inútil (a máquina regenera).
#
# 2 modos:
#   - PR (advisory): --check avisa se o painel ficou stale vs as fontes tocadas.
#     Nasce advisory (continue-on-error) — ADR 0261/0271, gate novo nunca nasce required.
#   - schedule/dispatch: regenera + abre auto-PR se mudou (a "máquina que mantém").
#     Auto-PR (não push direto): main rejeita push do bot (GH013) — padrão de
#     sdd-scorecard-publish.yml. COWORK_BOT_PAT + auto-merge; branch chore/ efêmera.

on:
  pull_request:
    branches: [main]
    paths:
      - 'memory/requisitos/*/BRIEFING.md'
      - 'memory/decisions/*.md'
      - 'memory/proibicoes.md'
      - 'governance/sdd-scorecard.json'
      - 'scripts/governance/gates-registry.json'
      - 'governance/required-checks-baseline.json'
      - 'scripts/governance/system-map.mjs'
      - '.github/workflows/system-map.yml'
  schedule:
    - cron: '30 10 * * *' # 07:30 BRT diário (pós-scorecard 06:50)
  workflow_dispatch:

concurrency:
  group: system-map-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: painel bate com as fontes (advisory)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # git log precisa do histórico p/ frescor
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: system-map --check (stale = avisa, não bloqueia)
        continue-on-error: true
        run: node scripts/governance/system-map.mjs --check

  refresh:
    name: regenera + auto-PR (matriz que mantém)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Regenera o painel + porta de entrada
        run: node scripts/governance/system-map.mjs
      # Auto-PR (NÃO push direto): main exige PR + required checks — o push direto do bot
      # é rejeitado (GH013 "Changes must be made through a pull request"), então o
      # commit-back antigo NUNCA aterrissava e a matriz não se mantinha. Padrão copiado de
      # sdd-scorecard-publish.yml / shipped-log-cron.yml. COWORK_BOT_PAT (não GITHUB_TOKEN):
      # PR aberto pelo GITHUB_TOKEN não dispara CI → ficaria preso no branch protection.
      # Branch chore/ efêmera (delete-branch); só cria PR se houver diff nos add-paths.
      - name: Auto-PR do painel regenerado
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.COWORK_BOT_PAT }}
          base: main
          branch: chore/system-map-refresh
          add-paths: |
            memory/reference/PAINEL-SISTEMA.md
            memory/reference/COMECE-AQUI.md
          commit-message: |
            chore(matriz): regenera PAINEL-SISTEMA + COMECE-AQUI das fontes canônicas

            Índice derivado ficou stale vs as fontes (módulos/ADRs/gates/scorecard). Regen
            automático pela máquina matriz (system-map.mjs). Substitui o git push direto em
            main (rejeitado por branch protection — GH013) pelo padrão auto-PR canônico.

            Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>
          title: 'chore(matriz): regenera PAINEL-SISTEMA + COMECE-AQUI (máquina matriz)'
          body: |
            **Regeneração automática dos índices do sistema** (`system-map.mjs`).

            O `PAINEL-SISTEMA.md` / `COMECE-AQUI.md` derivados ficaram desatualizados vs as
            fontes canônicas (módulos, ADRs, gates, scorecard). Esta é a "máquina que mantém"
            fechando o loop.

            Substitui o `git push` direto em main (rejeitado por branch protection — GH013)
            pelo padrão auto-PR de `sdd-scorecard-publish.yml` / `shipped-log-cron.yml`.
            Auto-merge habilitado; branch `chore/` efêmera.

            🤖 Generated by system-map (matriz)
          labels: |
            governance
            automated
          delete-branch: true
      - name: Auto-merge no PR gerado
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.COWORK_BOT_PAT }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --auto --delete-branch
