# ollama-embedder — embedder local de texto pro Copiloto
# ADR 0060 (Opção C híbrida) — substitui OpenAI text-embedding-3-small.
#
# Recursos: 4GB RAM, 4 CPU (Xeon E5-2680v4 14C/28T sobra)
# Modelo: nomic-embed-text v1.5 (768 dim, 137M params, multi-lingual decente em PT-BR)
# Acesso: APENAS interno (não exposto via Traefik) — porta 11434 do CT
#
# Setup:
#   1. SSH ao CT 100: cd /opt/oimpresso-ai && git clone (ou copia este compose)
#   2. docker compose -f ollama-embedder/docker-compose.yml up -d
#   3. Aguarda ~5 min download do modelo Nomic (~280MB)
#   4. docker exec ollama-embedder ollama pull nomic-embed-text
#   5. Smoke: curl http://localhost:11434/api/embeddings -d '{"model":"nomic-embed-text","prompt":"olá"}'
#
# Usage no Laravel (Modules/Copiloto/Services/Memoria/MeilisearchDriver.php):
#   .env: OLLAMA_EMBED_URL=http://192.168.0.50:11434/api/embeddings
#         OLLAMA_EMBED_MODEL=nomic-embed-text

services:
  ollama-embedder:
    image: ollama/ollama:latest
    container_name: ollama-embedder
    restart: unless-stopped
    networks:
      - docker-host_default
    ports:
      # Expor SOMENTE pra LAN (192.168.0.0/24) — Hostinger não chega aqui sozinho
      - "192.168.0.50:11434:11434"
    volumes:
      - ollama-embedder-data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
    environment:
      OLLAMA_KEEP_ALIVE: '24h'      # mantém modelo em RAM (sem cold start)
      OLLAMA_NUM_PARALLEL: '4'       # 4 requests simultâneas
      OLLAMA_MAX_LOADED_MODELS: '1'  # só Nomic carregado (economia RAM)
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  ollama-embedder-data:
    driver: local

networks:
  docker-host_default:
    external: true
