# OTel backend para CT 100 — recebe os spans que o OtelHelper já emite
# (config/otel.php → OTEL_EXPORTER_OTLP_TRACES_ENDPOINT = http://mcp.oimpresso.com:4318/v1/traces).
#
# DORMENTE: este arquivo NÃO ativa nada sozinho. O flip Tier 0 é do [W]:
#   1. subir este compose no CT 100 (docker compose -f docker-compose.yml up -d)
#   2. setar OTEL_ENABLED=true no .env do CT 100 (Hostinger fica false — ADR 0062)
# Ver: memory/requisitos/Jana/RUNBOOK-tier0-champion-makers-activation.md (TAREFA 1.b)
#
# Jaeger all-in-one já aceita OTLP nativo (4317 gRPC / 4318 HTTP) com
# COLLECTOR_OTLP_ENABLED=true — não precisa de otel-collector separado.
# Storage: badger (disco local persistente, custo ~zero). Pra escala → Elasticsearch.

services:
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: oimpresso-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    ports:
      - "4318:4318"    # OTLP HTTP — endpoint que o app já usa
      - "4317:4317"    # OTLP gRPC
      - "16686:16686"  # Jaeger UI (proteger atrás de Tailscale/auth no CT 100)
    volumes:
      - jaeger-badger:/badger
    # Recomendado no CT 100: bind só na interface Tailscale (não expor 16686 público).
    # Ex.: ports: ["100.x.x.x:16686:16686"]

volumes:
  jaeger-badger:
