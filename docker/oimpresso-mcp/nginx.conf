user www-data;
worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 50M;

    # Logs JSON pra agregação (alimenta MEM-CC-2 dashboard)
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"user_agent":"$http_user_agent",'
        '"x_claude_session":"$http_x_claude_code_session"'
        '}';
    access_log /var/log/nginx/access.log json_combined;

    # Server block — única virtualhost (mcp.oimpresso.com via Traefik)
    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Healthcheck nativo (sem PHP) pra Traefik
        location = /healthz {
            access_log off;
            return 200 'nginx-ok\n';
            add_header Content-Type text/plain;
        }

        # Fallback Laravel router
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP via FPM local
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 60s;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
        }

        # Bloquear arquivos sensíveis
        location ~ /\.(?!well-known).* {
            deny all;
        }
        location ~ \.(env|log|sql|md|gitignore|gitattributes)$ {
            deny all;
        }
    }
}
