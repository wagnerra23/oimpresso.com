; MEM-MCP-1.b (ADR 0053) — Overrides PHP 8.4 pro container MCP

memory_limit = 256M
max_execution_time = 60
post_max_size = 50M
upload_max_filesize = 50M

date.timezone = America/Sao_Paulo

; Opcache em produção pra performance
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1

; Realpath cache — Laravel se beneficia
realpath_cache_size = 4M
realpath_cache_ttl = 600

; Logs vão pra stderr (capturado por supervisord → Docker logs)
log_errors = On
error_log = /dev/stderr

; Não expor versão PHP em headers
expose_php = Off
