; MEM-MCP-1.c-perf (ADR 0053) — Overrides PHP 8.4 pro container MCP
;
; Otimizado pra Laravel 13 + 17.6k classes + 30+ módulos nWidart.
; Cold start medido ANTES: 2-10s health, 60s+ tools/list (pool exhausted).
; Meta: <500ms warm, <2s cold, sustenta 20 req/s.

memory_limit = 512M
max_execution_time = 60
post_max_size = 50M
upload_max_filesize = 50M

date.timezone = America/Sao_Paulo

; ============================================================================
; OPcache — peça fundamental do perf
; ============================================================================
; 17.669 classes no autoload_classmap exigem MUITO mais memória que default.
; Empiricamente: ~30-40MB por 1k classes em opcode → 512MB seguro com folga.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 512
opcache.interned_strings_buffer = 32
; Bumped 10k → 30k pra caber 17k classes do oimpresso + vendor + módulos.
opcache.max_accelerated_files = 30000
; Em prod: NUNCA revalida (deploy reinicia container). Ganho: ~30% nos stat() calls.
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
; Save comments — Laravel usa annotations em algumas libs.
opcache.save_comments = 1
opcache.fast_shutdown = 1

; JIT tracing — speed-up adicional em loops e funções quentes.
; tracing > function (PHP 8.4 default). Buffer 100M é generoso mas necessário.
opcache.jit_buffer_size = 100M
opcache.jit = tracing

; ============================================================================
; Realpath cache — Laravel cria centenas de path lookups por request
; ============================================================================
realpath_cache_size = 8M
realpath_cache_ttl = 600

; ============================================================================
; Logging
; ============================================================================
log_errors = On
error_log = /dev/stderr

; Não expor versão PHP em headers
expose_php = Off
