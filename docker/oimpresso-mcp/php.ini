; MEM-MCP-1.c-perf (ADR 0053) — Overrides PHP 8.4 pro container MCP
;
; CT 100 resized 29-abr: 8GB/4c → 32GB/16c (Wagner liberou máquina inteira).
; Octane workers: 4 → 16 (match cores).
; Per-worker budget: ~1.5GB (16 workers × 1.5GB = 24GB, sobra ~8GB pra OS+buffer).
;
; Cold start: 2-10s → ~50ms (Octane mantém boot em mem).
; Throughput: 200-400 RPS → 4.000+ RPS (FrankenPHP + 16 workers).

memory_limit = 1024M
max_execution_time = 60
post_max_size = 50M
upload_max_filesize = 50M

date.timezone = America/Sao_Paulo

; ============================================================================
; OPcache — agora muito mais generoso (CT 100 com 32GB)
; ============================================================================
opcache.enable = 1
opcache.enable_cli = 0
; Bumped 512M → 1GB. 17.669 classes + vendor full hit ~700MB em produção.
opcache.memory_consumption = 1024
opcache.interned_strings_buffer = 64
; Bumped 30k → 50k pra caber 17k classes + autoload generated com folga.
opcache.max_accelerated_files = 50000
; Em prod: NUNCA revalida (Octane recarrega no max-requests recycle).
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1

; JIT tracing — buffer maior agora que temos RAM sobrando.
opcache.jit_buffer_size = 256M
opcache.jit = tracing

; ============================================================================
; Realpath cache — Laravel cria centenas de path lookups por request
; ============================================================================
realpath_cache_size = 16M
realpath_cache_ttl = 600

; ============================================================================
; Logging
; ============================================================================
log_errors = On
error_log = /dev/stderr

; Não expor versão PHP em headers
expose_php = Off
