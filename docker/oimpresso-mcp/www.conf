; MEM-MCP-1.c-perf (ADR 0053) — Override pool php-fpm pro container MCP
;
; Default php:8.4-fpm-alpine: pm.max_children=5 (insuficiente).
; Smoke 29-abr 2026: 3 calls paralelas exauriam pool, 60s+ timeout.
;
; Sizing — empírico:
;   Cada worker idle ~30MB + ~40MB ao processar Laravel boot.
;   Container .env memory_limit=512M, mas worker usa ~80-120M em pico.
;   20 workers × 120M = 2.4GB pico — bem dentro de qualquer host docker razoável.

[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000
listen.mode = 0660

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
; Recycle worker após 500 requests pra evitar memory leaks acumulando.
pm.max_requests = 500

; Status endpoint pra monitoring (acessível só local — nginx não expõe)
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; Slowlog — captura requests >5s pra investigar bottlenecks futuros
slowlog = /var/log/php-fpm-slow.log
request_slowlog_timeout = 5s

; Output capture
catch_workers_output = yes
decorate_workers_output = no

; Mesmo env do parent
clear_env = no
