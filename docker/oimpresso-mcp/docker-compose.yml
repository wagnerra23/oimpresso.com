# MEM-MCP-1.b (ADR 0053) — Stack Docker do MCP server da empresa
#
# Hospedagem: CT 100 docker-host (Proxmox empresa, 192.168.0.50)
# Subdomínio: mcp.oimpresso.com → 177.74.67.30 → Traefik → este container
# Cert: Let's Encrypt R12 automático via Traefik labels
# DB: MySQL Hostinger via SSH tunnel (autossh sidecar)
#
# Deploy:
#   ssh root@<ct-100>
#   cd /opt/oimpresso-mcp
#   git pull && docker compose up -d
#
# NÃO usar Portainer Stacks (tem limitações com compose-spec novo —
# ver discussão na sessão de 29-abr-2026). Portainer apenas observa.

services:

  # ========================================================================
  # MCP server — app Laravel com endpoints /api/mcp/*
  # ========================================================================
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: oimpresso/mcp:latest
    container_name: oimpresso-mcp
    restart: unless-stopped
    networks:
      - docker-host_default

    # Volume bind: código vem do clone git em /opt/oimpresso-mcp/code (host)
    # Atualização: git pull no host + reload PHP-FPM no container
    volumes:
      - /opt/oimpresso-mcp/code:/var/www/html:ro
      - /opt/oimpresso-mcp/storage:/var/www/html/storage:rw
      - /opt/oimpresso-mcp/bootstrap-cache:/var/www/html/bootstrap/cache:rw

    # Variáveis de ambiente — usar .env (não commitado)
    env_file:
      - .env

    environment:
      # Conecta ao MySQL Hostinger via tunnel rodando no sidecar
      DB_HOST: tunnel
      DB_PORT: 3306
      # Laravel paths
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}

    depends_on:
      tunnel:
        condition: service_healthy

    # Healthcheck pra Traefik saber quando o container está pronto
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/api/mcp/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    labels:
      # Traefik routing
      - "traefik.enable=true"
      - "traefik.docker.network=docker-host_default"

      # HTTPS router
      - "traefik.http.routers.mcp.rule=Host(`mcp.oimpresso.com`)"
      - "traefik.http.routers.mcp.entrypoints=websecure"
      - "traefik.http.routers.mcp.tls=true"
      - "traefik.http.routers.mcp.tls.certresolver=letsencrypt"

      # Backend (nginx interno na 80)
      - "traefik.http.services.mcp.loadbalancer.server.port=80"
      - "traefik.http.services.mcp.loadbalancer.healthcheck.path=/api/mcp/health"
      - "traefik.http.services.mcp.loadbalancer.healthcheck.interval=30s"

      # HTTP → HTTPS redirect
      - "traefik.http.routers.mcp-http.rule=Host(`mcp.oimpresso.com`)"
      - "traefik.http.routers.mcp-http.entrypoints=web"
      - "traefik.http.routers.mcp-http.middlewares=mcp-redirect"
      - "traefik.http.middlewares.mcp-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.mcp-redirect.redirectscheme.permanent=true"

  # ========================================================================
  # SSH tunnel sidecar — mantém túnel persistente pro MySQL Hostinger
  # ========================================================================
  # autossh roda em loop forever; reconecta automaticamente se cair.
  # Expõe localhost:3306 dentro da rede docker (alias: tunnel:3306)
  # No app, DB_HOST=tunnel.
  #
  # Comando lê o script start-tunnel.sh (bind-mountado do repo) — evita
  # quoting issue de YAML folded scalar com aspas aninhadas.
  tunnel:
    image: kroniak/ssh-client:3.20
    container_name: oimpresso-mcp-tunnel
    restart: unless-stopped
    networks:
      - docker-host_default

    volumes:
      - /opt/oimpresso-mcp/ssh:/root/.ssh:ro
      - ./scripts:/scripts:ro

    # Lista (não string) — Docker NÃO faz sh -c implícito
    entrypoint: ["/bin/sh"]
    command: ["/scripts/start-tunnel.sh"]

    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3306 || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

networks:
  docker-host_default:
    external: true
